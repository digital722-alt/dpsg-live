<!DOCTYPE html>  <html lang="hi">  
<head>  
    <meta charset="UTF-8">  
    <meta name="viewport" content="width=device-width, initial-scale=1.0">  
    <title>DPSG Digital Seva - Nimbahera Official</title>  
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>  
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>  
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>  
    <script src="https://cdn.tailwindcss.com"></script>  
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>  
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>  
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">  
    <style>  
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');  
        body { font-family: 'Inter', sans-serif; background-color: #010413; color: white; margin: 0; overflow-x: hidden; }  
        .receipt-card { border: 1px solid #e2e8f0; color: #0f172a; border-radius: 1.5rem; background: white; }  
          
        @media print { .no-print { display: none !important; } }  

        /* SCRATCH CARD CSS */
        .scratch-container { position: relative; width: 100%; max-width: 500px; margin: 0 auto; user-select: none; }
        .scratch-canvas { position: absolute; top: 0; left: 0; z-index: 20; cursor: crosshair; border-radius: 1.5rem; width: 100%; height: 100%; touch-action: none; }
        .scratch-content { position: relative; z-index: 10; background: #000; border-radius: 1.5rem; overflow: hidden; }

        .winner-peela-glow { border: 4px solid #fbbf24; box-shadow: 0 0 70px rgba(251, 191, 36, 0.45); border-radius: 2rem; background: rgba(2, 6, 23, 0.95); animation: pulse-glow 2s infinite; }  
        @keyframes pulse-glow { 0%, 100% { box-shadow: 0 0 40px rgba(251, 191, 36, 0.3); } 50% { box-shadow: 0 0 80px rgba(251, 191, 36, 0.6); } }  

        /* BIG PHOTO SIZE */
        .prize-image-display { width: 100%; height: auto; min-height: 350px; display: flex; align-items: center; justify-content: center; }
        .prize-image-display img { width: 100%; height: auto; max-height: 600px; object-fit: contain; }
    </style>
</head>  
<body>  
    <div id="root"></div>  
    <script type="text/babel">  
    const { useState, useEffect, useRef, useCallback } = React;  

    const SHEET_ID = "1rrU0EHXur_HfPlmYxjm6vIJqeRW2VZAu0qIteItQkLo";  
    const MAIN_CSV = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv`;  
    const MAPPING_CSV = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRlm-iMRLk5J-lxybJ7S2sR3ZpcGNG8Z8r3BEku8GzK8opYlsunIcZoe03Jf0Xbhw/pub?gid=1529433935&single=true&output=csv";  

    const toDirectLink = (url) => {  
        if (!url) return "";  
        let id = "";  
        if (url.includes("/d/")) id = url.split("/d/")[1].split("/")[0];  
        if (url.includes("id=")) id = url.split("id=")[1].split("&")[0];  
        return id ? "https://drive.google.com/thumbnail?id=" + id + "&sz=w1000" : url;  
    };  

    const ScratchCard = ({ onComplete, children }) => {
        const canvasRef = useRef(null);
        const [isRevealed, setIsRevealed] = useState(false);

        useEffect(() => {
            const canvas = canvasRef.current;
            const ctx = canvas.getContext('2d');
            const parent = canvas.parentElement;
            canvas.width = parent.offsetWidth;
            canvas.height = parent.offsetHeight;

            // Scratch Layer (Golden/Silver Mix)
            const grad = ctx.createLinearGradient(0, 0, canvas.width, canvas.height);
            grad.addColorStop(0, '#C0C0C0');
            grad.addColorStop(0.5, '#E8E8E8');
            grad.addColorStop(1, '#A9A9A9');
            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Text on Scratch
            ctx.font = "bold 20px Inter";
            ctx.fillStyle = "#666";
            ctx.textAlign = "center";
            ctx.fillText("इसे स्क्रैच करें!", canvas.width / 2, canvas.height / 2);

            const scratch = (e) => {
                if (isRevealed) return;
                const rect = canvas.getBoundingClientRect();
                const x = (e.pageX || e.touches[0].pageX) - rect.left - window.scrollX;
                const y = (e.pageY || e.touches[0].pageY) - rect.top - window.scrollY;

                ctx.globalCompositeOperation = 'destination-out';
                ctx.beginPath();
                ctx.arc(x, y, 35, 0, Math.PI * 2);
                ctx.fill();

                // Check Reveal Percentage
                const pixels = ctx.getImageData(0, 0, canvas.width, canvas.height).data;
                let count = 0;
                for (let i = 0; i < pixels.length; i += 40) if (pixels[i + 3] === 0) count++;
                if (count > (pixels.length / 40) * 0.5) {
                    setIsRevealed(true);
                    onComplete();
                }
            };

            canvas.addEventListener('mousemove', scratch);
            canvas.addEventListener('touchmove', scratch);
        }, [isRevealed]);

        return (
            <div className="scratch-container mt-6">
                {!isRevealed && <canvas ref={canvasRef} className="scratch-canvas" />}
                <div className="scratch-content">{children}</div>
            </div>
        );
    };

    const App = () => {  
        const [status, setStatus] = useState("loading");  
        const [member, setMember] = useState(null);  
        const [prizeDisplay, setPrizeDisplay] = useState({ img: "", msg: "", isLocked: true, type: "normal", highlight: "" });  
        const [isScratched, setIsScratched] = useState(false);

        const mapPrizeDetails = useCallback((userRow, maps) => {  
            const mID = (userRow[1] || "").toString().toLowerCase().trim();  
            const dDateStr = (userRow[36] || "").toString().trim();  
            const prizeInam = (userRow[38] || "").toString().trim(); // Column 39
            const masterLock = (userRow[37] || "").toString().trim(); // Column AL (38)

            const today = new Date();  
            const drawDate = dDateStr ? new Date(dDateStr) : null;  
            
            // TRIPLE LOCK CHECK
            if (!dDateStr || drawDate > today || !masterLock || !prizeInam) {
                setPrizeDisplay({ img: "", msg: "रिजल्ट तैयार किया जा रहा है, कृपया प्रतीक्षा करें।", isLocked: true, type: "normal" });
                return;
            }

            const exactWinnerMatch = maps.find(m => (m.Membership_ID || "").toLowerCase() === mID);

            // 1. DPSG_WINNER LOCK
            if (masterLock === "DPSG_WINNER" && exactWinnerMatch) {
                setPrizeDisplay({
                    img: toDirectLink(exactWinnerMatch.Image_Link),
                    highlight: exactWinnerMatch.Inam_Name || prizeInam,
                    msg: `🎉 बहुत-बहुत शुभकामनाएँ! आपको यह जानकर बेहद खुशी होगी कि 51 मुख्य इनामों की लिस्ट में आपने शानदार ${exactWinnerMatch.Match_Name || 'Rank'} हासिल की है! 51 इनामों की इस लिस्ट में जगह बनाने वाले आप जैसे सभी भाग्यशाली प्रतिभागियों को बहुत-बहुत शुभकामनाएं। DPSG परिवार का हिस्सा बनने के लिए धन्यवाद! 🙏`,
                    isLocked: false, type: "winner"
                });
            } 
            // 2. DPSG_CASH LOCK
            else if (masterLock === "DPSG_CASH") {
                setPrizeDisplay({
                    img: toDirectLink("https://drive.google.com/file/d/1WOrBZpuRF9Q-Pc753LA11XoAaGjCv7zD/view?usp=drivesdk"),
                    highlight: prizeInam,
                    msg: "🥳 बधाई हो! आप 51 इनामों की लिस्ट में तो नहीं आ पाए हैं, लेकिन निराश होने की बिल्कुल ज़रूरत नहीं है! हमारी 'डिजिटल प्रॉब्लम सॉल्यूशन ग्रुप' की तरफ से आपको यह नकद कैशबैक का इनाम दिया जा रहा है। हम पर विश्वास जताने के लिए धन्यवाद! 🙏",
                    isLocked: false, type: "cashback"
                });
            }
            // 3. DPSG_GIFT LOCK
            else if (masterLock === "DPSG_GIFT") {
                setPrizeDisplay({
                    img: toDirectLink("https://drive.google.com/file/d/1baCVXWH7XYD5T8QxOfGKnkt9CKDHSx2Z/view?usp=drivesdk"),
                    highlight: prizeInam,
                    msg: "🎁 शुभकामनाएँ! इस बार आप 51 इनामों की लिस्ट में नहीं आ पाए हैं, इसलिए हमारी तरफ से आपके प्यार और सम्मान में यह प्यारा सा उपहार दिया जा रहा है! हमारे साथ हमेशा जुड़े रहने के लिए आपका हार्दिक धन्यवाद! 🙏",
                    isLocked: false, type: "gift"
                });
            }
            // 4. DPSG_NEXT LOCK (Try Again)
            else if (masterLock === "DPSG_NEXT") {
                setPrizeDisplay({
                    img: toDirectLink("https://drive.google.com/file/d/1j7v5a90h8ABi2r6piQIZR_4Qil4buiqh/view?usp=drivesdk"),
                    highlight: "Better Luck Next Time",
                    msg: "✨ हौसला रखें और मुस्कुराते रहें! इस बार आप 51 इनामों की लिस्ट में नहीं आ पाए हैं। लेकिन निराश बिल्कुल न हों, हमें पूरा विश्वास है कि भविष्य में आपका भाग्य जरूर चमकेगा और कोई बड़ा इनाम आपका इंतज़ार कर रहा होगा। धन्यवाद! 🙏",
                    isLocked: false, type: "loss"
                });
            }
            else {
                setPrizeDisplay({ img: "", msg: "परिणाम की आधिकारिक घोषणा जल्द होगी।", isLocked: true, type: "normal" });
            }
        }, []);

        useEffect(() => {  
            async function startSystem(){  
                const mainResponse = await fetch(MAIN_CSV + "&t=" + Date.now());  
                const mainText = await mainResponse.text();  
                const mapResponse = await fetch(MAPPING_CSV);  
                const mapText = await mapResponse.text();  
                Papa.parse(mainText,{ complete:(results)=>{  
                    const rows = results.data;  
                    const queryId = new URLSearchParams(window.location.search).get('id');  
                    if(queryId){  
                        const matchRow = rows.slice(1).find(r=> r[1] && r[1].toLowerCase()===queryId.toLowerCase());  
                        if(matchRow){  
                            setMember(matchRow);  
                            Papa.parse(mapText,{ header:true, complete:(mRes)=>{ mapPrizeDetails(matchRow, mRes.data); setStatus("view"); } });  
                        } else setStatus("search");  
                    } else setStatus("search");  
                }});  
            }  
            startSystem();  
        },[mapPrizeDetails]);  

        if (status === "loading") return <div className="h-screen bg-[#010413] flex items-center justify-center text-yellow-500 font-black">DPSG LOADING...</div>;  

        return (  
            <div className="min-h-screen p-4 sm:p-8 text-center bg-[#010413]">  
                <div className="max-w-md mx-auto">  
                    {status === "search" ? (  
                        <div className="bg-white/5 border border-white/10 p-10 rounded-[3rem]">  
                            <h2 className="text-xl font-black mb-8 italic uppercase tracking-widest">ID दर्ज करें</h2>  
                            <input id="sid" type="text" className="w-full bg-black/40 border border-white/10 rounded-2xl py-6 text-center text-white mb-6" placeholder="DPSG-26-XXX-XXXX" />  
                            <button onClick={() => window.location.href=`?id=${document.getElementById('sid').value}`} className="w-full bg-blue-600 py-6 rounded-2xl font-black uppercase shadow-xl">विवरण देखें</button>  
                        </div>  
                    ) : (  
                        <div className="space-y-8">  
                            <div className="text-center">  
                                <h1 className="text-2xl font-black italic">डिजिटल प्रॉब्लम सॉल्यूशन ग्रुप</h1>  
                                <p className="text-yellow-500 font-bold uppercase tracking-widest mt-1">NIMBAHERA</p>  
                            </div>  

                            {prizeDisplay.isLocked ? (
                                <div className="bg-white/5 border border-white/10 p-10 rounded-[2rem] italic">
                                    <i className="fa-solid fa-lock text-4xl text-yellow-500 mb-4"></i>
                                    <h2 className="text-xl font-bold">{prizeDisplay.msg}</h2>
                                </div>
                            ) : (
                                <div className={prizeDisplay.type !== 'loss' ? 'winner-peela-glow' : 'bg-white/5 border border-white/10 p-6 rounded-[2rem]'}>
                                    {/* 1. HIGHLIGHT BADGE */}
                                    <div className="bg-yellow-500 text-black font-black py-3 px-6 rounded-full inline-block mb-4 italic uppercase tracking-tighter shadow-lg">
                                        {prizeDisplay.type === 'winner' ? '🏆 मुख्य इनाम' : '🎁 उपहार'} : {prizeDisplay.highlight}
                                    </div>

                                    {/* 2. SCRATCH CARD WITH BIG PHOTO */}
                                    <ScratchCard onComplete={() => { setIsScratched(true); confetti(); }}>
                                        <div className="prize-image-display">
                                            <img src={prizeDisplay.img} alt="Prize" />
                                        </div>
                                    </ScratchCard>

                                    {/* 3. PROFESSIONAL MESSAGE */}
                                    {isScratched && (
                                        <div className="p-6 mt-4 bg-white/10 backdrop-blur-md rounded-2xl border border-white/10 text-left animate-in fade-in duration-1000">
                                            <p className="text-[14px] leading-relaxed font-medium text-blue-100">{prizeDisplay.msg}</p>
                                        </div>
                                    )}
                                </div>
                            )}

                            {/* RECEIPT SECTION (Old Code Safe) */}
                            <div id="receipt" className="receipt-card bg-white text-slate-900 rounded-[3rem] p-8 text-left shadow-2xl">
                                <div className="text-center border-b-2 border-dashed border-slate-200 pb-4 mb-6">
                                    <h3 className="font-black text-2xl text-blue-700 italic">प्रोफेशनल डिजिटल रसीद</h3>
                                </div>
                                <div className="space-y-4">
                                    <div className="flex justify-between border-b pb-4">
                                        <div><p className="text-[10px] text-slate-400 font-bold">ID IDENTITY</p><p className="text-xl font-black uppercase">{member[1]}</p></div>
                                        <div className="text-right"><p className="text-[10px] text-slate-400 font-bold">CATEGORY</p><p className="text-xs font-black text-blue-700 uppercase">{member[3]}</p></div>
                                    </div>
                                    <div className="bg-blue-600 rounded-[2rem] p-6 text-center text-white">
                                        <p className="text-[10px] font-bold uppercase opacity-70">सर्विस पॉइंट्स</p>
                                        <span className="text-6xl font-black">{member[21]}</span>
                                    </div>
                                    <div className="grid grid-cols-2 gap-4 text-xs font-bold border-y py-4 italic">
                                        <div>NAME: {member[8]}</div>
                                        <div className="text-right">VILLAGE: {member[5]}</div>
                                    </div>
                                    <div className="bg-slate-950 text-white p-6 rounded-2xl text-center">
                                        <p className="text-[10px] opacity-50 uppercase mb-1">लकी ड्रा तिथि</p>
                                        <p className="text-2xl font-black text-yellow-500 italic">{member[36]}</p>
                                    </div>
                                    <button onClick={()=>window.print()} className="no-print w-full bg-slate-900 text-white py-5 rounded-full text-xs font-black uppercase mt-4 shadow-xl">PRINT RECEIPT</button>
                                </div>
                            </div>
                        </div>  
                    )}  
                </div>  
            </div>  
        );  
    };  

    const root = ReactDOM.createRoot(document.getElementById('root'));  
    root.render(<App />);  
    </script>  
</body>  
</html>
