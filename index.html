<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DPSG डिजिटल रसीद</title>
    <!-- आवश्यक लाइब्रेरीज़ -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Devanagari:wght@400;700;900&family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        body { font-family: 'Inter', 'Noto Sans Devanagari', sans-serif; background-color: #010413; color: #ffffff; }
        .receipt-card { background: white; color: #0f172a; border-radius: 2rem; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5); }
        .benefit-box { border-left: 5px solid #bf953f; background: #f8fafc; padding: 15px; border-radius: 12px; margin-top: 20px; }
        @media print {
            .no-print { display: none !important; }
            body { background: white !important; color: black !important; }
            .receipt-card { box-shadow: none !important; border: 1px solid #ddd !important; width: 100% !important; border-radius: 0 !important; }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const App = () => {
            const [status, setStatus] = useState("loading"); 
            const [member, setMember] = useState(null);
            const [searchId, setSearchId] = useState("");
            
            const FILE_NAME = "CSV Data DPSG - Digital_Problem_Solution_Master.csv";

            // कार्ड के लाभ का डेटा
            const cardBenefits = {
                VIP: [
                    "कीमत: ₹500 (वैधता: 6 महीने)",
                    "उपयोग: संपूर्ण परिवार हेतु मान्य",
                    "कोटा: 150 प्रिंट + 80 फोटो (या 380 फोटो)",
                    "लैमिनेशन: 5 फ्री",
                    "ई-मित्र: 100% फ्री सेवा (केवल टोकन चार्ज)",
                    "डिलीवरी: 2 बार FREE (उसके बाद न्यूनतम रेट)",
                    "इनाम: ₹100 तुरंत वापस + बड़ा धमाका!"
                ],
                Gold: [
                    "कीमत: ₹100 (वैधता: 3 महीने)",
                    "उपयोग: केवल 1 व्यक्ति हेतु",
                    "कोटा: 40 प्रिंट + 24 फोटो (या 100 फोटो)",
                    "लैमिनेशन: 1 फ्री",
                    "ई-मित्र: 50% छूट (केवल टोकन चार्ज)",
                    "डिलीवरी: 1 बार (न्यूनतम रेट पर)",
                    "इनाम: 100% गारंटीड उपहार!"
                ],
                Silver: [
                    "कीमत: ₹50 (वैधता: 1 महीना)",
                    "उपयोग: केवल 1 व्यक्ति हेतु",
                    "कोटा: 15 प्रिंट + 12 फोटो (या 40 फोटो)",
                    "ई-मित्र: सीमित सेवा (केवल टोकन चार्ज)",
                    "डिलीवरी: 1 बार (न्यूनतम रेट पर)",
                    "इनाम: लकी ड्रा का शानदार अवसर!"
                ]
            };

            useEffect(() => {
                const queryId = new URLSearchParams(window.location.search).get('id');

                Papa.parse(FILE_NAME, {
                    download: true,
                    header: false,
                    skipEmptyLines: true,
                    complete: (results) => {
                        const rows = results.data;
                        if (queryId) {
                            const term = queryId.trim().toLowerCase();
                            const termPadded = term.padStart(4, '0');
                            
                            // मिलान करना (Serial No या Membership ID)
                            const found = rows.find(r => 
                                (r[1] && r[1].toString().trim().toLowerCase() === term) ||
                                (r[0] && r[0].toString().trim() === term) ||
                                (r[0] && r[0].toString().trim() === termPadded)
                            );

                            if (found) {
                                setMember(found);
                                setStatus("view");
                                // ड्रा की तारीख बीतने पर पटाखे
                                if (found[36] && new Date() >= new Date(found[36])) { 
                                    confetti({ particleCount: 100, spread: 70, origin: { y: 0.6 } });
                                }
                            } else { setStatus("search"); }
                        } else { setStatus("search"); }
                    },
                    error: () => setStatus("search")
                });
            }, []);

            const getBen = (typeStr) => {
                if (!typeStr) return [];
                const s = typeStr.toLowerCase();
                if (s.includes("vip") || s.includes("500")) return cardBenefits.VIP;
                if (s.includes("gold") || s.includes("100")) return cardBenefits.Gold;
                if (s.includes("silver") || s.includes("50")) return cardBenefits.Silver;
                return [];
            };

            if (status === "loading") return (
                <div className="h-screen flex items-center justify-center bg-[#010413]">
                    <div className="text-center">
                        <div className="w-12 h-12 border-4 border-yellow-500 border-t-transparent rounded-full animate-spin mx-auto mb-4"></div>
                        <p className="text-sm font-bold text-yellow-500 uppercase tracking-widest">डेटा लोड हो रहा है...</p>
                    </div>
                </div>
            );

            return (
                <div className="min-h-screen flex flex-col items-center p-4">
                    {status === "search" ? (
                        <div className="bg-white/5 rounded-[2rem] p-10 text-center w-full max-w-md mt-20 border border-white/10 shadow-2xl">
                            <h2 className="text-xl font-bold uppercase mb-8 text-white">कार्ड आईडी यहाँ दर्ज करें</h2>
                            <input type="text" placeholder="0001" className="w-full bg-black/40 border border-white/20 rounded-xl py-5 text-center text-3xl font-black mb-6 outline-none text-white uppercase" onChange={(e)=>setSearchId(e.target.value)} />
                            <button onClick={()=>{window.location.href=`?id=${searchId}`}} className="w-full bg-blue-600 py-5 rounded-xl font-bold text-white uppercase shadow-lg active:scale-95 transition-all">रिकॉर्ड खोजें</button>
                        </div>
                    ) : (
                        <div className="w-full max-w-md space-y-6 animate-in zoom-in duration-300 mt-10">
                            {/* Branding */}
                            <div className="text-center mb-6 no-print">
                                <h1 className="text-3xl font-black uppercase text-white leading-none">डिजिटल प्रॉब्लम सॉल्यूशन ग्रुप</h1>
                                <p className="text-[10px] text-blue-300 font-bold mt-2 tracking-widest uppercase">समस्या आपकी, समाधान हमारा !</p>
                            </div>

                            {/* THE RECEIPT */}
                            <div id="print-area" className="receipt-card p-8">
                                <div className="text-center border-b-2 border-dashed pb-4 mb-6">
                                    <h3 className="font-black text-2xl text-blue-600 uppercase">डिजिटल बचत रसीद</h3>
                                    <p className="text-[8px] font-bold text-gray-400 uppercase tracking-widest">निम्बाहेड़ा, राजस्थान</p>
                                </div>

                                <div className="space-y-6">
                                    <div className="flex justify-between border-b pb-4">
                                        <div className="w-2/3">
                                            <p className="text-[9px] text-gray-400 font-bold uppercase">सदस्यता आईडी (ID)</p>
                                            <p className="text-lg font-black text-slate-900">{member[1] || "---"}</p>
                                        </div>
                                        <div className="text-right w-1/3">
                                            <p className="text-[9px] text-gray-400 font-bold uppercase">कार्ड का नाम</p>
                                            <p className="text-[11px] font-bold text-blue-700 uppercase">{member[2] || "डिजिटल बचत कार्ड"}</p>
                                        </div>
                                    </div>

                                    {/* Points Display */}
                                    <div className="bg-blue-600 rounded-3xl p-6 text-center text-white shadow-xl">
                                        <p className="text-[10px] font-bold uppercase opacity-80 mb-1 italic">शेष सर्विस पॉइंट्स</p>
                                        <span className="text-6xl font-black">{member[21] || "---"}</span>
                                    </div>

                                    {/* Benefits Box */}
                                    <div className="bg-slate-50 p-5 rounded-2xl border border-slate-100 shadow-inner">
                                        <p className="text-[10px] text-gray-400 font-bold uppercase mb-1">कार्ड श्रेणी</p>
                                        <p className="text-[14px] font-black text-slate-800 mb-4">{member[3] || "---"}</p>
                                        <div className="pt-4 border-t border-slate-200">
                                            <p className="text-[10px] font-black text-blue-700 uppercase mb-3"><i className="fa-solid fa-crown mr-1"></i> कार्ड की मुख्य सुविधायें</p>
                                            <div className="space-y-2">
                                                {getBen(member[3]).map((b, i) => (
                                                    <div key={i} className="flex items-start text-[11px] text-slate-600 font-bold">
                                                        <i className="fa-solid fa-circle-check text-green-500 mt-1 mr-2"></i>
                                                        <p>{b}</p>
                                                    </div>
                                                ))}
                                            </div>
                                        </div>
                                    </div>

                                    {/* Details Table */}
                                    <div className="grid grid-cols-2 gap-x-6 gap-y-4 py-4 border-y border-slate-100">
                                        <div><p className="text-[9px] text-gray-400 font-bold uppercase">ग्राहक का नाम</p><p className="text-[14px] font-black text-slate-900">{member[8] || "---"}</p></div>
                                        <div className="text-right"><p className="text-[9px] text-gray-400 font-bold uppercase">गाँव / स्थान</p><p className="text-[14px] font-black text-slate-900">{member[5] || "---"}</p></div>
                                        <div><p className="text-[9px] text-gray-400 font-bold uppercase">बिक्री तिथि</p><p className="text-[11px] font-bold text-slate-700">{member[6] || "---"}</p></div>
                                        <div className="text-right"><p className="text-[9px] text-gray-400 font-bold uppercase">इनाम की स्थिति</p><p className="text-[11px] font-bold text-blue-600">{member[37] || "---"}</p></div>
                                    </div>

                                    {/* Dates */}
                                    <div className="grid grid-cols-3 gap-2 bg-slate-900 text-white p-4 rounded-2xl text-center">
                                        <div><span className="text-[7px] font-bold opacity-50 uppercase block">सक्रिय</span><p className="text-[9px] font-bold">{member[15] || "---"}</p></div>
                                        <div className="border-x border-white/10"><span className="text-[7px] font-bold opacity-50 uppercase block">वैधता</span><p className="text-[9px] font-bold text-red-400">{member[16] || "---"}</p></div>
                                        <div><span className="text-[7px] font-bold opacity-50 uppercase block">शेष दिन</span><p className="text-[9px] font-bold text-green-400">{member[17] || "---"}</p></div>
                                    </div>

                                    <div className="mt-6 text-center no-print pt-6 border-t border-slate-50">
                                        <button onClick={()=>window.print()} className="bg-slate-100 hover:bg-slate-200 text-slate-900 px-10 py-4 rounded-full text-xs font-black uppercase flex items-center justify-center mx-auto space-x-2 transition-all">
                                            <i className="fa-solid fa-print"></i><span>रसीद प्रिंट करें</span>
                                        </button>
                                    </div>
                                </div>
                            </div>
                            <p className="text-center text-[8px] text-slate-600 font-bold uppercase tracking-[1em] opacity-40 py-10">DPSG NIMBAHERA | JORAWAR SINGH</p>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
