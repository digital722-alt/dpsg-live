    const ScratchCard = ({ onComplete, children }) => {  
        const canvasRef = useRef(null); const [isRevealed, setIsRevealed] = useState(false);  
        useEffect(() => {  
            const canvas = canvasRef.current; if(!canvas) return; const ctx = canvas.getContext('2d');  
            canvas.width = canvas.parentElement.offsetWidth; canvas.height = canvas.parentElement.offsetHeight;  
            const grad = ctx.createLinearGradient(0, 0, canvas.width, canvas.height);  
            grad.addColorStop(0, '#B8860B'); grad.addColorStop(0.5, '#FFDF00'); grad.addColorStop(1, '#DAA520');  
            ctx.fillStyle = grad; ctx.fillRect(0, 0, canvas.width, canvas.height);  
            ctx.font = "900 32px Inter"; ctx.fillStyle = "rgba(139, 69, 19, 0.5)"; ctx.textAlign = "center";  
            ctx.fillText("SCRATCH HERE", canvas.width / 2, canvas.height / 2);  
            ctx.font = "700 18px Inter"; ctx.fillText("DPSG NIMBAHERA", canvas.width / 2, (canvas.height / 2) + 35);
            const scratch = (e) => {  
                if (isRevealed) return; const rect = canvas.getBoundingClientRect();  
                const x = (e.pageX || (e.touches && e.touches[0].pageX)) - rect.left; const y = (e.pageY || (e.touches && e.touches[0].pageY)) - rect.top;  
                ctx.globalCompositeOperation = 'destination-out'; ctx.beginPath(); ctx.arc(x, y, 75, 0, Math.PI * 2); ctx.fill();  
                const pixels = ctx.getImageData(0, 0, canvas.width, canvas.height).data;  
                let count = 0; for (let i = 0; i < pixels.length; i += 40) if (pixels[i + 3] === 0) count++;
                if (count > (pixels.length / 40) * 0.45) { setIsRevealed(true); onComplete(); }  
            };  
            canvas.addEventListener('mousemove', scratch); canvas.addEventListener('touchmove', scratch, {passive: true});  
        }, [isRevealed]);  
        return ( <div className="scratch-container"> {!isRevealed && <canvas ref={canvasRef} className="scratch-canvas" />} <div className="scratch-content">{children}</div> </div> );
    };

                                    <div><p className="text-[14px] sm:text-[15px] font-black text-slate-600 tracking-[0.1em] uppercase mb-2 fancy-text">{t.sAad}</p><p className="font-black tracking-[0.2em] text-xl text-slate-700 bg-white/50 px-3 py-1 rounded-lg inline-block border border-white/50">{mask(member[11])}</p></div>
                                    <div className="text-right"></div>
                                    <div><p className="text-[14px] sm:text-[15px] font-black text-slate-600 tracking-[0.1em] uppercase mb-2 fancy-text">{t.active}</p><p className="font-black text-2xl text-emerald-600 bg-emerald-50 px-4 py-2 rounded-xl border-2 border-emerald-300 inline-block shadow-md date-font tracking-wider">{clean(member[15])}</p></div>  
                                    <div className="text-right"><p className="text-[14px] sm:text-[15px] font-black text-slate-600 tracking-[0.1em] uppercase mb-2 fancy-text">{t.expiry}</p><p className="font-black text-2xl text-white bg-red-600 px-5 py-2 rounded-xl border-2 border-red-800 inline-block shadow-[0_5px_15px_rgba(220,38,38,0.4)] date-font tracking-wider animate-pulse">{clean(member[16])}</p></div>  
                                </div>
                                <button onClick={()=>window.print()} className="no-print w-full bg-gradient-to-r from-blue-700 to-indigo-800 text-white py-6 rounded-2xl font-black uppercase shadow-2xl hover:scale-[1.02] transition-all text-xl tracking-widest border-b-4 border-indigo-950"><i className="fa-solid fa-print mr-3 text-2xl"></i> {t.printBtn}</button>
                            </div>
                        </div>
                    )}

                    {/* 🚨 MODAL 1: STRICT CARD BOOKING FORM 🚨 */}
                    {showBookingForm && selectedCardId && (
                        <div className="fixed inset-0 z-[120] flex items-center justify-center bg-slate-900/95 backdrop-blur-xl p-4 overflow-y-auto">
                            <div className="glass-card p-8 w-full max-w-2xl relative my-8 border-4 border-green-400">
                                <button onClick={() => {setShowBookingForm(false); setSelectedCardId(null);}} className="absolute top-4 right-4 text-red-500 hover:text-red-700 text-3xl"><i className="fa-solid fa-circle-xmark"></i></button>
                                <h2 className="text-3xl font-black text-center mb-6 uppercase text-slate-800"><i className="fa-solid fa-address-card text-blue-600 mr-2"></i> Card Booking</h2>
                                <div className="bg-blue-50 p-6 rounded-2xl mb-8 border-2 border-blue-200 flex justify-between items-center">
                                    <div><p className="text-sm font-bold text-slate-500 uppercase">Selected Card</p><p className="text-3xl font-black text-blue-700">{selectedCardId.type} - {selectedCardId.id}</p></div>
                                    <div className="text-right"><p className="text-sm font-bold text-slate-500 uppercase">Payable</p><p className="text-4xl font-black text-green-600">₹{selectedCardId.type === 'VIP' ? '500' : selectedCardId.type === 'Gold' ? '100' : '50'}</p></div>
                                </div>
                                <form onSubmit={submitCardBooking} className="space-y-6 text-left">
                                    <div className="grid grid-cols-1 sm:grid-cols-2 gap-6">
                                        <div><label className="block text-sm font-black text-slate-600 mb-2">Customer Name <span className="text-red-500">*</span></label><input type="text" name="Name" required pattern="[a-zA-Z\s]+" title="Only Alphabets allowed" className="w-full p-4 rounded-xl border-2 border-slate-300 font-bold outline-none uppercase" /></div>
                                        <div><label className="block text-sm font-black text-slate-600 mb-2">Mobile Number <span className="text-red-500">*</span></label><input type="tel" name="Mobile" required pattern="[6-9][0-9]{9}" title="Valid 10 Digit Number" className="w-full p-4 rounded-xl border-2 border-slate-300 font-bold outline-none" /></div>
                                        <div><label className="block text-sm font-black text-slate-600 mb-2">Aadhar Number <span className="text-red-500">*</span></label><input type="text" name="Aadhar" required pattern="[0-9]{12}" title="Valid 12 Digit Aadhar Number" className="w-full p-4 rounded-xl border-2 border-slate-300 font-bold outline-none tracking-widest" /></div>
                                        <div><label className="block text-sm font-black text-slate-600 mb-2">DOB (जन्म तिथि) <span className="text-red-500">*</span></label><input type="date" name="DOB" required className="w-full p-4 rounded-xl border-2 border-slate-300 font-bold outline-none" /></div>
                                    </div>
                                    <div className="bg-red-50 p-6 rounded-2xl border-2 border-red-200 mt-6">
                                        <h4 className="font-black text-red-600 text-lg mb-4 uppercase"><i className="fa-solid fa-bolt mr-2 text-yellow-500"></i> Payment Method <span className="text-red-500">*</span></h4>
                                        <div className="space-y-4">
                                            <label className="flex items-start cursor-pointer group"><input type="radio" name="Payment_Method" value="Cash" required onChange={(e)=>setBookingPaymentMode(e.target.value)} className="mt-1 w-5 h-5" defaultChecked /><div className="ml-3"><p className="font-black text-slate-800">Standard Cash / UPI</p></div></label>
                                            <label className="flex items-start cursor-pointer group bg-white p-4 rounded-xl border border-red-100"><input type="radio" name="Payment_Method" value="Airtel_Bank_IS50" required onChange={(e)=>setBookingPaymentMode(e.target.value)} className="mt-1 w-5 h-5 text-red-600" /><div className="ml-3"><p className="font-black text-red-700 flex items-center"><i className="fa-solid fa-building-columns mr-2"></i> Airtel Payment Bank (IS 50 Offer)</p></div></label>
                                        </div>
                                    </div>
                                    {bookingPaymentMode === 'Airtel_Bank_IS50' && (
                                        <div className="animate-in fade-in"><label className="block text-sm font-black text-slate-600 mb-2">PAN Card <span className="text-red-500 animate-pulse">(Mandatory for Airtel)</span></label><input type="text" name="PAN" required pattern="[A-Z]{5}[0-9]{4}[A-Z]{1}" title="Format: ABCDE1234F" className="w-full p-4 rounded-xl border-2 border-red-300 font-bold uppercase tracking-widest bg-red-50" placeholder="ABCDE1234F" /></div>
                                    )}
                                    <button type="submit" className="w-full bg-gradient-to-r from-blue-600 to-indigo-700 text-white font-black py-6 rounded-2xl shadow-xl text-xl uppercase tracking-widest mt-8"><i className="fa-solid fa-check-circle mr-2"></i> Submit & Save</button>
                                </form>
                            </div>
                        </div>
                    )}

                    {/* 🚨 MODAL 2: 50+ SERVICES STRICT SMART FORM 🚨 */}
                    {showServiceForm && (
                        <div className="fixed inset-0 z-[110] flex items-center justify-center bg-slate-900/90 backdrop-blur-md p-4 overflow-y-auto">
                            <div className="glass-card p-8 sm:p-12 w-full max-w-lg relative animate-in zoom-in duration-300 border-4 border-blue-100 my-8">
                                <button onClick={() => setShowServiceForm(false)} className="absolute top-6 right-6 w-12 h-12 bg-red-50 text-red-600 rounded-full font-black text-2xl"><i className="fa-solid fa-xmark"></i></button>
                                <div className="text-center mb-8 border-b-2 border-slate-200 border-dashed pb-6"><h3 className="text-3xl font-black text-slate-800 uppercase">{formType || "Service Request"}</h3></div>
                                
                                <form onSubmit={submitServiceRequest} className="space-y-6 text-left">
                                    <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                                        <div><label className="block text-[13px] font-black uppercase text-slate-600 mb-2">Name <span className="text-red-500">*</span></label><input type="text" name="Name" required pattern="[a-zA-Z\s]+" title="Only Alphabets allowed" className="w-full border-2 border-slate-300 p-4 rounded-xl font-bold uppercase" /></div>
                                        <div><label className="block text-[13px] font-black uppercase text-slate-600 mb-2">Mobile <span className="text-red-500">*</span></label><input type="tel" name="Mobile" required pattern="[6-9][0-9]{9}" title="Valid 10 Digit Number" className="w-full border-2 border-slate-300 p-4 rounded-xl font-bold" /></div>
                                        <div><label className="block text-[13px] font-black uppercase text-slate-600 mb-2">Aadhar <span className="text-red-500">*</span></label><input type="text" name="Aadhar" required pattern="[0-9]{12}" title="Valid 12 Digit Aadhar Number" className="w-full border-2 border-slate-300 p-4 rounded-xl font-bold tracking-widest" /></div>
                                        <div><label className="block text-[13px] font-black uppercase text-slate-600 mb-2">DOB <span className="text-red-500">*</span></label><input type="date" name="DOB" required className="w-full border-2 border-slate-300 p-4 rounded-xl font-bold" /></div>
                                    </div>

                                    <div>
                                        <label className="block text-[13px] font-black uppercase text-slate-600 mb-2">Select Service <span className="text-red-500">*</span></label>
                                        <select name="Service_Type" value={selectedService} required className="w-full border-2 border-slate-300 p-4 rounded-xl font-bold" onChange={(e) => { setSelectedService(e.target.value); setDocHint(docList[e.target.value] || ""); }}>
                                            <option value="">-- Seva Chunein --</option>
                                            <optgroup label="Airtel Payment Bank"><option value="Airtel_Bank">🔴 Airtel Bank Khaata / KYC</option></optgroup>
                                            <optgroup label="Central Government Services"><option value="PAN_Card">💳 PAN Card</option><option value="Other">Ayushman Card / Passport</option></optgroup>
                                            <optgroup label="Rajasthan E-Mitra"><option value="Birth_Cert">Janam Praman Patra</option><option value="Caste_Cert">Jati Praman Patra</option><option value="Bonafide">Mool Niwas</option><option value="Other">Jan Aadhar / Ration Card</option></optgroup>
                                            <optgroup label="Other Services"><option value="Other">ITR / Kanooni Salah</option><option value="Other">Scholarship Form</option></optgroup>
                                        </select>
                                    </div>

                                    {/* DYNAMIC PAN FIELD FOR AIRTEL BANK */}
                                    {selectedService === 'Airtel_Bank' && (
                                        <div className="animate-in fade-in bg-red-50 p-4 rounded-xl border-2 border-red-300"><label className="block text-[13px] font-black uppercase text-slate-600 mb-2">PAN Card <span className="text-red-600 animate-pulse">(Mandatory for Airtel)</span></label><input type="text" name="PAN" required pattern="[A-Z]{5}[0-9]{4}[A-Z]{1}" title="Format: ABCDE1234F" className="w-full border-2 border-red-300 p-4 rounded-xl font-bold uppercase tracking-widest" placeholder="ABCDE1234F" /></div>
                                    )}
                                    
                                    {docHint && <div className="bg-blue-50 border border-blue-200 p-4 rounded-xl text-blue-800 font-bold text-sm shadow-sm">{docHint}</div>}
                                    
                                    <div><label className="block text-[13px] font-black uppercase text-slate-600 mb-2">Problem / Request <span className="text-red-500">*</span></label><textarea name="Customer_Problem" required rows="3" className="w-full border-2 border-slate-300 p-4 rounded-xl font-bold"></textarea></div>
                                    
                                    <div className="bg-blue-50 p-4 rounded-xl border-2 border-blue-100">
                                        <label className="block text-[13px] font-black uppercase text-slate-700 mb-3"><i className="fa-solid fa-paperclip mr-2 text-blue-600"></i> Photo/Video Upload</label>
                                        <input type="file" id="fileInput" accept="image/*,video/*" className="w-full text-sm font-bold text-slate-500 file:mr-4 file:py-2 file:px-4 file:rounded-xl file:bg-blue-600 file:text-white cursor-pointer" />
                                    </div>
                                    
                                    <button type="submit" id="submitBtn" disabled={isSubmitting} className="w-full bg-gradient-to-r from-blue-700 to-indigo-700 text-white font-black py-6 rounded-2xl shadow-xl mt-6 text-xl uppercase tracking-widest disabled:opacity-50"><i className="fa-brands fa-whatsapp mr-3"></i> Request Bhejein</button>
                                </form>
                            </div>
                        </div>
                    )}
                </div>
            </div>  
        );
    };  
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);  
    </script>
</body>  
</html>
