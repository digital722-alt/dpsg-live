<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DPSG डिजिटल रसीद पोर्टल</title>
    <!-- आवश्यक लाइब्रेरीज़ -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Devanagari:wght@400;700;900&family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        body { font-family: 'Inter', 'Noto Sans Devanagari', sans-serif; background-color: #010413; color: #ffffff; overflow-x: hidden; }
        .receipt-card { background: white; color: #0f172a; border-radius: 2.5rem; box-shadow: 0 35px 70px -15px rgba(0, 0, 0, 1); position: relative; }
        .lang-active { background: white !important; color: #000 !important; font-weight: 900; border: 1px solid #cbd5e1; }
        .gold-label { background: linear-gradient(135deg, #bf953f, #fcf6ba, #b38728); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .points-badge { background: linear-gradient(135deg, #1e40af, #1e3a8a); box-shadow: 0 10px 25px -5px rgba(30, 64, 175, 0.5); }
        .benefit-row { border-bottom: 1px dashed #e2e8f0; padding: 12px 0; display: flex; align-items: start; }
        .benefit-row:last-child { border-bottom: none; }
        
        @media print {
            .no-print { display: none !important; }
            body { background: white !important; padding: 0 !important; color: black !important; }
            .receipt-card { box-shadow: none !important; border: 1px solid #e2e8f0 !important; width: 100% !important; border-radius: 0 !important; }
        }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: #bf953f; border-radius: 10px; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const App = () => {
            const [lang, setLang] = useState('hi'); 
            const [status, setStatus] = useState("loading"); 
            const [member, setMember] = useState(null);
            const [searchId, setSearchId] = useState("");
            const [clock, setClock] = useState(new Date());

            const FILE_NAME = "CSV Data DPSG - Digital_Problem_Solution_Master.csv";

            const dictionary = {
                hi: {
                    brand: "डिजिटल प्रॉब्लम सॉल्यूशन ग्रुप",
                    slogan: "समस्या आपकी, समाधान हमारा - उचित मूल्य, बेहतरीन सेवा !",
                    city: "निम्बाहेड़ा, राजस्थान",
                    notice: "आधिकारिक सूचना",
                    receipt: "डिजिटल रसीद",
                    mId: "सदस्यता पहचान (ID)",
                    cName: "कार्ड का नाम",
                    cType: "कार्ड श्रेणी (Type)",
                    custName: "ग्राहक का नाम",
                    loc: "गाँव / स्थान",
                    saleDate: "बिक्री तिथि",
                    pStatus: "इनाम की स्थिति",
                    ptsRem: "शेष सर्विस पॉइंट्स",
                    active: "सक्रियण तिथि",
                    exp: "वैधता समाप्ति",
                    days: "शेष दिन",
                    ph: "मोबाइल",
                    ad: "आधार",
                    benefitsTitle: "आपके कार्ड की मुख्य सुविधायें",
                    btnGen: "रसीद प्रिंट करें",
                    find: "रिकॉर्ड खोजें",
                    enter: "कार्ड आईडी यहाँ दर्ज करें",
                    loadText: "डेटा लोड हो रहा है, कृपया रुकें..."
                },
                en: {
                    brand: "Digital Problem Solution Group",
                    slogan: "Your Problem, Our Solution - Best Price, Best Service!",
                    city: "Nimbahera, Rajasthan",
                    notice: "Official Board",
                    receipt: "DIGITAL RECEIPT",
                    mId: "Membership ID",
                    cName: "Card Name",
                    cType: "Card Category",
                    custName: "Member Name",
                    loc: "Village / Location",
                    saleDate: "Date of Sale",
                    pStatus: "Prize Status",
                    ptsRem: "Points Left",
                    active: "Activation Date",
                    expiry: "Expiry Date",
                    days: "Days Left",
                    ph: "Mobile",
                    ad: "Aadhaar",
                    benefitsTitle: "Exclusive Benefits",
                    btnGen: "Print Official Bill",
                    find: "Search",
                    enter: "Enter ID Here",
                    loadText: "Loading data, please wait..."
                }
            };

            const benefits = {
                VIP: {
                    hi: ["कीमत: ₹500 (वैधता: 6 महीने)", "उपयोग: संपूर्ण परिवार हेतु मान्य", "कोटा: 150 प्रिंट + 80 फोटो (या 380 फोटो)", "लैमिनेशन: 5 फ्री", "ई-मित्र: 100% फ्री सेवा (केवल टोकन चार्ज)", "डिलीवरी: 2 बार FREE (उसके बाद न्यूनतम रेट)", "इनाम: ₹100 तुरंत वापस + बड़ा धमाका!"],
                    en: ["Price: ₹500 (6 Months)", "Usage: Whole Family", "Quota: 150 Prints + 80 Photos", "Lamination: 5 Free", "E-Mitra: 100% Free", "Delivery: 2 times FREE", "Prize: ₹100 Cashback + Big Surprise!"]
                },
                Gold: {
                    hi: ["कीमत: ₹100 (वैधता: 3 महीने)", "उपयोग: केवल 1 व्यक्ति हेतु", "कोटा: 40 प्रिंट + 24 फोटो (या 100 फोटो)", "लैमिनेशन: 1 फ्री", "ई-मित्र: 50% छूट (केवल टोकन चार्ज)", "डिलीवरी: 1 बार (न्यूनतम रेट पर)", "इनाम: 100% गारंटीड उपहार!"],
                    en: ["Price: ₹100 (3 Months)", "Usage: 1 Person Only", "Quota: 40 Prints + 24 Photos", "Lamination: 1 Free", "E-Mitra: 50% Discount", "Delivery: 1 time", "Prize: 100% Guaranteed Gift!"]
                },
                Silver: {
                    hi: ["कीमत: ₹50 (वैधता: 1 महीना)", "उपयोग: केवल 1 व्यक्ति हेतु", "कोटा: 15 प्रिंट + 12 फोटो (या 40 फोटो)", "ई-मित्र: सीमित सेवा (केवल टोकन चार्ज)", "डिलीवरी: 1 बार (न्यूनतम रेट पर)", "इनाम: लकी ड्रा का शानदार अवसर!"],
                    en: ["Price: ₹50 (1 Month)", "Usage: 1 Person Only", "Quota: 15 Prints + 12 Photos", "E-Mitra: Limited Service", "Delivery: 1 time", "Prize: Lucky Draw Opportunity!"]
                }
            };

            useEffect(() => {
                const interval = setInterval(() => setClock(new Date()), 1000);
                const queryId = new URLSearchParams(window.location.search).get('id');

                // CSV लोड होने तक स्क्रीन नहीं बदलेगी
                Papa.parse(FILE_NAME, {
                    download: true,
                    header: false,
                    skipEmptyLines: true,
                    complete: (results) => {
                        const rows = results.data;
                        if (queryId) {
                            const term = queryId.trim().toLowerCase();
                            
                            // सटीक मिलान का पक्का तरीका
                            const found = rows.find(r => 
                                (r[1] && r[1].toString().trim().toLowerCase() === term) ||
                                (r[0] && r[0].toString().trim() === term) ||
                                (r[0] && r[0].toString().trim().padStart(4, '0') === term.padStart(4, '0'))
                            );

                            if (found) {
                                setMember(found);
                                setStatus("view");
                                if (found[36] && new Date() >= new Date(found[36])) { fireConfetti(); }
                            } else {
                                setStatus("search"); 
                            }
                        } else {
                            setStatus("search");
                        }
                    },
                    error: () => { setStatus("search"); }
                });

                return () => clearInterval(interval);
            }, []);

            const fireConfetti = () => {
                const end = Date.now() + (5 * 1000);
                (function frame() {
                    confetti({ particleCount: 3, angle: 60, spread: 60, origin: { x: 0 }, colors: ['#bf953f', '#ffffff', '#2563eb'] });
                    confetti({ particleCount: 3, angle: 120, spread: 60, origin: { x: 1 }, colors: ['#bf953f', '#ffffff', '#2563eb'] });
                    if (Date.now() < end) requestAnimationFrame(frame);
                }());
            };

            const getCardBen = (typeStr) => {
                if (!typeStr) return [];
                const s = typeStr.toLowerCase();
                if (s.includes("vip") || s.includes("500")) return benefits.VIP[lang];
                if (s.includes("gold") || s.includes("100")) return benefits.Gold[lang];
                if (s.includes("silver") || s.includes("50")) return benefits.Silver[lang];
                return [];
            };

            const cleanData = (v) => (v && v.toString().trim() !== "" && v !== "#REF!" && v !== "Pending") ? v : "विवरण अपडेट हो रहा है...";

            if (status === "loading") return (
                <div className="h-screen flex items-center justify-center bg-[#010413]">
                    <div className="text-center">
                        <div className="w-16 h-16 border-4 border-yellow-500 border-t-transparent rounded-full animate-spin mx-auto mb-6"></div>
                        <p className="text-xs font-black uppercase tracking-widest text-yellow-500 animate-pulse">{dictionary[lang].loadText}</p>
                    </div>
                </div>
            );

            const ui = dictionary[lang];

            return (
                <div className="min-h-screen flex flex-col items-center p-4">
                    {/* Top Bar */}
                    <div className="w-full max-w-md no-print flex justify-between items-center mb-8 border-b border-white/10 pb-4">
                        <div className="flex flex-col">
                            <span className="text-[10px] font-black uppercase text-gray-500">{clock.toLocaleDateString(lang === 'hi' ? 'hi-IN' : 'en-US')}</span>
                            <span className="text-blue-500 font-black text-xs">{clock.toLocaleTimeString()}</span>
                        </div>
                        <div className="bg-white/5 p-1 rounded-xl flex space-x-1 border border-white/10">
                            <button onClick={()=>setLang('hi')} className={`px-4 py-1.5 rounded-lg text-[10px] uppercase transition-all ${lang === 'hi' ? 'lang-active shadow-lg' : 'text-gray-400'}`}>हिन्दी</button>
                            <button onClick={()=>setLang('en')} className={`px-4 py-1.5 rounded-lg text-[10px] uppercase transition-all ${lang === 'en' ? 'lang-active shadow-lg' : 'text-gray-400'}`}>English</button>
                        </div>
                    </div>

                    <div className="max-w-md w-full">
                        {status === "search" ? (
                            <div className="bg-white/5 backdrop-blur-2xl rounded-[3rem] p-10 text-center animate-in zoom-in duration-500 border border-white/5 shadow-2xl no-print">
                                <h2 className="text-xl font-black uppercase mb-8 text-white tracking-widest">{ui.enter}</h2>
                                <input type="text" placeholder="DPSG-26-..." className="w-full bg-black/40 border border-white/10 rounded-2xl py-6 text-center text-3xl font-black mb-10 outline-none focus:border-yellow-500 text-white shadow-inner uppercase" onChange={(e)=>setSearchId(e.target.value)} />
                                <button onClick={()=>{window.location.href=`?id=${searchId}`}} className="w-full bg-blue-600 hover:bg-blue-500 py-6 rounded-2xl font-black uppercase text-xs tracking-widest text-white shadow-xl active:scale-95 transition-all">{ui.find}</button>
                            </div>
                        ) : (
                            <div className="space-y-6 animate-in slide-in-from-bottom-10 duration-700">
                                {/* Branding Header */}
                                <div className="text-center mb-8 no-print">
                                    <h1 className="text-3xl font-black italic uppercase leading-none tracking-tighter text-white">
                                        {ui.brand}
                                        <span className="block gold-label text-xl mt-1 tracking-[0.3em]">NIMBAHERA</span>
                                    </h1>
                                    <div className="mt-5 px-6 py-3 bg-blue-600/10 border border-blue-500/20 rounded-3xl">
                                        <p className="text-[10px] font-bold text-blue-300 italic text-center leading-relaxed">"{ui.slogan}"</p>
                                    </div>
                                </div>

                                {/* Official Notice Board */}
                                <div className="bg-yellow-500/10 border border-yellow-500/30 p-5 rounded-[2.5rem] no-print relative">
                                    <div className="flex items-center space-x-2 mb-2 text-yellow-500">
                                        <i className="fa-solid fa-bullhorn text-xs animate-pulse"></i>
                                        <span className="text-[10px] font-black uppercase tracking-widest">{ui.notice}</span>
                                    </div>
                                    <p className="text-[11px] font-bold text-gray-100 italic leading-relaxed">"{cleanData(member[38])}"</p>
                                </div>

                                {/* PREMIUM RECEIPT CARD */}
                                <div id="dpsg-receipt" className="receipt-card p-10 shadow-2xl relative overflow-hidden">
                                    <div className="text-center border-b-2 border-dashed border-gray-100 pb-6 mb-10">
                                        <h3 className="font-black text-2xl tracking-tighter text-blue-600 italic uppercase">{ui.receipt}</h3>
                                        <p className="text-[8px] font-bold text-gray-400 uppercase tracking-[0.4em] mt-1 italic">{ui.city}</p>
                                    </div>

                                    <div className="space-y-10">
                                        {/* Membership Info (Direct from Col 1, 2) */}
                                        <div className="flex justify-between items-start border-b border-gray-50 pb-6">
                                            <div className="space-y-1 w-2/3">
                                                <p className="text-[8px] text-gray-400 font-black uppercase tracking-widest">{ui.mId}</p>
                                                <p className="text-xl font-black text-slate-900 tracking-tighter uppercase leading-tight">{cleanData(member[1])}</p>
                                            </div>
                                            <div className="text-right w-1/3">
                                                <p className="text-[8px] text-gray-400 font-black uppercase tracking-widest">{ui.cName}</p>
                                                <p className="text-[10px] font-black text-blue-700 uppercase italic leading-tight">{cleanData(member[2])}</p>
                                            </div>
                                        </div>

                                        {/* Points Overview Display */}
                                        <div className="points-badge rounded-[2.5rem] p-8 text-center text-white shadow-2xl">
                                            <p className="text-[10px] font-black uppercase tracking-widest mb-1 opacity-70 italic">{ui.ptsRem}</p>
                                            <div className="flex justify-center items-end mb-6">
                                                <span className="text-7xl font-black tracking-tighter leading-none">{cleanData(member[21])}</span>
                                            </div>
                                            <div className="grid grid-cols-2 gap-4 pt-6 border-t border-white/10 text-[9px] font-black uppercase tracking-widest">
                                                <div><span className="opacity-60">Allocated</span><p className="text-sm">{cleanData(member[18])}</p></div>
                                                <div className="border-l border-white/10"><span className="opacity-60">Used</span><p className="text-sm">{(parseInt(member[19]) || 0) + (parseInt(member[20]) || 0)}</p></div>
                                            </div>
                                        </div>

                                        {/* Benefits Listing */}
                                        <div className="space-y-6">
                                            <div className="bg-slate-50 p-6 rounded-[2.5rem] border border-slate-100 shadow-inner">
                                                <p className="text-[8px] text-gray-400 font-black uppercase tracking-widest mb-1">{ui.cType}</p>
                                                <p className="text-[15px] font-black text-slate-800 uppercase italic tracking-tighter mb-4">{cleanData(member[3])}</p>
                                                
                                                <div className="pt-4 border-t border-slate-200">
                                                    <p className="text-[10px] font-black text-blue-700 uppercase tracking-widest mb-4 flex items-center"><i className="fa-solid fa-shield-heart mr-2 text-xs"></i> {ui.benefitsTitle}</p>
                                                    <div className="space-y-0">
                                                        {getCardBen(member[3]).map((ben, i) => (
                                                            <div key={i} className="benefit-row">
                                                                <i className="fa-solid fa-circle-check text-green-500 text-[10px] mt-1 mr-3"></i>
                                                                <p className="text-[11px] font-bold text-slate-600 leading-snug">{ben}</p>
                                                            </div>
                                                        ))}
                                                    </div>
                                                </div>
                                            </div>

                                            {/* Details Profile */}
                                            <div className="grid grid-cols-2 gap-x-8 gap-y-6 py-6 border-y border-slate-50">
                                                <div><p className="text-[8px] text-gray-400 font-black uppercase mb-1">{ui.custName}</p><p className="text-[15px] font-black text-slate-950 uppercase italic leading-tight">{cleanData(member[8])}</p></div>
                                                <div className="text-right"><p className="text-[8px] text-gray-400 font-black uppercase mb-1">{ui.loc}</p><p className="text-[15px] font-black text-slate-950 uppercase italic leading-tight">{cleanData(member[5])}</p></div>
                                                <div><p className="text-[8px] text-gray-400 font-black uppercase mb-1">{ui.saleDate}</p><p className="text-[11px] font-black text-slate-600">{cleanData(member[6])}</p></div>
                                                <div className="text-right"><p className="text-[8px] text-gray-400 font-black uppercase mb-1">{ui.pStatus}</p><p className="text-[11px] font-black text-blue-600 font-bold uppercase">{cleanData(member[37])}</p></div>
                                            </div>
                                        </div>

                                        {/* Validity Bar */}
                                        <div className="grid grid-cols-3 gap-2 bg-slate-950 text-white p-5 rounded-3xl text-center shadow-lg">
                                            <div><span className="text-[7px] uppercase font-black opacity-50 block mb-1">{ui.active}</span><p className="text-[9px] font-bold">{cleanData(member[15])}</p></div>
                                            <div className="border-x border-white/10"><span className="text-[7px] uppercase font-black opacity-50 block mb-1">{ui.exp}</span><p className="text-[9px] font-bold text-red-400">{cleanData(member[16])}</p></div>
                                            <div><span className="text-[7px] uppercase font-black opacity-50 block mb-1">{ui.days}</span><p className="text-[9px] font-bold text-green-400">{cleanData(member[17])}</p></div>
                                        </div>

                                        <div className="mt-8 text-center no-print border-t border-slate-100 pt-8">
                                            <button onClick={()=>window.print()} className="bg-slate-100 hover:bg-slate-200 text-slate-900 px-12 py-4 rounded-full text-[11px] font-black uppercase flex items-center justify-center mx-auto space-x-3 transition-all active:scale-95 border border-slate-200 shadow-md">
                                                <i className="fa-solid fa-print"></i><span>{ui.btnGen}</span>
                                            </button>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        )}
                        <p className="text-center text-[8px] text-gray-800 font-black uppercase mt-24 tracking-[1.5em] italic opacity-40 no-print italic">DPSG NIMBAHERA | J. ZORAWAR SINGH</p>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
