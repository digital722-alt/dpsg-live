    const ScratchCard = ({ onComplete, isLocked, children }) => {

            const grad = ctx.createLinearGradient(0,0, canvas.width, canvas.height);  
            grad.addColorStop(0, '#D4AF37'); grad.addColorStop(0.5, '#F9F295'); grad.addColorStop(1, '#B8860B');  
            ctx.fillStyle = grad; ctx.fillRect(0,0, canvas.width, canvas.height);

                if (revealed) return; const rect = canvas.getBoundingClientRect();  
                const x = (e.pageX || e.touches[0].pageX) - rect.left; const y = (e.pageY || e.touches[0].pageY) - rect.top;  
                ctx.globalCompositeOperation = 'destination-out'; ctx.beginPath(); ctx.arc(x, y, 65, 0, Math.PI*2); ctx.fill();  
                const pix = ctx.getImageData(0,0, canvas.width, canvas.height).data; let c = 0;  
                for(let i=0; i<pix.length; i+=40) if(pix[i+3] === 0) c++;  
                if(c > (pix.length/40)*0.45) { setRevealed(true); onComplete(); }  
            };  
            canvas.addEventListener('mousemove', scratch); canvas.addEventListener('touchmove', scratch);  
        }, [isLocked, revealed]);

                                shay = `"मंजिल उन्हीं को मिलती है जिनके सपनों में जान होती है, आज आपकी मेहनत और किस्मत दोनों मेहरबान होती है!"`;
                                msg = `हार्दिक बधाई! आप डिजिटल प्रॉब्लम सॉल्यूशन ग्रुप (DPSG) के गौरवशाली विजेता बने हैं। आपने <span class="highlight-yellow">${m.Inam_Name}</span> प्राप्त की है और आपकी रैंक <span class="highlight-yellow">${m.Match_Name}</span> है। धन्यवाद!`;
                            } else if(lock === "DPSG_CASH") {
                                shay = `"इनाम छोटा हो या बड़ा, अपनों का साथ सबसे प्यारा है!"`;
                                msg = `मुस्कुराइए! DPSG संस्था की ओर से आपको यह विशेष कैशबैक भेंट किया जा रहा है। धन्यवाद!`;

                                msg = `निराश न हों! हालांकि इस बार आप 51 बड़े इनामों में नहीं आ पाए, पर भविष्य में किस्मत ज़रूर चमकेगी। धन्यवाद!`;
                            }
                            setPrize({ img: fixUrl(m?.Image_Link), shayari: shay, mainMsg: msg, isLocked: (lock === "LOCKED" || !lock) });

                                            <p className="winner-shayari whitespace-pre-line">{prize.shayari}</p>

                                        </div>}
                                    </div>
                                </ScratchCard>
                            </div>
                            <div id="receipt" className="receipt-card p-10 text-left bg-white text-slate-900 border-2 border-slate-200">  
                                <div className="text-center border-b-2 border-dashed border-slate-200 pb-6 mb-8"><h3 className="font-black text-2xl text-blue-700 italic uppercase tracking-tighter">{t.receipt}</h3><p className="text-[9px] font-black text-slate-400 mt-1 uppercase tracking-widest">DPSG NIMBAHERA OFFICIAL</p></div>

                                    <p>01. यह डिजिटल सदस्यता कार्ड व्यक्तिगत है।</p><p>02. सेवाएँ समाप्ति तिथि तक मान्य हैं।</p><p>03. मैनेजमेंट के पास नियमों में बदलाव का अधिकार है।</p>

                            <div className="no-print flex flex-col items-center pt-10 pb-20">  
                                {!isAdmin && <button onClick={()=>setShowPin(!showPin)} className="p-8 bg-white dark:bg-slate-800 rounded-full shadow-lg border opacity-20 hover:opacity-100 transition-all hover:scale-110"><i className="fa-solid fa-fingerprint text-5xl text-blue-600"></i></button>}  
                                {showPin && !isAdmin && ( <div className="mt-4 bg-white dark:bg-slate-800 p-8 rounded-[2rem] border dark:border-slate-700 w-full animate-in zoom-in shadow-2xl"><input type="password" id="adminPin" className="w-full bg-slate-100 dark:bg-slate-700 rounded-2xl py-5 text-center mb-4 font-black outline-none text-2xl dark:text-white" placeholder="MASTER PIN" /><button onClick={()=>{document.getElementById('adminPin').value===MASTER_PIN?setIsAdmin(true):alert("Wrong Pin!");}} className="w-full bg-black text-white py-5 rounded-2xl font-black uppercase">Unlock Database</button></div> )}
                                {isAdmin && ( <div className="w-full mt-6 bg-white dark:bg-slate-800 border-4 border-blue-600 rounded-[3rem] p-10 text-left shadow-2xl overflow-hidden"><div className="flex justify-between items-center mb-8 border-b pb-4"><h3 className="font-black text-sm text-blue-600 uppercase tracking-widest flex items-center gap-2"><i className="fa-solid fa-database"></i> Master Database</h3><button onClick={()=>setIsAdmin(false)} className="text-red-500 font-bold text-[10px] uppercase border px-4 py-1 rounded-full">Logout</button></div><div className="grid gap-4 max-h-[500px] overflow-y-auto pr-2 custom-scroll">{member.map((v, i) => ( <div key={i} className="p-5 bg-slate-50 dark:bg-slate-700/50 rounded-2xl border border-slate-200 dark:border-slate-600 flex flex-col"><p className="text-[9px] text-slate-400 font-black uppercase mb-1">{headers[i] || `Col ${i}`}</p><p className="font-bold text-md text-slate-800 dark:text-slate-100 break-words">{v||"---"}</p></div> ))}</div></div> )}
                            </div>
                        </div>
                    )}
                </div>
            </div>  
        );  
    };  
    const root = ReactDOM.createRoot(document.getElementById('root')); root.render(<App />);  
    </script>
</body>  
</html>
