<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DPSG Digital Receipt Portal</title>
    <!-- Professional Tools -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Devanagari:wght@400;700;900&family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        body { 
            font-family: 'Inter', 'Noto Sans Devanagari', sans-serif; 
            background-color: #010413; 
            color: #ffffff;
            overflow-x: hidden;
        }
        .receipt-body { 
            background: white; 
            color: #0f172a; 
            border-radius: 2.5rem;
            box-shadow: 0 30px 60px -12px rgba(0, 0, 0, 1);
            position: relative;
        }
        .lang-active { background: white !important; color: #020617 !important; font-weight: 900; border: 1px solid #ddd; }
        .gold-glow { 
            background: linear-gradient(135deg, #bf953f, #fcf6ba, #b38728); 
            -webkit-background-clip: text; 
            -webkit-text-fill-color: transparent; 
        }
        .points-pill {
            background: linear-gradient(135deg, #1e40af, #1e3a8a);
        }
        .benefit-card { border-left: 5px solid #bf953f; background: #f1f5f9; padding: 12px; border-radius: 12px; margin-bottom: 8px; }
        
        @media print {
            .no-print { display: none !important; }
            body { background: white !important; padding: 0 !important; color: black !important; }
            .receipt-body { 
                box-shadow: none !important; 
                border: 1px solid #e2e8f0 !important; 
                width: 100% !important;
                margin: 0 !important;
                border-radius: 0 !important;
            }
        }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: #bf953f; border-radius: 10px; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">

        const App = () => {
            const [lang, setLang] = useState('hi');

            const [isAdmin, setIsAdmin] = useState(false);
            const [searchId, setSearchId] = useState("");
            const [now, setNow] = useState(new Date());

            const MASTER_PIN = "Chanchal@6375";
            const FILE_URL = "CSV Data DPSG - Digital_Problem_Solution_Master.csv";

            // Professional Translations
            const dict = {

                    cType: "कार्ड श्रेणी (Type)",
                    custName: "ग्राहक का नाम",

                    ptsRem: "शेष सर्विस पॉइंट्स",
                    ptsTot: "कुल आवंटित",

                    ad: "आधार",
                    benefitsTitle: "आपके कार्ड की मुख्य सुविधायें",

                    drawWait: "लकी ड्रा के परिणाम का इंतज़ार करें",
                    wonMsg: "बधाई हो! आप विजेता हैं",
                    infoUp: "विवरण अपडेट किया जा रहा है...",
                    find: "रिकॉर्ड खोजें",
                    enter: "आईडी यहाँ भरें"
                },
                en: {
                    slogan: "Your Problem, Our Solution - Best Price, Best Service!",
                    brand: "Digital Problem Solution Group",
                    city: "Nimbahera, Rajasthan",

                    receipt: "DIGITAL RECEIPT",
                    mId: "Membership ID Number",
                    cName: "Card Name",
                    cType: "Card Category",
                    custName: "Member Name",
                    village: "Village / Location",
                    saleDate: "Date of Sale",

                    ptsRem: "Total Points Remaining",
                    ptsTot: "Total Allocated",
                    ptsUsed: "Points Used",
                    active: "Activation Date",
                    expiry: "Expiry Date",
                    days: "Days Left",
                    ph: "Mobile",
                    ad: "Aadhaar",
                    benefitsTitle: "Exclusive Card Benefits",
                    btnGen: "Print Official Bill",
                    adminHeader: "Master Admin Dashboard",
                    drawWait: "Waiting for Lucky Draw",
                    wonMsg: "Congratulations! You Won",
                    infoUp: "Information Updating...",
                    find: "Search Record",
                    enter: "Enter ID Here"
                }
            };

            // Dynamic Benefit Mapping based on your criteria
            const cardBenefits = {
                VIP: {
                    hi: [
                        "उपयोग: संपूर्ण परिवार हेतु मान्य",
                        "कोटा: 150 प्रिंट + 80 फोटो (या 380 फोटो / 190 प्रिंट)",
                        "लैमिनेशन: 5 फ्री",
                        "ई-मित्र: 100% फ्री सेवा (केवल टोकन चार्ज देय)",
                        "डिलीवरी: 2 बार FREE (उसके बाद न्यूनतम रेट)",
                        "इनाम: ₹100 तुरंत वापस + बड़ा धमाका!"
                    ],
                    en: [
                        "Usage: Valid for entire family",
                        "Quota: 150 Prints + 80 Photos (or 380 Photos / 190 Prints)",
                        "Lamination: 5 Free",
                        "E-Mitra: 100% Free Service (only token charge)",
                        "Delivery: 2 times FREE (then minimum rate)",
                        "Prize: ₹100 Instant Return + Big Surprise!"
                    ]
                },
                Gold: {
                    hi: [
                        "उपयोग: केवल 1 व्यक्ति हेतु",
                        "कोटा: 40 प्रिंट + 24 फोटो (या 100 फोटो / 52 प्रिंट)",
                        "लैमिनेशन: 1 फ्री",
                        "ई-मित्र: 50% छूट (केवल टोकन चार्ज देय)",
                        "डिलीवरी: 1 बार (न्यूनतम रेट पर)",
                        "इनाम: 100% गारंटीड उपहार!"
                    ],
                    en: [
                        "Usage: Valid for 1 person only",
                        "Quota: 40 Prints + 24 Photos (or 100 Photos / 52 Prints)",
                        "Lamination: 1 Free",
                        "E-Mitra: 50% Discount (only token charge)",
                        "Delivery: 1 time (at minimum rate)",
                        "Prize: 100% Guaranteed Gift!"
                    ]
                },
                Silver: {
                    hi: [
                        "उपयोग: केवल 1 व्यक्ति हेतु",
                        "कोटा: 15 प्रिंट + 12 फोटो (या 40 फोटो / 21 प्रिंट)",
                        "ई-मित्र: सीमित सेवा (केवल टोकन चार्ज देय)",
                        "डिलीवरी: 1 बार (न्यूनतम रेट पर)",
                        "इनाम: लकी ड्रा का शानदार अवसर!"
                    ],
                    en: [
                        "Usage: Valid for 1 person only",
                        "Quota: 15 Prints + 12 Photos (or 40 Photos / 21 Prints)",
                        "E-Mitra: Limited Service (only token charge)",
                        "Delivery: 1 time (at minimum rate)",
                        "Prize: Great chance in Lucky Draw!"
                    ]
                }
            };

            const allHeaders = [
                "Serial_No", "Membership_ID", "Card_Name", "Card_Type", "Prize_Inam", 
                "Village_Gaon", "Sale_Date", "Security_Code", "Customer_Name", "Phone_Number", 
                "Date_of_Birth", "Aadhar_Last_4", "Status", "QR_Link", "Issue_Date", 
                "Activation_Date", "Expiry_Date", "Days_Left", "Total Points", "Used Photos", 
                "Used Prints", "Points Left", "Live Balance", "Total_Sold", "Today Sale", 
                "Stock Left", "Today's Income", "Total Income", "VIP Sale", "Gold Sale", 
                "Silver Sale", "तारीख", "बिके कार्ड", "आज की कमाई (1)", "बाकी कार्ड", 
                "आज की कमाई (2)", "Draw Date", "Inam Status", "Notice"
            ];

            useEffect(() => {
                const timerInt = setInterval(() => setNow(new Date()), 1000);
                const queryId = new URLSearchParams(window.location.search).get('id');

                Papa.parse(FILE_URL, {
                    download: true,
                    header: false,
                    complete: (results) => {
                        const allRows = results.data;
                        if (queryId) {
                            const cleanedQuery = queryId.trim();
                            // Precise Search: Match Serial (0001) or Membership_ID (DPSG-26-...)
                            const found = allRows.find(row => 
                                (row[0] && row[0].toString().trim() === cleanedQuery) || 
                                (row[1] && row[1].toString().trim() === cleanedQuery) ||
                                (row[0] && row[0].toString().padStart(4, '0') === cleanedQuery.padStart(4, '0'))
                            );
                            
                            if (found) {
                                setMember(found);
                                setStatus("view");
                                if (isWinningDate(found[36])) { fireFireworks(); }
                            } else {
                                setStatus("not-found");
                            }
                        } else {
                            setStatus("search");
                        }
                    },
                    error: () => { setStatus("search"); }
                });

                return () => clearInterval(timerInt);
            }, []);

            const fireFireworks = () => {
                const end = Date.now() + (6 * 1000);
                (function frame() {
                    confetti({ particleCount: 3, angle: 60, spread: 60, origin: { x: 0 }, colors: ['#bf953f', '#ffffff', '#2563eb'] });
                    confetti({ particleCount: 3, angle: 120, spread: 60, origin: { x: 1 }, colors: ['#bf953f', '#ffffff', '#2563eb'] });
                    if (Date.now() < end) requestAnimationFrame(frame);
                }());
            };

            const clean = (v) => (v && v.toString().trim() !== "" && v !== "#REF!" && v !== "Pending") ? v : dict[lang].infoUp;
            const isWinningDate = (d) => { if (!d || d.includes("जल्द") || d.trim() === "") return false; return new Date() >= new Date(d); };
            
            const getBenefits = (typeStr) => {
                if (!typeStr) return [];
                const s = typeStr.toLowerCase();
                if (s.includes("vip") || s.includes("500")) return cardBenefits.VIP[lang];
                if (s.includes("gold") || s.includes("100")) return cardBenefits.Gold[lang];
                if (s.includes("silver") || s.includes("50")) return cardBenefits.Silver[lang];
                return [];
            };

            if (status === "loading") return (
                <div className="h-screen flex items-center justify-center bg-[#010413]">
                    <div className="w-14 h-14 border-4 border-yellow-500 border-t-transparent rounded-full animate-spin"></div>
                </div>
            );

            const t_lang = dict[lang];

            return (
                <div className="min-h-screen flex flex-col items-center p-4 relative">
                    
                    {/* Header: DateTime & Language */}
                    <div className="w-full max-w-md no-print flex justify-between items-center mb-8 border-b border-white/10 pb-4">
                        <div className="flex flex-col">
                            <span className="text-[10px] font-black uppercase text-gray-500 tracking-widest">{now.toLocaleDateString(lang === 'hi' ? 'hi-IN' : 'en-US')}</span>
                            <span className="text-blue-500 font-black text-xs tracking-tighter uppercase">{now.toLocaleTimeString()}</span>
                        </div>
                        <div className="bg-white/5 p-1 rounded-xl flex space-x-1 border border-white/10 shadow-lg">
                            <button onClick={()=>setLang('hi')} className={`px-4 py-2 rounded-lg text-[10px] uppercase transition-all ${lang === 'hi' ? 'lang-active shadow-md' : 'text-gray-400'}`}>हिन्दी</button>
                            <button onClick={()=>setLang('en')} className={`px-4 py-2 rounded-lg text-[10px] uppercase transition-all ${lang === 'en' ? 'lang-active shadow-md' : 'text-gray-400'}`}>English</button>
                        </div>
                    </div>

                    <div className="max-w-md w-full z-10">
                        {/* Branding Header */}
                        <div className="text-center mb-10 no-print">
                            <h1 className="text-3xl font-black italic uppercase leading-none tracking-tighter text-white">
                                {t_lang.brand}
                                <span className="block gold-glow text-xl mt-1 tracking-[0.3em]">NIMBAHERA</span>
                            </h1>
                            <div className="mt-5 px-6 py-3 bg-blue-600/10 border border-blue-500/20 rounded-3xl">
                                <p className="text-[10px] font-bold text-blue-300 italic leading-relaxed text-center italic">"{t_lang.slogan}"</p>
                            </div>
                        </div>

                        {status === "search" || status === "not-found" ? (
                            <div className="bg-white/5 backdrop-blur-2xl rounded-[3.5rem] p-12 text-center animate-in zoom-in duration-500 no-print border border-white/5 shadow-2xl">
                                <h2 className="text-xl font-black uppercase mb-8 text-white tracking-widest italic">{t_lang.enter}</h2>
                                <input type="text" placeholder="0001" className="w-full bg-black/40 border border-white/10 rounded-2xl py-6 text-center text-4xl font-black mb-10 outline-none focus:border-yellow-500 text-white shadow-inner" onChange={(e)=>setSearchId(e.target.value)} />
                                <button onClick={()=>{window.location.href=`?id=${searchId}`}} className="w-full bg-blue-600 hover:bg-blue-500 py-6 rounded-2xl font-black uppercase text-xs tracking-widest text-white shadow-xl transition-all active:scale-95">{t_lang.find}</button>
                                {status === "not-found" && <p className="mt-4 text-red-400 text-[10px] font-bold uppercase tracking-widest">ID नहीं मिली! कृपया सही आईडी डालें।</p>}
                            </div>
                        ) : (
                            <div className="space-y-6 animate-in slide-in-from-bottom-10 duration-700">
                                
                                {/* 1. Official Notice (Col 39) */}
                                <div className="bg-yellow-500/10 border border-yellow-500/30 p-5 rounded-[2.5rem] no-print relative">
                                    <div className="flex items-center space-x-2 mb-2 text-yellow-500">
                                        <i className="fa-solid fa-bullhorn text-xs animate-pulse"></i>
                                        <span className="text-[10px] font-black uppercase tracking-widest">{t_lang.notice}</span>
                                    </div>
                                    <p className="text-[11px] font-bold text-gray-200 italic leading-relaxed">"{clean(member[38])}"</p>
                                </div>

                                {/* 2. THE MASTER RECEIPT (The Bill) */}
                                <div id="dpsg-receipt" className="receipt-body p-10 shadow-2xl relative overflow-hidden">
                                    <div className="text-center border-b-2 border-dashed border-gray-100 pb-6 mb-10">
                                        <h3 className="font-black text-2xl tracking-tighter text-blue-600 italic uppercase">{t_lang.receipt}</h3>
                                        <p className="text-[8px] font-bold text-gray-400 uppercase tracking-[0.5em] mt-1 italic">{t_lang.city}</p>
                                    </div>

                                    <div className="space-y-10">
                                        {/* Membership Identity (Fix: Direct extraction from Col 2 and Col 3) */}
                                        <div className="flex justify-between items-start border-b border-gray-50 pb-6">
                                            <div className="space-y-1 w-2/3">
                                                <p className="text-[8px] text-gray-400 font-black uppercase tracking-widest">{t_lang.mId}</p>
                                                <p className="text-xl font-black text-slate-900 tracking-tighter uppercase leading-tight">{clean(member[1])}</p>
                                            </div>
                                            <div className="text-right w-1/3">
                                                <p className="text-[8px] text-gray-400 font-black uppercase tracking-widest">{t_lang.cName}</p>
                                                <p className="text-[11px] font-black text-blue-700 uppercase italic leading-tight">{clean(member[2])}</p>
                                            </div>
                                        </div>

                                        {/* Points Overview Badge */}
                                        <div className="points-pill rounded-[2.5rem] p-8 text-center text-white shadow-2xl shadow-blue-500/30">
                                            <p className="text-[10px] font-black uppercase tracking-widest mb-1 opacity-70 italic">{t_lang.ptsRem}</p>
                                            <div className="flex justify-center items-end mb-6">
                                                <span className="text-7xl font-black tracking-tighter leading-none">{clean(member[21])}</span>
                                            </div>
                                            <div className="grid grid-cols-2 gap-4 pt-6 border-t border-white/10 text-[9px] font-black uppercase tracking-widest">
                                                <div className="flex flex-col space-y-1">
                                                    <span className="opacity-60">{t_lang.ptsTot}</span>
                                                    <span className="text-sm">{clean(member[18])}</span>
                                                </div>
                                                <div className="flex flex-col border-l border-white/10">
                                                    <span className="opacity-60">{t_lang.ptsUsed}</span>
                                                    <span className="text-sm">{(parseInt(member[19]) || 0) + (parseInt(member[20]) || 0)}</span>
                                                </div>
                                            </div>
                                        </div>

                                        {/* AUTOMATED CARD BENEFITS BASED ON COL 4 */}
                                        <div className="space-y-6">
                                            <div className="bg-slate-50 p-6 rounded-[2.5rem] border border-slate-100 shadow-inner">
                                                <p className="text-[8px] text-gray-400 font-black uppercase tracking-widest mb-2">{t_lang.cType}</p>
                                                <p className="text-[16px] font-black text-slate-800 uppercase italic tracking-tighter mb-4">{clean(member[3])}</p>
                                                
                                                <div className="pt-4 border-t border-slate-200">
                                                    <p className="text-[10px] font-black text-blue-700 uppercase tracking-widest mb-4 flex items-center">
                                                        <i className="fa-solid fa-medal mr-2 text-xs"></i> {t_lang.benefitsTitle}
                                                    </p>
                                                    <div className="space-y-1">
                                                        {getBenefits(member[3]).map((ben, idx) => (
                                                            <div key={idx} className="benefit-card flex items-start space-x-3">
                                                                <i className="fa-solid fa-circle-check text-green-600 text-[10px] mt-1.5"></i>
                                                                <p className="text-[11px] font-bold text-slate-700 leading-snug">{ben}</p>
                                                            </div>
                                                        ))}
                                                    </div>
                                                </div>
                                            </div>

                                            {/* Member Profile */}
                                            <div className="grid grid-cols-2 gap-8 py-2 border-y border-slate-50">
                                                <div>
                                                    <p className="text-[8px] text-gray-400 font-black uppercase tracking-widest mb-2 italic">{t_lang.custName}</p>
                                                    <p className="text-[16px] font-black text-slate-950 uppercase italic leading-tight">{clean(member[8])}</p>
                                                </div>
                                                <div className="text-right">
                                                    <p className="text-[8px] text-gray-400 font-black uppercase tracking-widest mb-2 italic">{t_lang.village}</p>
                                                    <p className="text-[16px] font-black text-slate-950 uppercase italic leading-tight">{clean(member[5])}</p>
                                                </div>
                                            </div>
                                        </div>

                                        {/* Status Stats (Col 7 & 38) */}
                                        <div className="grid grid-cols-2 gap-4 bg-slate-50 p-6 rounded-3xl border border-slate-100">
                                            <div>
                                                <p className="text-[8px] text-gray-400 font-black uppercase mb-1 tracking-widest">{t_lang.saleDate}</p>
                                                <p className="text-[12px] font-black text-slate-800 uppercase italic tracking-tighter">{clean(member[6])}</p>
                                            </div>
                                            <div className="text-right border-l border-slate-200 pl-4">
                                                <p className="text-[8px] text-gray-400 font-black uppercase mb-1 tracking-widest">{t_lang.pStatus}</p>
                                                <p className="text-[12px] font-black text-blue-600 uppercase italic tracking-tighter">{clean(member[37])}</p>
                                            </div>
                                        </div>

                                        {/* Validity timeline */}
                                        <div className="grid grid-cols-3 gap-2 bg-slate-950 text-white p-6 rounded-3xl text-center shadow-lg">
                                            <div className="flex flex-col">
                                                <span className="text-[7px] uppercase font-black opacity-50 mb-1 tracking-widest">{t_lang.active}</span>
                                                <span className="text-[10px] font-bold">{clean(member[15])}</span>
                                            </div>
                                            <div className="flex flex-col border-x border-white/10">
                                                <span className="text-[7px] uppercase font-black opacity-50 mb-1 tracking-widest">{t_lang.exp}</span>
                                                <span className="text-[10px] font-bold text-red-400">{clean(member[16])}</span>
                                            </div>
                                            <div className="flex flex-col">
                                                <span className="text-[7px] uppercase font-black opacity-50 mb-1 tracking-widest">{t_lang.days}</span>
                                                <span className="text-[10px] font-bold text-green-400">{clean(member[17])}</span>
                                            </div>
                                        </div>

                                        {/* Print Button */}
                                        <div className="mt-8 text-center no-print border-t border-slate-100 pt-8">
                                            <button onClick={()=>window.print()} className="bg-slate-100 hover:bg-slate-200 text-slate-900 px-12 py-4 rounded-full text-[11px] font-black uppercase flex items-center justify-center mx-auto space-x-3 transition-all active:scale-95 border border-slate-200 shadow-md">
                                                <i className="fa-solid fa-print"></i>
                                                <span>{t_lang.btnGen}</span>
                                            </button>
                                        </div>
                                    </div>
                                </div>

                                {/* Bumper Prize Section */}
                                {isWinningDate(member[36]) ? (
                                    <div className="bg-gradient-to-br from-yellow-500 via-yellow-600 to-yellow-800 rounded-[4rem] p-12 text-center shadow-2xl no-print border-4 border-yellow-200 transform scale-105 shadow-yellow-900/40">
                                        <i className="fa-solid fa-trophy text-8xl text-white mb-8 drop-shadow-2xl animate-bounce"></i>
                                        <p className="text-[11px] text-white/80 font-black uppercase mb-2 tracking-[0.5em] animate-pulse">{t_lang.wonMsg}</p>
                                        <h2 className="text-4xl font-black text-white uppercase tracking-tighter leading-tight drop-shadow-2xl">{clean(member[4])}</h2>
                                    </div>
                                ) : (
                                    <div className="bg-white/5 border border-dashed border-white/10 rounded-[3.5rem] p-12 text-center no-print opacity-50">
                                        <i className="fa-solid fa-gift text-gray-600 mb-4 text-4xl"></i>
                                        <p className="text-[11px] text-gray-500 font-bold uppercase tracking-[0.4em] leading-relaxed italic text-center leading-loose">{t_lang.drawWait}</p>
                                    </div>
                                )}

                                {/* MASTER ADMIN LOGIN */}
                                {!isAdmin ? (
                                    <div className="bg-white/5 rounded-[3.5rem] p-12 text-center space-y-8 shadow-2xl border border-white/5 no-print mt-12">
                                        <div className="space-y-2">
                                            <i className="fa-solid fa-shield-halved text-gray-600 text-3xl"></i>
                                            <p className="text-[10px] text-gray-500 font-black uppercase tracking-[0.6em]">Secure Administrator Access</p>
                                        </div>
                                        <div className="space-y-6">
                                            <input type="password" placeholder="PIN" 
                                                className="w-full bg-black/60 border border-white/10 rounded-2xl py-6 text-center text-white outline-none focus:border-blue-500 text-5xl font-bold tracking-[0.5em] shadow-inner" 
                                                value={pinInput}
                                                onChange={(e)=>setPinInput(e.target.value)} 
                                                onKeyDown={(e)=>e.key === 'Enter' && (pinInput.trim() === MASTER_PIN ? setIsAdmin(true) : alert(t_lang.wrongPin))}
                                            />
                                            <button onClick={()=>pinInput.trim() === MASTER_PIN ? setIsAdmin(true) : alert(t_lang.wrongPin)} className="w-full bg-white text-black font-black py-5 rounded-2xl text-[11px] uppercase tracking-[0.5em] shadow-2xl transition-all active:scale-95 border-b-4 border-gray-300">Unlock Master Dashboard</button>
                                        </div>
                                    </div>
                                ) : (
                                    <div className="bg-slate-950 rounded-[4rem] p-10 space-y-6 shadow-2xl border border-yellow-500/20 max-h-[700px] overflow-y-auto no-print relative">
                                        <div className="flex justify-between items-center border-b border-yellow-500/30 pb-6 mb-8 sticky top-0 bg-slate-950 z-20">
                                            <h3 className="text-[14px] font-black text-yellow-500 uppercase italic tracking-[0.1em] flex items-center"><i className="fa-solid fa-user-secret mr-3"></i> {t_lang.adminHeader}</h3>
                                            <button onClick={()=>setIsAdmin(false)} className="text-[11px] text-white bg-red-600/80 px-6 py-2.5 rounded-2xl uppercase font-black shadow-lg">Close Vault</button>
                                        </div>
                                        <div className="space-y-5">
                                            {allHeaders.map((h, idx) => (
                                                <div key={idx} className="flex justify-between items-center text-[11px] py-3 border-b border-white/5 last:border-0 hover:bg-white/5 transition-colors px-3 rounded-xl leading-relaxed">
                                                    <span className="text-gray-500 uppercase font-black pr-8">{idx + 1}. {h}</span>
                                                    <span className={`text-right font-black ${idx === 3 ? 'text-green-400 font-extrabold text-xs' : idx === 8 ? 'text-blue-400 font-extrabold text-xs' : 'text-white'}`}>
                                                        {member[idx] || "---"}
                                                    </span>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                )}
                            </div>
                        )}
                        <p className="text-center text-[8px] text-gray-800 font-black uppercase mt-24 tracking-[1.5em] italic opacity-40 no-print italic">DPSG NIMBAHERA | J. ZORAWAR SINGH</p>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
