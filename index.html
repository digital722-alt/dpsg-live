            const canvas = canvasRef.current; if(!canvas) return; const ctx = canvas.getContext('2d');  
            canvas.width = canvas.parentElement.offsetWidth; canvas.height = canvas.parentElement.offsetHeight;  
            const grad = ctx.createLinearGradient(0, 0, canvas.width, canvas.height);  
            grad.addColorStop(0, '#B8860B'); grad.addColorStop(0.5, '#FFDF00'); grad.addColorStop(1, '#DAA520');

            ctx.font = "900 32px Inter"; ctx.fillStyle = "rgba(139, 69, 19, 0.5)"; ctx.textAlign = "center";

                const x = (e.pageX || (e.touches && e.touches[0].pageX)) - rect.left;
                const y = (e.pageY || (e.touches && e.touches[0].pageY)) - rect.top;

                <i className="fa-solid fa-building-shield text-7xl text-blue-600 mb-6 drop-shadow-lg"></i>
                <h1 className="text-3xl sm:text-4xl font-black italic uppercase text-transparent bg-clip-text bg-gradient-to-r from-blue-700 to-indigo-600 mb-2">{t.brand}</h1>
                <p className="text-amber-500 font-black tracking-widest mt-2 uppercase text-[15px] pb-6 mb-8 border-b-2 border-dashed border-slate-300 dark:border-slate-600">{t.service}</p>
                
                <div className="space-y-6">
                    <button onClick={() => setAppState("booking")} className="w-full bg-gradient-to-r from-blue-600 to-indigo-700 hover:from-blue-700 hover:to-indigo-800 text-white font-black py-6 rounded-2xl shadow-xl text-xl uppercase tracking-widest transition-all hover:scale-[1.02] border-b-4 border-indigo-900">
                        <i className="fa-solid fa-address-card mr-3 text-2xl"></i> नया कार्ड बुक करें (Book Card)
                    </button>
                    
                    <button onClick={() => setAppState("search")} className="w-full bg-white dark:bg-slate-800 text-blue-700 dark:text-blue-400 font-black py-6 rounded-2xl shadow-md text-lg uppercase tracking-widest transition-all hover:scale-[1.02] border-2 border-blue-200 dark:border-slate-600">
                        <i className="fa-solid fa-magnifying-glass mr-3"></i> सर्विस स्टेटस / कार्ड डाउनलोड
                    </button>
                </div>
            </div>
        );

        const renderBookingGrid = () => (
            <div className="glass-card p-6 sm:p-10 text-center animate-in slide-in-from-right duration-500">
                <button onClick={() => setAppState("landing")} className="text-slate-500 font-black mb-4 flex items-center hover:text-blue-600"><i className="fa-solid fa-arrow-left mr-2"></i> वापस जाएँ</button>
                
                {/* LIVE FOMO COUNTER */}
                <div className="bg-red-100 border-2 border-red-500 text-red-700 px-4 py-3 rounded-xl mb-6 flex justify-center items-center blink-text">
                    <i className="fa-solid fa-fire mr-3 text-2xl text-red-600"></i>
                    <p className="font-black uppercase tracking-widest">🔥 जल्दी करें! 1000 में से केवल <span className="text-2xl">{cardsAvailable}</span> कार्ड शेष!</p>
                </div>

                <h3 className="text-2xl font-black mb-4 uppercase text-slate-800 dark:text-slate-100">अपना मनपसंद कार्ड नंबर चुनें</h3>
                <p className="text-sm text-slate-500 font-bold mb-4">* हरे रंग के बॉक्स में से कोई भी एक नंबर चुनें</p>

                {/* 1000 Grid Representation (Rendering 100 for Demo Speed, logic scales to 1000) */}
                <div className="number-grid bg-white/50 dark:bg-slate-900/50">
                    {Array.from({ length: 150 }).map((_, i) => {
                        let num = i + 1;
                        let status = (num % 17 === 0 || num % 23 === 0) ? "sold" : "available"; // Random sold sim
                        return (
                            <div key={num} onClick={() => status === "available" && setSelectedCardNo(num)}
                                className={`number-box ${status === 'sold' ? 'number-sold' : selectedCardNo === num ? 'number-selected' : 'number-available'}`}>
                                {num.toString().padStart(4, '0')}
                            </div>
                        )
                    })}
                </div>

                {selectedCardNo && (
                    <button onClick={() => openForm("Card Booking - " + selectedCardNo)} className="w-full mt-6 bg-green-600 hover:bg-green-700 text-white font-black py-5 rounded-xl shadow-xl text-lg uppercase transition-all">
                        नंबर {selectedCardNo.toString().padStart(4, '0')} के साथ आगे बढ़ें <i className="fa-solid fa-arrow-right ml-2"></i>
                    </button>
                )}
            </div>
        );

        // -----------------------------------------------------------

        return (  
            <div className={`min-h-screen pb-10 ${theme === 'dark' ? 'dark' : ''}`}> 
                
                {showWelcome && appState === "view" && (
                    <div className="fixed inset-0 z-[100] flex items-center justify-center bg-slate-900/80 backdrop-blur-sm p-4 fade-in-scale">
                        <div className="bg-white dark:bg-slate-800 p-10 sm:p-14 rounded-[3rem] w-full max-w-xl text-center shadow-[0_0_50px_rgba(59,130,246,0.5)] border-4 border-blue-400 relative overflow-hidden">
                            <h2 className="text-3xl font-black text-slate-800 dark:text-white mb-2 fancy-text">{getGreeting()}!</h2>
                            <p className="text-[17px] font-bold text-blue-800 dark:text-blue-300 mb-6 leading-relaxed">{t.welcomeTitle}</p>
                            <button onClick={() => setShowWelcome(false)} className="w-full bg-gradient-to-r from-blue-600 to-indigo-700 hover:from-blue-700 hover:to-indigo-800 text-white font-black py-5 rounded-2xl shadow-xl text-xl uppercase tracking-widest transition-all">
                                {t.proceedBtn} <i className="fa-solid fa-arrow-right ml-2"></i>
                            </button>
                        </div>
                    </div>
                )}

                <div className="no-print marquee flex justify-center items-center w-full">
                    <div className="marquee-content flex items-center">
                        <i className="fa-solid fa-bullhorn text-5xl text-red-700 dark:text-red-900 mx-5 blink-text drop-shadow-lg"></i>
                        <span className="blink-text text-xl font-black uppercase tracking-widest text-blue-900 dark:text-white">{t.official} :</span> 
                        <span className="ml-4 text-[17px] font-bold text-slate-800 dark:text-slate-100">{member ? (member[38] || "Welcome to Digital Problem Solution Group Nimbahera") : "DPSG Dashboard Loading..."}</span>
                        <i className="fa-solid fa-bullhorn text-5xl text-red-700 dark:text-red-900 mx-5 blink-text drop-shadow-lg"></i>
                    </div>
                </div>  
                
                <div className="max-w-xl mx-auto p-4 sm:p-8 relative z-10">  
                    <div className="no-print flex justify-end mb-4 gap-3">
                        <button onClick={()=>setTheme(theme==='light'?'dark':'light')} className="w-12 h-12 flex items-center justify-center bg-white/90 dark:bg-slate-800/90 backdrop-blur-md rounded-full shadow-lg text-xl border-2 border-white hover:scale-105 transition-all">
                            {theme==='light'?'🌙':'☀️'}
                        </button>
                    </div>

                    {/* STATE ROUTING */}
                    {appState === "landing" && renderLandingPage()}
                    {appState === "booking" && renderBookingGrid()}
                    
                    {appState === "search" && (  
                        <div className="glass-card p-12 text-center animate-in slide-in-from-left duration-500">  
                            <button onClick={() => setAppState("landing")} className="text-slate-500 font-black mb-6 flex items-center hover:text-blue-600"><i className="fa-solid fa-arrow-left mr-2"></i> वापस</button>
                            <i className="fa-solid fa-id-card text-7xl text-blue-600 mb-6 drop-shadow-lg"></i>  
                            <h2 className="text-2xl font-black mb-8 uppercase text-slate-800 dark:text-slate-100">{t.searchTitle}</h2>  
                            <input id="sid" type="text" className="w-full bg-slate-50 dark:bg-slate-900 border-2 border-slate-300 dark:border-slate-600 rounded-2xl py-5 text-center mb-6 text-2xl font-black uppercase focus:border-blue-500 transition-all outline-none" placeholder="DPSG-26-XXXX" />  
                            <button onClick={() => window.location.href=`?id=${document.getElementById('sid').value}`} className="w-full bg-gradient-to-r from-blue-600 to-indigo-700 hover:from-blue-700 hover:to-indigo-800 py-5 rounded-2xl font-black text-white shadow-xl text-xl tracking-widest transition-all">{t.searchBtn}</button>  
                        </div>  
                    )}

                    {appState === "view" && (  
                        <div className="space-y-8 animate-in slide-in-from-bottom-6 duration-700">  
                            {/* ... EXACT ORIGINAL VIEW CODE RETAINED HERE ... */}
                            <div className="text-center glass-card p-8">  
                                <h1 className="text-3xl sm:text-4xl font-black italic uppercase text-transparent bg-clip-text bg-gradient-to-r from-blue-700 to-indigo-600 dark:from-blue-400 dark:to-indigo-300 leading-tight drop-shadow-sm">{t.brand}</h1>  
                                <p className="text-amber-500 font-black tracking-widest mt-2 uppercase text-[15px] border-b-2 border-dashed border-amber-200 dark:border-amber-800 inline-block pb-2">{t.service}</p>  
                                <p className="text-slate-700 dark:text-slate-200 font-black mt-5 italic text-[14px] bg-white/50 dark:bg-slate-900/50 backdrop-blur-sm py-3 px-5 rounded-full inline-block border border-white/50 dark:border-slate-700 shadow-sm"><i className="fa-solid fa-quote-left text-blue-500 mr-2 text-lg"></i>{t.slogan}<i className="fa-solid fa-quote-right text-blue-500 ml-2 text-lg"></i></p>
                            </div>  
    
                            <div className="no-print grid grid-cols-4 gap-3 my-6">
                                <button onClick={() => openForm(t.icon1)} className="group flex flex-col items-center justify-center glass-card !rounded-3xl py-4 px-2 hover:border-orange-400 hover:-translate-y-1 transition-all !border-[1px]"><div className="w-14 h-14 bg-gradient-to-br from-orange-100 to-orange-50 text-orange-500 rounded-2xl flex items-center justify-center text-2xl mb-3 shadow-inner group-hover:scale-110 transition-transform"><i className="fa-solid fa-desktop"></i></div><span className="text-[11px] sm:text-[12px] font-black text-slate-800 dark:text-slate-200 uppercase text-center leading-tight">{t.icon1}</span></button>
                                <button onClick={() => openForm(t.icon2)} className="group flex flex-col items-center justify-center glass-card !rounded-3xl py-4 px-2 hover:border-blue-400 hover:-translate-y-1 transition-all !border-[1px]"><div className="w-14 h-14 bg-gradient-to-br from-blue-100 to-blue-50 text-blue-600 rounded-2xl flex items-center justify-center text-2xl mb-3 shadow-inner group-hover:scale-110 transition-transform"><i className="fa-solid fa-hard-drive"></i></div><span className="text-[11px] sm:text-[12px] font-black text-slate-800 dark:text-slate-200 uppercase text-center leading-tight">{t.icon2}</span></button>
                                <button onClick={() => openForm(t.icon3)} className="group flex flex-col items-center justify-center glass-card !rounded-3xl py-4 px-2 hover:border-purple-400 hover:-translate-y-1 transition-all !border-[1px]"><div className="w-14 h-14 bg-gradient-to-br from-purple-100 to-purple-50 text-purple-600 rounded-2xl flex items-center justify-center text-2xl mb-3 shadow-inner group-hover:scale-110 transition-transform"><i className="fa-solid fa-mobile-screen-button"></i></div><span className="text-[11px] sm:text-[12px] font-black text-slate-800 dark:text-slate-200 uppercase text-center leading-tight">{t.icon3}</span></button>
                                <button onClick={() => openForm("Airtel Payment Bank (KYC)")} className="group flex flex-col items-center justify-center glass-card !rounded-3xl py-4 px-2 hover:border-red-400 hover:-translate-y-1 transition-all !border-[1px]"><div className="w-14 h-14 bg-gradient-to-br from-red-100 to-red-50 text-red-600 rounded-2xl flex items-center justify-center text-2xl mb-3 shadow-inner group-hover:scale-110 transition-transform"><i className="fa-solid fa-building-columns"></i></div><span className="text-[11px] sm:text-[12px] font-black text-slate-800 dark:text-slate-200 uppercase text-center leading-tight">AIRTEL BANK</span></button>
                            </div>

                            {/* EXACT RECEIPT CODE REMAINS UNTOUCHED BELOW */}
                            <div id="receipt" className="glass-card p-8 sm:p-12 text-left relative mt-8">  
                                <div className="text-center border-b-4 border-slate-200 dark:border-slate-700 border-dashed pb-8 mb-10">
                                    <h3 className="font-black text-3xl text-blue-900 dark:text-blue-400 italic uppercase tracking-tight drop-shadow-sm">{t.receipt}</h3>
                                </div>  
                                <div className="grid grid-cols-2 gap-y-12 gap-x-4 text-sm border-b-2 border-slate-200 dark:border-slate-700 pb-12">  
                                    <div className="col-span-2 text-center bg-blue-50/70 border-2 border-blue-400 rounded-[2rem] p-8">
                                        <p className="text-[15px] font-black text-blue-800 tracking-[0.2em] mb-4"><i className="fa-solid fa-fingerprint mr-3 text-2xl"></i> {t.idLabelFull}</p>
                                        <p className="text-4xl sm:text-5xl font-black text-blue-600 tracking-wider">{clean(member[1])}</p>
                                    </div>
                                    <div className="col-span-2 grid grid-cols-2 gap-4">
                                        <div><p className="text-[14px] font-black text-slate-600 mb-2">{t.cName}</p><p className="font-black text-2xl text-indigo-900">{clean(member[8])}</p></div>  
                                        <div className="text-right"><p className="text-[14px] font-black text-slate-600 mb-2">{t.vill}</p><p className="font-black text-2xl text-slate-800">{clean(member[5])}</p></div>  
                                    </div>
                                    <div><p className="text-[14px] font-black text-slate-600 mb-2">{t.sMob}</p><p className="font-black text-xl text-slate-700">{mask(member[9])}</p></div>
                                    <div className="text-right"><p className="text-[14px] font-black text-slate-600 mb-2">{t.sAad}</p><p className="font-black text-xl text-slate-700">{mask(member[11])}</p></div>
                                </div>
                                <button onClick={()=>window.print()} className="no-print mt-10 w-full bg-blue-700 text-white py-6 rounded-2xl font-black uppercase text-xl border-b-4 border-indigo-950"><i className="fa-solid fa-print mr-3"></i> {t.printBtn}</button>
                            </div>
                        </div>
                    )}

                    {/* NEW UPDATED SMART FORM MODAL */}
                    {showForm && (
                        <div className="fixed inset-0 z-[110] flex items-center justify-center bg-slate-900/90 backdrop-blur-md p-4 overflow-y-auto pt-20 pb-20">
                            <div className="glass-card p-8 sm:p-12 w-full max-w-lg relative animate-in zoom-in duration-300 border-4 border-blue-400">
                                <button onClick={() => setShowForm(false)} className="absolute top-6 right-6 w-12 h-12 bg-red-100 text-red-600 rounded-full font-black text-2xl"><i className="fa-solid fa-xmark"></i></button>
                                
                                <div className="text-center mb-8 border-b-2 border-slate-200 border-dashed pb-6">
                                    <h3 className="text-2xl font-black text-slate-800 uppercase tracking-wider">{formType}</h3>
                                </div>
                                
                                <form onSubmit={sendToWhatsApp} className="space-y-6 text-left">
                                    <input type="hidden" name="Service" value={formType} />
                                    
                                    <div>
                                        <label className="block text-[13px] font-black uppercase text-slate-600 mb-2 tracking-widest">पूरा नाम <span className="text-red-500">*</span></label>
                                        <input type="text" name="Name" required pattern="[A-Za-z ]+" title="केवल अक्षर (Alphabets) दर्ज करें" className="w-full border-2 border-slate-300 p-4 rounded-xl font-bold text-lg" placeholder="अपना नाम लिखें" />
                                    </div>

                                    <div>
                                        <label className="block text-[13px] font-black uppercase text-slate-600 mb-2 tracking-widest">आधार लिंक मोबाइल <span className="text-red-500">*</span></label>
                                        <input type="tel" name="Mobile" required pattern="[6-9][0-9]{9}" title="सही 10 अंकों का मोबाइल नंबर दर्ज करें" className="w-full border-2 border-slate-300 p-4 rounded-xl font-bold text-xl" placeholder="10 Digit Mobile No" />
                                    </div>

                                    <div>
                                        <label className="block text-[13px] font-black uppercase text-slate-600 mb-2 tracking-widest">आधार कार्ड नंबर <span className="text-red-500">*</span></label>
                                        <input type="text" name="Aadhar" required pattern="[0-9]{12}" title="सही 12 अंकों का आधार दर्ज करें" className="w-full border-2 border-slate-300 p-4 rounded-xl font-bold text-xl tracking-[0.2em]" placeholder="XXXX XXXX XXXX" />
                                    </div>
                                    
                                    <div>
                                        <label className="block text-[13px] font-black uppercase text-slate-600 mb-2 tracking-widest">जन्म तिथि (DOB) <span className="text-red-500">*</span></label>
                                        <input type="date" name="DOB" required className="w-full border-2 border-slate-300 p-4 rounded-xl font-bold text-lg" />
                                    </div>

                                    <div>
                                        <label className="block text-[13px] font-black uppercase text-slate-600 mb-2 tracking-widest">पेमेंट का माध्यम <span className="text-red-500">*</span></label>
                                        <select value={paymentMode} onChange={(e)=>setPaymentMode(e.target.value)} name="Payment" className="w-full border-2 border-slate-300 p-4 rounded-xl font-bold text-lg">
                                            <option value="Cash">Cash (नकद)</option>
                                            <option value="UPI">UPI (PhonePe/Google Pay)</option>
                                            <option value="Airtel Payment Bank">Airtel Payment Bank</option>
                                        </select>
                                    </div>

                                    {/* AIRTEL SPECIAL PAN CONDITION */}
                                    <div className={`transition-all ${paymentMode === 'Airtel Payment Bank' ? 'block bg-red-50 p-4 rounded-xl border-2 border-red-300' : 'block'}`}>
                                        <label className="block text-[13px] font-black uppercase text-slate-600 mb-2 tracking-widest">
                                            पैन कार्ड (PAN) {paymentMode === 'Airtel Payment Bank' && <span className="text-red-600 ml-2 animate-pulse">(अनिवार्य)</span>}
                                        </label>
                                        <input type="text" name="Pan" required={paymentMode === 'Airtel Payment Bank'} pattern="[A-Z]{5}[0-9]{4}[A-Z]{1}" title="ABCDE1234F फॉर्मेट में दर्ज करें" className="w-full border-2 border-slate-300 p-4 rounded-xl font-bold text-xl uppercase" placeholder="ABCDE1234F" />
                                        {paymentMode === 'Airtel Payment Bank' && <p className="text-xs text-red-600 font-bold mt-2"><i className="fa-solid fa-triangle-exclamation"></i> एयरटेल पेमेंट बैंक के लिए पैन अनिवार्य है।</p>}
                                    </div>

                                    <div>
                                        <label className="block text-[13px] font-black uppercase text-slate-600 mb-2 tracking-widest">समस्या / कार्य (कलम 12) <span className="text-red-500">*</span></label>
                                        <textarea name="Problem" required rows="3" className="w-full border-2 border-slate-300 p-4 rounded-xl font-bold text-lg resize-none" placeholder="कार्य का विवरण..."></textarea>
                                    </div>
                                    
                                    <div className="bg-blue-50 p-4 rounded-xl border-2 border-blue-200">
                                        <label className="block text-[13px] font-black uppercase text-slate-700 mb-2 tracking-widest"><i className="fa-solid fa-paperclip"></i> डॉक्यूमेंट / वीडियो (कलम 13)</label>
                                        <input type="file" name="Files" multiple accept="image/*,video/*,application/pdf" className="w-full text-sm font-bold" />
                                    </div>

                                    <button type="submit" className="w-full bg-gradient-to-r from-green-600 to-emerald-700 hover:from-green-700 hover:to-emerald-800 text-white font-black py-6 rounded-2xl shadow-xl mt-6 text-xl uppercase tracking-widest"><i className="fa-brands fa-whatsapp mr-3 text-2xl"></i> व्हाट्सएप पर सबमिट करें</button>
                                </form>
                            </div>
                        </div>
                    )}
                </div>
            </div>  
        );  
    };  
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);  
    </script>
</body>  
</html>
