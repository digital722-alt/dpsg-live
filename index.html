<!DOCTYPE html>  
<html lang="hi">  
<head>  
    <meta charset="UTF-8">  
    <meta name="viewport" content="width=device-width, initial-scale=1.0">  
    <title>DPSG Master Portal - Digital Seva Nimbahera</title>  
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>  
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>  
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>  
    <script src="https://cdn.tailwindcss.com"></script>  
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>  
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>  
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">  
    <script>tailwind.config = { darkMode: 'class' }</script>
    <style>  
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=Mukta:wght@400;700;800&display=swap');  
        body { font-family: 'Mukta', sans-serif; transition: all 0.3s; margin: 0; }  
        .dark body { background-color: #0f172a; color: #f8fafc; }
        .light body { background-color: #f1f5f9; color: #1e293b; }
        .receipt-card { border-radius: 2.5rem; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5); }  
        .marquee-container { background: #fbbf24; color: #000; padding: 12px 0; overflow: hidden; border-bottom: 3px solid #000; }
        .marquee-p { display: inline-block; white-space: nowrap; font-weight: 900; animation: scroll-left 25s linear infinite; font-size: 15px; }
        @keyframes scroll-left { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }
        .winner-glow { border: 8px solid #fbbf24; box-shadow: 0 0 70px rgba(251, 191, 36, 0.9); animation: pulse 2s infinite; }  
        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.02); } }  
        @media print { .no-print { display: none !important; } .receipt-card { box-shadow: none !important; border: 1px solid #ccc !important; } }
    </style>
</head>  
<body>  
    <div id="root"></div>  
    <script type="text/babel">  
    const { useState, useEffect, useRef, useCallback } = React;  
    const SHEET_ID = "1rrU0EHXur_HfPlmYxjm6vIJqeRW2VZAu0qIteItQkLo";  
    const MAIN_CSV = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv`;  
    const MAPPING_CSV = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRlm-iMRLk5J-lxybJ7S2sR3ZpcGNG8Z8r3BEku8GzK8opYlsunIcZoe03Jf0Xbhw/pub?gid=1529433935&single=true&output=csv";  
    const FORM_LINK = "https://docs.google.com/forms/d/e/1FAIpQLSdU9UfN7-6Xyv9U5X9z9X9z9X9z9X9z9X9z9X9z9X9z9X9z9/viewform";

    const translations = {
        hi: {
            brand: "डिजिटल प्रॉब्लम सॉल्यूशन ग्रुप", slogan: "समस्या आपकी, समाधान हमारा - उचित मूल्य, बेहतरीन सेवा", 
            receipt: "प्रोफेशनल डिजिटल रसीद", notice: "📢 आवश्यक सूचना", search: "ID सर्च करें", open: "डैशबोर्ड खोलें",
            id: "ID पहचान", cat: "श्रेणी", name: "ग्राहक का नाम", vil: "ग्राम/शहर", mob: "मोबाइल", active: "सक्रियण तिथि", exp: "समाप्ति तिथि",
            pts: "कुल पॉइंट्स", usd: "उपयोग", bal: "शेष", draw: "लकी ड्रा तिथि", benefit: "सदस्यता कार्ड सुविधायें",
            tTitle: "नियम व शर्तें", warning: "⚠️ आधिकारिक घोषणा होने तक कृपया कार्ड को स्क्रैच न करें", pending: "परिणाम जल्द घोषित होगा।"
        },
        en: {
            brand: "DIGITAL PROBLEM SOLUTION GROUP", slogan: "YOUR PROBLEM, OUR SOLUTION - BEST SERVICE",
            receipt: "PROFESSIONAL DIGITAL RECEIPT", notice: "📢 IMPORTANT NOTICE", search: "SEARCH ID", open: "OPEN DASHBOARD",
            id: "ID IDENTITY", cat: "CATEGORY", name: "CUSTOMER NAME", vil: "VILLAGE/CITY", mob: "MOBILE", active: "ACTIVATION DATE", exp: "EXPIRY DATE",
            pts: "TOTAL POINTS", usd: "USED", bal: "BALANCE", draw: "LUCKY DRAW DATE", benefit: "MEMBERSHIP BENEFITS",
            tTitle: "TERMS & CONDITIONS", warning: "⚠️ DO NOT SCRATCH UNTIL ANNOUNCED", pending: "RESULT COMING SOON..."
        }
    };

    const cardSpecs = {  
        VIP: ["वीआईपी कार्ड: ₹500 (6 महीने)", "उपयोग: पूरे परिवार के लिए मान्य", "कोटा: 150 प्रिंट + 80 फोटो (या 380 फोटो / 190 प्रिंट)", "लैमिनेशन: 2 फ्री", "ई-मित्र: 100% फ्री सेवा (केवल टोकन चार्ज)", "डिलीवरी: 2 बार फ्री (न्यूनतम रेट)", "इनाम: 100 Cash Back + बड़ा धमाका!", "संपर्क: 7229874128"],  
        Gold: ["गोल्ड कार्ड: ₹100 (3 महीने)", "उपयोग: केवल 1 व्यक्ति हेतु", "कोटा: 40 प्रिंट + 24 फोटो (या 100 फोटो / 52 प्रिंट)", "लैमिनेशन: 1 फ्री", "ई-मित्र: 50% छूट (केवल टोकन चार्ज)", "डिलीवरी: 1 बार (न्यूनतम रेट)", "इनाम: 100% गारंटीड उपहार!", "संपर्क: 7229874128"],  
        Silver: ["सिल्वर कार्ड: ₹50 (1 महीना)", "उपयोग: केवल 1 व्यक्ति हेतु", "कोटा: 15 प्रिंट + 12 फोटो (या 40 फोटो / 21 प्रिंट)", "ई-मित्र: सीमित सेवा (केवल टोकन चार्ज)", "डिलीवरी: 1 बार (न्यूनतम रेट)", "इनाम: लकी ड्रा का शानदार अवसर!", "संपर्क: 7229874128"]  
    };

    const App = () => {  
        const [lang, setLang] = useState('hi');
        const [theme, setTheme] = useState('dark');
        const [status, setStatus] = useState("loading"); 
        const [member, setMember] = useState(null); 
        const [prize, setPrize] = useState({ img: "", msg: "", isLocked: true, highlight: "" });  

        const t = translations[lang];

        const mapPrize = useCallback((row, maps) => {  
            const lock = (row[37] || "").toUpperCase().trim(); 
            if (!lock || lock === "LOCKED") { setPrize({ msg: t.pending, isLocked: true }); return; }
            const match = maps.find(m => m.Membership_ID?.toLowerCase().trim() === row[1].toLowerCase().trim());

            if (lock === "DPSG_WINNER" && match) {
                setPrize({ img: "https://drive.google.com/thumbnail?id=" + match.Image_Link?.split("id=")[1] + "&sz=w1000", highlight: lang==='hi'?(match.Inam_Name||"विजेता"):"WINNER", msg: lang==='hi'?`'मंजिल उन्हीं को मिलती है जिनके सपनों में जान होती है,\nआज आपकी मेहनत और किस्मत दोनों मेहरबान होती है!'\n\nहार्दिक बधाई! आप DPSG के विजेता बने हैं। आपने ${match.Inam_Name} जीता है और आपकी रैंक ${match.Match_Name} है। धन्यवाद!`:`Congratulations! You won ${match.Inam_Name} (Rank ${match.Match_Name}). Thank you!`, isLocked: false });
            } else if (lock === "DPSG_CASH") {
                setPrize({ img: "https://drive.google.com/thumbnail?id=1WOrBZpuRF9Q-Pc753LA11XoAaGjCv7zD&sz=w1000", highlight: "CASH BACK", msg: lang==='hi'?`'इनाम छोटा हो या बड़ा, अपनों का साथ सबसे प्यारा है!'\n\nमुस्कुराइए! DPSG की ओर से आपको विशेष कैशबैक दिया जा रहा है। भविष्य में भी हम आपकी सेवा के लिए तत्पर रहेंगे। धन्यवाद!`:`DPSG Special Cashback for you. Thank you for your trust!`, isLocked: false });
            } else if (lock === "DPSG_GIFT") {
                setPrize({ img: "https://drive.google.com/thumbnail?id=1baCVXWH7XYD5T8QxOfGKnkt9CKDHSx2Z&sz=w1000", highlight: "DPSG GIFT", msg: lang==='hi'?`'खूबसूरत सा ये तोहफा बस एक छोटा सा बहाना है!'\n\nबधाई हो! DPSG परिवार की ओर से यह उपहार आपकी संतुष्टि और विश्वास का सम्मान है। धन्यवाद!`:`Congratulations! This DPSG gift is a token of our appreciation. Thank you!`, isLocked: false });
            } else {
                setPrize({ img: "https://drive.google.com/thumbnail?id=1j7v5a90h8ABi2r6piQIZR_4Qil4buiqh&sz=w1000", highlight: "TRY AGAIN", msg: lang==='hi'?`'गिरते हैं शहसवार ही मैदान-ए-जंग में!'\n\nनिराश न हों! हालांकि इस बार आप 51 बड़े इनामों में नहीं आ पाए, पर भविष्य के ड्रा में आपकी किस्मत ज़रूर चमकेगी। धन्यवाद!`:`Don't be disappointed! Better luck next time in the lucky draw. Thank you!`, isLocked: false });
            }
        }, [lang, t.pending]);

        useEffect(() => {  
            document.documentElement.className = theme;
            fetch(MAIN_CSV + "&t=" + Date.now()).then(r => r.text()).then(txt => {  
                Papa.parse(txt, { complete: (res) => {  
                    const rows = res.data;
                    const qId = new URLSearchParams(window.location.search).get('id');  
                    const match = rows.slice(1).find(r => r[1] && r[1].toLowerCase() === (qId || "").toLowerCase());  
                    if (match) { 
                        setMember(match); 
                        fetch(MAPPING_CSV).then(r => r.text()).then(mTxt => { Papa.parse(mTxt, { header: true, complete: (mRes) => { mapPrize(match, mRes.data); setStatus("view"); } }); });
                    } else setStatus("search");  
                }});  
            });  
        }, [lang, theme, mapPrize]);  

        if (status === "loading") return <div className="h-screen flex items-center justify-center font-black text-blue-400">DPSG LOADING...</div>;  

        return (  
            <div className="min-h-screen pb-10">  
                <div className="no-print marquee-container"><div className="marquee-p">{member ? member[38] : t.brand} • {t.slogan}</div></div>  
                <div className="max-w-xl mx-auto p-4 sm:p-8">  
                    <div className="no-print flex justify-between items-center mb-6">
                        <button onClick={() => setLang(lang === 'hi' ? 'en' : 'hi')} className="bg-blue-600 text-white px-5 py-2 rounded-full font-bold text-xs">{lang === 'hi' ? 'ENGLISH' : 'हिंदी'}</button>
                        <button onClick={() => setTheme(theme === 'dark' ? 'light' : 'dark')} className="p-3 bg-white dark:bg-slate-800 rounded-full shadow-lg">{theme === 'dark' ? '☀️' : '🌙'}</button>
                    </div>

                    {status === "search" ? (  
                        <div className="bg-white dark:bg-slate-800 p-12 rounded-[2.5rem] shadow-xl text-center"><i className="fa-solid fa-id-card text-6xl text-blue-600 mb-6"></i><h2 className="text-xl font-bold mb-8 uppercase dark:text-white">{t.search}</h2><input id="sid" type="text" className="w-full bg-slate-100 dark:bg-slate-700 border-2 rounded-2xl py-5 text-center mb-6 font-bold" placeholder="DPSG-26-XXXX" /><button onClick={() => window.location.href=`?id=${document.getElementById('sid').value}`} className="w-full bg-blue-600 py-5 rounded-2xl font-black text-white shadow-lg">{t.open}</button></div>
                    ) : (  
                        <div className="space-y-6">  
                            <div className="text-center"><h1 className="text-3xl font-black italic uppercase dark:text-white">{t.brand}</h1><div className="bg-blue-600 inline-block px-4 py-1 rounded-full mt-2"><p className="text-[10px] font-bold text-white uppercase">{t.slogan}</p></div></div>  
                            
                            <div className="grid grid-cols-4 gap-2 text-center no-print">
                                <a href={FORM_LINK} className="bg-white p-3 rounded-2xl shadow-lg"><i className="fa-solid fa-desktop text-orange-500 text-2xl"></i><p className="text-[9px] font-bold text-slate-900 mt-2">ई-मित्र</p></a>
                                <a href={FORM_LINK} className="bg-white p-3 rounded-2xl shadow-lg"><i className="fa-solid fa-database text-blue-500 text-2xl"></i><p className="text-[9px] font-bold text-slate-900 mt-2">डेटा</p></a>
                                <a href={FORM_LINK} className="bg-white p-3 rounded-2xl shadow-lg"><i className="fa-solid fa-mobile-screen text-purple-500 text-2xl"></i><p className="text-[9px] font-bold text-slate-900 mt-2">अनलोक</p></a>
                                <a href={FORM_LINK} className="bg-white p-3 rounded-2xl shadow-lg"><i className="fa-solid fa-landmark text-green-600 text-2xl"></i><p className="text-[9px] font-bold text-slate-900 mt-2">योजना</p></a>
                            </div>

                            <div className="bg-slate-800 dark:bg-slate-900 p-1 rounded-[2.5rem] shadow-xl border-2 border-slate-700">
                                <p className="text-red-500 font-bold text-[10px] my-3 text-center animate-pulse uppercase">{t.warning}</p>
                                <div className="bg-white rounded-[2rem] overflow-hidden">  
                                    {prize.isLocked ? ( <div className="py-24 text-center text-slate-400 font-bold italic"><p>{prize.msg}</p></div> ) : (  
                                        <div className="text-center w-full winner-glow">
                                            <div className="bg-blue-600 text-white px-10 py-2 rounded-b-3xl font-black text-xs mb-4 uppercase">{prize.highlight}</div>  
                                            <img src={prize.img} className="w-full max-h-[300px] object-contain px-4" />  
                                            <div className="bg-slate-900 text-white p-6 w-full text-center border-t-4 border-yellow-500">
                                                <p className="italic font-bold text-sm text-yellow-200 whitespace-pre-line">{prize.msg}</p>
                                            </div>
                                        </div>
                                    )}  
                                </div>
                            </div>

                            <div id="receipt" className="receipt-card p-10 text-left bg-white text-slate-900 border-2 border-slate-100">  
                                <div className="text-center border-b-2 border-dashed border-slate-200 pb-6 mb-8"><h3 className="font-black text-2xl text-blue-700 italic uppercase">{t.receipt}</h3><p className="text-[9px] font-black text-slate-400 mt-1 uppercase">DPSG NIMBAHERA</p></div>  
                                <div className="grid grid-cols-2 gap-y-10 border-b pb-8 text-sm">  
                                    <div><p className="text-[9px] font-black text-slate-400 uppercase">{t.id}</p><p className="text-xl font-black text-blue-700">{member[1]}</p></div>  
                                    <div className="text-right"><p className="text-[9px] font-black text-slate-400 uppercase">{t.cat}</p><p className="font-bold text-blue-700 bg-blue-50 px-4 py-1 rounded-full text-[10px] inline-block">{member[3]}</p></div>  
                                    <div><p className="text-[9px] font-black text-slate-400 uppercase">{t.name}</p><p className="font-bold uppercase">{member[8]}</p></div>  
                                    <div className="text-right"><p className="text-[9px] font-black text-slate-400 uppercase">{t.vil}</p><p className="font-bold uppercase">{member[5]}</p></div>  
                                </div>
                                <div className="grid grid-cols-3 gap-4 my-8">
                                    <div className="bg-blue-600 text-white p-5 rounded-3xl text-center"><p className="text-[8px] font-bold uppercase">{t.pts}</p><p className="text-2xl font-black">{member[18]}</p></div>
                                    <div className="bg-slate-800 text-white p-5 rounded-3xl text-center"><p className="text-[8px] font-bold uppercase">{t.usd}</p><p className="text-2xl font-black">{(parseInt(member[18])-parseInt(member[21]))||0}</p></div>
                                    <div className="bg-green-600 text-white p-5 rounded-3xl text-center"><p className="text-[8px] font-bold uppercase">{t.bal}</p><p className="text-2xl font-black">{member[21]}</p></div>
                                </div>
                                <div className="bg-blue-50/50 p-6 rounded-3xl border border-blue-100 my-8 font-bold italic text-[11px] space-y-3">
                                    <p className="text-blue-700 font-black uppercase mb-2 flex items-center"><i className="fa-solid fa-star mr-2"></i> {t.benefit}</p>
                                    {(() => { 
                                        const cat = (member[3] || "").toLowerCase(); 
                                        let key = (cat.includes("vip") || cat.includes("500")) ? "VIP" : (cat.includes("gold") || cat.includes("100")) ? "Gold" : "Silver"; 
                                        return cardSpecs[key].map((ben, i) => ( <div key={i} className="flex items-start py-1 border-b border-blue-100 last:border-0"><i className="fa-solid fa-check text-green-500 mr-2 mt-1"></i>{ben}</div> )); 
                                    })()}
                                </div>
                                <div className="bg-slate-900 text-white p-8 rounded-[2.5rem] text-center mb-8 border-4 border-slate-800"><p className="text-[10px] opacity-50 uppercase mb-1">{t.draw}</p><p className="text-3xl font-black text-yellow-500 italic uppercase">{member[36]}</p></div>
                                <a href="https://wa.me/917229874128" className="no-print w-full bg-green-600 text-white py-5 rounded-full font-black uppercase shadow-xl hover:bg-green-700 text-lg flex items-center justify-center gap-3"><i className="fa-brands fa-whatsapp text-3xl"></i> WhatsApp Support</a>
                            </div>
                        </div>
                    )}
                </div>
            </div>  
        );  
    };  
    const root = ReactDOM.createRoot(document.getElementById('root')); root.render(<App />);  
    </script>
</body>  
</html>
