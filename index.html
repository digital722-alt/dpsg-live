<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DPSG Digital Seva - Official Master Portal</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; color: #1e293b; margin: 0; overflow-x: hidden; }
        .receipt-card { border: 1px solid #e2e8f0; color: #0f172a; border-radius: 2rem; background: white; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.1); }
        @media print { .no-print { display: none !important; } body { background: white !important; } .receipt-card { border: none !important; box-shadow: none !important; margin: 0 !important; width: 100% !important; } }
        
        .marquee { white-space: nowrap; overflow: hidden; position: relative; background: #fbbf24; color: #000; font-weight: 800; padding: 10px 0; font-size: 14px; text-transform: uppercase; border-bottom: 2px solid #000; }
        .marquee p { display: inline-block; padding-left: 100%; animation: marquee 25s linear infinite; }
        @keyframes marquee { 0% { transform: translate(0, 0); } 100% { transform: translate(-100%, 0); } }

        .scratch-container { position: relative; width: 100%; max-width: 450px; margin: 0 auto; min-height: 350px; }
        .scratch-canvas { position: absolute; top: 0; left: 0; z-index: 30; border-radius: 1.5rem; cursor: crosshair; touch-action: none; width: 100%; height: 100%; }
        .scratch-content { background: #000; border-radius: 1.5rem; overflow: hidden; display: flex; flex-direction: column; align-items: center; justify-content: center; width: 100%; height: 100%; border: 4px solid #334155; }
        .winner-glow { border: 5px solid #fbbf24; box-shadow: 0 0 50px rgba(251, 191, 36, 0.5); animation: pulse 2s infinite; }
        @keyframes pulse { 0% { box-shadow: 0 0 20px rgba(251, 191, 36, 0.4); } 50% { box-shadow: 0 0 60px rgba(251, 191, 36, 0.7); } 100% { box-shadow: 0 0 20px rgba(251, 191, 36, 0.4); } }
        .custom-scroll::-webkit-scrollbar { display: none; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>
    <div id="root"></div>
    
    <script type="text/babel">
    const { useState, useEffect, useRef, useCallback } = React;

    const SHEET_ID = "1rrU0EHXur_HfPlmYxjm6vIJqeRW2VZAu0qIteItQkLo";
    const MAIN_CSV = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv`;
    const MAPPING_CSV = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRlm-iMRLk5J-lxybJ7S2sR3ZpcGNG8Z8r3BEku8GzK8opYlsunIcZoe03Jf0Xbhw/pub?gid=1529433935&single=true&output=csv";
    const MASTER_PIN = "Chanchal@6375";

    const vocab = {
        hi: { brand: "डिजिटल प्रॉब्लम सॉल्यूशन ग्रुप", service: "डिजिटल सेवा निम्बाहेड़ा", points: "कुल पॉइंट्स", termsTitle: "नियम व शर्तें" },
        en: { brand: "Digital Problem Solution Group", service: "Digital Seva Nimbahera", points: "Total Points", termsTitle: "Terms & Conditions" }
    };

    const cardSpecs = {
        VIP: { hi: ["कीमत: ₹500 (6 महीने)", "ई-मित्र: 100% फ्री सेवा", "इनाम: ₹100 Cash Back + धमाका!"] },
        Gold: { hi: ["कीमत: ₹100 (3 महीने)", "ई-मित्र: 50% छूट", "इनाम: 100% गारंटीड उपहार!"] },
        Silver: { hi: ["कीमत: ₹50 (1 महीना)", "ई-मित्र: सीमित सेवा", "इनाम: लकी ड्रा का अवसर!"] }
    };

    const toDirectLink = (url) => { if (!url) return ""; let id = ""; if (url.includes("/d/")) id = url.split("/d/")[1].split("/")[0]; if (url.includes("id=")) id = url.split("id=")[1].split("&")[0]; return id ? "https://drive.google.com/thumbnail?id=" + id + "&sz=w1000" : url; };
    const mask = (v) => v?.length > 4 ? v.slice(0, 2) + "******" + v.slice(-2) : v;

    const ScratchCard = ({ onComplete, children }) => {
        const canvasRef = useRef(null);
        const [isRevealed, setIsRevealed] = useState(false);
        useEffect(() => {
            const canvas = canvasRef.current; if(!canvas) return; const ctx = canvas.getContext('2d');
            canvas.width = canvas.parentElement.offsetWidth; canvas.height = canvas.parentElement.offsetHeight;
            const grad = ctx.createLinearGradient(0, 0, canvas.width, canvas.height);
            grad.addColorStop(0, '#D4AF37'); grad.addColorStop(0.5, '#F9F295'); grad.addColorStop(1, '#B8860B');
            ctx.fillStyle = grad; ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.font = "bold 22px Inter"; ctx.fillStyle = "#4a3b01"; ctx.textAlign = "center";
            ctx.fillText("SCRATCH HERE", canvas.width / 2, canvas.height / 2);
            const scratch = (e) => {
                if (isRevealed) return; const rect = canvas.getBoundingClientRect();
                const x = (e.pageX || (e.touches && e.touches[0].pageX)) - rect.left;
                const y = (e.pageY || (e.touches && e.touches[0].pageY)) - rect.top;
                ctx.globalCompositeOperation = 'destination-out'; ctx.beginPath(); ctx.arc(x, y, 40, 0, Math.PI * 2); ctx.fill();
                const pixels = ctx.getImageData(0, 0, canvas.width, canvas.height).data;
                let count = 0; for (let i = 0; i < pixels.length; i += 40) if (pixels[i + 3] === 0) count++;
                if (count > (pixels.length / 40) * 0.5) { setIsRevealed(true); onComplete(); }
            };
            canvas.addEventListener('mousemove', scratch); canvas.addEventListener('touchmove', scratch);
        }, [isRevealed]);
        return ( <div className="scratch-container"> {!isRevealed && <canvas ref={canvasRef} className="scratch-canvas" />} <div className="scratch-content">{children}</div> </div> );
    };

    const App = () => {
        const [lang, setLang] = useState('hi'); 
        const [status, setStatus] = useState("loading"); // loading, home, view
        const [member, setMember] = useState(null); 
        const [headers, setHeaders] = useState([]);
        const [globalNotice, setGlobalNotice] = useState("Welcome to Digital Problem Solution Group Nimbahera");
        const [showForm, setShowForm] = useState(null);
        const [prize, setPrize] = useState({ img: "", msg: "", isLocked: true, type: "normal", highlight: "" });
        const [isScratched, setIsScratched] = useState(false); 
        const [isAdmin, setIsAdmin] = useState(false);
        const [showPin, setShowPin] = useState(false);
        const [searchId, setSearchId] = useState("");

        const t = vocab[lang];

        const mapPrize = useCallback((row, maps) => {
            const mID = (row[1] || "").toString().toLowerCase().trim();
            const dDate = (row[36] || "").toString().trim();
            const lock = (row[37] || "").toString().toUpperCase().trim();
            const inamName = (row[4] || "").toString().trim();
            const today = new Date(); const draw = dDate ? new Date(dDate) : null;
            const keys = ["DPSG_WINNER", "DPSG_CASH", "DPSG_GIFT", "DPSG_NEXT"];

            if (!dDate || draw > today || !keys.includes(lock)) {
                setPrize({ msg: "परिणाम की घोषणा जल्द की जाएगी।", isLocked: true }); return;
            }
            const match = maps.find(m => m.Membership_ID.toLowerCase() === mID);
            if (lock === "DPSG_WINNER" && match) setPrize({ img: toDirectLink(match.Image_Link), highlight: inamName, msg: `🎉 Congratulations!`, isLocked: false, type: "winner" });
            else if (lock === "DPSG_CASH") setPrize({ img: "https://drive.google.com/thumbnail?id=1WOrBZpuRF9Q-Pc753LA11XoAaGjCv7zD&sz=w1000", highlight: inamName, msg: "🥳 Cashback Unlocked!", isLocked: false, type: "cash" });
            else if (lock === "DPSG_GIFT") setPrize({ img: "https://drive.google.com/thumbnail?id=1baCVXWH7XYD5T8QxOfGKnkt9CKDHSx2Z&sz=w1000", highlight: inamName, msg: "🎁 Gift Unlocked!", isLocked: false, type: "gift" });
            else setPrize({ img: "https://drive.google.com/thumbnail?id=1j7v5a90h8ABi2r6piQIZR_4Qil4buiqh&sz=w1000", highlight: inamName || "Better Luck", msg: "✨ Try Again!", isLocked: false, type: "loss" });
        }, []);

        useEffect(() => {
            fetch(MAIN_CSV + "&t=" + Date.now()).then(r => r.text()).then(txt => {
                Papa.parse(txt, { complete: (res) => {
                    const rows = res.data; 
                    setHeaders(rows[0] || []);
                    if(rows[1] && rows[1][38]) setGlobalNotice(rows[1][38]);

                    const qId = new URLSearchParams(window.location.search).get('id');
                    if (qId) { 
                        const match = rows.slice(1).find(r => r[1] && r[1].toLowerCase() === qId.toLowerCase());
                        if (match) { 
                            setMember(match); 
                            fetch(MAPPING_CSV).then(r => r.text()).then(mTxt => { 
                                Papa.parse(mTxt, { header: true, complete: (mRes) => { mapPrize(match, mRes.data); setStatus("view"); } }); 
                            }); 
                        } else { alert("ID Not Found"); setStatus("home"); }
                    } else {
                        setStatus("home");
                    }
                }});
            });
        }, [mapPrize]);

        const clean = (val) => (val && val !== "#REF!" && val !== "") ? val : "Updating...";

        const handleSearch = () => {
            if(searchId) window.location.href=`?id=${searchId}`;
        };

        if (status === "loading") return <div className="h-screen flex items-center justify-center font-black text-blue-600">DPSG SYSTEM LOADING...</div>;

        return (
            <div className="min-h-screen bg-slate-50 pb-20">
                {/* Live Notice Marquee */}
                <div className="no-print marquee"><p>{globalNotice}</p></div>
                
                {/* Header Section (UMANG Style) */}
                <div className="no-print bg-blue-700 text-white p-6 rounded-b-[2rem] shadow-lg mb-6">
                    <div className="flex justify-between items-center">
                        <h1 className="text-2xl font-black italic"><i className="fa-solid fa-building-columns mr-2"></i> DPSG UMANG</h1>
                    </div>
                    <p className="text-blue-200 text-xs mt-1 tracking-widest uppercase font-bold">Official Digital Services Portal</p>
                </div>

                <div className="max-w-xl mx-auto px-4">
                    
                    {/* UMANG HOME DASHBOARD */}
                    {status === "home" && (
                        <div className="animate-in fade-in duration-500">
                            
                            {/* Sliding Banners */}
                            <div className="flex overflow-x-auto gap-4 snap-x snap-mandatory hide-scrollbar mb-8">
                                <div className="snap-center shrink-0 w-[85%] bg-gradient-to-r from-purple-600 to-indigo-600 text-white p-5 rounded-3xl shadow-lg border-2 border-indigo-400">
                                    <h3 className="font-black text-lg"><i className="fa-solid fa-crown text-yellow-300"></i> VIP (100) & Gold (400)</h3>
                                    <p className="text-xs mt-2 font-bold opacity-90">लक्ष्य: 30 दिन | रिफंड: 30 दिन में 100% वापसी!</p>
                                </div>
                                <div className="snap-center shrink-0 w-[85%] bg-gradient-to-r from-emerald-500 to-teal-600 text-white p-5 rounded-3xl shadow-lg border-2 border-emerald-400">
                                    <h3 className="font-black text-lg"><i className="fa-solid fa-mobile-screen"></i> Data Recovery</h3>
                                    <p className="text-xs mt-2 font-bold opacity-90">डिलीट फोटो, डेटा वापसी और मोबाइल अनलॉकिंग</p>
                                </div>
                            </div>

                            {/* Service Grid */}
                            <h3 className="font-black text-slate-700 mb-4 px-2 uppercase text-sm tracking-wider"><i className="fa-solid fa-layer-group text-blue-600"></i> Our Services</h3>
                            <div className="grid grid-cols-3 gap-3 mb-8">
                                <div onClick={() => setShowForm('PAN / Aadhaar Update')} className="bg-white p-4 rounded-2xl shadow border border-slate-100 text-center cursor-pointer active:scale-95 transition-all">
                                    <i className="fa-solid fa-id-card text-blue-500 text-3xl mb-2"></i>
                                    <p className="text-[10px] font-black uppercase">PAN / Aadhaar</p>
                                </div>
                                <div onClick={() => setShowForm('Data Recovery')} className="bg-white p-4 rounded-2xl shadow border border-slate-100 text-center cursor-pointer active:scale-95 transition-all">
                                    <i className="fa-solid fa-database text-purple-500 text-3xl mb-2"></i>
                                    <p className="text-[10px] font-black uppercase">Data Recovery</p>
                                </div>
                                <div onClick={() => setShowForm('Govt Schemes')} className="bg-white p-4 rounded-2xl shadow border border-slate-100 text-center cursor-pointer active:scale-95 transition-all">
                                    <i className="fa-solid fa-landmark text-green-500 text-3xl mb-2"></i>
                                    <p className="text-[10px] font-black uppercase">Govt Schemes</p>
                                </div>
                            </div>

                            {/* Search Receipt Box */}
                            <div className="bg-white p-6 rounded-[2rem] shadow-xl border border-slate-100">
                                <h3 className="font-black text-slate-800 mb-4 text-center text-lg"><i className="fa-solid fa-wallet text-blue-600"></i> My Profile & Rewards</h3>
                                <input value={searchId} onChange={(e)=>setSearchId(e.target.value)} type="text" className="w-full bg-slate-50 border-2 border-slate-200 rounded-xl py-3 px-4 text-center mb-4 font-bold focus:border-blue-500 outline-none uppercase" placeholder="Enter ID (DPSG-26-...)" />
                                <button onClick={handleSearch} className="w-full bg-blue-600 py-3 rounded-xl font-black text-white shadow hover:bg-blue-700">SEARCH DETAILS</button>
                            </div>

                            {/* WhatsApp Help */}
                            <a href="https://wa.me/917229874128?text=मुझे%20फॉर्म%20भरने%20में%20मदद%20चाहिए" target="_blank" className="mt-6 block bg-red-50 text-red-600 border border-red-200 rounded-xl p-4 text-center font-bold text-sm">
                                <i className="fa-brands fa-whatsapp text-lg mr-2"></i> फॉर्म भरने में दिक्कत? (नि:शुल्क सहायता)
                            </a>
                        </div>
                    )}

                    {/* RECEIPT AND SCRATCH CARD VIEW (OLD LOGIC INTACT) */}
                    {status === "view" && (
                        <div className="space-y-8 animate-in slide-in-from-bottom-4 duration-700">
                            
                            {/* Scratch Card Section with Warning */}
                            <div className={`p-2 rounded-[2rem] ${prize.type === 'winner' ? 'winner-glow bg-yellow-400' : 'bg-slate-200'}`}>
                                <p className="text-red-600 text-[10px] font-black uppercase text-center py-2"><i className="fa-solid fa-triangle-exclamation"></i> आधिकारिक घोषणा होने तक कृपया कार्ड को स्क्रैच न करें</p>
                                
                                {prize.isLocked ? (
                                    <div className="bg-white p-12 rounded-[1.8rem] text-center italic">
                                        <i className="fa-solid fa-lock text-4xl text-slate-300 mb-4"></i>
                                        <p className="text-slate-500 font-bold">{prize.msg}</p>
                                    </div>
                                ) : (
                                    <ScratchCard onComplete={() => { setIsScratched(true); confetti(); }}>
                                        <div className="bg-white px-8 py-2 rounded-full font-black text-blue-600 mb-4 shadow-md">{clean(prize.highlight)}</div>
                                        <img src={prize.img} className="max-h-80 w-auto object-contain" alt="Prize" />
                                    </ScratchCard>
                                )}
                            </div>

                            {/* Receipt Card */}
                            <div id="receipt" className="receipt-card p-8 text-left">
                                <div className="text-center border-b-2 border-dashed border-slate-100 pb-6 mb-6">
                                    <h3 className="font-black text-xl text-blue-700 italic uppercase">Professional Digital Receipt</h3>
                                    <p className="text-[9px] font-black text-slate-400 uppercase mt-1">NIMBAHERA, RAJASTHAN</p>
                                </div>
                                
                                <div className="space-y-6">
                                    <div className="flex justify-between items-end border-b pb-4">
                                        <div><p className="text-[10px] text-slate-400 font-black uppercase mb-1">ID IDENTITY</p><p className="text-xl font-black text-slate-900">{clean(member[1])}</p></div>
                                        <div className="text-right"><p className="text-[10px] text-slate-400 font-black uppercase mb-1">Category</p><p className="text-xs font-black text-blue-700 border-2 border-blue-100 px-3 py-1 rounded-full">{clean(member[3])}</p></div>
                                    </div>

                                    <div className="grid grid-cols-3 gap-2">
                                        <div className="bg-blue-600 text-white p-4 rounded-2xl text-center"><p className="text-[8px] font-bold uppercase mb-1">Total Points</p><p className="text-xl font-black">{clean(member[21])}</p></div>
                                        <div className="bg-slate-800 text-white p-4 rounded-2xl text-center"><p className="text-[8px] font-bold uppercase mb-1">Used</p><p className="text-xl font-black">{clean(member[22])}</p></div>
                                        <div className="bg-green-600 text-white p-4 rounded-2xl text-center"><p className="text-[8px] font-bold uppercase mb-1">Balance</p><p className="text-xl font-black">{clean(member[23])}</p></div>
                                    </div>

                                    <div className="grid grid-cols-2 gap-x-6 gap-y-6 py-4">
                                        <div><p className="text-[9px] text-slate-400 font-black uppercase mb-1">Name</p><p className="text-sm font-black uppercase">{clean(member[8])}</p></div>
                                        <div className="text-right"><p className="text-[9px] text-slate-400 font-black uppercase mb-1">Village</p><p className="text-sm font-black uppercase">{clean(member[5])}</p></div>
                                        <div><p className="text-[9px] text-slate-400 font-black uppercase mb-1">Mobile</p><p className="font-bold tracking-widest">{mask(member[9])}</p></div>
                                        <div className="text-right"><p className="text-[9px] text-slate-400 font-black uppercase mb-1">Aadhar</p><p className="font-bold tracking-widest">{mask(member[11])}</p></div>
                                    </div>

                                    <button onClick={()=>window.print()} className="no-print w-full bg-blue-600 text-white py-4 rounded-2xl text-sm font-black uppercase shadow-lg"><i className="fa-solid fa-print"></i> PRINT RECEIPT</button>
                                </div>
                            </div>

                            {/* MASTER ADMIN - FINGERPRINT ICON */}  
                            <div className="no-print pt-6 pb-10 flex flex-col items-center border-t">
                                {!isAdmin && (
                                    <button onClick={() => setShowPin(!showPin)} className="opacity-30 hover:opacity-100 transition-all p-4 bg-white rounded-full shadow border">
                                        <i className="fa-solid fa-fingerprint text-3xl text-blue-600"></i>
                                    </button>
                                )}
                                {showPin && !isAdmin && (
                                    <div className="mt-6 bg-white p-6 rounded-3xl border shadow-xl w-full">
                                        <input type="password" id="adminPin" className="w-full bg-slate-50 border-2 rounded-xl px-6 py-4 text-lg font-bold text-center mb-4 outline-none" placeholder="ENTER PIN" />
                                        <button onClick={() => {document.getElementById('adminPin').value === MASTER_PIN ? setIsAdmin(true) : alert("WRONG PIN!");}} className="w-full bg-slate-900 py-4 rounded-xl font-black text-white">UNLOCK ALL 39 COLUMNS</button>
                                    </div>
                                )}
                                {isAdmin && (
                                    <div className="w-full mt-6 bg-white border rounded-3xl p-6 shadow-xl">
                                        <div className="flex justify-between items-center mb-4 border-b pb-2">
                                            <h3 className="font-black text-blue-600 text-xs">MASTER DASHBOARD</h3>
                                            <button onClick={()=>setIsAdmin(false)} className="text-red-500 font-black text-xs">LOGOUT</button>
                                        </div>
                                        <div className="grid grid-cols-1 gap-2 max-h-96 overflow-y-auto">
                                            {member.map((val, i) => (
                                                <div key={i} className="p-3 bg-slate-50 rounded-lg border">
                                                    <p className="text-[9px] text-slate-500 font-bold mb-1">{headers[i] || `Col ${i}`}</p>
                                                    <p className="font-bold text-sm text-black">{val || "---"}</p>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                )}
                            </div>
                        </div>
                    )}
                </div>

                {/* Formspree Modal (Appears when user clicks a service) */}
                {showForm && (
                    <div className="fixed inset-0 bg-black/60 z-50 flex items-center justify-center p-4">
                        <div className="bg-white p-6 rounded-[2rem] w-full max-w-md relative animate-in zoom-in">
                            <button onClick={()=>setShowForm(null)} className="absolute top-4 right-5 text-2xl text-slate-400 hover:text-red-500"><i className="fa-solid fa-times"></i></button>
                            <h2 className="font-black text-xl mb-6 text-blue-700 border-b pb-3">{showForm} <br/><span className="text-xs text-slate-500 uppercase tracking-widest">Application Form</span></h2>
                            
                            <form action="https://formspree.io/f/xwvndvoe" method="POST" encType="multipart/form-data">
                                <input type="hidden" name="Service" value={showForm} />
                                <input type="text" name="Name" placeholder="आपका पूरा नाम" required className="w-full bg-slate-50 border-2 border-slate-100 p-4 rounded-xl mb-4 font-bold outline-none focus:border-blue-500" />
                                <input type="tel" name="Phone" placeholder="मोबाइल नंबर (WhatsApp)" required className="w-full bg-slate-50 border-2 border-slate-100 p-4 rounded-xl mb-4 font-bold outline-none focus:border-blue-500" />
                                <label className="block text-xs font-black text-slate-500 mb-2 uppercase tracking-widest">दस्तावेज़ (फोटो/आधार) चुनें:</label>
                                <input type="file" name="Document" className="w-full border-2 border-dashed border-slate-300 p-4 rounded-xl mb-6 bg-slate-50 cursor-pointer text-sm font-bold" />
                                <button type="submit" className="w-full bg-blue-600 text-white font-black py-4 rounded-xl shadow-lg hover:bg-blue-700">SUBMIT APPLICATION</button>
                                <p className="text-[10px] text-center text-slate-400 font-bold mt-4">डेटा सुरक्षित रूप से DPSG टीम को भेजा जाएगा।</p>
                            </form>
                        </div>
                    </div>
                )}
            </div>
        );
    };
    const root = ReactDOM.createRoot(document.getElementById('root')); root.render(<App />);
    </script>
</body>
</html>
