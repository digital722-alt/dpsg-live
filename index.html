<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DPSG Digital Portal | Zorawar Singh</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Devanagari:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: 'Noto Sans Devanagari', sans-serif; background-color: #010413; color: white; overflow-x: hidden; }
        .glass { background: rgba(255, 255, 255, 0.02); backdrop-filter: blur(25px); border: 1px solid rgba(255, 255, 255, 0.08); }
        .gold-glow { background: linear-gradient(135deg, #bf953f, #fcf6ba, #b38728); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .admin-dashboard { background: #020617; border: 1px solid rgba(234, 179, 8, 0.3); }
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // ==========================================
        // DPSG MASTER DATABASE (1 to 1000 Records)
        // Mapping as per your CSV columns (1 to 39)
        // ==========================================
        const dpsgData = {
            "0001": {
                1: "0001", 2: "DPSG-26-113-0001", 3: "डिजिटल बचत कार्ड", 4: "₹500 VIP Card (6 महीने)",
                5: "LED TV (32 Inch)", 6: "निंबाहेड़ा", 7: "14-02-26", 8: "JORA-77-001", 9: "संदीप बना",
                10: "6376858028", 11: "15-08-1990", 12: "4528", 13: "⏳ पेंडिंग", 37: "2026-02-14", 39: "खुशखबरी! बुकिंग जारी है।"
            },
            "0002": {
                1: "0002", 2: "DPSG-26-126-0002", 3: "डिजिटल बचत कार्ड", 4: "₹500 VIP Card (6 महीने)",
                5: "", 6: "", 9: "", 10: "", 12: "", 37: "", 39: ""
            }
        };

        const App = () => {
            const [status, setStatus] = useState("loading");
            const [card, setCard] = useState(null);
            const [pass, setPass] = useState("");
            const [isAdmin, setIsAdmin] = useState(false);
            const [searchId, setSearchId] = useState("");

            const MASTER_PASS = "Chanchal@6375";

            useEffect(() => {
                const params = new URLSearchParams(window.location.search);
                const id = params.get('id');
                
                setTimeout(() => {
                    if (id) {
                        const serial = id.padStart(4, '0');
                        // Get from DB or create a fallback empty record for indices
                        const record = dpsgData[serial] || { 1: serial, 2: `DPSG-26-ID-${serial}` };
                        setCard(record);
                        setStatus("view");
                    } else { setStatus("search"); }
                }, 800);
            }, []);

            const getDisplay = (val) => {
                if (!val || val.toString().trim() === "" || val === "Pending" || val === "#REF!") {
                    return "Jankaari updat ki jaa rhi h...";
                }
                return val;
            };

            const maskValue = (val, type) => {
                const str = getDisplay(val);
                if (str.includes("updat")) return str;
                if (type === "phone") return "********" + val.toString().slice(-2);
                if (type === "aadhar") return "XXXX-XXXX-XX" + val.toString().slice(-2);
                return str;
            };

            const isDrawPassed = (dateStr) => {
                if (!dateStr || dateStr.includes("जल्द ही") || dateStr.trim() === "") return false;
                const today = new Date();
                const draw = new Date(dateStr);
                return today >= draw;
            };

            if (status === "loading") return (
                <div className="h-screen flex items-center justify-center">
                    <div className="w-10 h-10 border-2 border-yellow-500 border-t-transparent rounded-full animate-spin"></div>
                </div>
            );

            return (
                <div className="min-h-screen flex items-center justify-center p-4">
                    <div className="max-w-md w-full relative z-10">
                        
                        <div className="text-center mb-8">
                            <h1 className="text-4xl font-black italic uppercase leading-none tracking-tighter">
                                <span className="block text-white">DPSG</span>
                                <span className="block gold-glow">DIGITAL PORTAL</span>
                            </h1>
                            <p className="text-[10px] text-gray-600 font-bold uppercase tracking-[0.4em] mt-3">Nimbahera | J. Zorawar Singh</p>
                        </div>

                        {status === "search" ? (
                            <div className="glass rounded-[3rem] p-10 text-center animate-in zoom-in duration-500">
                                <h2 className="text-lg font-black uppercase mb-6">ID Darj Karein</h2>
                                <input type="number" placeholder="0001" className="w-full bg-white/5 border border-white/10 rounded-2xl py-4 text-center text-3xl font-black mb-6 outline-none" onChange={(e)=>setSearchId(e.target.value)} />
                                <button onClick={()=>{window.location.href=`?id=${searchId}`}} className="w-full bg-blue-600 py-4 rounded-xl font-black uppercase text-xs tracking-widest">RECORD DEKHEIN</button>
                            </div>
                        ) : (
                            <div className="space-y-6 animate-in slide-in-from-bottom-10 duration-700">
                                
                                {/* Customer View Area */}
                                <div className="glass rounded-[3rem] p-8 border border-white/5 relative overflow-hidden">
                                    <div className="flex justify-between items-start mb-10">
                                        <div className="flex items-center space-x-2">
                                            <div className="w-2 h-2 bg-green-500 rounded-full animate-pulse shadow-[0_0_10px_rgba(34,197,94,1)]"></div>
                                            <span className="text-[10px] font-black text-green-400 uppercase">Verified Member</span>
                                        </div>
                                        <span className="bg-white/5 px-4 py-1.5 rounded-full text-[8px] font-black text-yellow-500 uppercase">{getDisplay(card[4])}</span>
                                    </div>

                                    <div className="space-y-6">
                                        <div>
                                            <p className="text-[8px] text-gray-500 uppercase font-black mb-1">Membership ID (Col 2)</p>
                                            <p className="text-2xl font-black tracking-tighter text-white">{getDisplay(card[2])}</p>
                                        </div>
                                        
                                        <div className="grid grid-cols-2 gap-4 border-t border-white/5 pt-4">
                                            <div>
                                                <p className="text-[8px] text-gray-500 uppercase font-black mb-1">Member Name (Col 9)</p>
                                                <p className="text-sm font-bold text-blue-300 uppercase italic leading-tight">{getDisplay(card[9])}</p>
                                            </div>
                                            <div className="text-right">
                                                <p className="text-[8px] text-gray-500 uppercase font-black mb-1">Village (Col 6)</p>
                                                <p className="text-sm font-bold text-white uppercase italic">{getDisplay(card[6])}</p>
                                            </div>
                                        </div>

                                        <div className="bg-black/40 p-4 rounded-2xl flex justify-between items-center border border-white/5">
                                            <div className="space-y-1">
                                                <p className="text-[7px] text-gray-500 uppercase font-black">Mobile (Col 10)</p>
                                                <p className="text-[11px] font-bold text-white tracking-widest">{maskValue(card[10], "phone")}</p>
                                            </div>
                                            <div className="text-right space-y-1">
                                                <p className="text-[7px] text-gray-500 uppercase font-black">Aadhar (Col 12)</p>
                                                <p className="text-[11px] font-bold text-gray-300 tracking-widest">{maskValue(card[12], "aadhar")}</p>
                                            </div>
                                        </div>
                                    </div>
                                </div>

                                {/* Prize Logic - Controlled by Col 37 (Draw Date) */}
                                {isDrawPassed(card[37]) ? (
                                    <div className="glass rounded-[3rem] p-10 text-center border-yellow-500/20 shadow-[0_0_40px_rgba(234,179,8,0.1)]">
                                        <i className="fa-solid fa-trophy text-6xl text-yellow-500 mb-4 animate-bounce"></i>
                                        <p className="text-[10px] text-yellow-500 font-black uppercase mb-1 tracking-widest">Congratulations!</p>
                                        <h2 className="text-4xl font-black text-white uppercase tracking-tighter">{getDisplay(card[5])}</h2>
                                    </div>
                                ) : (
                                    <div className="glass rounded-[2rem] p-8 text-center border border-dashed border-white/10">
                                        <i className="fa-solid fa-lock text-gray-600 mb-2"></i>
                                        <p className="text-[10px] text-gray-500 font-bold uppercase tracking-widest">Result Draw Date par khulega</p>
                                        <p className="text-[10px] text-blue-400 mt-2 italic font-bold tracking-tighter">Jankaari updat ki jaa rhi h...</p>
                                    </div>
                                )}

                                {/* Admin Vault - Password: Chanchal@6375 */}
                                {!isAdmin ? (
                                    <div className="glass rounded-[2rem] p-6 text-center space-y-4">
                                        <p className="text-[9px] text-gray-500 font-black uppercase tracking-[0.2em]">BANA ADMIN MODE</p>
                                        <input type="password" placeholder="PASSWORD" className="w-full bg-black/50 border border-white/10 rounded-xl py-3 text-center text-xl text-white outline-none focus:border-yellow-500" onChange={(e)=>setPass(e.target.value)} />
                                        <button onClick={()=>{if(pass===MASTER_PASS) setIsAdmin(true); else alert("Wrong Password!");}} className="w-full bg-white text-black font-black py-3 rounded-xl text-[10px] uppercase tracking-widest">Unlock All Columns</button>
                                    </div>
                                ) : (
                                    <div className="admin-dashboard rounded-[3rem] p-8 space-y-4 animate-in slide-in-from-bottom-4 duration-500">
                                        <div className="flex justify-between items-center border-b border-yellow-500/20 pb-2 mb-4">
                                            <h3 className="text-[10px] font-black text-yellow-500 uppercase italic">Admin View (All 39 Columns)</h3>
                                            <button onClick={()=>setIsAdmin(false)} className="text-[8px] text-gray-500 uppercase underline">Exit</button>
                                        </div>
                                        <div className="grid grid-cols-2 gap-y-3 text-[10px] leading-relaxed">
                                            <span className="text-gray-500 uppercase">Prize (Col 5):</span><span className="text-right font-bold text-green-400">{getDisplay(card[5])}</span>
                                            <span className="text-gray-500 uppercase">Phone (Col 10):</span><span className="text-right font-bold text-white">{getDisplay(card[10])}</span>
                                            <span className="text-gray-500 uppercase">Security (Col 8):</span><span className="text-right font-bold text-yellow-500">{getDisplay(card[8])}</span>
                                            <span className="text-gray-500 uppercase">Sale Date (Col 7):</span><span className="text-right">{getDisplay(card[7])}</span>
                                            <span className="text-gray-500 uppercase">Draw Date (Col 37):</span><span className="text-right">{getDisplay(card[37])}</span>
                                            <span className="text-gray-500 uppercase">Notice (Col 39):</span><span className="text-right italic text-blue-200">{getDisplay(card[39])}</span>
                                        </div>
                                    </div>
                                )}
                            </div>
                        )}
                        
                        <p className="text-center text-[7px] text-gray-800 font-black uppercase mt-12 tracking-[0.5em] italic opacity-30">Digital Problem Solution | Nimbahera</p>
                    </div>
                </div>
            );
        };
        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
