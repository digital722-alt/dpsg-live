<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DPSG Digital Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Devanagari:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: 'Noto Sans Devanagari', sans-serif; background-color: #010413; color: white; overflow-x: hidden; }
        .glass { background: rgba(255, 255, 255, 0.02); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .admin-box { background: rgba(15, 23, 42, 0.95); border: 1px solid rgba(234, 179, 8, 0.4); box-shadow: 0 0 30px rgba(0,0,0,0.5); }
        .gold-text { background: linear-gradient(135deg, #bf953f, #fcf6ba, #b38728); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const App = () => {
            const [status, setStatus] = useState("loading");
            const [card, setCard] = useState(null);
            const [pass, setPass] = useState("");
            const [isAdmin, setIsAdmin] = useState(false);
            const [searchId, setSearchId] = useState("");

            const MASTER_PASS = "Chanchal@6375";

            // Data loading logic for 1000 IDs
            const loadCardData = (id) => {
                const n = parseInt(id);
                if (isNaN(n) || n < 1 || n > 1000) return null;
                
                const serial = id.padStart(4, '0');
                // CSV columns logic mapping
                return {
                    1: serial,
                    2: `DPSG-26-${113 + (n-1)*13}-${serial}`, // Membership ID
                    4: n <= 50 ? "₹500 VIP Card" : (n <= 500 ? "₹100 Gold Card" : "₹50 Silver Card"),
                    5: n === 1 ? "LED TV 32 Inch" : "", // Prize_Inam
                    6: n === 1 ? "Nimbahera" : "", // Village
                    9: n === 1 ? "Sandeep" : "Registered Member", // Customer_Name
                    10: n === 1 ? "6376858028" : "", // Phone
                    12: n === 1 ? "4528" : "", // Aadhaar
                    37: n === 1 ? "2026-02-14" : "", // Draw Date
                    17: "2026-08-15", // Security Code/Expiry
                    39: "Booking open hai!" // Notice
                };
            };

            useEffect(() => {
                const params = new URLSearchParams(window.location.search);
                const id = params.get('id');
                setTimeout(() => {
                    if (id) {
                        const data = loadCardData(id);
                        if (data) { setCard(data); setStatus("view"); }
                        else { setStatus("search"); }
                    } else { setStatus("search"); }
                }, 800);
            }, []);

            const checkVal = (val) => (val && val.trim() !== "" && val !== "Pending") ? val : "Jankaari update ki jaa rhi h...";
            
            const maskData = (val, type) => {
                if (!val || val.includes("update")) return "---";
                if (type === "phone") return "XXXXXX" + val.slice(-2);
                if (type === "aadhar") return "XXXX-XXXX-XX" + val.slice(-2);
                return val;
            };

            const canShowInam = (dateStr) => {
                if (!dateStr || dateStr === "") return false;
                const today = new Date();
                const drawDate = new Date(dateStr);
                return today >= drawDate;
            };

            const handleAdminLogin = () => {
                if (pass === MASTER_PASS) setIsAdmin(true);
                else alert("Password Galat Hai!");
            };

            if (status === "loading") return (
                <div className="h-screen flex items-center justify-center">
                    <div className="w-10 h-10 border-2 border-blue-500 border-t-transparent rounded-full animate-spin"></div>
                </div>
            );

            return (
                <div className="min-h-screen flex items-center justify-center p-4">
                    <div className="max-w-md w-full relative z-10">
                        {/* Header */}
                        <div className="text-center mb-10">
                            <h1 className="text-4xl font-black italic uppercase leading-none tracking-tighter">
                                <span className="block text-white">DIGITAL</span>
                                <span className="block gold-text uppercase">Bachat Portal</span>
                            </h1>
                            <p className="text-[10px] text-gray-600 font-bold uppercase tracking-[0.4em] mt-4">Nimbahera | DPSG</p>
                        </div>

                        {status === "search" ? (
                            <div className="glass rounded-[3rem] p-10 text-center animate-in zoom-in duration-500">
                                <h2 className="text-lg font-black uppercase mb-6">ID Darj Karein</h2>
                                <input type="number" placeholder="0001" className="w-full bg-white/5 border border-white/10 rounded-2xl py-4 text-center text-2xl font-black mb-6 outline-none" onChange={(e)=>setSearchId(e.target.value)} />
                                <button onClick={()=>{window.location.href=`?id=${searchId}`}} className="w-full bg-blue-600 py-4 rounded-xl font-black uppercase text-xs">Record Dekhein</button>
                            </div>
                        ) : (
                            <div className="space-y-6 animate-in slide-in-from-bottom-10 duration-700">
                                
                                {/* Customer View Area */}
                                <div className="glass rounded-[3rem] p-8 border border-white/5 relative overflow-hidden">
                                    <div className="flex justify-between items-start mb-10">
                                        <div className="flex items-center space-x-2">
                                            <div className="w-1.5 h-1.5 bg-green-500 rounded-full animate-pulse"></div>
                                            <span className="text-[10px] font-black text-green-400 uppercase">Verified</span>
                                        </div>
                                        <span className="bg-white/5 px-3 py-1 rounded-full text-[8px] font-black text-yellow-500 uppercase">{card[4]}</span>
                                    </div>

                                    <div className="space-y-6">
                                        <div>
                                            <p className="text-[8px] text-gray-500 uppercase font-black mb-1">Membership ID</p>
                                            <p className="text-2xl font-black tracking-tighter text-white">{card[2]}</p>
                                        </div>
                                        
                                        <div className="grid grid-cols-2 gap-4 border-t border-white/5 pt-4">
                                            <div>
                                                <p className="text-[8px] text-gray-500 uppercase font-black mb-1">Customer Name</p>
                                                <p className="text-sm font-bold text-blue-300 uppercase italic">{checkVal(card[9])}</p>
                                            </div>
                                            <div className="text-right">
                                                <p className="text-[8px] text-gray-500 uppercase font-black mb-1">Mobile (Last 2)</p>
                                                <p className="text-sm font-bold text-white">{maskData(card[10], "phone")}</p>
                                            </div>
                                        </div>

                                        <div className="bg-black/40 p-4 rounded-2xl flex justify-between items-center">
                                            <span className="text-[8px] text-gray-500 uppercase font-black">Aadhar (Last 2)</span>
                                            <span className="text-xs font-bold text-gray-300">{maskData(card[12], "aadhar")}</span>
                                        </div>
                                    </div>
                                </div>

                                {/* Inam Result - Condition: Col 37 Date logic */}
                                {canShowInam(card[37]) ? (
                                    <div className="glass rounded-[3rem] p-10 text-center border-yellow-500/20">
                                        <i className="fa-solid fa-trophy text-5xl text-yellow-500 mb-4 animate-bounce"></i>
                                        <p className="text-[10px] text-yellow-500 font-black uppercase mb-1">Congratulations!</p>
                                        <h2 className="text-3xl font-black text-white uppercase">{checkVal(card[5])}</h2>
                                    </div>
                                ) : (
                                    <div className="glass rounded-[2rem] p-6 text-center border border-dashed border-white/10">
                                        <p className="text-[9px] text-gray-500 font-bold uppercase tracking-widest">Inam ka result Draw Date par khulega</p>
                                        <p className="text-[10px] text-blue-400 mt-2 italic">Jankaari update ki jaa rhi h...</p>
                                    </div>
                                )}

                                {/* Admin Area */}
                                {!isAdmin ? (
                                    <div className="glass rounded-[2rem] p-6 space-y-4">
                                        <p className="text-[9px] text-gray-500 text-center font-black uppercase">Admin Portal (Chanchal@6375)</p>
                                        <input type="password" placeholder="PASSWORD" className="w-full bg-black/50 border border-white/10 rounded-xl py-3 text-center text-xl text-white outline-none" onChange={(e)=>setPass(e.target.value)} />
                                        <button onClick={handleAdminLogin} className="w-full bg-white text-black font-black py-3 rounded-xl text-[10px] uppercase">Unlock Master Data</button>
                                    </div>
                                ) : (
                                    <div className="admin-box rounded-[2.5rem] p-6 space-y-4 animate-in slide-in-from-bottom-4 duration-500">
                                        <h3 className="text-[10px] font-black text-yellow-500 uppercase border-b border-yellow-500/20 pb-2">Master View (39 Columns Data)</h3>
                                        <div className="grid grid-cols-2 gap-y-2 text-[10px]">
                                            <span className="text-gray-500">Village:</span><span className="text-right">{checkVal(card[6])}</span>
                                            <span className="text-gray-500">Full Phone:</span><span className="text-right font-bold text-blue-400">{checkVal(card[10])}</span>
                                            <span className="text-gray-500">Inam Name:</span><span className="text-right font-bold text-green-400">{checkVal(card[5])}</span>
                                            <span className="text-gray-500">Security Code:</span><span className="text-right">{checkVal(card[17])}</span>
                                            <span className="text-gray-500">Notice:</span><span className="text-right italic">{checkVal(card[39])}</span>
                                        </div>
                                        <button onClick={()=>setIsAdmin(false)} className="w-full text-[8px] text-gray-600 uppercase mt-2">Close Admin Panel</button>
                                    </div>
                                )}
                            </div>
                        )}
                        <p className="text-center text-[8px] text-gray-800 font-black uppercase mt-12 tracking-[0.4em] italic opacity-40">Digital Problem Solution | v6.0</p>
                    </div>
                </div>
            );
        };
        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
