<!DOCTYPE html>  
<html lang="hi">  
<head>  
    <meta charset="UTF-8">  
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>  
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>  
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>  
    <script src="https://cdn.tailwindcss.com"></script>  
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>  
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>  
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">  
    <script>tailwind.config = { darkMode: 'class' }</script>
    <style>  
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=Mukta:wght@400;700;800&display=swap');  
        body { font-family: 'Mukta', sans-serif; transition: background-color 0.3s; margin: 0; background-color: #0f172a; color: #f8fafc; }  
        .receipt-card { border: 1px solid #e2e8f0; border-radius: 2.5rem; background: white; box-shadow: 0 30px 60px -12px rgba(0, 0, 0, 0.6); color: #0f172a; }  
        .marquee { white-space: nowrap; overflow: hidden; background: linear-gradient(90deg, #b48a2d, #fbbf24, #b48a2d); color: #000; font-weight: 900; padding: 12px 0; font-size: 15px; text-transform: uppercase; border-bottom: 3px solid #000; }  
        .marquee p { display: inline-block; padding-left: 100%; animation: marquee 25s linear infinite; }  
        @keyframes marquee { 0% { transform: translate(0, 0); } 100% { transform: translate(-100%, 0); } }  
        .scratch-container { position: relative; width: 100%; max-width: 550px; margin: 0 auto; min-height: 480px; }  
        .scratch-canvas { position: absolute; top: 0; left: 0; z-index: 30; border-radius: 2rem; cursor: crosshair; touch-action: none; width: 100%; height: 100%; }  
        .scratch-content { background: #fff; border-radius: 2rem; overflow: hidden; display: flex; flex-direction: column; align-items: center; justify-content: center; width: 100%; height: 100%; border: 4px solid #fbbf24; }  
        .winner-glow { border: 8px solid #fbbf24; box-shadow: 0 0 70px rgba(251, 191, 36, 0.9); animation: pulse 2s infinite; background: #0f172a !important; }  
        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.02); } }  
        .value-style { font-size: 1.2rem; font-weight: 800; background: linear-gradient(45deg, #1e40af, #3b82f6); -webkit-background-clip: text; -webkit-text-fill-color: transparent; text-transform: uppercase; }
        .winner-msg-container { background: #0f172a; color: #fbbf24; padding: 20px; text-align: center; border-top: 4px solid #fbbf24; width: 100%; }
        .shayari-font { font-style: italic; font-weight: 800; font-size: 1.2rem; color: #fde68a; line-height: 1.6; }
        .icon-card { background: white; padding: 12px; border-radius: 1.5rem; box-shadow: 0 10px 20px rgba(0,0,0,0.3); }
        .notice-portal { background: #1e293b; border-left: 6px solid #fbbf24; padding: 15px; border-radius: 20px; margin-bottom: 20px; border: 1px solid #334155; }
        @media print { .no-print { display: none !important; } .receipt-card { border: none !important; box-shadow: none !important; width: 100% !important; margin: 0 !important; } }  
    </style>
</head>  
<body>  
    <div id="root"></div>  
    <script type="text/babel">  
    const { useState, useEffect, useRef, useCallback } = React;  
    const SHEET_ID = "1rrU0EHXur_HfPlmYxjm6vIJqeRW2VZAu0qIteItQkLo";  
    const MAIN_CSV = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv`;  
    const MAPPING_CSV = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRlm-iMRLk5J-lxybJ7S2sR3ZpcGNG8Z8r3BEku8GzK8opYlsunIcZoe03Jf0Xbhw/pub?gid=1529433935&single=true&output=csv";  
    const MASTER_PIN = "Chanchal@6375";  

    const vocab = {  
        hi: {  
            brand: "डिजिटल प्रॉब्लम सॉल्यूशन ग्रुप", slogan: "समस्या आपकी, समाधान हमारा - उचित मूल्य, बेहतरीन सेवा", 
            receipt: "प्रोफेशनल डिजिटल रसीद", idLabel: "मेंबरशिप आईडी दर्ज करें",  
            tTitle: "नियम व शर्तें", noticeHead: "📢 आवश्यक सूचना",
            t1: "01. यह डिजिटल सदस्यता कार्ड व्यक्तिगत है और अहस्तांतरणीय है।", t2: "02. सेवाओं का लाभ केवल कार्ड पर अंकित समाप्ति तिथि तक ही मान्य है।", t3: "03. लिया गया शुल्क पंजीकरण शुल्क है, जो वापस नहीं होगा।", t4: "04. सर्वर त्रुटि में फिजिकल स्क्रैच कार्ड का परिणाम अंतिम होगा।", t5: "05. सर्वर खराबी पर प्रबंधन की जिम्मेदारी नहीं होगी।", t6: "06. सरकारी टोकन शुल्क ग्राहक द्वारा अलग से देय होगा।", t7: "07. फ्री डिलीवरी सीमा के बाद न्यूनतम शुल्क लिया जाएगा।", t8: "08. यह समाज सेवा हेतु है, कृपया कार्य पूर्ण होने तक धैर्य रखें।", t9: "09. कार्य में लगने वाले समय हेतु अभद्र व्यवहार स्वीकार्य नहीं होगा।", t10: "10. मैनेजमेंट के पास नियमों में बदलाव का पूर्ण अधिकार है।",
            warning: "⚠️ आधिकारिक घोषणा होने तक कृपया कार्ड को स्क्रैच न करें", pending: "परिणाम जल्द घोषित होगा।"
        }
    };

    const cardSpecs = {  
        VIP: ["वीआईपी कार्ड: ₹500 (6 महीने)", "उपयोग: पूरे परिवार के लिए मान्य", "कोटा: 150 प्रिंट + 80 फोटो (या 380 फोटो / 190 प्रिंट)", "लैमिनेशन: 2 फ्री", "ई-मित्र: 100% फ्री सेवा (केवल टोकन चार्ज)", "डिलीवरी: 2 बार फ्री (न्यूनतम रेट)", "इनाम: 100 Cash Back + बड़ा धमाका!", "संपर्क: 7229874128"],  
        Gold: ["गोल्ड कार्ड: ₹100 (3 महीने)", "उपयोग: केवल 1 व्यक्ति हेतु", "कोटा: 40 प्रिंट + 24 फोटो (या 100 फोटो / 52 प्रिंट)", "लैमिनेशन: 1 फ्री", "ई-मित्र: 50% छूट (केवल टोकन चार्ज)", "डिलीवरी: 1 बार (न्यूनतम रेट)", "इनाम: 100% गारंटीड उपहार!", "संपर्क: 7229874128"],  
        Silver: ["सिल्वर कार्ड: ₹50 (1 महीना)", "उपयोग: केवल 1 व्यक्ति हेतु", "कोटा: 15 प्रिंट + 12 फोटो (या 40 फोटो / 21 प्रिंट)", "ई-मित्र: सीमित सेवा (केवल टोकन चार्ज)", "डिलीवरी: 1 बार (न्यूनतम रेट)", "इनाम: लकी ड्रा का शानदार अवसर!", "संपर्क: 7229874128"]  
    };

    const toDirectLink = (url) => { if (!url) return ""; let id = ""; if (url.includes("/d/")) id = url.split("/d/")[1].split("/")[0]; if (url.includes("id=")) id = url.split("id=")[1].split("&")[0]; return id ? "https://drive.google.com/thumbnail?id=" + id + "&sz=w1000" : url; };  
    const mask = (v) => v?.length > 4 ? v.slice(0, 2) + "******" + v.slice(-2) : v;  

    const ScratchCard = ({ onComplete, children }) => {  
        const canvasRef = useRef(null); const [isRevealed, setIsRevealed] = useState(false);  
        useEffect(() => {  
            const canvas = canvasRef.current; if(!canvas) return; const ctx = canvas.getContext('2d');  
            canvas.width = canvas.parentElement.offsetWidth; canvas.height = canvas.parentElement.offsetHeight;  
            const grad = ctx.createLinearGradient(0, 0, canvas.width, canvas.height);  
            grad.addColorStop(0, '#D4AF37'); grad.addColorStop(0.5, '#F9F295'); grad.addColorStop(1, '#B8860B');  
            ctx.fillStyle = grad; ctx.fillRect(0, 0, canvas.width, canvas.height);  
            ctx.font = "bold 28px Inter"; ctx.fillStyle = "#4a3b01"; ctx.textAlign = "center";  
            ctx.fillText("SCRATCH FATA-FAT!", canvas.width / 2, canvas.height / 2);  
            const scratch = (e) => {  
                if (isRevealed) return; const rect = canvas.getBoundingClientRect();  
                const x = (e.pageX || (e.touches && e.touches[0].pageX)) - rect.left;  
                const y = (e.pageY || (e.touches && e.touches[0].pageY)) - rect.top;  
                ctx.globalCompositeOperation = 'destination-out'; ctx.beginPath(); 
                ctx.arc(x, y, 80, 0, Math.PI * 2); ctx.fill();  
                const pixels = ctx.getImageData(0, 0, canvas.width, canvas.height).data;  
                let count = 0; for (let i = 0; i < pixels.length; i += 40) if (pixels[i + 3] === 0) count++;  
                if (count > (pixels.length / 40) * 0.40) { setIsRevealed(true); onComplete(); }  
            };  
            canvas.addEventListener('mousemove', scratch); canvas.addEventListener('touchmove', scratch, {passive: true});  
        }, [isRevealed]);  
        return ( <div className="scratch-container"> {!isRevealed && <canvas ref={canvasRef} className="scratch-canvas" />} <div className="scratch-content">{children}</div> </div> );  
    };  

    const App = () => {  
        const [theme, setTheme] = useState('dark'); const [status, setStatus] = useState("loading"); 
        const [member, setMember] = useState(null); const [headers, setHeaders] = useState([]);  
        const [isAdmin, setIsAdmin] = useState(false); const [showPin, setShowPin] = useState(false);  
        const [prize, setPrize] = useState({ img: "", msg: "", isLocked: true, highlight: "", colorClass: "" });  

        const t = vocab.hi;

        const mapPrize = useCallback((row, maps) => {  
            const mID = (row[1] || "").toString().toLowerCase().trim();  
            const lock = (row[37] || "").toString().toUpperCase().trim(); 
            if (!lock || lock === "LOCKED") { setPrize({ msg: t.pending, isLocked: true }); return; }
            const match = maps.find(m => m.Membership_ID && m.Membership_ID.toLowerCase().trim() === mID);  
            if (lock === "DPSG_WINNER" && match) {
                setPrize({ img: toDirectLink(match.Image_Link), highlight: match.Inam_Name || "DPSG WINNER", msg: `'मंजिल उन्हीं को मिलती है जिनके सपनों में जान होती है,\nआज आपकी मेहनत और किस्मत दोनों मेहरबान होती है!'\n\nहार्दिक बधाई! आप डिजिटल प्रॉब्लम सॉल्यूशन ग्रुप (DPSG) के गौरवशाली विजेता बने हैं। आपने ${match.Inam_Name} जीता है और आपकी रैंक ${match.Match_Name} है। यह उपहार संस्था की ओर से आपके अटूट विश्वास का सम्मान है। धन्यवाद!`, isLocked: false, colorClass: "winner-glow" });  
            } else if (lock === "DPSG_CASH") {
                setPrize({ img: "https://drive.google.com/thumbnail?id=1WOrBZpuRF9Q-Pc753LA11XoAaGjCv7zD&sz=w1000", highlight: "CASH BACK", msg: `'इनाम छोटा हो या बड़ा, अपनों का साथ सबसे प्यारा है,\nजीत की ये शुरुआत है, अभी तो सारा आसमान तुम्हारा है!'\n\nमुस्कुराइए! DPSG संस्था की ओर से आपको यह विशेष कैशबैक भेंट किया जा रहा है। यह आपके और हमारे अटूट रिश्ते की पहचान है। भविष्य में भी बेहतरीन सेवाओं के लिए हम तत्पर रहेंगे। धन्यवाद!`, isLocked: false, colorClass: "border-4 border-green-500 bg-white" });  
            } else if (lock === "DPSG_GIFT") {
                setPrize({ img: "https://drive.google.com/thumbnail?id=1baCVXWH7XYD5T8QxOfGKnkt9CKDHSx2Z&sz=w1000", highlight: "DPSG GIFT", msg: `'खूबसूरत सा ये तोहफा बस एक छोटा सा बहाना है,\nहमे तो आपके साथ मिलकर खुशियों का जशन मनाना है!'\n\nबधाई हो! DPSG परिवार की ओर से यह उपहार आपके डिजिटल सफर को और भी खास बनाने के लिए है। आपकी संतुष्टि ही हमारी सफलता है। धन्यवाद!`, isLocked: false, colorClass: "border-4 border-blue-500 bg-white" });  
            } else {
                setPrize({ img: "https://drive.google.com/thumbnail?id=1j7v5a90h8ABi2r6piQIZR_4Qil4buiqh&sz=w1000", highlight: "TRY AGAIN", msg: `'गिरते हैं शहसवार ही मैदान-ए-जंग में,\nवो क्या गिरेंगे जो घुटनों के बल चलते हैं!'\n\nनिराश न हों! हालांकि इस बार आप 51 बड़े इनामों की सूची में नहीं आ पाए हैं, लेकिन DPSG संस्था आपके निरंतर विश्वास की सराहना करती है। भविष्य के लकी ड्रा में आपकी किस्मत ज़रूर चमकेगी। धन्यवाद!`, isLocked: false, colorClass: "bg-white border-4" });  
            }
        }, [t.pending]);

        useEffect(() => {  
            fetch(MAIN_CSV + "&t=" + Date.now()).then(r => r.text()).then(txt => {  
                Papa.parse(txt, { complete: (res) => {  
                    const rows = res.data; setHeaders(rows[0] || []);  
                    const qId = new URLSearchParams(window.location.search).get('id');  
                    const match = rows.slice(1).find(r => r[1] && r[1].toLowerCase() === (qId || "").toLowerCase());  
                    if (match) { setMember(match); fetch(MAPPING_CSV).then(r => r.text()).then(mTxt => { Papa.parse(mTxt, { header: true, complete: (mRes) => { mapPrize(match, mRes.data); setStatus("view"); } }); }); }  
                    else setStatus("search");  
                }});  
            });  
        }, [mapPrize]);  

        const clean = (val) => (val && val !== "#REF!" && val !== "") ? val : "---";

        if (status === "loading") return <div className="h-screen flex items-center justify-center font-black text-blue-400">DPSG LOADING...</div>;  

        return (  
            <div className="min-h-screen pb-10">  
                <div className="no-print marquee"><p>{member ? member[38] : t.brand} • {t.slogan}</p></div>  
                <div className="max-w-xl mx-auto p-4 sm:p-8">  
                    {status === "search" ? (  
                        <div className="bg-white p-12 rounded-[2.5rem] shadow-xl text-center border">  
                            <i className="fa-solid fa-id-card text-6xl text-blue-600 mb-6"></i>  
                            <h2 className="text-xl font-black mb-8 uppercase text-slate-900">ID सर्च करें</h2>  
                            <input id="sid" type="text" className="w-full bg-slate-50 border-2 rounded-2xl py-5 text-center mb-6 text-xl font-bold uppercase text-slate-900" placeholder="DPSG-26-XXXX" />  
                            <button onClick={() => window.location.href=`?id=${document.getElementById('sid').value}`} className="w-full bg-blue-600 py-5 rounded-2xl font-black text-white shadow-lg">DASHBOARD खोलें</button>  
                        </div>  
                    ) : (  
                        <div className="space-y-8 animate-in slide-in-from-bottom-4 duration-700">  
                            <div className="text-center">  
                                <h1 className="text-3xl font-black italic uppercase text-white leading-none">{t.brand}</h1>  
                                <div className="bg-blue-600 inline-block px-4 py-1 rounded-full mt-4 shadow-lg"><p className="text-[10px] font-bold text-white uppercase tracking-wider">{t.slogan}</p></div>
                            </div>  

                            <div className="grid grid-cols-4 gap-3 text-center no-print">
                                <div className="icon-card"><i className="fa-solid fa-desktop text-orange-500 text-2xl"></i><p className="text-[9px] font-black text-slate-900 mt-2">ई-मित्र</p></div>
                                <div className="icon-card"><i className="fa-solid fa-database text-blue-500 text-2xl"></i><p className="text-[9px] font-black text-slate-900 mt-2">डेटा रिकवरी</p></div>
                                <div className="icon-card"><i className="fa-solid fa-mobile-screen text-purple-500 text-2xl"></i><p className="text-[9px] font-black text-slate-900 mt-2">अनलोक</p></div>
                                <div className="icon-card"><i className="fa-solid fa-landmark text-green-600 text-2xl"></i><p className="text-[9px] font-black text-slate-900 mt-2">योजना</p></div>
                            </div>

                            <div className="notice-portal no-print"><h4 className="text-yellow-500 font-black text-[10px] uppercase mb-1">{t.noticeHead}</h4><p className="text-white font-bold text-sm italic">{member[38] || "Welcome to DPSG!"}</p></div>

                            <div className="no-print bg-slate-900 p-1 rounded-[3rem] shadow-xl border-2 border-slate-800">
                                <p className="text-red-500 font-black text-[10px] my-3 text-center animate-pulse uppercase">{t.warning}</p>
                                <div className={`p-1 rounded-[2.5rem] ${prize.isLocked ? 'bg-slate-800' : prize.colorClass}`}>  
                                    {prize.isLocked ? ( <div className="p-24 text-center text-slate-400 font-bold italic"> <i className="fa-solid fa-lock text-5xl mb-4"></i> <p>{prize.msg}</p> </div> ) : (  
                                        <ScratchCard onComplete={() => confetti()}>  
                                            <div className="p-0 text-center w-full bg-white flex flex-col items-center">
                                                <div className="bg-blue-600 text-white px-10 py-2 rounded-b-3xl font-black text-md mb-4 shadow-xl">{prize.highlight}</div>  
                                                <img src={prize.img} className="w-full max-h-[400px] object-contain px-4" alt="Prize" />  
                                                <div className="winner-msg-container"><p className="shayari-font whitespace-pre-line">{prize.msg.split('\n\n')[0]}</p><p className="bg-yellow-500 text-black px-6 py-1.5 rounded-full font-black text-xs inline-block shadow-lg mt-4 uppercase">{prize.msg.split('\n\n')[1] || "बधाई हो!"}</p></div>
                                            </div>
                                        </ScratchCard>  
                                    )}  
                                </div>
                            </div>

                            <div id="receipt" className="receipt-card p-12 text-left">  
                                <div className="text-center border-b-2 border-dashed border-slate-200 pb-8 mb-8"><h3 className="font-black text-2xl text-blue-700 italic uppercase tracking-tight">{t.receipt}</h3><p className="text-[10px] font-black text-slate-400 uppercase tracking-[0.3em] mt-2">DPSG NIMBAHERA</p></div>  
                                <div className="grid grid-cols-2 gap-y-12 text-sm border-b border-slate-100 pb-10">  
                                    <div><p className="text-[9px] font-black text-slate-400 uppercase">ID IDENTITY</p><p className="value-style">{clean(member[1])}</p></div>  
                                    <div className="text-right"><p className="text-[9px] font-black text-slate-400 uppercase">CATEGORY</p><p className="font-black text-blue-700 px-5 py-1.5 border-2 border-blue-100 rounded-full bg-blue-50 inline-block text-xs">{clean(member[3])}</p></div>  
                                    <div><p className="text-[9px] font-black text-slate-400 uppercase">CUSTOMER NAME</p><p className="font-black uppercase text-xl text-slate-800">{clean(member[8])}</p></div>  
                                    <div className="text-right"><p className="text-[9px] font-black text-slate-400 uppercase">VILLAGE</p><p className="font-black uppercase text-xl text-slate-800">{clean(member[5])}</p></div>  
                                    <div><p className="text-[9px] font-black text-slate-400 uppercase">MOBILE</p><p className="font-bold tracking-widest text-slate-700">******{member[9]?.slice(-4)}</p></div>
                                    <div className="text-right"><p className="text-[9px] font-black text-slate-400 uppercase">EXPIRY</p><p className="font-bold text-red-600">{clean(member[16])}</p></div>  
                                </div>
                                <div className="grid grid-cols-3 gap-5 my-10">
                                    <div className="bg-blue-600 text-white p-6 rounded-3xl text-center shadow-lg"><p className="text-[9px] font-bold opacity-70 uppercase">POINTS</p><p className="text-3xl font-black">{clean(member[18])}</p></div>
                                    <div className="bg-slate-800 text-white p-6 rounded-3xl text-center shadow-lg"><p className="text-[9px] font-bold opacity-70 uppercase">USED</p><p className="text-3xl font-black">{(parseInt(member[18])-parseInt(member[21]))||0}</p></div>
                                    <div className="bg-green-600 text-white p-6 rounded-3xl text-center shadow-lg"><p className="text-[9px] font-bold opacity-70 uppercase">BALANCE</p><p className="text-3xl font-black">{clean(member[21])}</p></div>
                                </div>
                                <div className="bg-blue-50/50 p-8 rounded-[2rem] border border-blue-100 my-8 font-bold italic text-[11px] space-y-3 text-slate-700">
                                    <p className="text-blue-700 font-black uppercase mb-4 flex items-center italic"><i className="fa-solid fa-star-of-life mr-2"></i> सदस्यता कार्ड सुविधायें</p>
                                    {(() => { 
                                        const cat = (member[3] || "").toLowerCase(); 
                                        let key = (cat.includes("vip") || cat.includes("500")) ? "VIP" : (cat.includes("gold") || cat.includes("100")) ? "Gold" : "Silver"; 
                                        return cardSpecs[key].map((ben, i) => ( <div key={i} className="flex items-start py-2 border-b border-blue-100/50 last:border-0"><i className="fa-solid fa-circle-check text-green-500 mr-3 mt-1"></i>{ben}</div> )); 
                                    })()}
                                </div>
                                <div className="bg-slate-900 text-white p-10 rounded-[2.5rem] text-center mb-10 shadow-2xl border-4 border-slate-800"><p className="text-[11px] opacity-50 uppercase mb-2 tracking-widest">LUCKY DRAW DATE</p><p className="text-4xl font-black text-yellow-500 italic uppercase tracking-widest">{clean(member[36])}</p></div>
                                <div className="bg-slate-50 p-10 rounded-[2.5rem] border border-slate-100 mb-10 text-[10px] font-bold italic space-y-4 text-slate-500">
                                    <h4 className="text-[11px] font-black uppercase mb-4 border-b pb-2 flex items-center text-slate-800"><i className="fa-solid fa-scale-balanced mr-3 text-blue-600"></i> {t.tTitle}</h4>
                                    <p>{t.t1}</p><p>{t.t2}</p><p>{t.t3}</p><p>{t.t4}</p><p>{t.t5}</p><p>{t.t6}</p><p>{t.t7}</p><p>{t.t8}</p><p>{t.t9}</p><p>{t.t10}</p>
                                </div>
                                <button onClick={()=>window.print()} className="no-print w-full bg-blue-600 text-white py-6 rounded-full font-black uppercase shadow-xl hover:bg-blue-700 text-lg flex items-center justify-center gap-3"><i className="fa-brands fa-whatsapp text-2xl"></i> Print Receipt</button>
                            </div>
                        </div>
                    )}
                </div>
            </div>  
        );  
    };  
    const root = ReactDOM.createRoot(document.getElementById('root')); root.render(<App />);  
    </script>
</body>  
</html>
