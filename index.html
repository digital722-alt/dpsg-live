    const ScratchCard = ({ onComplete, children }) => {  
        const canvasRef = useRef(null);  
        const [isRevealed, setIsRevealed] = useState(false);  
        useEffect(() => {  
            const canvas = canvasRef.current; if(!canvas) return; const ctx = canvas.getContext('2d');  
            canvas.width = canvas.parentElement.offsetWidth; canvas.height = canvas.parentElement.offsetHeight;  
            const grad = ctx.createLinearGradient(0, 0, canvas.width, canvas.height);  
            grad.addColorStop(0, '#D4AF37'); grad.addColorStop(0.5, '#F9F295'); grad.addColorStop(1, '#B8860B');  
            ctx.fillStyle = grad; ctx.fillRect(0, 0, canvas.width, canvas.height);  
            ctx.font = "bold 22px Inter"; ctx.fillStyle = "#4a3b01"; ctx.textAlign = "center";  
            ctx.fillText("SCRATCH HERE", canvas.width / 2, canvas.height / 2);  
            const scratch = (e) => {  
                if (isRevealed) return; const rect = canvas.getBoundingClientRect();  
                const x = (e.pageX || (e.touches && e.touches[0].pageX)) - rect.left;  
                const y = (e.pageY || (e.touches && e.touches[0].pageY)) - rect.top;  
                ctx.globalCompositeOperation = 'destination-out'; ctx.beginPath(); ctx.arc(x, y, 40, 0, Math.PI * 2); ctx.fill();  
                const pixels = ctx.getImageData(0, 0, canvas.width, canvas.height).data;  
                let count = 0; for (let i = 0; i < pixels.length; i += 40) if (pixels[i + 3] === 0) count++;  
                if (count > (pixels.length / 40) * 0.5) { setIsRevealed(true); onComplete(); }  
            };  
            canvas.addEventListener('mousemove', scratch); canvas.addEventListener('touchmove', scratch, {passive: true});  
        }, [isRevealed]);

                                <div className="flex justify-between text-xs font-bold text-slate-500 dark:text-slate-400 mb-2 uppercase">
                                    <span>Total: <span className="text-blue-600 dark:text-blue-400">{clean(member[21])}</span></span>
                                    <span>{t.balance}: <span className="text-green-600 dark:text-green-400">{clean(member[23])}</span></span>
                                </div>
                                <div className="w-full bg-slate-100 dark:bg-slate-700 rounded-full h-4 overflow-hidden relative shadow-inner">
                                    <div className="bg-gradient-to-r from-blue-500 to-indigo-600 h-4 rounded-full progress-bar" style={{ width: `${calculateProgress(member[22], member[21])}%` }}></div>
                                </div>
                                <p className="text-right text-[10px] text-slate-400 dark:text-slate-500 font-bold mt-2 uppercase">{t.used}: {clean(member[22])}</p>
                            </div>

                            {/* NEW: Services Grid (Formspree Triggers) */}
                            <div className="no-print">
                                <div className="grid grid-cols-4 gap-3">
                                    {[
                                        { id: 'emitra', name: 'ई-मित्र', icon: 'fa-laptop-file', color: 'bg-orange-500' },
                                        { id: 'data', name: 'डेटा रिकवरी', icon: 'fa-hard-drive', color: 'bg-blue-500' },
                                        { id: 'unlock', name: 'मोबाइल अनलॉक', icon: 'fa-mobile-screen-button', color: 'bg-purple-500' },
                                        { id: 'yojana', name: 'सरकारी योजनाएं', icon: 'fa-building-columns', color: 'bg-green-500' }
                                    ].map(srv => (
                                        <div key={srv.id} onClick={() => setShowServiceForm({ show: true, serviceName: srv.name })} className="flex flex-col items-center justify-center p-3 bg-white dark:bg-slate-800 rounded-2xl shadow-sm border dark:border-slate-700 cursor-pointer hover:scale-105 transition-transform">
                                            <div className={`w-12 h-12 ${srv.color} text-white rounded-full flex items-center justify-center mb-2 shadow-inner`}>
                                                <i className={`fa-solid ${srv.icon} text-xl`}></i>
                                            </div>
                                            <span className="text-[9px] font-bold text-slate-700 dark:text-slate-300 text-center uppercase">{srv.name}</span>
                                        </div>
                                    ))}
                                </div>
                            </div>
                            {/* NEW: Reward Section with Strict Red Warning */}
                            <div className="no-print bg-white dark:bg-slate-800 p-6 rounded-[2rem] shadow-sm border dark:border-slate-700">
                                <h3 className="font-black text-slate-800 dark:text-white mb-4 uppercase text-sm"><i className="fa-solid fa-gift text-pink-500 mr-2"></i> {t.rewardTitle || 'Reward Section'}</h3>
                                
                                <div className="bg-red-100 dark:bg-red-900/30 border-l-4 border-red-500 text-red-700 dark:text-red-400 p-3 rounded-lg mb-6 shadow-sm">
                                    <p className="text-[11px] font-black animate-pulse">{t.warningMsg}</p>
                                </div>

                                <div className={`p-2 rounded-[2rem] transition-all duration-700 ${prize.type !== 'normal' && isScratched ? prize.colorClass : 'bg-slate-200 dark:bg-slate-700'}`}>  
                                    {prize.isLocked ? (  
                                        <div className="bg-white dark:bg-slate-800 p-12 rounded-[1.8rem] text-center italic shadow-inner">  
                                            <i className="fa-solid fa-lock text-4xl text-slate-300 dark:text-slate-600 mb-4"></i>  
                                            <p className="text-slate-500 dark:text-slate-400 font-bold">{prize.msg}</p>  
                                        </div>  
                                    ) : (  
                                        <ScratchCard onComplete={() => { setIsScratched(true); confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } }); }}>  
                                            <div className="bg-white dark:bg-slate-800 p-6 text-center w-full h-full flex flex-col justify-center items-center">
                                                <div className="bg-slate-100 dark:bg-slate-700 px-8 py-2 rounded-full font-black text-blue-600 dark:text-blue-400 mb-4 shadow-sm text-sm uppercase">{clean(prize.highlight)}</div>  
                                                <img src={prize.img} className="max-h-60 w-auto object-contain drop-shadow-lg" alt="Prize" />  
                                            </div>
                                        </ScratchCard>  
                                    )}  
                                </div>
                            </div>

                            {/* NEW: Help Desk Buttons */}
                            <div className="no-print grid grid-cols-2 gap-4 mt-2">
                                <a href="https://wa.me/917229874128" target="_blank" rel="noreferrer" className="bg-green-500 text-white p-4 rounded-2xl shadow-sm hover:bg-green-600 transition-colors flex items-center justify-center gap-2">
                                    <i className="fa-brands fa-whatsapp text-2xl"></i>
                                    <span className="font-black text-[11px] uppercase">WhatsApp</span>
                                </a>
                                <a href="https://maps.google.com/?q=Digital+Seva+Nimbahera" target="_blank" rel="noreferrer" className="bg-red-500 text-white p-4 rounded-2xl shadow-sm hover:bg-red-600 transition-colors flex items-center justify-center gap-2">
                                    <i className="fa-solid fa-location-dot text-2xl"></i>
                                    <span className="font-black text-[11px] uppercase">Location</span>
                                </a>
                            </div>

                            {/* ORIGINAL: 100% SAME DIGITAL RECEIPT */}
                            <div id="receipt" className="receipt-card p-8 sm:p-12 text-left dark:bg-white dark:text-slate-900 mt-8">  
                                <div className="text-center border-b-2 border-dashed border-slate-100 pb-8 mb-8">  
                                    <h3 className="font-black text-2xl text-blue-700 italic uppercase">{t.receipt}</h3>  
                                    <p className="text-[9px] font-black text-slate-400 uppercase tracking-widest mt-2">NIMBAHERA, RAJASTHAN</p>  
                                </div>  
                                  
                                <div className="space-y-10">  
                                    <div className="flex justify-between items-end border-b pb-6">  
                                        <div><p className="text-[10px] text-slate-400 font-black uppercase mb-1">ID IDENTITY</p><p className="text-2xl font-black text-slate-900">{clean(member[1])}</p></div>  
                                        <div className="text-right"><p className="text-[10px] text-slate-400 font-black uppercase mb-1">Category</p><p className="text-sm font-black text-blue-700 border-2 border-blue-100 px-4 py-1 rounded-full">{clean(member[3])}</p></div>  
                                    </div>  

                                    <div className="grid grid-cols-3 gap-4">  
                                        <div className="bg-blue-600 text-white p-6 rounded-3xl text-center shadow-lg">  
                                            <p className="text-[9px] font-bold uppercase opacity-80 mb-1">{t.points}</p>  
                                            <p className="text-3xl font-black">{clean(member[21])}</p>  
                                        </div>  
                                        <div className="bg-slate-800 text-white p-6 rounded-3xl text-center shadow-lg">  
                                            <p className="text-[9px] font-bold uppercase opacity-80 mb-1">{t.used}</p>  
                                            <p className="text-3xl font-black">{clean(member[22])}</p>  
                                        </div>  
                                        <div className="bg-green-600 text-white p-6 rounded-3xl text-center shadow-lg">  
                                            <p className="text-[9px] font-bold uppercase opacity-80 mb-1">{t.balance}</p>  
                                            <p className="text-3xl font-black">{clean(member[23])}</p>  
                                        </div>  
                                    </div>  

                                    <div className="bg-blue-50/50 p-8 rounded-[2rem] border border-blue-100">  
                                        <p className="text-[11px] font-black text-blue-700 uppercase mb-6 flex items-center italic"><i className="fa-solid fa-crown mr-3"></i> सदस्यता कार्ड सुविधायें</p>  
                                        <div className="space-y-3">  
                                        {(() => {  
                                            const cat = member[3]?.toLowerCase() || "";  
                                            let key = (cat.includes("vip") || cat.includes("500")) ? "VIP" : (cat.includes("gold") || cat.includes("100")) ? "Gold" : "Silver";  
                                            return cardSpecs[key][lang].map((ben, i) => (  
                                                <div key={i} className="flex items-start text-[11px] font-bold italic py-2 border-b border-blue-100/50 last:border-0"><i className="fa-solid fa-circle-check text-green-500 mr-3 mt-1"></i>{ben}</div>  
                                            ));  
                                        })()}  
                                        </div>  
                                    </div>  

                                    <div className="grid grid-cols-2 gap-x-8 gap-y-10 py-4 border-y border-slate-50">  
                                        <div><p className="text-[9px] text-slate-400 font-black uppercase mb-1">Customer Name</p><p className="text-[17px] font-black text-slate-900 uppercase">{clean(member[8])}</p></div>  
                                        <div className="text-right"><p className="text-[9px] text-slate-400 font-black uppercase mb-1">Village</p><p className="text-[17px] font-black text-slate-900 uppercase">{clean(member[5])}</p></div>  
                                        <div><p className="text-[9px] text-slate-400 font-black uppercase mb-1">Secure Mobile</p><p className="text-lg font-bold tracking-widest">{mask(member[9])}</p></div>  
                                        <div className="text-right"><p className="text-[9px] text-slate-400 font-black uppercase mb-1">Secure Aadhar</p><p className="text-lg font-bold tracking-widest">{mask(member[11])}</p></div>  
                                        <div><p className="text-[9px] text-slate-400 font-black uppercase mb-1">{t.active}</p><p className="font-bold text-slate-800">{clean(member[34])}</p></div>  
                                        <div className="text-right"><p className="text-[9px] text-slate-400 font-black uppercase mb-1">{t.expiry}</p><p className="font-bold text-red-600">{clean(member[35])}</p></div>  
                                        <div className="bg-slate-100 p-4 rounded-2xl text-center"><p className="text-[9px] text-slate-400 font-black uppercase mb-1">{t.left}</p><p className="text-xl font-black text-blue-700">{clean(member[20])}</p></div>  
                                        <div className="bg-slate-100 p-4 rounded-2xl text-center"><p className="text-[9px] text-slate-400 font-black uppercase mb-1">{t.fee}</p><p className="text-xl font-black text-slate-800">{clean(member[2])}</p></div>  
                                    </div>  

                                    <div className="bg-slate-900 text-white p-8 rounded-3xl text-center shadow-xl">  
                                        <p className="text-[10px] font-black uppercase opacity-50 mb-2 italic tracking-widest">{t.draw}</p>  
                                        <p className="text-3xl font-black text-yellow-500 italic uppercase">{clean(member[36])}</p>  
                                    </div>  

                                    <div className="bg-slate-50 p-10 rounded-[2.5rem] border border-slate-100">  
                                        <h4 className="text-[11px] font-black uppercase mb-8 border-b pb-4 flex items-center text-slate-800"><i className="fa-solid fa-scale-balanced mr-3 text-blue-600"></i> {t.termsTitle}</h4>  
                                        <div className="space-y-5 text-slate-500 font-bold italic text-[10px] leading-relaxed">  
                                            <p>{t.t1}</p><p>{t.t2}</p><p>{t.t3}</p><p>{t.t4}</p><p>{t.t5}</p>  
                                            <p>{t.t6}</p><p>{t.t7}</p><p>{t.t8}</p><p>{t.t9}</p><p>{t.t10}</p>  
                                        </div>  
                                    </div>  
                                    <button onClick={()=>window.print()} className="no-print w-full bg-blue-600 text-white py-6 rounded-full text-sm font-black uppercase shadow-xl hover:bg-blue-700 transition-all active:scale-95">PRINT OFFICIAL RECEIPT</button>  
                                </div>  
                            </div>

                            {/* ORIGINAL: MASTER ADMIN - FINGERPRINT ICON */}    
                            <div className="no-print pt-10 pb-20 flex flex-col items-center">  
                                {!isAdmin && (  
                                    <button onClick={() => setShowPin(!showPin)} className="opacity-20 hover:opacity-100 transition-all p-6 bg-white dark:bg-slate-800 rounded-full shadow-lg border dark:border-slate-700">  
                                        <i className="fa-solid fa-fingerprint text-4xl text-blue-600 dark:text-blue-400"></i>  
                                    </button>  
                                )}  
                                {showPin && !isAdmin && (  
                                    <div className="mt-8 bg-white dark:bg-slate-800 p-10 rounded-[2.5rem] border dark:border-slate-700 shadow-2xl w-full animate-in zoom-in">  
                                        <input type="password" id="adminPin" className="w-full bg-slate-50 dark:bg-slate-700 border-2 border-slate-200 dark:border-slate-600 rounded-2xl px-8 py-5 text-xl font-bold text-center mb-4 focus:border-blue-500 outline-none dark:text-white" placeholder="ENTER PIN" />  
                                        <button onClick={() => {document.getElementById('adminPin').value === MASTER_PIN ? setIsAdmin(true) : alert("WRONG PIN!");}} className="w-full bg-slate-900 dark:bg-slate-600 py-5 rounded-2xl font-black text-white">UNLOCK ALL 39 COLUMNS</button>  
                                    </div>  
                                )}  
                                {isAdmin && (  
                                    <div className="w-full mt-10 bg-white dark:bg-slate-800 border dark:border-slate-700 rounded-[2.5rem] p-8 text-left shadow-2xl overflow-hidden">  
                                        <div className="flex justify-between items-center mb-6 border-b dark:border-slate-700 pb-4">  
                                            <h3 className="font-black text-blue-600 dark:text-blue-400 text-sm">MASTER DASHBOARD (FULL DATA)</h3>  
                                            <button onClick={()=>setIsAdmin(false)} className="text-red-500 font-black text-xs uppercase">Logout</button>  
                                        </div>  
                                        <div className="grid grid-cols-1 gap-3 max-h-96 overflow-y-auto pr-2 custom-scroll">  
                                            {member.map((val, i) => (  
                                                <div key={i} className="p-4 bg-slate-50 dark:bg-slate-700/50 rounded-xl border border-slate-100 dark:border-slate-600">  
                                                    <p className="text-[8px] text-slate-400 dark:text-slate-500 uppercase font-black mb-1">{headers[i] || `Index ${i}`}</p>  
                                                    <p className="font-bold text-slate-800 dark:text-slate-200 text-sm">{val || "---"}</p>  
                                                </div>  
                                            ))}  
                                        </div>  
                                    </div>  
                                )}  
                            </div> 
                        </div> // End of View State Space-y-8
                    )}  
                </div> // End main container

                {/* NEW: Formspree Service Popup Modal */}
                {showServiceForm.show && (
                    <div className="fixed inset-0 bg-black/70 backdrop-blur-sm z-50 flex items-center justify-center p-4 animate-in fade-in duration-300">
                        <div className="bg-white dark:bg-slate-800 w-full max-w-sm rounded-[2rem] shadow-2xl overflow-hidden border dark:border-slate-700 relative">
                            <button onClick={() => setShowServiceForm({ show: false, serviceName: "" })} className="absolute top-4 right-4 w-8 h-8 bg-slate-100 dark:bg-slate-700 rounded-full flex items-center justify-center text-slate-500 hover:text-red-500 transition-colors z-10">
                                <i className="fa-solid fa-xmark"></i>
                            </button>
                            <div className="p-8">
                                <div className="w-16 h-16 bg-blue-100 dark:bg-blue-900/50 rounded-full flex items-center justify-center mb-4 mx-auto shadow-inner text-blue-600 dark:text-blue-400">
                                    <i className="fa-solid fa-cloud-arrow-up text-3xl"></i>
                                </div>
                                <h3 className="text-lg font-black text-center text-slate-800 dark:text-white uppercase mb-6 tracking-wide">{showServiceForm.serviceName}</h3>
                                
                                <form action="https://formspree.io/f/xwvndvoe" method="POST" encType="multipart/form-data" className="space-y-4">
                                    <input type="hidden" name="Service_Requested" value={showServiceForm.serviceName} />
                                    <input type="hidden" name="Membership_ID" value={member ? member[1] : "Unknown"} />
                                    
                                    <div>
                                        <label className="text-[10px] font-black text-slate-500 dark:text-slate-400 uppercase ml-2 mb-1 block">Full Name</label>
                                        <input type="text" name="Client_Name" required className="w-full bg-slate-50 dark:bg-slate-700 border border-slate-200 dark:border-slate-600 rounded-xl px-4 py-3 text-sm font-bold outline-none focus:border-blue-500 dark:text-white" placeholder="आपका नाम" />
                                    </div>
                                    
                                    <div>
                                        <label className="text-[10px] font-black text-slate-500 dark:text-slate-400 uppercase ml-2 mb-1 block">Mobile Number</label>
                                        <input type="tel" name="Mobile_Number" required className="w-full bg-slate-50 dark:bg-slate-700 border border-slate-200 dark:border-slate-600 rounded-xl px-4 py-3 text-sm font-bold outline-none focus:border-blue-500 dark:text-white" placeholder="मोबाइल नंबर" />
                                    </div>

                                    <div>
                                        <label className="text-[10px] font-black text-slate-500 dark:text-slate-400 uppercase ml-2 mb-1 block">Upload Document/Photo</label>
                                        <div className="w-full bg-slate-50 dark:bg-slate-700 border-2 border-dashed border-slate-300 dark:border-slate-600 rounded-xl px-4 py-4 text-center cursor-pointer hover:border-blue-500 transition-colors relative">
                                            <i className="fa-solid fa-file-arrow-up text-slate-400 text-2xl mb-2"></i>
                                            <p className="text-xs font-bold text-slate-500 dark:text-slate-400">Click to upload file</p>
                                            <input type="file" name="attachment" required className="absolute inset-0 w-full h-full opacity-0 cursor-pointer" />
                                        </div>
                                    </div>

                                    <button type="submit" className="w-full bg-blue-600 text-white py-4 rounded-xl font-black text-sm uppercase shadow-lg hover:bg-blue-700 transition-all mt-4 active:scale-95 flex items-center justify-center gap-2">
                                        <i className="fa-solid fa-paper-plane"></i> Submit Request
                                    </button>
                                </form>
                            </div>
                        </div>
                    </div>
                )}
            </div>  
        );  
    };  
    const root = ReactDOM.createRoot(document.getElementById('root')); root.render(<App />);  
    </script>
</body>  
</html>
