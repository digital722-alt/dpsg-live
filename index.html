<!DOCTYPE html>  
<html lang="hi">  
<head>  
    <meta charset="UTF-8">  
    <meta name="viewport" content="width=device-width, initial-scale=1.0">  
    <title>DPSG Master Portal - Digital Seva Nimbahera</title>  
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>  
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>  
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>  
    <script src="https://cdn.tailwindcss.com"></script>  
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>  
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>  
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">  
    <style>  
        @import url('https://fonts.googleapis.com/css2?family=Mukta:wght@400;700;800&family=Poppins:wght@400;700;900&display=swap');  
        
        /* पूरी बॉडी की थीम बदली गई */
        body { 
            font-family: 'Mukta', sans-serif; 
            background-color: #0f172a; /* Deep Midnight Blue */
            color: #f8fafc;
            margin: 0; 
        }  

        /* ऊपर की प्रीमियम गोल्ड पट्टी */
        .marquee { 
            background: linear-gradient(90deg, #b48a2d, #fbbf24, #b48a2d); 
            color: #000; 
            font-weight: 800; 
            padding: 10px 0; 
            border-bottom: 3px solid #78350f;
        }  

        /* रॉयल विनर कार्ड लेआउट */
        .winner-panel {
            background: linear-gradient(145deg, #1e293b, #0f172a);
            border: 4px solid #fbbf24;
            border-radius: 2.5rem;
            box-shadow: 0 0 60px rgba(251, 191, 36, 0.4);
            overflow: hidden;
            position: relative;
        }

        .winner-image-frame {
            background: #fff;
            padding: 10px;
            border-bottom: 5px solid #fbbf24;
        }

        .congrats-text {
            background: rgba(251, 191, 36, 0.1);
            padding: 20px;
            color: #fbbf24;
            text-align: center;
            border-top: 1px solid rgba(251, 191, 36, 0.3);
        }

        .shayari-font {
            font-style: italic;
            font-family: 'Georgia', serif;
            color: #fef3c7;
            font-size: 1.1rem;
            line-height: 1.5;
        }

        /* बटन स्टाइल */
        .btn-premium {
            background: linear-gradient(to bottom, #2563eb, #1e40af);
            transition: all 0.3s;
            box-shadow: 0 4px 15px rgba(37, 99, 235, 0.4);
        }
        .btn-premium:active { transform: scale(0.95); }

        /* लैंग्वेज स्विच */
        .lang-toggle {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid #fbbf24;
            color: #fbbf24;
            padding: 5px 15px;
            border-radius: 20px;
            font-weight: bold;
        }
    </style>
</head>  
<body>  
    <div id="root"></div>  
    <script type="text/babel">  
    const { useState, useEffect, useRef, useCallback } = React;  
    const SHEET_ID = "1rrU0EHXur_HfPlmYxjm6vIJqeRW2VZAu0qIteItQkLo";  
    const MAIN_CSV = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv`;  
    const MAPPING_CSV = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRlm-iMRLk5J-lxybJ7S2sR3ZpcGNG8Z8r3BEku8GzK8opYlsunIcZoe03Jf0Xbhw/pub?gid=1529433935&single=true&output=csv";  
    const MASTER_PIN = "Chanchal@6375";  

    const vocab = {  
        hi: {  
            brand: "डिजिटल प्रोबलम सॉल्यूशन ग्रुप", slogan: "समस्या आपकी, समाधान हमारा - उचित मूल्य, बेहतरीन सेवा", 
            receipt: "प्रोफेशनल डिजिटल रसीद", searchTitle: "ID सर्च करें", openDash: "डैशबोर्ड खोलें",
            idLabel: "ID पहचान", catLabel: "श्रेणी", nameLabel: "ग्राहक का नाम", villageLabel: "ग्राम/शहर",
            mobLabel: "सुरक्षित मोबाइल", adhLabel: "सुरक्षित आधार", active: "सक्रियण तिथि", expiry: "समाप्ति तिथि", draw: "लकी ड्रा तिथि",  
            points: "पॉइंट्स", used: "उपयोग", balance: "शेष",
            tTitle: "नियम व शर्तें", t1: "01. यह डिजिटल सदस्यता कार्ड व्यक्तिगत है।", t2: "02. सेवाएँ समाप्ति तिथि तक ही मान्य हैं।",
            warning: "⚠️ आधिकारिक घोषणा होने तक कार्ड को स्क्रैच न करें", pending: "परिणाम जल्द घोषित होगा।", print: "प्रिंट रसीद"
        },
        en: {
            brand: "DIGITAL PROBLEM SOLUTION GROUP", slogan: "Your Problem, Our Solution - Best Service",
            receipt: "PROFESSIONAL DIGITAL RECEIPT", searchTitle: "SEARCH ID", openDash: "OPEN DASHBOARD",
            idLabel: "ID IDENTITY", catLabel: "CATEGORY", nameLabel: "Customer Name", villageLabel: "Village",
            mobLabel: "Secure Mobile", adhLabel: "Secure Aadhar", active: "Start Date", expiry: "End Date", draw: "Lucky Draw",
            points: "Points", used: "Used", balance: "Balance",
            tTitle: "Terms & Conditions", t1: "01. This card is personal.", t2: "02. Valid till expiry.",
            warning: "⚠️ DO NOT SCRATCH UNTIL ANNOUNCED", pending: "Coming Soon...", print: "PRINT RECEIPT"
        }
    };

    const App = () => {  
        const [lang, setLang] = useState('hi');
        const [status, setStatus] = useState("loading"); 
        const [member, setMember] = useState(null); 
        const [prize, setPrize] = useState({ img: "", msg: "", isLocked: true, highlight: "" });  

        const t = vocab[lang];

        const mapPrize = useCallback((row, maps) => {  
            const mID = (row[1] || "").toString().toLowerCase().trim();  
            const lock = (row[37] || "").toString().toUpperCase().trim(); 
            const dDateStr = (row[36] || "").toString().trim(); 

            // Logic to check lock status (0% change in logic)
            if (!lock || lock === "" || lock === "LOCKED") {
                setPrize({ msg: t.pending, isLocked: true }); return;
            }

            const match = maps.find(m => m.Membership_ID && m.Membership_ID.toLowerCase().trim() === mID);  

            if (lock === "DPSG_WINNER" && match) {
                setPrize({ 
                    img: match.Image_Link.includes("drive.google.com") ? "https://drive.google.com/thumbnail?id=" + match.Image_Link.split("id=")[1] + "&sz=w1000" : match.Image_Link, 
                    highlight: lang === 'hi' ? (match.Inam_Name || "विजेता") : "WINNER", 
                    msg: lang === 'hi' ? `'मंजिल उन्हीं को मिलती है जिनके सपनों में जान होती है,\nआज आपकी मेहनत और किस्मत दोनों मेहरबान होती है!'\n\nबधाई हो! आप बने हैं विजेता। आपकी रैंक ${match.Match_Name} है।` : `Success comes to those who dream!\nCongratulations! You are the winner.`, 
                    isLocked: false 
                });  
            } else {
                setPrize({ img: "https://drive.google.com/thumbnail?id=1WOrBZpuRF9Q-Pc753LA11XoAaGjCv7zD&sz=w1000", highlight: "CASH BACK", msg: "DPSG Special Prize!", isLocked: false });
            }
        }, [t.pending, lang]);

        useEffect(() => {  
            fetch(MAIN_CSV).then(r => r.text()).then(txt => {  
                Papa.parse(txt, { complete: (res) => {  
                    const rows = res.data;
                    const qId = new URLSearchParams(window.location.search).get('id');  
                    const match = rows.slice(1).find(r => r[1] && r[1].toLowerCase() === (qId || "").toLowerCase());  
                    if (match) { 
                        setMember(match); 
                        fetch(MAPPING_CSV).then(r => r.text()).then(mTxt => { 
                            Papa.parse(mTxt, { header: true, complete: (mRes) => { mapPrize(match, mRes.data); setStatus("view"); } }); 
                        }); 
                    } else setStatus("search");  
                }});  
            });  
        }, [mapPrize]);  

        if (status === "loading") return <div className="h-screen flex items-center justify-center text-blue-400 font-bold">DPSG LOADING...</div>;  

        return (  
            <div className="min-h-screen">  
                <div className="marquee"><p>{member ? member[38] : t.brand}</p></div>  
                
                <div className="max-w-xl mx-auto p-4 sm:p-6">  
                    <div className="flex justify-between items-center mb-6">
                        <button onClick={()=>setLang(lang==='hi'?'en':'hi')} className="lang-toggle">
                            {lang==='hi'?'English':'हिंदी'}
                        </button>
                    </div>

                    {status === "search" ? (  
                        <div className="bg-slate-800 p-10 rounded-[2.5rem] border border-slate-700 text-center shadow-2xl">  
                            <h2 className="text-xl font-bold mb-6 text-blue-400 uppercase">{t.searchTitle}</h2>  
                            <input id="sid" type="text" className="w-full bg-slate-900 border-2 border-slate-700 rounded-2xl py-4 text-center mb-6 font-bold uppercase text-white" placeholder="DPSG-26-XXXX" />  
                            <button onClick={() => window.location.href=`?id=${document.getElementById('sid').value}`} className="w-full btn-premium py-4 rounded-2xl font-black text-white">DASHBOARD</button>  
                        </div>  
                    ) : (  
                        <div className="space-y-6">  
                            <div className="text-center">  
                                <h1 className="text-3xl font-black italic text-white uppercase">{t.brand}</h1>  
                                <div className="bg-blue-600 inline-block px-4 py-1 rounded-full mt-2">
                                    <p className="text-[10px] font-bold text-white uppercase">{t.slogan}</p>
                                </div>
                            </div>  

                            {/* रॉयल विनर सेक्शन - 0% DATA CHANGE */}
                            <div className="winner-panel">
                                {prize.isLocked ? (
                                    <div className="py-20 text-center text-slate-500">
                                        <i className="fa-solid fa-lock text-4xl mb-4"></i>
                                        <p>{prize.msg}</p>
                                    </div>
                                ) : (
                                    <div className="animate-in zoom-in duration-500">
                                        <div className="winner-image-frame">
                                            <div className="bg-yellow-500 text-black text-center font-black py-1 text-sm uppercase">{prize.highlight}</div>
                                            <img src={prize.img} className="w-full max-h-[300px] object-contain mx-auto my-4" />
                                        </div>
                                        <div className="congrats-text">
                                            <p className="shayari-font whitespace-pre-line mb-4">{prize.msg.split('\n\n')[0]}</p>
                                            <p className="bg-blue-600 text-white px-6 py-2 rounded-full font-bold text-sm inline-block">{prize.msg.split('\n\n')[1]}</p>
                                        </div>
                                    </div>
                                )}
                            </div>

                            {/* प्रोफेशनल रसीद सेक्शन */}
                            <div className="bg-white text-slate-900 p-8 rounded-[2.5rem] shadow-2xl">
                                <h3 className="text-center font-black text-xl text-blue-700 italic border-b-2 border-dashed pb-4 mb-6 uppercase">{t.receipt}</h3>
                                
                                <div className="grid grid-cols-2 gap-6 text-sm">
                                    <div><p className="text-[9px] text-slate-400 font-bold uppercase">{t.idLabel}</p><p className="text-lg font-black">{member[1]}</p></div>
                                    <div className="text-right"><p className="text-[9px] text-slate-400 font-bold uppercase">{t.catLabel}</p><p className="text-blue-600 font-bold">{member[3]}</p></div>
                                    <div><p className="text-[9px] text-slate-400 font-bold uppercase">{t.nameLabel}</p><p className="font-bold">{member[8]}</p></div>
                                    <div className="text-right"><p className="text-[9px] text-slate-400 font-bold uppercase">{t.villageLabel}</p><p className="font-bold">{member[5]}</p></div>
                                </div>

                                <div className="grid grid-cols-3 gap-3 my-6">
                                    <div className="bg-blue-600 text-white p-4 rounded-2xl text-center"><p className="text-[8px] uppercase">{t.points}</p><p className="text-xl font-bold">{member[18]}</p></div>
                                    <div className="bg-slate-800 text-white p-4 rounded-2xl text-center"><p className="text-[8px] uppercase">{t.used}</p><p className="text-xl font-bold">{(parseInt(member[18])-parseInt(member[21]))||0}</p></div>
                                    <div className="bg-green-600 text-white p-4 rounded-2xl text-center"><p className="text-[8px] uppercase">{t.balance}</p><p className="text-xl font-bold">{member[21]}</p></div>
                                </div>

                                <div className="bg-slate-100 p-5 rounded-2xl text-[10px] text-slate-600 italic">
                                    <p className="font-bold text-slate-900 mb-2 uppercase"><i className="fa-solid fa-scale-balanced mr-2"></i> {t.tTitle}</p>
                                    <p>{t.t1}</p><p>{t.t2}</p>
                                    <p className="mt-4 text-center font-bold text-blue-700">लकी ड्रा तिथि: {member[36]}</p>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            </div>  
        );  
    };  
    const root = ReactDOM.createRoot(document.getElementById('root')); root.render(<App />);  
    </script>
</body>  
</html>
