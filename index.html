<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DPSG Professional Portal | J. Zorawar Singh</title>
    <!-- Professional Tools -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Devanagari:wght@400;700;900&family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        body { 
            font-family: 'Inter', 'Noto Sans Devanagari', sans-serif; 
            background-color: #020617; 
            color: #f8fafc;
            overflow-x: hidden;
        }
        .receipt-body { 
            background: white; 
            color: #0f172a; 
            border-radius: 2.5rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.7);
        }
        .lang-active { background: white; color: #020617; font-weight: 900; }
        .gold-border { border: 2px solid #bf953f; }
        .gold-text { background: linear-gradient(135deg, #bf953f, #fcf6ba, #b38728); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        
        @media print {
            .no-print { display: none !important; }
            body { background: white !important; padding: 0 !important; }
            .receipt-body { 
                box-shadow: none !important; 
                border: 1px solid #e2e8f0 !important; 
                width: 100% !important;
                margin: 0 !important;
                border-radius: 0 !important;
            }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const App = () => {
            const [lang, setLang] = useState('hi'); 
            const [status, setStatus] = useState("loading");
            const [member, setMember] = useState(null);
            const [pinInput, setPinInput] = useState("");
            const [isAdmin, setIsAdmin] = useState(false);
            const [searchId, setSearchId] = useState("");
            const [now, setNow] = useState(new Date());

            const ADMIN_PIN = "Chanchal@6375";

            // Professional Translation Dictionary
            const dict = {
                hi: {
                    slogan: "समस्या आपकी, समाधान हमारा - उचित मूल्य, बेहतरीन सेवा !",
                    brand: "डिजिटल प्रॉब्लम सॉल्यूशन ग्रुप",
                    city: "निम्बाहेड़ा, राजस्थान",
                    notice: "सूचना पटल",
                    receipt: "डिजिटल रसीद",
                    mId: "सदस्यता पहचान",
                    cType: "कार्ड का प्रकार",
                    name: "ग्राहक का नाम",
                    location: "गाँव / स्थान",
                    soldDate: "बिक्री की तारीख",
                    pStatus: "इनाम की स्थिति",
                    ptsRem: "शेष सर्विस पॉइंट्स",
                    ptsTot: "कुल आवंटित",
                    ptsUsed: "उपयोग किए गए",
                    active: "सक्रियण तिथि",
                    exp: "वैधता समाप्ति",
                    days: "शेष दिन",
                    ph: "मोबाइल",
                    ad: "आधार",
                    btnGen: "रसीद प्रिंट करें",
                    adminHeader: "मास्टर कंट्रोल (39 कॉलम)",
                    drawMsg: "लकी ड्रा परिणाम का इंतज़ार करें",
                    wonMsg: "बधाई हो! आप विजेता हैं",
                    infoUp: "जानकारी अपडेट की जा रही है...",
                    find: "रिकॉर्ड खोजें",
                    enter: "आईडी यहाँ भरें"
                },
                en: {
                    slogan: "Your Problem, Our Solution - Best Price, Best Service!",
                    brand: "Digital Problem Solution Group",
                    city: "Nimbahera, Rajasthan",
                    notice: "Notice Board",
                    receipt: "DIGITAL RECEIPT",
                    mId: "Membership ID",
                    cType: "Card Category",
                    name: "Member Name",
                    location: "Village / Location",
                    soldDate: "Date of Sale",
                    pStatus: "Prize Status",
                    ptsRem: "Service Points Left",
                    ptsTot: "Total Allocated",
                    ptsUsed: "Total Used",
                    active: "Activation Date",
                    exp: "Expiry Date",
                    days: "Days Left",
                    ph: "Mobile",
                    ad: "Aadhaar",
                    btnGen: "Print Receipt",
                    adminHeader: "Master Admin Dashboard",
                    drawMsg: "Awaiting Lucky Draw Result",
                    wonMsg: "Congratulations! You are a Winner",
                    infoUp: "Information being updated...",
                    find: "Search Record",
                    enter: "Enter ID Number"
                }
            };

            const colHeaders = [
                "Serial_No", "Membership_ID", "Card_Name", "Card_Type", "Prize_Inam", 
                "Village_Gaon", "Sale_Date", "Security_Code", "Customer_Name", "Phone_Number", 
                "Date_of_Birth", "Aadhar_Last_4", "Status", "QR_Link", "Issue_Date", 
                "Activation_Date", "Expiry_Date", "Days_Left", "Total Points", "Used Photos", 
                "Used Prints", "Points Left", "Live Balance", "Total_Sold", "Today Sale", 
                "Stock Left", "Today's Income", "Total Income", "VIP Sale", "Gold Sale", 
                "Silver Sale", "तारीख", "बिके कार्ड", "आज की कमाई (1)", "बाकी कार्ड", 
                "आज की कमाई (2)", "Draw Date", "Inam Status", "Notice"
            ];

            const dpsgDatabase = {
                "0001": ["0001", "DPSG-26-113-0001", "डिजिटल बचत कार्ड", "₹500 VIP Card", "LED TV (32 Inch)", "निंबाहेड़ा", "14-02-26", "JORA-77-001", "ज़ोरावर सिंह बना", "6376858028", "15-08-1990", "4528", "Active", "#REF!", "14-02-26", "2026-02-14", "14-08-26", "180", "380", "10", "5", "365", "500", "1", "1", "999", "500", "500", "1", "0", "0", "14-02-26", "1", "500", "999", "500", "2026-02-14", "Delivered", "DPSG ग्रुप निम्बाहेड़ा में आपका स्वागत है।"],
            };

            useEffect(() => {
                const timer = setInterval(() => setNow(new Date()), 1000);
                const id = new URLSearchParams(window.location.search).get('id');
                
                setTimeout(() => {
                    if (id) {
                        const serial = id.padStart(4, '0');
                        const row = dpsgDatabase[serial] || generateMock(serial);
                        setMember(row);
                        setStatus("view");
                        if (isWinner(row[36])) { fireworks(); }
                    } else { setStatus("search"); }
                }, 800);
                return () => clearInterval(timer);
            }, []);

            const generateMock = (s) => {
                let r = new Array(39).fill("");
                r[0] = s; r[1] = `DPSG-26-ID-${s}`;
                r[3] = parseInt(s) <= 50 ? "VIP Card" : "Standard Card";
                return r;
            };

            const fireworks = () => {
                const duration = 7 * 1000;
                const end = Date.now() + duration;
                (function frame() {
                    confetti({ particleCount: 3, angle: 60, spread: 55, origin: { x: 0 }, colors: ['#bf953f', '#ffffff', '#2563eb'] });
                    confetti({ particleCount: 3, angle: 120, spread: 55, origin: { x: 1 }, colors: ['#bf953f', '#ffffff', '#2563eb'] });
                    if (Date.now() < end) requestAnimationFrame(frame);
                }());
            };

            const clean = (val) => (val && val.toString().trim() !== "" && val !== "#REF!" && val !== "Pending") ? val : dict[lang].infoUp;
            const isWinner = (d) => { if (!d || d.includes("जल्द") || d.trim() === "") return false; return new Date() >= new Date(d); };
            const maskData = (v, type) => {
                const s = clean(v);
                if (s.includes("update") || s.includes("अपडेट")) return s;
                if (type === "phone") return "********" + v.toString().slice(-2);
                if (type === "aadhar") return "XXXX-XXXX-XX" + v.toString().slice(-2);
                return s;
            };

            if (status === "loading") return (
                <div className="h-screen flex items-center justify-center bg-[#020617]">
                    <div className="w-14 h-14 border-4 border-blue-600 border-t-transparent rounded-full animate-spin"></div>
                </div>
            );

            const t = dict[lang];

            return (
                <div className="min-h-screen flex flex-col items-center p-4 relative">
                    {/* Professional Navbar */}
                    <div className="w-full max-w-md no-print flex justify-between items-center mb-8 border-b border-white/5 pb-4">
                        <div className="flex flex-col">
                            <span className="text-[10px] font-black uppercase text-gray-500 tracking-widest">{now.toLocaleDateString(lang === 'hi' ? 'hi-IN' : 'en-US')}</span>
                            <span className="text-blue-500 font-black text-xs uppercase tracking-tighter">{now.toLocaleTimeString()}</span>
                        </div>
                        <div className="bg-white/5 p-1 rounded-xl flex space-x-1 border border-white/10">
                            <button onClick={()=>setLang('hi')} className={`px-4 py-1.5 rounded-lg text-[10px] uppercase transition-all ${lang === 'hi' ? 'lang-active shadow-lg' : 'text-gray-500'}`}>हिन्दी</button>
                            <button onClick={()=>setLang('en')} className={`px-4 py-1.5 rounded-lg text-[10px] uppercase transition-all ${lang === 'en' ? 'lang-active shadow-lg' : 'text-gray-500'}`}>ENG</button>
                        </div>
                    </div>

                    <div className="max-w-md w-full z-10">
                        {/* Header Section */}
                        <div className="text-center mb-10 no-print">
                            <h1 className="text-3xl font-black italic uppercase leading-none tracking-tighter text-white">
                                {t.brand}
                                <span className="block gold-text text-xl mt-1 tracking-[0.25em]">NIMBAHERA</span>
                            </h1>
                            <div className="mt-5 px-5 py-3 bg-blue-600/5 border border-blue-500/20 rounded-2xl">
                                <p className="text-[10px] font-bold text-blue-300 italic">"{t.slogan}"</p>
                            </div>
                        </div>

                        {status === "search" ? (
                            <div className="bg-white/5 backdrop-blur-3xl rounded-[3rem] p-10 text-center animate-in zoom-in duration-500 no-print border border-white/10 shadow-2xl">
                                <h2 className="text-xl font-black uppercase mb-8 text-white tracking-widest italic">{t.enter}</h2>
                                <input type="number" placeholder="0001" className="w-full bg-black/40 border border-white/10 rounded-2xl py-5 text-center text-4xl font-black mb-8 outline-none focus:border-yellow-500 text-white" onChange={(e)=>setSearchId(e.target.value)} />
                                <button onClick={()=>{window.location.href=`?id=${searchId}`}} className="w-full bg-blue-600 hover:bg-blue-500 py-5 rounded-xl font-black uppercase text-xs tracking-widest text-white shadow-xl transition-all active:scale-95">{t.find}</button>
                            </div>
                        ) : (
                            <div className="space-y-6 animate-in slide-in-from-bottom-10 duration-700">
                                
                                {/* 1. Official Notice (Col 39) */}
                                <div className="bg-yellow-500/10 border border-yellow-500/20 p-5 rounded-[2.5rem] no-print relative">
                                    <div className="flex items-center space-x-2 mb-2 text-yellow-500">
                                        <i className="fa-solid fa-bullhorn text-xs animate-pulse"></i>
                                        <span className="text-[9px] font-black uppercase tracking-widest">{t.notice}</span>
                                    </div>
                                    <p className="text-[11px] font-bold text-gray-200 italic leading-relaxed">{clean(member[38])}</p>
                                </div>

                                {/* 2. THE PREMIUM RECEIPT */}
                                <div id="receipt-box" className="receipt-body p-8 shadow-2xl relative overflow-hidden">
                                    <div className="text-center border-b-2 border-dashed border-gray-200 pb-5 mb-8">
                                        <h3 className="font-black text-2xl tracking-tighter text-blue-600 italic uppercase">{t.receipt}</h3>
                                        <p className="text-[8px] font-bold text-gray-400 uppercase tracking-[0.4em] mt-1">{t.city}</p>
                                    </div>

                                    <div className="space-y-8">
                                        {/* Membership Info */}
                                        <div className="flex justify-between items-start">
                                            <div className="space-y-1">
                                                <p className="text-[8px] text-gray-400 font-black uppercase tracking-widest">{t.mId}</p>
                                                <p className="text-2xl font-black text-slate-900 tracking-tighter">{clean(member[1])}</p>
                                            </div>
                                            <div className="text-right">
                                                <p className="text-[8px] text-gray-400 font-black uppercase tracking-widest">{t.cType}</p>
                                                <p className="text-[10px] font-black bg-blue-50 text-blue-700 px-4 py-1.5 rounded-full border border-blue-100 uppercase">{clean(member[3])}</p>
                                            </div>
                                        </div>

                                        {/* Service Points (Main Center) */}
                                        <div className="bg-blue-600 rounded-[2.5rem] p-6 text-center text-white shadow-2xl shadow-blue-500/30">
                                            <p className="text-[9px] font-black uppercase tracking-widest mb-1 opacity-70">{t.ptsRem}</p>
                                            <div className="flex justify-center items-end mb-4">
                                                <span className="text-6xl font-black tracking-tighter">{clean(member[21])}</span>
                                            </div>
                                            <div className="grid grid-cols-2 gap-4 pt-4 border-t border-white/10 text-[8px] font-black uppercase tracking-widest">
                                                <div className="flex flex-col">
                                                    <span className="opacity-60 mb-1">{t.ptsTot}</span>
                                                    <span className="text-xs">{clean(member[18])}</span>
                                                </div>
                                                <div className="flex flex-col border-l border-white/10">
                                                    <span className="opacity-60 mb-1">{t.ptsUsed}</span>
                                                    <span className="text-xs">{(parseInt(member[19]) || 0) + (parseInt(member[20]) || 0)}</span>
                                                </div>
                                            </div>
                                        </div>

                                        {/* Member Profile */}
                                        <div className="grid grid-cols-2 gap-8 border-y border-slate-50 py-6">
                                            <div>
                                                <p className="text-[8px] text-gray-400 font-black uppercase tracking-widest mb-2">{t.name}</p>
                                                <p className="text-[15px] font-black text-slate-900 uppercase italic leading-tight">{clean(member[8])}</p>
                                            </div>
                                            <div className="text-right">
                                                <p className="text-[8px] text-gray-400 font-black uppercase tracking-widest mb-2">{t.location}</p>
                                                <p className="text-[15px] font-black text-slate-900 uppercase italic leading-tight">{clean(member[5])}</p>
                                            </div>
                                        </div>

                                        {/* Requested Column Stats (7 & 38) */}
                                        <div className="grid grid-cols-2 gap-4 bg-slate-50 p-4 rounded-3xl border border-slate-100">
                                            <div>
                                                <p className="text-[7px] text-gray-400 font-black uppercase mb-1 tracking-widest">{t.soldDate}</p>
                                                <p className="text-[11px] font-black text-slate-700 uppercase italic tracking-tighter">{clean(member[6])}</p>
                                            </div>
                                            <div className="text-right border-l border-slate-200 pl-4">
                                                <p className="text-[7px] text-gray-400 font-black uppercase mb-1 tracking-widest">{t.pStatus}</p>
                                                <p className="text-[11px] font-black text-blue-600 uppercase italic tracking-tighter">{clean(member[37])}</p>
                                            </div>
                                        </div>

                                        {/* Important Dates */}
                                        <div className="grid grid-cols-3 gap-2 bg-slate-900 text-white p-4 rounded-2xl text-center shadow-lg">
                                            <div className="flex flex-col">
                                                <span className="text-[6px] uppercase font-black opacity-50 mb-1">{t.active}</span>
                                                <span className="text-[9px] font-bold">{clean(member[15])}</span>
                                            </div>
                                            <div className="flex flex-col border-x border-white/10">
                                                <span className="text-[6px] uppercase font-black opacity-50 mb-1">{t.exp}</span>
                                                <span className="text-[9px] font-bold text-red-400">{clean(member[16])}</span>
                                            </div>
                                            <div className="flex flex-col">
                                                <span className="text-[6px] uppercase font-black opacity-50 mb-1">{t.days}</span>
                                                <span className="text-[9px] font-bold">{clean(member[17])}</span>
                                            </div>
                                        </div>

                                        {/* Footer Masking */}
                                        <div className="flex justify-between items-center text-[8px] text-slate-400 border-t border-slate-100 pt-5 italic font-bold no-print">
                                            <span>{t.ph}: {maskData(member[9], "phone")}</span>
                                            <span>{t.ad}: {maskData(member[11], "aadhar")}</span>
                                        </div>

                                        {/* PRINT BUTTON */}
                                        <div className="mt-8 text-center no-print">
                                            <button onClick={()=>window.print()} className="bg-slate-100 hover:bg-slate-200 text-slate-900 px-8 py-3 rounded-full text-[10px] font-black uppercase flex items-center justify-center mx-auto space-x-3 transition-all active:scale-95 shadow-md border border-slate-200">
                                                <i className="fa-solid fa-print"></i>
                                                <span>{t.btnGen}</span>
                                            </button>
                                        </div>
                                    </div>
                                </div>

                                {/* 3. PRIZE BOX (Controlled by Draw Date Col 37) */}
                                {isWinner(member[36]) ? (
                                    <div className="bg-gradient-to-br from-yellow-500 to-yellow-700 rounded-[3.5rem] p-10 text-center shadow-2xl no-print border-4 border-yellow-200 transform scale-105">
                                        <i className="fa-solid fa-trophy text-7xl text-white mb-6 drop-shadow-xl animate-bounce"></i>
                                        <p className="text-[10px] text-white/70 font-black uppercase mb-1 tracking-[0.4em] animate-pulse">{t.congrats}</p>
                                        <h2 className="text-4xl font-black text-white uppercase tracking-tighter leading-none drop-shadow-xl">{clean(member[4])}</h2>
                                    </div>
                                ) : (
                                    <div className="bg-white/5 border border-dashed border-white/10 rounded-[3rem] p-10 text-center no-print opacity-60">
                                        <i className="fa-solid fa-gift text-gray-600 mb-4 text-3xl"></i>
                                        <p className="text-[10px] text-gray-500 font-bold uppercase tracking-[0.3em] leading-loose italic">{t.drawMsg}</p>
                                    </div>
                                )}

                                {/* 4. MASTER ADMIN VAULT */}
                                {!isAdmin ? (
                                    <div className="bg-white/5 rounded-[3rem] p-10 text-center space-y-6 shadow-2xl border border-white/5 no-print">
                                        <p className="text-[9px] text-gray-500 font-black uppercase tracking-[0.5em]">Administrator Login Required</p>
                                        <div className="space-y-4">
                                            <input type="password" placeholder="PIN" className="w-full bg-black/60 border border-white/10 rounded-2xl py-5 text-center text-white outline-none focus:border-blue-500 text-4xl font-bold tracking-[0.5em]" onChange={(e)=>setPinInput(e.target.value)} />
                                            <button onClick={()=>{if(pinInput===ADMIN_PIN) setIsAdmin(true); else alert("Access Denied: Invalid Security PIN.");}} className="w-full bg-white text-black font-black py-4 rounded-xl text-[10px] uppercase tracking-[0.4em] shadow-2xl transition-all active:scale-95">Secure Unlock</button>
                                        </div>
                                    </div>
                                ) : (
                                    <div className="bg-slate-950 rounded-[4rem] p-10 space-y-4 shadow-2xl border border-yellow-500/20 max-h-[600px] overflow-y-auto no-print relative">
                                        <div className="flex justify-between items-center border-b border-yellow-500/30 pb-5 mb-6 sticky top-0 bg-slate-950 z-20">
                                            <h3 className="text-[12px] font-black text-yellow-500 uppercase italic tracking-widest flex items-center"><i className="fa-solid fa-shield-check mr-2"></i> {t.adminHeader}</h3>
                                            <button onClick={()=>setIsAdmin(false)} className="text-[10px] text-white bg-red-600 px-4 py-2 rounded-xl uppercase font-black shadow-lg">Close</button>
                                        </div>
                                        <div className="space-y-4">
                                            {colHeaders.map((name, idx) => (
                                                <div key={idx} className="flex justify-between items-center text-[10px] py-2 border-b border-white/5 last:border-0 leading-relaxed">
                                                    <span className="text-gray-500 uppercase font-black pr-4">{idx + 1}. {name}</span>
                                                    <span className={`text-right font-black ${idx === 4 ? 'text-green-400 font-bold' : idx === 8 ? 'text-blue-400' : 'text-white'}`}>
                                                        {member[idx] || "---"}
                                                    </span>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                )}
                            </div>
                        )}
                        <p className="text-center text-[8px] text-gray-800 font-black uppercase mt-16 tracking-[1em] italic opacity-30 no-print">DPSG NIMBAHERA | J. ZORAWAR SINGH</p>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
