        body { font-family: 'Inter', sans-serif; transition: background-color 0.3s; margin: 0; }  
        
        /* Premium Receipt Card Style */
        .receipt-card { 
            border: 1px solid #e2e8f0; 
            border-radius: 2.5rem; 
            background: #ffffff; 
            box-shadow: 0 20px 40px -10px rgba(37, 99, 235, 0.1), 0 0 20px rgba(0,0,0,0.02);

            overflow: hidden;

        }
        
        @media print { .no-print { display: none !important; } .receipt-card { border: none !important; box-shadow: none !important; width: 100% !important; margin: 0 !important; } .receipt-card::before { display: none; } }

        useEffect(() => {  
            const canvas = canvasRef.current; if(!canvas) return; const ctx = canvas.getContext('2d');  
            canvas.width = canvas.parentElement.offsetWidth; canvas.height = canvas.parentElement.offsetHeight;  
            const grad = ctx.createLinearGradient(0, 0, canvas.width, canvas.height);  
            grad.addColorStop(0, '#D4AF37'); grad.addColorStop(0.5, '#FFF8DC'); grad.addColorStop(1, '#B8860B');  
            ctx.fillStyle = grad; ctx.fillRect(0, 0, canvas.width, canvas.height);  
            
            // Premium Scratch Overlay Pattern
            ctx.strokeStyle = "rgba(255,255,255,0.2)"; ctx.lineWidth = 2;
            for(let i=0; i<canvas.width; i+=20) { ctx.beginPath(); ctx.moveTo(i, 0); ctx.lineTo(i-50, canvas.height); ctx.stroke(); }

            ctx.font = "900 32px Inter"; ctx.fillStyle = "#4a3b01"; ctx.textAlign = "center";  
            ctx.shadowColor="rgba(255,255,255,0.8)"; ctx.shadowBlur=10;
            ctx.fillText("SCRATCH HERE", canvas.width / 2, canvas.height / 2);  
            ctx.shadowBlur=0; // Reset

            const scratch = (e) => {  
                if (isRevealed) return; const rect = canvas.getBoundingClientRect();  
                const x = (e.pageX || (e.touches && e.touches[0].pageX)) - rect.left;  
                const y = (e.pageY || (e.touches && e.touches[0].pageY)) - rect.top;  
                ctx.globalCompositeOperation = 'destination-out'; ctx.beginPath(); 
                ctx.arc(x, y, 80, 0, Math.PI * 2); ctx.fill();  
                const pixels = ctx.getImageData(0, 0, canvas.width, canvas.height).data;  
                let count = 0; for (let i = 0; i < pixels.length; i += 40) if (pixels[i + 3] === 0) count++;  
                if (count > (pixels.length / 40) * 0.40) { setIsRevealed(true); onComplete(); }  
            };  
            canvas.addEventListener('mousemove', scratch); canvas.addEventListener('touchmove', scratch, {passive: true});  
        }, [isRevealed]);  
        return ( <div className="scratch-container"> {!isRevealed && <canvas ref={canvasRef} className="scratch-canvas" />} <div className="scratch-content">{children}</div> </div> );

            } else if (lock === "DPSG_GIFT") {

            }
        }, [t.pending]);

        useEffect(() => {  
            fetch(MAIN_CSV + "&t=" + Date.now()).then(r => r.text()).then(txt => {  
                Papa.parse(txt, { complete: (res) => {

        // Smart Empty Data Handler

        return (  
            <div className={`min-h-screen pb-10 ${theme === 'dark' ? 'bg-slate-900 text-white' : 'bg-slate-50 text-slate-900'}`}>

                    {status === "search" ? (  
                        <div className="bg-white dark:bg-slate-800 p-12 rounded-[2.5rem] shadow-2xl text-center border-t-4 border-blue-600">  
                            <div className="bg-blue-50 w-24 h-24 mx-auto rounded-full flex items-center justify-center mb-6 shadow-inner"><i className="fa-solid fa-id-card text-5xl text-blue-600"></i></div>
                            <h2 className="text-2xl font-black mb-8 uppercase tracking-wider">{t.searchTitle}</h2>  
                            <input id="sid" type="text" className="w-full bg-slate-50 dark:bg-slate-700 border-2 border-slate-200 focus:border-blue-500 rounded-2xl py-5 text-center mb-6 text-xl font-bold uppercase outline-none transition-all shadow-sm" placeholder="DPSG-26-XXXX" />  
                            <button onClick={() => window.location.href=`?id=${document.getElementById('sid').value}`} className="w-full bg-gradient-to-r from-blue-600 to-indigo-700 py-5 rounded-2xl font-black text-white shadow-lg hover:shadow-xl hover:scale-[1.02] transition-all tracking-widest">{t.searchBtn}</button>  
                        </div>  
                    ) : (  
                        <div className="space-y-8 animate-in slide-in-from-bottom-4 duration-700">  
                            <div className="text-center bg-white dark:bg-slate-800 p-6 rounded-[2rem] shadow-md border border-slate-100 dark:border-slate-700">  
                                <h1 className="text-3xl font-black italic uppercase bg-gradient-to-r from-blue-800 to-blue-500 bg-clip-text text-transparent leading-tight">{t.brand}</h1>  
                                <p className="text-yellow-600 dark:text-yellow-400 font-bold tracking-[0.2em] mt-2 uppercase text-xs">{t.service}</p>  
                                <div className="mt-4 bg-blue-50 dark:bg-blue-900/30 py-2 px-4 rounded-full inline-block border border-blue-100 dark:border-blue-800">
                                    <p className="text-blue-800 dark:text-blue-300 font-black italic text-xs tracking-wide">{t.slogan}</p>
                                </div>
                            </div>  
                            
                            {/* 4 Premium Icons Section */}
                            <div className="no-print grid grid-cols-4 gap-3 my-6">
                                <button onClick={() => openForm(t.emitra)} className="group flex flex-col items-center justify-center bg-white dark:bg-slate-800 py-4 px-2 rounded-[1.5rem] shadow-md border-b-4 border-orange-400 hover:bg-orange-50 dark:hover:bg-slate-700 transition-all">
                                    <div className="w-12 h-12 bg-gradient-to-br from-orange-100 to-orange-200 text-orange-600 rounded-full flex items-center justify-center text-xl mb-2 shadow-inner group-hover:scale-110 transition-transform"><i className="fa-solid fa-desktop"></i></div>
                                    <span className="text-[10px] sm:text-xs font-black text-slate-700 dark:text-slate-300 text-center">{t.emitra}</span>
                                </button>
                                <button onClick={() => openForm(t.dataRec)} className="group flex flex-col items-center justify-center bg-white dark:bg-slate-800 py-4 px-2 rounded-[1.5rem] shadow-md border-b-4 border-blue-500 hover:bg-blue-50 dark:hover:bg-slate-700 transition-all">
                                    <div className="w-12 h-12 bg-gradient-to-br from-blue-100 to-blue-200 text-blue-600 rounded-full flex items-center justify-center text-xl mb-2 shadow-inner group-hover:scale-110 transition-transform"><i className="fa-solid fa-hard-drive"></i></div>
                                    <span className="text-[10px] sm:text-xs font-black text-slate-700 dark:text-slate-300 text-center">{t.dataRec}</span>
                                </button>
                                <button onClick={() => openForm(t.mobileSvc)} className="group flex flex-col items-center justify-center bg-white dark:bg-slate-800 py-4 px-2 rounded-[1.5rem] shadow-md border-b-4 border-purple-500 hover:bg-purple-50 dark:hover:bg-slate-700 transition-all">
                                    <div className="w-12 h-12 bg-gradient-to-br from-purple-100 to-purple-200 text-purple-600 rounded-full flex items-center justify-center text-xl mb-2 shadow-inner group-hover:scale-110 transition-transform"><i className="fa-solid fa-mobile-screen-button"></i></div>
                                    <span className="text-[10px] sm:text-xs font-black text-slate-700 dark:text-slate-300 text-center">{t.mobileSvc}</span>
                                </button>
                                <button onClick={() => openForm(t.govtScm)} className="group flex flex-col items-center justify-center bg-white dark:bg-slate-800 py-4 px-2 rounded-[1.5rem] shadow-md border-b-4 border-green-500 hover:bg-green-50 dark:hover:bg-slate-700 transition-all">
                                    <div className="w-12 h-12 bg-gradient-to-br from-green-100 to-green-200 text-green-600 rounded-full flex items-center justify-center text-xl mb-2 shadow-inner group-hover:scale-110 transition-transform"><i className="fa-solid fa-building-columns"></i></div>
                                    <span className="text-[10px] sm:text-xs font-black text-slate-700 dark:text-slate-300 text-center">{t.govtScm}</span>
                                </button>
                            </div>

                            {/* Scratch & Lock Section */}
                            <div className="no-print bg-white dark:bg-slate-800 p-8 rounded-[3rem] shadow-[0_10px_40px_-15px_rgba(0,0,0,0.1)] border border-slate-100 dark:border-slate-700">
                                <p className="text-red-600 bg-red-50 dark:bg-red-900/20 py-2 px-4 rounded-full font-black text-[11px] mb-6 text-center animate-pulse uppercase border border-red-100">{t.warning}</p>
                                <div className={`p-2 rounded-[2.5rem] ${prize.isLocked ? 'glass-lock relative' : prize.colorClass}`}>  
                                    {prize.isLocked ? ( 
                                        <div className="p-24 text-center text-slate-500 font-bold italic flex flex-col items-center justify-center min-h-[400px]"> 
                                            <div className="w-24 h-24 bg-white/50 dark:bg-slate-700/50 rounded-full flex items-center justify-center mb-6 shadow-lg border-2 border-slate-200 dark:border-slate-600">
                                                <i className="fa-solid fa-lock text-5xl text-slate-400 dark:text-slate-300"></i>
                                            </div>
                                            <p className="text-lg tracking-wide">{prize.msg}</p> 
                                        </div> 
                                    ) : (  
                                        <ScratchCard onComplete={() => confetti({particleCount:300, spread:100, origin:{y:0.6}})}>  
                                            <div className="p-8 text-center w-full bg-white dark:bg-slate-800 flex flex-col items-center">
                                                <div className="bg-gradient-to-r from-blue-700 to-blue-500 text-white px-10 py-3 rounded-full font-black text-lg mb-8 uppercase shadow-[0_10px_20px_-10px_rgba(37,99,235,0.6)] tracking-[0.2em]">{prize.highlight}</div>  
                                                <img src={prize.img} className="w-full max-h-[480px] object-contain mb-8 filter drop-shadow-xl" alt="Prize" />  
                                                <p className="text-[15px] font-bold leading-relaxed whitespace-pre-line px-4 text-slate-800 dark:text-slate-200">{prize.msg}</p>
                                            </div>
                                        </ScratchCard>  
                                    )}  
                                </div>
                            </div>

                            {/* WhatsApp & Location Buttons Section */}
                            <div className="no-print grid grid-cols-2 gap-4 my-4">
                                <button onClick={() => openForm('WhatsApp (HELP)')} className="bg-gradient-to-r from-green-500 to-green-600 hover:from-green-600 hover:to-green-700 text-white font-black py-4 rounded-2xl shadow-lg flex items-center justify-center text-sm transition-all transform hover:scale-[1.02]">
                                    <i className="fa-brands fa-whatsapp text-2xl mr-2"></i> HELP
                                </button>
                                <button onClick={() => openForm('LOCATION')} className="bg-gradient-to-r from-red-500 to-red-600 hover:from-red-600 hover:to-red-700 text-white font-black py-4 rounded-2xl shadow-lg flex items-center justify-center text-sm transition-all transform hover:scale-[1.02]">
                                    <i className="fa-solid fa-location-dot text-2xl mr-2"></i> LOCATION
                                </button>
                            </div>

                            {/* Premium Digital Receipt */}
                            <div id="receipt" className="receipt-card p-8 sm:p-12 text-left dark:bg-white dark:text-slate-900 mt-8">  
                                <div className="text-center border-b-2 border-dashed border-slate-200 pb-8 mb-8">
                                    <h3 className="font-black text-2xl sm:text-3xl bg-gradient-to-r from-blue-800 to-blue-500 bg-clip-text text-transparent italic uppercase tracking-tight">{t.receipt}</h3>
                                    <p className="text-[10px] font-black text-slate-400 uppercase tracking-[0.4em] mt-3 bg-slate-50 inline-block px-4 py-1 rounded-full">DPSG NIMBAHERA</p>
                                </div>  
                                
                                <div className="grid grid-cols-2 gap-y-10 gap-x-4 text-sm border-b border-slate-100 pb-10">  
                                    <div><p className="text-[10px] text-slate-400 font-black uppercase mb-1">ID IDENTITY</p><p className="text-xl sm:text-2xl font-black text-blue-900">{clean(member[1])}</p></div>  
                                    <div className="text-right"><p className="text-[10px] text-slate-400 font-black uppercase mb-1">Category</p><p className="font-black text-blue-700 px-5 py-1.5 border-2 border-blue-100 rounded-full bg-blue-50 inline-block shadow-sm">{clean(member[3])}</p></div>  
                                    
                                    <div><p className="text-[10px] text-slate-400 font-black uppercase mb-1">Customer Name</p><p className="font-black uppercase text-lg text-slate-800">{clean(member[8])}</p></div>  
                                    <div className="text-right"><p className="text-[10px] text-slate-400 font-black uppercase mb-1">Village</p><p className="font-black uppercase text-lg text-slate-800">{clean(member[5])}</p></div>  
                                    
                                    <div><p className="text-[10px] text-slate-400 font-black uppercase mb-1">Secure Mobile</p><p className="font-bold tracking-widest text-slate-600 bg-slate-50 px-2 py-1 rounded inline-block border">{mask(member[9])}</p></div>
                                    <div className="text-right"><p className="text-[10px] text-slate-400 font-black uppercase mb-1">Secure Aadhar</p><p className="font-bold tracking-widest text-slate-600 bg-slate-50 px-2 py-1 rounded inline-block border">{mask(member[11])}</p></div>
                                    
                                    <div><p className="text-[10px] text-slate-400 font-black uppercase mb-1">{t.active}</p><p className="font-bold text-slate-700">{clean(member[15])}</p></div>  
                                    
                                    {/* Highlighted Expiry Date */}
                                    <div className="text-right">
                                        <p className="text-[10px] text-slate-400 font-black uppercase mb-1">{t.expiry}</p>
                                        <p className="font-black text-red-600 bg-red-100 border border-red-200 shadow-sm px-3 py-1 rounded-lg inline-block text-base tracking-wide">{clean(member[16])}</p>
                                    </div>  
                                </div>
                                
                                <div className="grid grid-cols-3 gap-3 sm:gap-5 my-10">
                                    <div className="bg-gradient-to-br from-blue-500 to-blue-700 text-white p-4 sm:p-6 rounded-3xl text-center shadow-[0_10px_20px_-10px_rgba(37,99,235,0.6)]"><p className="text-[9px] font-bold opacity-80 uppercase mb-1 tracking-wider">Points</p><p className="text-2xl sm:text-3xl font-black">{clean(member[18])}</p></div>
                                    <div className="bg-gradient-to-br from-slate-700 to-slate-900 text-white p-4 sm:p-6 rounded-3xl text-center shadow-[0_10px_20px_-10px_rgba(15,23,42,0.6)]"><p className="text-[9px] font-bold opacity-80 uppercase mb-1 tracking-wider">Used</p><p className="text-2xl sm:text-3xl font-black">{(parseInt(member[18])-parseInt(member[21]))||0}</p></div>
                                    <div className="bg-gradient-to-br from-emerald-500 to-emerald-700 text-white p-4 sm:p-6 rounded-3xl text-center shadow-[0_10px_20px_-10px_rgba(16,185,129,0.6)]"><p className="text-[9px] font-bold opacity-80 uppercase mb-1 tracking-wider">Balance</p><p className="text-2xl sm:text-3xl font-black">{clean(member[21])}</p></div>
                                </div>
                                
                                <div className="bg-blue-50/80 p-6 sm:p-8 rounded-[2rem] border-2 border-blue-100 my-8 font-bold italic text-[12px] space-y-4 shadow-inner">
                                    <p className="text-blue-800 font-black uppercase mb-4 flex items-center text-sm"><div className="w-8 h-8 bg-blue-200 text-blue-700 rounded-full flex items-center justify-center mr-3"><i className="fa-solid fa-crown"></i></div> {t.facTitle}</p>
                                    {(() => { const cat = (member[3] || "").toLowerCase(); let key = (cat.includes("vip") || cat.includes("500")) ? "VIP" : (cat.includes("gold") || cat.includes("100")) ? "Gold" : "Silver"; return cardSpecs[key].hi.map((ben, i) => ( <div key={i} className="flex items-start py-2 border-b border-blue-200/50 last:border-0 text-slate-700"><i className="fa-solid fa-circle-check text-green-500 mr-3 mt-0.5 text-lg"></i>{ben}</div> )); })()}
                                </div>
                                
                                <div className="relative overflow-hidden bg-slate-900 text-white p-10 rounded-[2.5rem] text-center mb-10 shadow-2xl border-4 border-slate-800">
                                    <div className="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-transparent via-yellow-400 to-transparent opacity-50"></div>
                                    <p className="text-[11px] opacity-60 uppercase mb-2 tracking-[0.3em] font-bold">{t.draw}</p>
                                    <p className="text-3xl sm:text-4xl font-black text-transparent bg-clip-text bg-gradient-to-r from-yellow-300 to-yellow-600 italic uppercase tracking-widest drop-shadow-md">{clean(member[36])}</p>
                                </div>
                                
                                <div className="bg-slate-50 p-6 sm:p-10 rounded-[2.5rem] border border-slate-200 mb-10 text-[10px] sm:text-[11px] font-bold italic space-y-3 text-slate-500 shadow-sm">
                                    <h4 className="text-[12px] font-black uppercase mb-6 border-b-2 border-slate-200 pb-3 flex items-center text-slate-800"><i className="fa-solid fa-scale-balanced mr-3 text-blue-600 text-lg"></i> {t.tTitle}</h4>
                                    <div className="grid gap-2">
                                        <p>{t.t1}</p><p>{t.t2}</p><p>{t.t3}</p><p>{t.t4}</p><p>{t.t5}</p><p>{t.t6}</p><p>{t.t7}</p><p>{t.t8}</p><p>{t.t9}</p><p>{t.t10}</p>
                                    </div>
                                </div>
                                <button onClick={()=>window.print()} className="no-print w-full bg-gradient-to-r from-blue-600 to-indigo-700 text-white py-6 rounded-full font-black uppercase shadow-xl hover:shadow-2xl active:scale-95 text-lg transition-all tracking-widest flex items-center justify-center"><i className="fa-solid fa-print mr-3 text-xl"></i> Print Official Receipt</button>
                            </div>

                            {/* Admin Panel */}
                            <div className="no-print pt-10 pb-20 flex flex-col items-center">  
                                {!isAdmin && <button onClick={()=>setShowPin(!showPin)} className="p-8 bg-white dark:bg-slate-800 rounded-full shadow-lg border-2 border-slate-100 dark:border-slate-700 opacity-30 hover:opacity-100 transition-all hover:scale-110"><i className="fa-solid fa-fingerprint text-5xl text-blue-600"></i></button>}  
                                {showPin && !isAdmin && ( <div className="mt-6 bg-white dark:bg-slate-800 p-8 rounded-[2rem] border-2 border-slate-100 dark:border-slate-700 w-full animate-in zoom-in shadow-2xl"><input type="password" id="adminPin" className="w-full bg-slate-50 dark:bg-slate-700 rounded-2xl py-5 text-center mb-4 font-black outline-none text-2xl tracking-[0.5em] border focus:border-blue-500 transition-all" placeholder="PIN" /><button onClick={()=>{document.getElementById('adminPin').value===MASTER_PIN?setIsAdmin(true):alert("Wrong Pin!");}} className="w-full bg-slate-900 text-white py-5 rounded-2xl font-black uppercase tracking-widest hover:bg-black transition-colors">Unlock Database</button></div> )}
                                {isAdmin && ( <div className="w-full mt-6 bg-white dark:bg-slate-800 border-2 border-slate-100 dark:border-slate-700 rounded-[2rem] p-6 sm:p-10 text-left shadow-2xl overflow-hidden border-t-8 border-t-blue-600"><div className="flex justify-between items-center mb-8 border-b-2 border-slate-100 dark:border-slate-700 pb-4"><h3 className="font-black text-sm text-blue-600 uppercase tracking-widest flex items-center"><i className="fa-solid fa-database mr-2"></i> Master Panel</h3><button onClick={()=>setIsAdmin(false)} className="text-red-500 font-bold text-[11px] uppercase border border-red-200 bg-red-50 dark:bg-red-900/20 px-4 py-2 rounded-full hover:bg-red-100 transition-colors">Logout</button></div><div className="grid gap-4 max-h-[500px] overflow-y-auto pr-2 custom-scroll">{member.map((v, i) => ( <div key={i} className="p-5 bg-slate-50 dark:bg-slate-700 rounded-2xl border border-slate-200 dark:border-slate-600 hover:border-blue-300 transition-colors"><p className="text-[9px] text-slate-400 font-black uppercase mb-1 tracking-wider">{headers[i] || `Index ${i}`}</p><p className="font-bold text-md text-slate-800 dark:text-slate-100">{v||"---"}</p></div> ))}</div></div> )}
                            </div>
                        </div>
                    )}

                    {/* Premium Formspree Popup Modal */}
                    {showForm && (
                        <div className="fixed inset-0 z-50 flex items-center justify-center bg-slate-900/80 backdrop-blur-sm p-4 animate-in fade-in duration-200">
                            <div className="bg-white dark:bg-slate-800 p-8 rounded-[2.5rem] w-full max-w-md relative shadow-2xl animate-in zoom-in-95 duration-300 border border-slate-200 dark:border-slate-700">
                                <button onClick={() => setShowForm(false)} className="absolute top-5 right-5 w-10 h-10 bg-slate-100 dark:bg-slate-700 text-slate-500 hover:bg-red-100 hover:text-red-600 rounded-full font-black text-lg flex items-center justify-center transition-all"><i className="fa-solid fa-xmark"></i></button>
                                
                                <div className="text-center mb-8 border-b-2 border-dashed border-slate-200 dark:border-slate-700 pb-6">
                                    <div className="w-16 h-16 bg-blue-50 dark:bg-blue-900/30 text-blue-600 rounded-full flex items-center justify-center mx-auto mb-3 text-2xl"><i className="fa-solid fa-headset"></i></div>
                                    <h3 className="text-xl font-black text-slate-800 dark:text-white uppercase tracking-widest">{formType}</h3>
                                </div>

                                <form action="https://formspree.io/f/xwvndvoe" method="POST" encType="multipart/form-data" className="space-y-6 text-left">
                                    <input type="hidden" name="Service_Requested" value={formType} />
                                    <div>
                                        <label className="block text-[11px] font-black uppercase text-slate-500 dark:text-slate-400 mb-2 tracking-widest">Mobile Number <span className="text-red-500 text-sm">*</span></label>
                                        <div className="relative">
                                            <i className="fa-solid fa-phone absolute left-4 top-1/2 transform -translate-y-1/2 text-slate-400"></i>
                                            <input type="tel" name="Mobile" required className="w-full border-2 border-slate-200 dark:border-slate-600 bg-slate-50 dark:bg-slate-900 py-4 pl-12 pr-4 rounded-2xl outline-none focus:border-blue-500 font-bold text-lg transition-all" placeholder={t.placeholder} />
                                        </div>
                                    </div>
                                    <div>
                                        <label className="block text-[11px] font-black uppercase text-slate-500 dark:text-slate-400 mb-2 tracking-widest">Describe Problem <span className="text-red-500 text-sm">*</span></label>
                                        <textarea name="Problem" required rows="3" className="w-full border-2 border-slate-200 dark:border-slate-600 bg-slate-50 dark:bg-slate-900 p-4 rounded-2xl outline-none focus:border-blue-500 font-bold text-md transition-all resize-none" placeholder="अपनी समस्या यहाँ लिखें..."></textarea>
                                    </div>
                                    <div>
                                        <label className="block text-[11px] font-black uppercase text-slate-500 dark:text-slate-400 mb-2 tracking-widest">Upload Files (Photos/Videos)</label>
                                        <input type="file" name="Files" multiple accept="image/*,video/*" className="w-full text-sm text-slate-500 file:mr-4 file:py-3 file:px-6 file:rounded-full file:border-0 file:text-xs file:font-black file:uppercase file:bg-blue-100 file:text-blue-700 hover:file:bg-blue-200 transition-all cursor-pointer bg-slate-50 dark:bg-slate-900 p-2 rounded-2xl border-2 border-slate-200 dark:border-slate-600" />
                                    </div>
                                    <button type="submit" className="w-full bg-gradient-to-r from-blue-600 to-indigo-700 hover:from-blue-700 hover:to-indigo-800 text-white font-black py-5 rounded-2xl shadow-[0_10px_20px_-10px_rgba(37,99,235,0.6)] mt-2 text-lg uppercase tracking-widest transition-all hover:scale-[1.02] flex items-center justify-center"><i className="fa-solid fa-paper-plane mr-3"></i> {lang === 'hi' ? 'रिक्वेस्ट भेजें' : 'Send Request'}</button>
                                </form>
                            </div>
                        </div>
                    )}
                </div>
            </div>  
        );  
    };  
    const root = ReactDOM.createRoot(document.getElementById('root')); root.render(<App />);  
    </script>
</body>  
</html>
