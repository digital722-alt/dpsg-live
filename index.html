<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DPSG Digital Seva - Nimbahera Official</title>
    <!-- आवश्यक लाइब्रेरीज़ -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #010413; color: white; margin: 0; overflow-x: hidden; }
        .receipt-card { border: 1px solid #e2e8f0; color: #0f172a; }
        @media print {
            .no-print { display: none !important; }
            body { background: white !important; color: black !important; }
            .receipt-card { border: none !important; box-shadow: none !important; margin: 0 !important; width: 100% !important; }
        }
        .spinner { border: 4px solid rgba(255, 255, 255, 0.1); border-top: 4px solid #fbbf24; border-radius: 50%; width: 45px; height: 45px; animation: spin 0.8s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .image-glow { border: 4px solid #fbbf24; box-shadow: 0 0 40px rgba(251, 191, 36, 0.5); border-radius: 1.5rem; overflow: hidden; background: #000; }
        .custom-scroll::-webkit-scrollbar { width: 5px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // --- मास्टर सेटिंग्स (हुक्म ज़ोरावर सिंह जी) ---
        const SHEET_ID = "1rrU0EHXur_HfPlmYxjm6vIJqeRW2VZAu0qIteItQkLo";
        const CSV_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv`;
        const MASTER_PIN = "Chanchal@6375"; 

        const App = () => {
            const [lang, setLang] = useState('hi');
            const [status, setStatus] = useState("loading");
            const [member, setMember] = useState(null);
            const [headers, setHeaders] = useState([]);
            const [searchId, setSearchId] = useState("");
            const [isAdmin, setIsAdmin] = useState(false);
            const [showAdminPanel, setShowAdminPanel] = useState(false);
            const [pinInput, setPinInput] = useState("");
            const [imgSrc, setImgSrc] = useState("");
            const [imgLoading, setImgLoading] = useState(true);
            const [currentTime, setCurrentTime] = useState(new Date());

            const vocab = {
                hi: {
                    brand: "डिजिटल प्रॉब्लम सॉल्यूशन ग्रुप", service: "डिजिटल सेवा",
                    slogan: "समस्या आपकी, समाधान हमारा !", subSlogan: "उचित मूल्य, बेहतरीन सेवा !",
                    idLabel: "मेंबरशिप आईडी दर्ज करें", receipt: "प्रोफेशनल डिजिटल रसीद",
                    winner: "बधाई हो! आप विजेता हैं", prize: "आपका विशेष उपहार",
                    print: "डिजिटल रसीद प्रिंट करें", auth: "एडमिन मास्टर वेरिफिकेशन",
                    unlock: "Unlock Dashboard", update: "अपडेट हो रहा है...",
                    points: "सर्विस पॉइंट्स", active: "सक्रियण", expiry: "समाप्ति", left: "शेष दिन"
                },
                en: {
                    brand: "Digital Problem Solution Group", service: "Digital Seva",
                    slogan: "Your Problem, Our Solution!", subSlogan: "Best Price, Excellent Service!",
                    idLabel: "Enter Membership ID", receipt: "OFFICIAL DIGITAL RECEIPT",
                    winner: "CONGRATULATIONS! YOU WON", prize: "Your Special Reward",
                    print: "Print Receipt", auth: "Admin Master Authorization",
                    unlock: "Unlock Panel", update: "Updating...",
                    points: "Service Points", active: "Activation", expiry: "Expiry", left: "Days Left"
                }
            };

            const cardSpecs = {
                VIP: { 
                    hi: ["कीमत: ₹500 (वैधता: 6 महीने)", "उपयोग: संपूर्ण परिवार हेतु", "कोटा: 150 प्रिंट + 80 फोटो (या कुल 380 फोटो / 190 प्रिंट)", "लैमिनेशन: 5 फ्री", "ई-मित्र: 100% फ्री सेवा (केवल टोकन चार्ज देय)", "डिलीवरी: 2 बार FREE (फिर न्यूनतम डिलीवरी चार्ज)", "इनाम: ₹100 तुरंत वापस + बड़ा धमाका!"],
                    en: ["Price: ₹500 (Validity: 6 Months)", "Usage: Full Family Access", "Quota: 150 Prints + 80 Photos (or total 380 photos / 190 prints)", "Lamination: 5 Free", "E-Mitra: 100% Free (only token charges apply)", "Delivery: 2 FREE Deliveries (then min delivery charges)", "Reward: ₹100 Cashback + Mega Reward!"]
                },
                Gold: { 
                    hi: ["कीमत: ₹100 (वैधता: 3 महीने)", "उपयोग: केवल 1 व्यक्ति हेतु", "कोटा: 40 प्रिंट + 24 फोटो (या कुल 100 फोटो / 52 प्रिंट)", "लैमिनेशन: 1 फ्री", "ई-मित्र: 50% छूट (केवल टोकन चार्ज देय)", "डिलीवरी: 1 बार (न्यूनतम डिलीवरी चार्ज)", "इनाम: 100% गारंटी उपहार!"],
                    en: ["Price: ₹100 (3 Months)", "Usage: Individual Only", "Quota: 40 Prints + 24 Photos (or total 100 photos / 52 prints)", "Lamination: 1 Free", "E-Mitra: 50% Off (only token charges apply)", "Delivery: 1 Time Delivery (at minimum charges)", "Reward: 100% Guaranteed Gift!"]
                },
                Silver: { 
                    hi: ["कीमत: ₹50 (वैधता: 1 महीना)", "उपयोग: केवल 1 व्यक्ति हेतु", "कोटा: 15 प्रिंट + 12 फोटो (या कुल 40 फोटो / 21 प्रिंट)", "ई-मित्र: सीमित सेवा (केवल टोकन चार्ज देय)", "डिलीवरी: 1 बार (न्यूनतम डिलीवरी चार्ज)", "इनाम: लकी ड्रा का अवसर!"],
                    en: ["Price: ₹50 (Validity: 1 Month)", "Usage: Individual Only", "Quota: 15 Prints + 12 Photos (or total 40 photos / 21 prints)", "E-Mitra: Limited Support (token charges apply)", "Delivery: 1 Time Delivery (at minimum charges)", "Reward: Great Luck in Draw!"]
                }
            };

            // --- 1000% IMAGE HUNTER ENGINE ---
            const findItemImage = (itemName) => {
                if (!itemName) return;
                setImgLoading(true);
                
                // AI Translator for Keywords
                let cleanKey = itemName.toLowerCase();
                if (cleanKey.includes("मिक्सर")) cleanKey = "Kitchen Mixer Grinder Machine";
                else if (cleanKey.includes("पंख")) cleanKey = "Electric Ceiling Fan";
                else if (cleanKey.includes("घड़ी")) cleanKey = "Digital Smart Watch";
                else if (cleanKey.includes("साइकिल")) cleanKey = "Bicycle hero";
                else if (cleanKey.includes("कूलर")) cleanKey = "Desert Air Cooler";

                // Triple-Source Search
                const mainUrl = `https://loremflickr.com/800/600/${encodeURIComponent(cleanKey)},product,item/all?lock=${Math.random()}`;
                setImgSrc(mainUrl);
            };

            useEffect(() => {
                const timer = setInterval(() => setCurrentTime(new Date()), 1000);
                const params = new URLSearchParams(window.location.search);
                const qId = params.get('id');

                Papa.parse(`${CSV_URL}&v=${Date.now()}`, {
                    download: true, header: false, skipEmptyLines: true,
                    complete: (res) => {
                        const rows = res.data;
                        if (rows.length > 0) setHeaders(rows[0]);
                        if (qId) {
                            const q = qId.trim().toLowerCase();
                            const match = rows.find(r => 
                                (r[0] && r[0].toString().trim().toLowerCase() === q) ||
                                (r[1] && r[1].toString().trim().toLowerCase() === q)
                            );
                            if (match) {
                                setMember(match); setStatus("view");
                                if (match[37]?.toLowerCase().includes("win")) { 
                                    // पटाखे फोड़ना (Confetti Success)
                                    setTimeout(() => {
                                        confetti({ particleCount: 200, spread: 80, origin: { y: 0.6 } });
                                    }, 500);
                                    findItemImage(match[4]); 
                                }
                            } else setStatus("search");
                        } else setStatus("search");
                    },
                    error: () => setStatus("search")
                });
                return () => clearInterval(timer);
            }, []);

            const mask = (val) => {
                if (!val || val === "#REF!") return "Updating...";
                const s = val.toString().trim();
                return s.length > 4 ? s.slice(0, 2) + "******" + s.slice(-2) : s;
            };

            const clean = (v) => (v && v !== "#REF!") ? v : "Updating...";

            const handleAdminLogin = (e) => {
                if(e) e.preventDefault();
                if (pinInput === MASTER_PIN) setIsAdmin(true);
                else alert("गलत पासवर्ड! (Chanchal@6375)");
            };

            if (status === "loading") return <div className="h-screen flex items-center justify-center bg-[#010413]"><div className="spinner"></div></div>;

            const ui = vocab[lang];
            const isWinner = member && member[37]?.toLowerCase().includes("win");

            return (
                <div className="min-h-screen p-4 sm:p-8 text-center overflow-x-hidden">
                    {/* Header Bar */}
                    <div className="max-w-md mx-auto no-print flex justify-between items-center mb-8 border-b border-white/10 pb-4 font-black text-[10px]">
                        <div className="text-left">
                            {currentTime.toLocaleDateString()}<br/><span className="text-blue-500 italic">{currentTime.toLocaleTimeString()}</span>
                        </div>
                        <div className="flex bg-white/5 p-1 rounded-xl shadow-inner border border-white/5">
                            <button onClick={()=>setLang('hi')} className={`px-4 py-1.5 rounded-lg ${lang === 'hi' ? 'bg-white text-black shadow-lg scale-105' : 'text-gray-500'}`}>हिन्दी</button>
                            <button onClick={()=>setLang('en')} className={`px-4 py-1.5 rounded-lg ${lang === 'en' ? 'bg-white text-black shadow-lg scale-105' : 'text-gray-500'}`}>ENGLISH</button>
                        </div>
                    </div>

                    <div className="max-w-md mx-auto">
                        {status === "search" ? (
                            <div className="bg-white/5 border border-white/10 p-10 rounded-[3.5rem] shadow-2xl animate-in zoom-in">
                                <i className="fa-solid fa-qrcode text-6xl text-blue-500 mb-8 animate-pulse"></i>
                                <h2 className="text-xl font-black mb-10 tracking-widest uppercase italic leading-none">{ui.idLabel}</h2>
                                <input type="text" id="sid" placeholder="आईडी यहाँ लिखें" className="w-full bg-black/40 border border-white/10 rounded-2xl py-6 text-center text-xl font-bold mb-10 text-white outline-none focus:border-blue-500" />
                                <button onClick={()=>window.location.href=`?id=`+document.getElementById('sid').value} className="w-full bg-blue-600 py-6 rounded-2xl font-black uppercase text-white shadow-xl active:scale-95 transition-all">SEARCH</button>
                            </div>
                        ) : (
                            <div className="space-y-10 pb-24 text-center">
                                {/* Branding Restored */}
                                <div>
                                    <h1 className="text-2xl font-black uppercase tracking-tighter leading-none italic">{ui.brand}</h1>
                                    <p className="text-[16px] text-yellow-500 font-bold tracking-widest mt-2 uppercase">{ui.service}</p>
                                    <p className="text-[13px] text-blue-400 font-bold mt-4 uppercase italic underline decoration-blue-500/20 underline-offset-4">{ui.slogan}</p>
                                    <p className="text-[10px] text-gray-500 font-black uppercase mt-1 tracking-widest leading-none">{ui.subSlogan}</p>
                                </div>

                                {/* Winner Experience */}
                                {isWinner && (
                                    <div className="bg-gradient-to-br from-yellow-300 via-yellow-600 to-yellow-900 p-1 rounded-[3.5rem] shadow-2xl animate-in zoom-in">
                                        <div className="bg-[#020617] rounded-[3.3rem] p-10 relative overflow-hidden">
                                            <h2 className="text-yellow-500 font-black text-2xl uppercase tracking-tighter mb-4 italic drop-shadow-lg">{ui.winner}</h2>
                                            <div className="bg-white/5 rounded-[2.5rem] p-8 border border-yellow-500/30 my-6">
                                                <p className="text-gray-400 text-[10px] uppercase font-black mb-2">{ui.prize}</p>
                                                <p className="text-white text-3xl font-black italic underline decoration-yellow-500 underline-offset-8 mb-8 leading-tight">{member[4]}</p>
                                                
                                                <div className="aspect-video bg-black/60 rounded-3xl overflow-hidden flex items-center justify-center relative image-glow shadow-inner">
                                                    {imgLoading && <div className="spinner absolute z-10"></div>}
                                                    <img 
                                                        src={imgSrc} 
                                                        className={`w-full h-full object-cover transition-opacity duration-1000 ${imgLoading ? 'opacity-0' : 'opacity-100'}`}
                                                        onLoad={()=>setImgLoading(false)}
                                                        onError={(e)=>{
                                                            e.target.src="https://via.placeholder.com/800/600/020617/fbbf24?text=OFFICIAL+REWARD";
                                                            setImgLoading(false);
                                                        }}
                                                    />
                                                </div>
                                            </div>
                                            <p className="text-[9px] text-yellow-500/40 font-black uppercase italic animate-pulse">DPSG NIMBAHERA OFFICIAL ENGINE</p>
                                        </div>
                                    </div>
                                )}

                                {/* Professional Digital Receipt Card */}
                                <div id="receipt-print" className="bg-white text-slate-900 rounded-[3rem] p-10 shadow-2xl relative border border-slate-100 receipt-card text-left">
                                    <div className="text-center border-b-2 border-dashed pb-8 mb-10 text-slate-900 leading-none">
                                        <h3 className="font-black text-3xl text-blue-700 uppercase italic tracking-tighter">{ui.receipt}</h3>
                                        <p className="text-[9px] font-black text-slate-400 uppercase tracking-[0.4em] mt-3 italic text-center">NIMBAHERA, RAJASTHAN</p>
                                    </div>

                                    <div className="space-y-12 leading-none">
                                        <div className="flex justify-between items-start border-b pb-8">
                                            <div><p className="text-[10px] text-slate-400 font-black uppercase italic">Identity (ID)</p><p className="text-2xl font-black text-slate-950 uppercase mt-1">{clean(member[1])}</p></div>
                                            <div className="text-right"><p className="text-[10px] text-slate-400 font-black uppercase italic">Category</p><p className="text-[11px] font-black text-blue-700 uppercase mt-1 italic">{clean(member[3])}</p></div>
                                        </div>

                                        <div className="bg-blue-600 rounded-[3.5rem] p-10 text-center text-white shadow-2xl relative overflow-hidden">
                                            <div className="absolute top-0 right-0 p-8 opacity-10"><i className="fa-solid fa-gem text-7xl"></i></div>
                                            <p className="text-[11px] font-black uppercase opacity-80 mb-2 italic tracking-widest">{ui.points}</p>
                                            <span className="text-8xl font-black tracking-tighter drop-shadow-2xl">{clean(member[21])}</span>
                                            <div className="grid grid-cols-2 gap-4 mt-12 pt-10 border-t border-white/10 text-[10px] font-black uppercase leading-none">
                                                <div className="text-center">कुल आवंटित<p className="text-xl font-black mt-1 leading-none">{clean(member[18])}</p></div>
                                                <div className="border-l border-white/10 text-center">कुल उपयोग<p className="text-xl font-black mt-1 leading-none">{(parseInt(member[19]) || 0) + (parseInt(member[20]) || 0)}</p></div>
                                            </div>
                                        </div>

                                        <div className="bg-slate-50 p-8 rounded-[2.5rem] border border-slate-100 shadow-inner">
                                            <p className="text-[10px] font-black text-blue-700 uppercase mb-4 italic flex items-center leading-none"><i className="fa-solid fa-crown mr-2 text-xs"></i> {lang === 'hi' ? 'विशेष कार्ड सुविधायें' : 'SPECIAL CARD PRIVILEGES'}</p>
                                            <div className="space-y-1">
                                                {(() => {
                                                    const s = member[3]?.toLowerCase() || "";
                                                    let bKey = (s.includes("vip") || s.includes("500")) ? "VIP" : (s.includes("gold") || s.includes("100")) ? "Gold" : "Silver";
                                                    // Dynamic English/Hindi Switch
                                                    return cardSpecs[bKey][lang].map((ben, i) => (
                                                        <div key={i} className="flex items-start text-[12px] font-bold italic py-2 border-b border-slate-200/50 last:border-0 leading-tight"><i className="fa-solid fa-circle-check text-green-500 mt-1 mr-3 text-[10px]"></i>{ben}</div>
                                                    ));
                                                })()}
                                            </div>
                                        </div>

                                        <div className="grid grid-cols-3 gap-3 bg-slate-100 p-8 rounded-[3rem] text-center shadow-inner font-black">
                                            <div><p className="text-[9px] text-slate-400 uppercase italic mb-1">{ui.active}</p><p className="text-[12px] text-slate-950">{clean(member[15])}</p></div>
                                            <div className="border-x border-slate-200"><p className="text-[9px] text-red-500 uppercase italic mb-1">{ui.expiry}</p><p className="text-[12px] text-red-600">{clean(member[16])}</p></div>
                                            <div><p className="text-[9px] text-green-600 uppercase italic mb-1">{ui.left}</p><p className="text-[12px] text-green-600">{clean(member[17])}</p></div>
                                        </div>

                                        <div className="grid grid-cols-2 gap-y-12 py-10 border-y border-slate-100 leading-none">
                                            <div><p className="text-[9px] text-slate-400 font-black uppercase mb-1 italic">Name</p><p className="text-[18px] font-black uppercase italic text-slate-900 leading-tight">{clean(member[8])}</p></div>
                                            <div className="text-right"><p className="text-[9px] text-slate-400 font-black uppercase mb-1 italic">Village</p><p className="text-[18px] font-black uppercase italic text-slate-900 leading-tight">{clean(member[5])}</p></div>
                                            <div><p className="text-[9px] text-slate-400 font-black uppercase mb-1 italic">Mobile</p><p className="text-[16px] font-bold tracking-widest">{mask(member[9])}</p></div>
                                            <div className="text-right"><p className="text-[9px] text-slate-400 font-black uppercase mb-1 italic">Aadhar</p><p className="text-[16px] font-bold tracking-widest">{mask(member[11])}</p></div>
                                        </div>

                                        <button onClick={()=>window.print()} className="no-print w-full bg-slate-900 text-white py-6 rounded-full text-[13px] font-black uppercase shadow-2xl active:scale-95 transition-all">PRINT OFFICIAL RECEIPT</button>
                                    </div>
                                </div>

                                {/* Master Admin Access (39 Columns) */}
                                <div className="no-print pt-32 pb-20 flex flex-col items-center">
                                    {!isAdmin && <button onClick={()=>setShowAdminPanel(!showAdminPanel)} className="opacity-10 hover:opacity-30 transition-all p-8 bg-white/5 rounded-full shadow-2xl"><i className="fa-solid fa-fingerprint text-4xl"></i></button>}
                                    {showAdminPanel && !isAdmin && (
                                        <form onSubmit={handleAdminLogin} className="mt-8 flex flex-col bg-white/5 p-10 rounded-[3.5rem] border border-white/10 w-full backdrop-blur-3xl animate-in slide-in-from-top-4 shadow-2xl">
                                            <p className="text-[11px] font-black text-blue-400 uppercase tracking-widest mb-6 text-center italic leading-none">{ui.auth}</p>
                                            <div className="flex flex-col space-y-4">
                                                <input type="password" onChange={(e)=>setPinInput(e.target.value)} className="w-full bg-black/60 border border-white/10 rounded-2xl px-8 py-5 text-lg font-bold tracking-[1em] text-white text-center outline-none focus:border-blue-500" placeholder="PIN" />
                                                <button type="submit" className="w-full bg-blue-600 py-6 rounded-2xl text-sm font-black uppercase text-white shadow-xl active:scale-90 transition-all">UNLOCK MASTER PANEL</button>
                                            </div>
                                        </form>
                                    )}
                                    {isAdmin && (
                                        <div className="w-full mt-10 bg-white/5 border border-white/10 rounded-[3.5rem] p-12 overflow-hidden shadow-2xl text-left animate-in zoom-in">
                                            <div className="flex justify-between items-center mb-12 pb-8 border-b border-white/10 text-white uppercase italic leading-none">
                                                <h3 className="text-[13px] font-black text-blue-400">Master Data Dashboard (39 Columns)</h3>
                                                <button onClick={()=>setIsAdmin(false)} className="bg-red-500/10 text-red-500 px-6 py-2 rounded-full font-black text-[10px] border border-red-500/20 active:scale-95">LOGOUT</button>
                                            </div>
                                            <div className="grid grid-cols-1 sm:grid-cols-2 gap-4 max-h-[800px] overflow-y-auto pr-4 custom-scroll">
                                                {member.map((val, i) => (
                                                    <div key={i} className="p-5 rounded-2xl bg-white/5 border border-white/10 group transition-all">
                                                        <p className="text-[9px] text-blue-400 uppercase font-black tracking-widest mb-2 opacity-70 leading-none">{headers[i] || `Col Index ${i}`}</p>
                                                        <p className="text-[15px] font-bold italic leading-relaxed text-white">{val || vocab[lang].update}</p>
                                                    </div>
                                                ))}
                                            </div>
                                        </div>
                                    )}
                                </div>
                                <p className="text-center text-[10px] text-slate-600 font-black uppercase mt-12 tracking-[2.5em] opacity-30 py-12 italic no-print leading-loose">DPSG NIMBAHERA | NORTH INDIA OFFICIAL</p>
                            </div>
                        )}
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
