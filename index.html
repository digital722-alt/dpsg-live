                const grad = ctx.createLinearGradient(0, 0, canvas.width, canvas.height);  
                grad.addColorStop(0, '#B8860B'); grad.addColorStop(0.5, '#FFDF00'); grad.addColorStop(1, '#DAA520');  
              
                ctx.fillStyle = grad; ctx.fillRect(0, 0, canvas.width, canvas.height);  
                ctx.font = "900 32px Inter"; ctx.fillStyle = "rgba(139, 69, 19, 0.5)"; ctx.textAlign = "center";  
                ctx.fillText("SCRATCH HERE", canvas.width / 2, canvas.height / 2);  
                ctx.font = "700 18px Inter"; ctx.fillText("DPSG NIMBAHERA", canvas.width / 2, (canvas.height / 2) + 35);

                    if (isRevealed) return; const rect = canvas.getBoundingClientRect();  
                    const x = (e.pageX || (e.touches && e.touches[0].pageX)) - rect.left;
                    const y = (e.pageY || (e.touches && e.touches[0].pageY)) - rect.top;  
                    ctx.globalCompositeOperation = 'destination-out'; ctx.beginPath();
                    ctx.arc(x, y, 75, 0, Math.PI * 2); ctx.fill();  
                    const pixels = ctx.getImageData(0, 0, canvas.width, canvas.height).data;  
                    let count = 0;
                    for (let i = 0; i < pixels.length; i += 40) if (pixels[i + 3] === 0) count++;
                    if (count > (pixels.length / 40) * 0.45) { setIsRevealed(true); onComplete(); }  
                };  
                canvas.addEventListener('mousemove', scratch);
                canvas.addEventListener('touchmove', scratch, {passive: true});  
            }, [isRevealed]);

                                    <button onClick={() => openForm("Airtel Payment Bank")} className="group flex flex-col items-center justify-center glass-card !rounded-3xl py-4 px-2 hover:border-red-400 hover:-translate-y-1 transition-all !border-[1px]"><div className="w-14 h-14 bg-gradient-to-br from-red-100 to-red-50 text-red-600 rounded-2xl flex items-center justify-center text-2xl mb-3 shadow-inner group-hover:scale-110 transition-transform"><i className="fa-solid fa-building-columns"></i></div><span className="text-[11px] sm:text-[12px] font-black text-slate-800 dark:text-slate-200 uppercase text-center leading-tight">AIRTEL BANK</span></button>
                                </div>

                                {/* LIVE STATUS CHECK */}
                                <div className="no-print glass-card p-6 mb-8 relative overflow-hidden text-center border-t-4 border-blue-500">
                                    <h3 className="font-black text-lg mb-4 text-blue-900 dark:text-blue-300 uppercase tracking-widest flex items-center justify-center"><i className="fa-solid fa-radar mr-2 text-xl"></i> {t.trackTitle}</h3>
                                    <div className="flex gap-2 max-w-md mx-auto">
                                        <input type="text" id="liveStatusInput" placeholder={t.serialHint} maxLength="4" className="flex-1 bg-white/80 dark:bg-slate-900/80 border-2 border-slate-300 dark:border-slate-600 rounded-xl px-4 py-3 outline-none focus:border-blue-500 font-black text-center uppercase tracking-widest shadow-inner text-slate-800 dark:text-white" />
                                        <button onClick={checkStatusFromCSV} className="bg-gradient-to-r from-blue-600 to-indigo-700 hover:from-blue-700 hover:to-indigo-800 text-white px-6 rounded-xl font-black uppercase tracking-widest transition-all shadow-xl">{t.checkBtn}</button>
                                    </div>
                                    {statusCheckResult && (
                                        <div className={`mt-5 p-4 rounded-xl text-center font-black text-xl border-2 animate-in zoom-in shadow-lg ${statusCheckResult === 'OK' ? 'border-green-500 bg-green-50 text-green-600 dark:bg-green-900/20 dark:text-green-400' : 'border-amber-500 bg-amber-50 text-amber-600 dark:bg-amber-900/20 dark:text-amber-400'}`}>
                                            {statusCheckResult === 'OK' ? t.statusOk : t.statusProcess}
                                        </div>
                                    )}
                                </div>

                                {/* SCRATCH CARD */}
                                <div className="no-print glass-card p-8 relative overflow-hidden">
                                    <p className="text-red-500 font-black text-[13px] mb-6 text-center blink-text uppercase tracking-widest flex justify-center items-center"><i className="fa-solid fa-triangle-exclamation mr-2 text-xl"></i> {t.warning}</p>
                                    <div className={`p-2 rounded-[2.5rem] relative z-10 ${prizeState.isLocked ? 'glass-lock' : prizeState.colorClass}`}>  
                                        {prizeState.isLocked ? ( 
                                            <div className="p-16 text-center flex flex-col items-center justify-center min-h-[350px]"> 
                                                <div className="relative mb-8 mt-4">
                                                    <div className="absolute inset-0 bg-yellow-400 blur-3xl opacity-50 rounded-full"></div>
                                                    <i className="fa-solid fa-lock text-[10rem] text-transparent bg-clip-text bg-gradient-to-br from-yellow-200 via-yellow-500 to-yellow-800 drop-shadow-[0_15px_15px_rgba(0,0,0,0.4)] relative z-10"></i> 
                                                </div>
                                                <p className="font-black text-red-600 dark:text-red-500 text-3xl uppercase tracking-[0.2em] drop-shadow-md mt-6">{t.pending}</p> 
                                            </div> 
                                        ) : (  
                                            <ScratchCard onComplete={() => confetti({particleCount:400, spread:120, origin:{y:0.6}, colors: ['#FFD700', '#FFA500', '#FF4500', '#00FF00']})}>  
                                                <div className="p-8 text-center w-full bg-white/95 dark:bg-slate-900/95 backdrop-blur-md flex flex-col items-center h-full justify-center">
                                                    <div className="bg-gradient-to-r from-blue-800 via-indigo-600 to-blue-800 text-white px-10 py-3 rounded-full font-black text-xl mb-8 uppercase shadow-[0_10px_20px_rgba(79,70,229,0.4)] tracking-widest border-2 border-indigo-300 fancy-text">{prizeState.highlight}</div>  
                                                    <img src={prizeState.img} className="w-full max-h-[400px] object-contain mb-8 drop-shadow-2xl rounded-2xl" alt="Prize" />  
                                                    <p className="text-[16px] font-black leading-relaxed whitespace-pre-line px-2 text-gradient-prize fancy-text">{t.prizes[prizeState.type] ? t.prizes[prizeState.type](prizeState.rank) : ""}</p>
                                                </div>
                                            </ScratchCard>  
                                        )}  
                                    </div>
                                </div>

                                {/* PREMIUM RECEIPT (Restored Full) */}
                                <div id="receipt" className="glass-card p-8 sm:p-12 text-left relative mt-8">  
                                    <div className="text-center border-b-4 border-slate-200 dark:border-slate-700 border-dashed pb-8 mb-10">
                                        <h3 className="font-black text-3xl text-blue-900 dark:text-blue-400 italic uppercase tracking-tight drop-shadow-sm">{t.receipt}</h3>
                                        <p className="text-[12px] font-black text-slate-500 uppercase tracking-[0.5em] mt-3 bg-white/50 dark:bg-slate-800/50 inline-block px-4 py-1 rounded-full border border-white/50">DPSG NIMBAHERA</p>
                                    </div>  
                                    
                                    <div className="grid grid-cols-2 gap-y-12 gap-x-4 text-sm border-b-2 border-slate-200 dark:border-slate-700 pb-12">  
                                        <div className="col-span-2 text-center bg-blue-50/70 dark:bg-blue-900/30 backdrop-blur-sm border-2 border-blue-400 dark:border-blue-600 rounded-[2rem] p-8 shadow-[0_0_25px_rgba(59,130,246,0.3)] transform transition hover:scale-[1.01]">
                                            <p className="text-[15px] sm:text-[17px] font-black text-blue-800 dark:text-blue-300 tracking-[0.2em] uppercase mb-4 fancy-text flex justify-center items-center"><i className="fa-solid fa-fingerprint mr-3 text-2xl"></i> {t.idLabelFull}</p>
                                            <p className="text-4xl sm:text-5xl font-black text-blue-600 dark:text-blue-400 drop-shadow-md tracking-wider fancy-text">{clean(member[1])}</p>
                                        </div>
                                        
                                        <div className="col-span-2 bg-white/60 dark:bg-slate-800/60 backdrop-blur-sm p-6 rounded-2xl border border-white/50 dark:border-slate-700">
                                            <div className="grid grid-cols-2 gap-4">
                                                <div><p className="text-[14px] sm:text-[15px] font-black text-slate-600 dark:text-slate-400 tracking-[0.1em] uppercase mb-2 fancy-text"><i className="fa-solid fa-user text-blue-500 mr-2"></i>{t.cName}</p><p className="font-black uppercase text-2xl text-indigo-900 dark:text-indigo-300 drop-shadow-sm">{clean(member[8])}</p></div>  
                                                <div className="text-right"><p className="text-[14px] sm:text-[15px] font-black text-slate-600 dark:text-slate-400 tracking-[0.1em] uppercase mb-2 fancy-text"><i className="fa-solid fa-map-location-dot text-red-500 mr-2"></i>{t.vill}</p><p className="font-black uppercase text-2xl text-slate-800 dark:text-slate-200">{clean(member[5])}</p></div>  
                                            </div>
                                        </div>
                                        
                                        <div><p className="text-[14px] sm:text-[15px] font-black text-slate-600 dark:text-slate-400 tracking-[0.1em] uppercase mb-2 fancy-text">{t.cat}</p><p className="font-black text-blue-900 dark:text-blue-200 px-5 py-2 border-2 border-blue-200 dark:border-blue-800 rounded-xl bg-blue-50/80 dark:bg-blue-900/50 inline-block shadow-sm text-lg">{clean(member[3])}</p></div>  
                                        <div className="text-right"><p className="text-[14px] sm:text-[15px] font-black text-slate-600 dark:text-slate-400 tracking-[0.1em] uppercase mb-2 fancy-text">{t.sMob}</p><p className="font-black tracking-[0.2em] text-xl text-slate-700 dark:text-slate-300 bg-white/50 dark:bg-slate-800/50 px-3 py-1 rounded-lg inline-block border border-white/50">{mask(member[9])}</p></div>
                                        
                                        <div><p className="text-[14px] sm:text-[15px] font-black text-slate-600 dark:text-slate-400 tracking-[0.1em] uppercase mb-2 fancy-text">{t.sAad}</p><p className="font-black tracking-[0.2em] text-xl text-slate-700 dark:text-slate-300 bg-white/50 dark:bg-slate-800/50 px-3 py-1 rounded-lg inline-block border border-white/50">{mask(member[11])}</p></div>
                                        <div className="text-right"></div>
                                        
                                        <div><p className="text-[14px] sm:text-[15px] font-black text-slate-600 dark:text-slate-400 tracking-[0.1em] uppercase mb-2 fancy-text">{t.active}</p><p className="font-black text-2xl text-emerald-600 dark:text-emerald-400 bg-emerald-50 dark:bg-emerald-900/30 px-4 py-2 rounded-xl border-2 border-emerald-300 dark:border-emerald-700 inline-block shadow-md date-font tracking-wider">{clean(member[15])}</p></div>  
                                        <div className="text-right"><p className="text-[14px] sm:text-[15px] font-black text-slate-600 dark:text-slate-400 tracking-[0.1em] uppercase mb-2 fancy-text">{t.expiry}</p><p className="font-black text-2xl text-white bg-red-600 px-5 py-2 rounded-xl border-2 border-red-800 inline-block shadow-[0_5px_15px_rgba(220,38,38,0.4)] date-font tracking-wider animate-pulse">{clean(member[16])}</p></div>  
                                    </div>
                                    
                                    <div className="grid grid-cols-3 gap-5 my-12">
                                        <div className="bg-gradient-to-b from-blue-700 to-blue-900 text-white p-6 rounded-3xl text-center shadow-[0_10px_20px_rgba(29,78,216,0.3)] border-t-4 border-blue-400"><p className="text-[11px] sm:text-[12px] font-bold opacity-80 uppercase tracking-widest mb-2 fancy-text">{t.points}</p><p className="text-4xl font-black drop-shadow-md">{clean(member[18])}</p></div>
                                        <div className="bg-gradient-to-b from-slate-700 to-slate-900 text-white p-6 rounded-3xl text-center shadow-lg border-t-4 border-slate-500"><p className="text-[11px] sm:text-[12px] font-bold opacity-80 uppercase tracking-widest mb-2 fancy-text">{t.used}</p><p className="text-4xl font-black drop-shadow-md">{(parseInt(member[18])-parseInt(member[21]))||0}</p></div>
                                        <div className="bg-gradient-to-b from-emerald-500 to-emerald-700 text-white p-6 rounded-3xl text-center shadow-[0_10px_20px_rgba(16,185,129,0.3)] border-t-4 border-emerald-300"><p className="text-[11px] sm:text-[12px] font-bold opacity-80 uppercase tracking-widest mb-2 fancy-text">{t.balance}</p><p className="text-4xl font-black drop-shadow-md">{clean(member[21])}</p></div>
                                    </div>
                                    
                                    <div className="bg-gradient-to-r from-blue-50/80 to-indigo-50/80 dark:from-slate-800/80 dark:to-slate-700/80 backdrop-blur-md p-8 rounded-[2.5rem] border-2 border-blue-200 dark:border-slate-600 my-8 font-bold italic text-[13px] space-y-4 shadow-inner">
                                        <p className="text-blue-900 dark:text-blue-300 font-black uppercase mb-6 flex items-center italic text-lg"><i className="fa-solid fa-crown mr-3 text-yellow-500 text-2xl drop-shadow-sm"></i> {t.ben}</p>
                                        {(() => { const cat = (member[3] || "").toLowerCase(); let key = (cat.includes("vip") || cat.includes("500")) ? "VIP" : (cat.includes("gold") || cat.includes("100")) ? "Gold" : "Silver"; return cardSpecs[key][lang].map((ben, i) => ( <div key={i} className="flex items-start py-3 border-b-2 border-blue-200/50 dark:border-slate-600/50 last:border-0 text-slate-800 dark:text-slate-200"><i className="fa-solid fa-circle-check text-green-500 mr-4 mt-0.5 text-lg drop-shadow-sm"></i>{ben}</div> )); })()}
                                    </div>
                                    
                                    <div className="bg-gradient-to-br from-slate-900 via-black to-slate-900 text-white p-12 rounded-[3rem] text-center mb-10 shadow-2xl border-4 border-slate-700 relative overflow-hidden">
                                        <i className="fa-solid fa-gift absolute -right-10 -bottom-10 text-9xl opacity-20 text-yellow-500"></i>
                                        <p className="text-[16px] sm:text-[18px] text-yellow-300 uppercase mb-4 tracking-[0.4em] font-black drop-shadow-md"><i className="fa-solid fa-star mr-3 animate-pulse text-yellow-400"></i> {t.draw} <i className="fa-solid fa-star ml-3 animate-pulse text-yellow-400"></i></p>
                                        <p className="text-5xl font-black text-yellow-400 italic uppercase tracking-widest drop-shadow-[0_0_20px_rgba(250,204,21,0.6)] date-font mt-2">{clean(member[36])}</p>
                                    </div>
                                    
                                    <div className="bg-white/50 dark:bg-slate-800/50 backdrop-blur-sm p-10 rounded-[2.5rem] border-2 border-white/60 dark:border-slate-700 mb-10 text-[12px] font-bold italic space-y-4 text-slate-600 dark:text-slate-400 shadow-inner">
                                        <h4 className="text-[15px] font-black uppercase mb-6 border-b-2 border-slate-200 dark:border-slate-600 pb-4 flex items-center text-slate-900 dark:text-slate-100"><i className="fa-solid fa-scale-balanced mr-3 text-blue-600 text-xl"></i> {t.tTitle}</h4>
                                        <p className="flex"><span className="w-6 text-blue-600 text-lg">▸</span>{t.t1}</p><p className="flex"><span className="w-6 text-blue-600 text-lg">▸</span>{t.t2}</p><p className="flex"><span className="w-6 text-blue-600 text-lg">▸</span>{t.t3}</p><p className="flex"><span className="w-6 text-blue-600 text-lg">▸</span>{t.t4}</p><p className="flex"><span className="w-6 text-blue-600 text-lg">▸</span>{t.t5}</p><p className="flex"><span className="w-6 text-blue-600 text-lg">▸</span>{t.t6}</p><p className="flex"><span className="w-6 text-blue-600 text-lg">▸</span>{t.t7}</p><p className="flex"><span className="w-6 text-blue-600 text-lg">▸</span>{t.t8}</p><p className="flex"><span className="w-6 text-blue-600 text-lg">▸</span>{t.t9}</p><p className="flex"><span className="w-6 text-blue-600 text-lg">▸</span>{t.t10}</p>
                                    </div>
                                    
                                    <button onClick={()=>window.print()} className="no-print w-full bg-gradient-to-r from-blue-700 to-indigo-800 hover:from-blue-800 hover:to-indigo-900 text-white py-6 rounded-2xl font-black uppercase shadow-2xl hover:scale-[1.02] active:scale-[0.98] transition-all text-xl tracking-widest border-b-4 border-indigo-950"><i className="fa-solid fa-print mr-3 text-2xl"></i> {t.printBtn}</button>
                                </div>

                                {/* ADMIN PANEL */}
                                <div className="no-print pt-10 pb-20 flex flex-col items-center">  
                                    {!isAdmin && <button onClick={()=>setShowPin(!showPin)} className="p-8 glass-card !rounded-full opacity-50 hover:opacity-100 transition-all hover:scale-110 !border-[1px]"><i className="fa-solid fa-fingerprint text-6xl text-blue-600"></i></button>}  
                                    {showPin && !isAdmin && ( <div className="mt-8 glass-card p-10 w-full animate-in zoom-in shadow-2xl"><input type="password" id="adminPin" className="w-full bg-slate-50/80 dark:bg-slate-900/80 border-4 border-slate-200 dark:border-slate-600 rounded-2xl py-6 text-center mb-6 font-black outline-none text-3xl tracking-widest focus:border-blue-500 transition-all" placeholder="MASTER PIN" /><button onClick={()=>{document.getElementById('adminPin').value===MASTER_PIN?setIsAdmin(true):alert("Wrong Pin!");}} className="w-full bg-slate-900 dark:bg-black text-white py-6 rounded-2xl font-black uppercase tracking-widest shadow-xl hover:bg-slate-800 transition-all text-xl"><i className="fa-solid fa-unlock mr-3"></i> Unlock Database</button></div> )}
                                    {isAdmin && ( <div className="w-full mt-8 glass-card p-10 text-left overflow-hidden border-t-8 border-t-blue-600"><div className="flex justify-between items-center mb-8 border-b-2 border-slate-200 dark:border-slate-700 pb-5"><h3 className="font-black text-lg text-blue-600 uppercase tracking-widest"><i className="fa-solid fa-database mr-3"></i> Master Database Panel</h3><button onClick={()=>setIsAdmin(false)} className="text-red-600 font-black text-[13px] uppercase border-2 border-red-200 dark:border-red-900/50 hover:bg-red-50 dark:hover:bg-red-900/20 px-6 py-2 rounded-full transition-all">Logout</button></div><div className="grid gap-4 max-h-[600px] overflow-y-auto pr-2 custom-scroll">{member.map((v, i) => ( <div key={i} className="p-6 bg-white/50 dark:bg-slate-900/50 rounded-2xl border-2 border-slate-200 dark:border-slate-700 hover:border-blue-400 transition-all"><p className="text-[11px] text-slate-500 font-black uppercase mb-2 tracking-widest">{headers[i] || `Index ${i}`}</p><p className="font-black text-lg text-slate-800 dark:text-slate-100">{v||"---"}</p></div> ))}</div></div> )}
                                </div>
                            </div>
                        )}

                        {/* SMART WHATSAPP FORM WITH AIRTEL PAN RULE */}
                        {showForm && (
                            <div className="fixed inset-0 z-[110] flex items-center justify-center bg-slate-900/90 backdrop-blur-md p-4 overflow-y-auto pt-20 pb-20">
                                <div className="glass-card p-8 sm:p-12 w-full max-w-lg relative animate-in zoom-in duration-300 border-4 border-blue-400">
                                    <button onClick={() => setShowForm(false)} className="absolute top-6 right-6 w-12 h-12 bg-red-100 text-red-600 rounded-full font-black text-2xl"><i className="fa-solid fa-xmark"></i></button>
                                    
                                    <div className="text-center mb-8 border-b-2 border-slate-200 border-dashed pb-6">
                                        <h3 className="text-2xl font-black text-slate-800 uppercase tracking-wider">{formType}</h3>
                                    </div>
                                    
                                    <form onSubmit={sendToWhatsApp} className="space-y-6 text-left">
                                        <input type="hidden" name="Service" value={formType} />
                                        
                                        <div>
                                            <label className="block text-[13px] font-black uppercase text-slate-600 mb-2 tracking-widest">पूरा नाम <span className="text-red-500">*</span></label>
                                            <input type="text" name="Name" required pattern="[A-Za-z ]+" title="केवल अक्षर (Alphabets) दर्ज करें" className="w-full border-2 border-slate-300 p-4 rounded-xl font-bold text-lg" placeholder="अपना नाम लिखें" defaultValue={member ? member[8] : ''} />
                                        </div>

                                        <div>
                                            <label className="block text-[13px] font-black uppercase text-slate-600 mb-2 tracking-widest">आधार लिंक मोबाइल <span className="text-red-500">*</span></label>
                                            <input type="tel" name="Mobile" required pattern="[6-9][0-9]{9}" title="सही 10 अंकों का मोबाइल नंबर दर्ज करें" className="w-full border-2 border-slate-300 p-4 rounded-xl font-bold text-xl" placeholder="10 Digit Mobile No" defaultValue={member ? member[9] : ''} />
                                        </div>

                                        <div>
                                            <label className="block text-[13px] font-black uppercase text-slate-600 mb-2 tracking-widest">आधार कार्ड नंबर <span className="text-red-500">*</span></label>
                                            <input type="text" name="Aadhar" required pattern="[0-9]{12}" title="सही 12 अंकों का आधार दर्ज करें" className="w-full border-2 border-slate-300 p-4 rounded-xl font-bold text-xl tracking-[0.2em]" placeholder="XXXX XXXX XXXX" defaultValue={member ? member[11] : ''} />
                                        </div>

                                        <div>
                                            <label className="block text-[13px] font-black uppercase text-slate-600 mb-2 tracking-widest">पेमेंट का माध्यम <span className="text-red-500">*</span></label>
                                            <select value={paymentMode} onChange={(e)=>setPaymentMode(e.target.value)} name="Payment" className="w-full border-2 border-slate-300 p-4 rounded-xl font-bold text-lg">
                                                <option value="Cash">Cash (नकद)</option>
                                                <option value="UPI">UPI (PhonePe/Google Pay)</option>
                                                <option value="Airtel Payment Bank">Airtel Payment Bank</option>
                                            </select>
                                        </div>

                                        {/* AIRTEL SPECIAL PAN CONDITION */}
                                        <div className={`transition-all ${paymentMode === 'Airtel Payment Bank' ? 'block bg-red-50 p-4 rounded-xl border-2 border-red-300' : 'block'}`}>
                                            <label className="block text-[13px] font-black uppercase text-slate-600 mb-2 tracking-widest">
                                                पैन कार्ड (PAN) {paymentMode === 'Airtel Payment Bank' && <span className="text-red-600 ml-2 animate-pulse">(अनिवार्य)</span>}
                                            </label>
                                            <input type="text" name="Pan" required={paymentMode === 'Airtel Payment Bank'} pattern="[A-Z]{5}[0-9]{4}[A-Z]{1}" title="ABCDE1234F फॉर्मेट में दर्ज करें" className="w-full border-2 border-slate-300 p-4 rounded-xl font-bold text-xl uppercase" placeholder="ABCDE1234F" />
                                            {paymentMode === 'Airtel Payment Bank' && <p className="text-xs text-red-600 font-bold mt-2"><i className="fa-solid fa-triangle-exclamation"></i> एयरटेल पेमेंट बैंक के लिए पैन अनिवार्य है।</p>}
                                        </div>

                                        <div>
                                            <label className="block text-[13px] font-black uppercase text-slate-600 mb-2 tracking-widest">समस्या / कार्य का विवरण <span className="text-red-500">*</span></label>
                                            <textarea name="Problem" required rows="3" className="w-full border-2 border-slate-300 p-4 rounded-xl font-bold text-lg resize-none" placeholder="कार्य का विवरण..."></textarea>
                                        </div>
                                        
                                        <div className="bg-blue-50 p-4 rounded-xl border-2 border-blue-200">
                                            <label className="block text-[13px] font-black uppercase text-slate-700 mb-2 tracking-widest"><i className="fa-solid fa-paperclip"></i> डॉक्यूमेंट / वीडियो अपलोड</label>
                                            <input type="file" name="Files" multiple accept="image/*,video/*,application/pdf" className="w-full text-sm font-bold" />
                                        </div>

                                        <button type="submit" className="w-full bg-gradient-to-r from-green-600 to-emerald-700 hover:from-green-700 hover:to-emerald-800 text-white font-black py-6 rounded-2xl shadow-xl mt-6 text-xl uppercase tracking-widest"><i className="fa-brands fa-whatsapp mr-3 text-2xl"></i> व्हाट्सएप पर सबमिट करें</button>
                                    </form>
                                </div>
                            </div>
                        )}
                    </div>
                </div>  
            );  
        };  
        
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);  
    </script>
</body>  
</html>
