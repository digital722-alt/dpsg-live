    const MASTER_PIN = "Chanchal@6375";

    const vocab = {

            t8: "यह कार्य पूर्णतः समाज सेवा के उद्देश्य से किया जा रहा है। कार्यों के संपादन में समय लग सकता है, अतः कृपया धैर्य बनाए रखें।",

            t10: "DPSG मैनेजमेंट के पास बिना सूचना के नियमों और सुविधाओं में बदलाव करने का पूर्ण अधिकार सुरक्षित है।",
            pending: "परिणाम की घोषणा जल्द की जाएगी, कृपया ड्रा तिथि का इंतज़ार करें।"
        },
        en: {

            terms: "Terms & Conditions",
            t1: "This membership card is personal and fully non-transferable.",
            t2: "Services can be availed only until the 'Expiry Date' mentioned on the card.",
            t3: "The fee taken is only a 'Registration Fee', which will not be refunded under any circumstances.",
            t4: "In case of server error, the result on the Physical Scratch Card will be considered final.",
            t5: "Services may be delayed due to server/internet issues; management won't be responsible.",

    const cardSpecs = {

            hi: [
                "कीमत: ₹500 (समय सीमा 6 महीने)",
                "उपयोग: पूरे परिवार के लिए मान्य",
                "कोटा: 150 प्रिंट + 80 फोटो (या 380 फोटो / 190 प्रिंट)",
                "लैमिनेशन: 2 फ्री",
                "ई-मित्र: 100% फ्री सेवा (केवल सरकारी टोकन चार्ज देय)",
                "डिलीवरी: 2 बार फ्री (न्यूनतम रेट पर)",
                "इनाम: ₹100 Cash Back + बड़ा धमाका!"
            ],
            en: [
                "Price: ₹500 (Validity 6 Months)",

        Gold: {

                "इनाम: 100% गारंटीड उपहार!"
            ],
            en: [
                "Price: ₹100 (Validity 3 Months)",

                "Delivery: 1 Time (at Minimum Rate)",
                "Prize: 100% Guaranteed Gift!"
            ]
        },
        Silver: {
            hi: [
                "कीमत: ₹50 (समय सीमा 1 महीना)",
                "उपयोग: केवल 1 व्यक्ति हेतु",
                "कोटा: 15 प्रिंट + 12 फोटो (या 40 फोटो / 21 प्रिंट)",
                "ई-मित्र: सीमित सेवा (केवल टोकन चार्ज देय)",
                "डिलीवरी: 1 बार (न्यूनतम रेट पर)",
                "इनाम: लकी ड्रा का शानदार अवसर!"
            ],
            en: [
                "Price: ₹50 (Validity 1 Month)",
                "Usage: Valid for only 1 person",

                "Prize: Lucky Draw Opportunity!"

    const toDirectLink = (url) => { if (!url) return ""; let id = ""; if (url.includes("/d/")) id = url.split("/d/")[1].split("/")[0]; if (url.includes("id=")) id = url.split("id=")[1].split("&")[0]; return id ? "https://drive.google.com/thumbnail?id=" + id + "&sz=w1000" : url; };
    const mask = (v) => v?.length > 4 ? v.slice(0, 2) + "******" + v.slice(-2) : v;

    const ScratchCard = ({ onComplete, children }) => {
        const canvasRef = useRef(null);
        const [isRevealed, setIsRevealed] = useState(false);
        useEffect(() => {
            const canvas = canvasRef.current; if(!canvas) return; const ctx = canvas.getContext('2d');
            canvas.width = canvas.parentElement.offsetWidth; canvas.height = canvas.parentElement.offsetHeight;
            const grad = ctx.createLinearGradient(0, 0, canvas.width, canvas.height);
            grad.addColorStop(0, '#D4AF37'); grad.addColorStop(0.5, '#F9F295'); grad.addColorStop(1, '#B8860B');
            ctx.fillStyle = grad; ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.font = "bold 24px Inter"; ctx.fillStyle = "#5c4033"; ctx.textAlign = "center";
            ctx.fillText("यहाँ स्क्रैच करें!", canvas.width / 2, canvas.height / 2);
            const scratch = (e) => {
                if (isRevealed) return; const rect = canvas.getBoundingClientRect();
                const x = (e.pageX || (e.touches && e.touches[0].pageX)) - rect.left;
                const y = (e.pageY || (e.touches && e.touches[0].pageY)) - rect.top;
                ctx.globalCompositeOperation = 'destination-out'; ctx.beginPath(); ctx.arc(x, y, 40, 0, Math.PI * 2); ctx.fill();
                const pixels = ctx.getImageData(0, 0, canvas.width, canvas.height).data;
                let count = 0; for (let i = 0; i < pixels.length; i += 40) if (pixels[i + 3] === 0) count++;
                if (count > (pixels.length / 40) * 0.55) { setIsRevealed(true); onComplete(); }
            };
            canvas.addEventListener('mousemove', scratch); canvas.addEventListener('touchmove', scratch);
        }, [isRevealed]);
        return ( <div className="scratch-container mt-6"> {!isRevealed && <canvas ref={canvasRef} className="scratch-canvas" />} <div className="scratch-content">{children}</div> </div> );
    };

    const App = () => {
        const [lang, setLang] = useState('hi'); const [status, setStatus] = useState("loading");
        const [member, setMember] = useState(null); const [headers, setHeaders] = useState([]);
        const [prizeDisplay, setPrizeDisplay] = useState({ img: "", msg: "", isLocked: true, type: "normal", highlight: "" });
        const [isScratched, setIsScratched] = useState(false); const [isAdmin, setIsAdmin] = useState(false);
        const t = vocab[lang];

        const mapPrizeDetails = useCallback((userRow, maps, mainHeaders) => {
            const mID = (userRow[1] || "").toString().toLowerCase().trim();
            const dDateStr = (userRow[36] || "").toString().trim();
            const masterLock = (userRow[37] || "").toString().toUpperCase().trim();
            const prizeInam = (userRow[4] || "").toString().trim();
            const today = new Date(); const drawDate = dDateStr ? new Date(dDateStr) : null;
            const magic = ["DPSG_WINNER", "DPSG_CASH", "DPSG_GIFT", "DPSG_NEXT"];

            if (!dDateStr || drawDate > today || !magic.includes(masterLock)) {
                setPrizeDisplay({ img: "", msg: t.pending, isLocked: true, type: "normal" }); return;
            }
            const match = maps.find(m => m.Membership_ID.toLowerCase() === mID);
            if (masterLock === "DPSG_WINNER" && match) setPrizeDisplay({ img: toDirectLink(match.Image_Link), highlight: prizeInam, msg: `🎉 बधाई! आपने 51 मुख्य इनामों की लिस्ट में ${match.Match_Name} जीता है!`, isLocked: false, type: "winner" });

        useEffect(() => {
            fetch(MAIN_CSV + "&t=" + Date.now()).then(r => r.text()).then(txt => {
                Papa.parse(txt, { complete: (res) => {
                    const rows = res.data; setHeaders(rows[0] || []);

                    if (match) { setMember(match); fetch(MAPPING_CSV).then(r => r.text()).then(mTxt => { Papa.parse(mTxt, { header: true, complete: (mRes) => { mapPrizeDetails(match, mRes.data, rows[0]); setStatus("view"); } }); }); }
                    else setStatus("search");
                }});
            });
        }, [mapPrizeDetails]);

        if (status === "loading") return <div className="h-screen bg-[#010413] flex items-center justify-center text-yellow-500 font-black italic">DPSG LOADING...</div>;

        return (
            <div className="min-h-screen p-4 sm:p-8 text-center bg-[#010413]">
                <div className="max-w-md mx-auto no-print flex justify-between mb-8 items-center border-b border-white/10 pb-4">
                    <div className="flex bg-white/5 p-1 rounded-xl">
                        <button onClick={() => setLang('hi')} className={`px-4 py-1.5 rounded-lg ${lang === 'hi' ? 'bg-white text-black' : 'text-gray-400'}`}>हिन्दी</button>
                        <button onClick={() => setLang('en')} className={`px-4 py-1.5 rounded-lg ${lang === 'en' ? 'bg-white text-black' : 'text-gray-400'}`}>EN</button>
                    </div>
                    <button onClick={() => {if(prompt("PIN?")===MASTER_PIN) setIsAdmin(true)}} className="opacity-10 hover:opacity-100 transition-all"><i className="fa-solid fa-fingerprint text-3xl"></i></button>
                </div>

                <div className="max-w-md mx-auto">
                    {status === "search" ? (
                        <div className="bg-white/5 border border-white/10 p-10 rounded-[3rem] text-white">
                            <h2 className="text-xl font-black mb-8 italic uppercase tracking-widest">{t.idLabel}</h2>
                            <input id="sid" type="text" className="w-full bg-black/40 border border-white/10 rounded-2xl py-6 text-center mb-6 text-white text-xl font-bold" placeholder="DPSG-26-XXX" />
                            <button onClick={() => window.location.href=`?id=${document.getElementById('sid').value}`} className="w-full bg-blue-600 py-6 rounded-2xl font-black uppercase text-white shadow-xl">विवरण देखें</button>
                        </div>
                    ) : (
                        <div className="space-y-8 animate-in zoom-in">
                            <div className="text-center text-white">
                                <h1 className="text-2xl font-black italic uppercase leading-tight">{t.brand}</h1>
                                <p className="text-yellow-500 font-bold tracking-widest mt-1 uppercase">{t.service}</p>
                                <p className="text-[11px] text-blue-400 font-bold mt-2 italic tracking-widest uppercase underline decoration-blue-500/30 underline-offset-4">{t.slogan}</p>
                            </div>

                            {prizeDisplay.isLocked ? (
                                <div className="bg-white/5 border border-white/10 p-10 rounded-[2rem] italic text-white">
                                    <i className="fa-solid fa-lock text-4xl text-yellow-500 mb-4"></i>
                                    <h2 className="text-xl font-bold leading-relaxed">{prizeDisplay.msg}</h2>
                                </div>
                            ) : (
                                <div className={prizeDisplay.type !== 'loss' ? 'winner-peela-glow' : 'bg-white/5 border border-white/10 p-6 rounded-[2rem]'}>
                                    <ScratchCard onComplete={() => { setIsScratched(true); confetti(); }}>
                                        <div className="bg-yellow-500 text-black font-black py-3 px-6 rounded-full inline-block italic uppercase text-sm mb-4 shadow-lg">{prizeDisplay.highlight}</div>
                                        <div className="prize-image-display"><img src={prizeDisplay.img} alt="Prize" /></div>
                                    </ScratchCard>
                                    {isScratched && <div className="p-6 mt-4 bg-white/10 rounded-2xl text-left text-[13px] text-blue-100 italic leading-relaxed">{prizeDisplay.msg}</div>}
                                </div>

                            <div id="receipt" className="receipt-card bg-white text-slate-900 rounded-[3.5rem] p-10 shadow-2xl text-left">
                                <div className="text-center border-b-2 border-dashed border-slate-200 pb-8 mb-8">
                                    <h3 className="font-black text-2xl text-blue-700 italic uppercase tracking-tighter">{t.receipt}</h3>
                                    <p className="text-[9px] font-black text-slate-400 uppercase tracking-widest mt-2 italic">NIMBAHERA, RAJASTHAN</p>
                                </div>
                                <div className="space-y-8">
                                    <div className="flex justify-between border-b pb-4">
                                        <div><p className="text-[10px] text-slate-400 font-black uppercase italic">ID IDENTITY</p><p className="text-xl font-black uppercase mt-1 leading-none">{member[1]}</p></div>
                                        <div className="text-right"><p className="text-[10px] text-slate-400 font-black uppercase italic">Category</p><p className="text-[11px] font-black text-blue-700 uppercase mt-1 italic leading-none">{member[3]}</p></div>
                                    </div>
                                    <div className="bg-blue-600 rounded-[3.5rem] p-10 text-center text-white shadow-xl">
                                        <p className="text-[11px] font-black uppercase opacity-70 mb-2 italic tracking-widest">{t.points}</p>
                                        <span className="text-8xl font-black leading-none">{member[21]}</span>
                                    </div>
                                    <div className="bg-slate-50 p-8 rounded-[2.5rem] border border-slate-100 shadow-inner">
                                        <p className="text-[10px] font-black text-blue-700 uppercase mb-6 flex items-center italic leading-none"><i className="fa-solid fa-crown mr-3"></i> सदस्यता कार्ड सुविधायें</p>
                                        {(() => {
                                            const s = member[3].toLowerCase();
                                            let key = (s.includes("vip") || s.includes("500")) ? "VIP" : (s.includes("gold") || s.includes("100")) ? "Gold" : "Silver";
                                            return cardSpecs[key][lang].map((ben, i) => (
                                                <div key={i} className="flex items-start text-[11px] font-bold italic py-3 border-b border-slate-200/50 last:border-0 leading-tight"><i className="fa-solid fa-circle-check text-green-500 mr-3 mt-1"></i>{ben}</div>

                                        })()}
                                    </div>
                                    <div className="grid grid-cols-2 gap-x-4 gap-y-12 py-8 border-y border-slate-100">
                                        <div><p className="text-[9px] text-slate-400 font-black uppercase mb-2 italic">Customer Name</p><p className="text-[17px] font-black uppercase italic leading-tight text-slate-900">{member[8]}</p></div>
                                        <div className="text-right"><p className="text-[9px] text-slate-400 font-black uppercase mb-2 italic">Village</p><p className="text-[17px] font-black uppercase italic leading-tight text-slate-900">{member[5]}</p></div>
                                        <div><p className="text-[9px] text-slate-400 font-black uppercase mb-2 italic">Mobile (Secure)</p><p className="text-[15px] font-bold tracking-widest">{mask(member[9])}</p></div>
                                        <div className="text-right"><p className="text-[9px] text-slate-400 font-black uppercase mb-2 italic">Aadhar (Secure)</p><p className="text-[15px] font-bold tracking-widest">{mask(member[11])}</p></div>
                                    </div>
                                    <div className="bg-slate-950 text-white p-8 rounded-[2.5rem] text-center shadow-2xl relative">
                                        <p className="text-[11px] font-black uppercase opacity-50 mb-4 italic leading-none tracking-widest">{t.draw}</p>
                                        <p className="text-4xl font-black text-yellow-500 italic uppercase leading-none tracking-tighter">{member[36]}</p>
                                    </div>
                                    <div className="bg-slate-50 p-10 rounded-[3rem] border border-slate-200 shadow-inner">
                                        <h4 className="text-[11px] font-black uppercase mb-6 border-b pb-3 italic leading-none flex items-center"><i className="fa-solid fa-scale-balanced mr-3 text-blue-600"></i> {t.terms}</h4>
                                        <div className="space-y-6 text-slate-600 font-bold italic text-[10px] leading-relaxed">
                                            <p>०१. {t.t1}</p><p>०२. {t.t2}</p><p>०३. {t.t3}</p><p>०४. {t.t4}</p><p>०५. {t.t5}</p>
                                            <p>०६. {t.t6}</p><p>०७. {t.t7}</p><p>०८. {t.t8}</p><p>०९. {t.t9}</p><p>१०. {t.t10}</p>
                                        </div>
                                    </div>
                                    <button onClick={()=>window.print()} className="no-print w-full bg-slate-900 text-white py-6 rounded-full text-[12px] font-black uppercase shadow-2xl transition-all active:scale-95">PRINT OFFICIAL RECEIPT</button>
                                </div>
                            </div>

                            {isAdmin && (
                                <div className="no-print mt-12 bg-white/5 border border-white/10 rounded-[3.5rem] p-10 text-left animate-in fade-in">
                                    <h3 className="text-blue-400 font-black uppercase italic mb-8 border-b border-white/10 pb-4 text-[13px] tracking-widest text-center">Master Data Dashboard (39 Columns)</h3>
                                    <div className="grid grid-cols-1 gap-4 max-h-[600px] overflow-auto pr-4 custom-scroll">
                                        {member.map((val, i) => ( <div key={i} className="p-4 bg-white/5 rounded-2xl border border-white/5"> <p className="text-[8px] opacity-50 uppercase font-black mb-1">{headers[i] || `Index ${i}`}</p> <p className="font-bold text-white italic text-[14px]">{val || "---"}</p> </div> ))}
                                    </div>
                                    <button onClick={()=>setIsAdmin(false)} className="mt-8 w-full bg-red-500 text-white py-4 rounded-2xl font-black uppercase text-[10px]">Logout Admin</button>
                                </div>
                            )}
                        </div>
                    )}
                </div>
            </div>
        );
    };
    const root = ReactDOM.createRoot(document.getElementById('root')); root.render(<App />);
    </script>
</body>
</html>
