<!DOCTYPE html>  
<html lang="hi">  
<head>  
    <meta charset="UTF-8">  
    <meta name="viewport" content="width=device-width, initial-scale=1.0">  
    <title>DPSG Digital Seva - Smart Dashboard</title>  
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>  
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>  
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>  
    <script src="https://cdn.tailwindcss.com"></script>  
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>  
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>  
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">  
    <script>tailwind.config = { darkMode: 'class' }</script>
    <style>  
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');  
        body { font-family: 'Inter', sans-serif; transition: background-color 0.3s; margin: 0; overflow-x: hidden; }  
        .receipt-card { border: 1px solid #e2e8f0; color: #0f172a; border-radius: 2rem; background: white; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.1); }  
        @media print { .no-print { display: none !important; } .receipt-card { border: none !important; box-shadow: none !important; width: 100% !important; margin: 0 !important; } }  
        .marquee { white-space: nowrap; overflow: hidden; position: relative; background: #fbbf24; color: #000; font-weight: 800; padding: 10px 0; font-size: 14px; text-transform: uppercase; border-bottom: 2px solid #000; }  
        .marquee p { display: inline-block; padding-left: 100%; animation: marquee 25s linear infinite; }  
        @keyframes marquee { 0% { transform: translate(0, 0); } 100% { transform: translate(-100%, 0); } }  
        .scratch-container { position: relative; width: 100%; max-width: 500px; margin: 0 auto; min-height: 400px; }  
        .scratch-canvas { position: absolute; top: 0; left: 0; z-index: 30; border-radius: 1.5rem; cursor: crosshair; touch-action: none; width: 100%; height: 100%; }  
        .scratch-content { background: #fff; border-radius: 1.5rem; overflow: hidden; display: flex; flex-direction: column; align-items: center; justify-content: center; width: 100%; height: 100%; border: 4px solid #334155; }  
        .winner-glow { border: 6px solid #fbbf24; box-shadow: 0 0 60px rgba(251, 191, 36, 0.7); animation: pulse 2s infinite; }  
        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.02); } }
        .progress-bar { transition: width 1s ease-in-out; }
        .custom-scroll::-webkit-scrollbar { width: 6px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>  
<body>  
    <div id="root"></div>  
    <script type="text/babel">  
    const { useState, useEffect, useRef, useCallback } = React;  
    const SHEET_ID = "1rrU0EHXur_HfPlmYxjm6vIJqeRW2VZAu0qIteItQkLo";  
    const MAIN_CSV = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv`;  
    const MAPPING_CSV = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRlm-iMRLk5J-lxybJ7S2sR3ZpcGNG8Z8r3BEku8GzK8opYlsunIcZoe03Jf0Xbhw/pub?gid=1529433935&single=true&output=csv";  
    const MASTER_PIN = "Chanchal@6375";  

    const toDirectLink = (url) => { if (!url) return ""; let id = ""; if (url.includes("/d/")) id = url.split("/d/")[1].split("/")[0]; if (url.includes("id=")) id = url.split("id=")[1].split("&")[0]; return id ? "https://drive.google.com/thumbnail?id=" + id + "&sz=w1000" : url; };  
    const mask = (v) => v?.length > 4 ? v.slice(0, 2) + "******" + v.slice(-2) : v;  

    const ScratchCard = ({ onComplete, children }) => {  
        const canvasRef = useRef(null); const [isRevealed, setIsRevealed] = useState(false);  
        useEffect(() => {  
            const canvas = canvasRef.current; if(!canvas) return; const ctx = canvas.getContext('2d');  
            canvas.width = canvas.parentElement.offsetWidth; canvas.height = canvas.parentElement.offsetHeight;  
            const grad = ctx.createLinearGradient(0, 0, canvas.width, canvas.height);  
            grad.addColorStop(0, '#D4AF37'); grad.addColorStop(0.5, '#F9F295'); grad.addColorStop(1, '#B8860B');  
            ctx.fillStyle = grad; ctx.fillRect(0, 0, canvas.width, canvas.height);  
            ctx.font = "bold 24px Inter"; ctx.fillStyle = "#4a3b01"; ctx.textAlign = "center";  
            ctx.fillText("SCRATCH FATA-FAT!", canvas.width / 2, canvas.height / 2);  
            const scratch = (e) => {  
                if (isRevealed) return; const rect = canvas.getBoundingClientRect();  
                const x = (e.pageX || (e.touches && e.touches[0].pageX)) - rect.left;  
                const y = (e.pageY || (e.touches && e.touches[0].pageY)) - rect.top;  
                ctx.globalCompositeOperation = 'destination-out'; ctx.beginPath(); 
                ctx.arc(x, y, 55, 0, Math.PI * 2); // Bigger arc for faster scratching
                ctx.fill();  
                const pixels = ctx.getImageData(0, 0, canvas.width, canvas.height).data;  
                let count = 0; for (let i = 0; i < pixels.length; i += 40) if (pixels[i + 3] === 0) count++;  
                if (count > (pixels.length / 40) * 0.45) { setIsRevealed(true); onComplete(); }  
            };  
            canvas.addEventListener('mousemove', scratch); canvas.addEventListener('touchmove', scratch, {passive: true});  
        }, [isRevealed]);  
        return ( <div className="scratch-container"> {!isRevealed && <canvas ref={canvasRef} className="scratch-canvas" />} <div className="scratch-content">{children}</div> </div> );  
    };  
    const App = () => {  
        const [lang, setLang] = useState('hi'); const [theme, setTheme] = useState('light');
        const [status, setStatus] = useState("loading"); const [member, setMember] = useState(null); 
        const [headers, setHeaders] = useState([]); const [isAdmin, setIsAdmin] = useState(false);  
        const [prize, setPrize] = useState({ img: "", msg: "", isLocked: true, type: "normal", highlight: "", colorClass: "" });  
        const [showPin, setShowPin] = useState(false); const [showForm, setShowForm] = useState({ show: false, srv: "" });

        const vocab = {
            hi: { brand: "डिजिटल प्रॉब्लम सॉल्यूशन ग्रुप", wallet: "डिजिटल वॉलेट प्रोग्रेस", warning: "⚠️ आधिकारिक घोषणा होने तक कृपया कार्ड को स्क्रैच न करें", pending: "परिणाम जल्द घोषित होगा।" },
            en: { brand: "Digital Problem Solution Group", wallet: "Digital Wallet Progress", warning: "⚠️ Do not scratch until official announcement", pending: "Results pending." }
        };
        const t = vocab[lang];

        const mapPrize = useCallback((row, maps) => {  
            const mID = (row[1] || "").toString().toLowerCase().trim();  
            const dDateStr = (row[36] || "").toString().trim(); 
            const lock = (row[37] || "").toString().toUpperCase().trim(); 
            const inamName = (row[4] || "").toString().trim();  
            
            let drawDate = null;
            if (dDateStr) {
                let parts = dDateStr.split(/[-/]/);
                if (parts.length === 3) drawDate = new Date(parts[2], parts[1]-1, parts[0]);
                else drawDate = new Date(dDateStr);
            }
            const today = new Date(); today.setHours(0,0,0,0); if(drawDate) drawDate.setHours(0,0,0,0);

            // Hide debug data if Inam Status is blank
            if (!lock || !dDateStr || drawDate > today) {
                setPrize({ msg: t.pending, isLocked: true }); return;
            }

            const match = maps.find(m => m.Membership_ID && m.Membership_ID.toLowerCase() === mID);  

            if (lock === "DPSG_WINNER" && match) {
                setPrize({ 
                    img: toDirectLink(match.Image_Link), 
                    highlight: match.Match_Name, 
                    msg: `🏆 'मंजिल उन्हीं को मिलती है जिनके सपनों में जान होती है, आज आपकी मेहनत और किस्मत दोनों मेहरबान होती है!' \n\n आप बने हैं महा-इनाम के विजेता! आपकी रैंक ${match.Match_Name} है। उज्ज्वल भविष्य की शुभकामनाओं के साथ धन्यवाद!`, 
                    isLocked: false, type: "winner", colorClass: "winner-glow bg-yellow-100" 
                });  
            } else if (lock === "DPSG_CASH") {
                setPrize({ 
                    img: "https://drive.google.com/thumbnail?id=1WOrBZpuRF9Q-Pc753LA11XoAaGjCv7zD&sz=w1000", 
                    highlight: inamName, 
                    msg: `💰 'इनाम छोटा हो या बड़ा, अपनों का साथ सबसे प्यारा है, जीत की ये शुरुआत है, अभी तो सारा आसमान तुम्हारा है!' \n\n महा-इनाम में स्थान न सही, पर आप हमारे खास हैं। DPSG की ओर से यह स्पेशल कैशबैक स्वीकार करें। धन्यवाद!`, 
                    isLocked: false, type: "cash", colorClass: "border-4 border-green-500 bg-green-50" 
                });  
            } else if (lock === "DPSG_GIFT") {
                setPrize({ 
                    img: "https://drive.google.com/thumbnail?id=1baCVXWH7XYD5T8QxOfGKnkt9CKDHSx2Z&sz=w1000", 
                    highlight: inamName, 
                    msg: `🎁 'खूबसूरत सा ये तोहफा बस एक छोटा सा बहाना है, हमे तो आपके साथ मिलकर खुशियों का जशन मनाना है!' \n\n DPSG अपने परिवार को खाली हाथ नहीं भेजता। हमारी ओर से यह गिफ्ट आपके भरोसे का प्रतीक है। धन्यवाद!`, 
                    isLocked: false, type: "gift", colorClass: "border-4 border-blue-500 bg-blue-50" 
                });  
            } else {
                setPrize({ 
                    img: "https://drive.google.com/thumbnail?id=1j7v5a90h8ABi2r6piQIZR_4Qil4buiqh&sz=w1000", 
                    highlight: "TRY AGAIN", 
                    msg: `✨ 'गिरते हैं शहसवार ही मैदान-ए-जंग में, वो क्या गिरेंगे जो घुटनों के बल चलते हैं!' \n\n निराश न हों, अगली जीत आपकी ही होगी। हमारे मिशन का हिस्सा बनने के लिए धन्यवाद!`, 
                    isLocked: false, type: "loss", colorClass: "bg-slate-100" 
                });  
            }
        }, [t.pending]);

        useEffect(() => {  
            fetch(MAIN_CSV + "&t=" + Date.now()).then(r => r.text()).then(txt => {  
                Papa.parse(txt, { complete: (res) => {  
                    const rows = res.data; setHeaders(rows[0] || []);  
                    const qId = new URLSearchParams(window.location.search).get('id');  
                    const match = rows.slice(1).find(r => r[1] && r[1].toLowerCase() === (qId || "").toLowerCase());  
                    if (match) { setMember(match); fetch(MAPPING_CSV).then(r => r.text()).then(mTxt => { Papa.parse(mTxt, { header: true, complete: (mRes) => { mapPrize(match, mRes.data); setStatus("view"); } }); }); }  
                    else setStatus("search");  
                }});  
            });  
        }, [mapPrize]);  

        if (status === "loading") return <div className="h-screen flex items-center justify-center font-black text-blue-600">DPSG LOADING...</div>;  

        return (  
            <div className={`min-h-screen ${theme === 'dark' ? 'bg-slate-900 text-white' : 'bg-slate-50 text-slate-900'}`}>  
                <div className="no-print marquee"><p>{member ? member[38] : "Welcome to DPSG - Smart Digital Dashboard"}</p></div>  
                <div className="max-w-xl mx-auto p-4 sm:p-8">  
                    <div className="no-print flex justify-between mb-6">
                        <div className="flex bg-slate-200 dark:bg-slate-700 p-1 rounded-xl">
                            <button onClick={()=>setLang('hi')} className={`px-4 py-1 rounded-lg ${lang==='hi'?'bg-white shadow':''}`}>HI</button>
                            <button onClick={()=>setLang('en')} className={`px-4 py-1 rounded-lg ${lang==='en'?'bg-white shadow':''}`}>EN</button>
                        </div>
                        <button onClick={()=>setTheme(theme==='light'?'dark':'light')} className="text-2xl">{theme==='light'?'🌙':'☀️'}</button>
                    </div>

                    {status === "search" ? (  
                        <div className="bg-white dark:bg-slate-800 p-10 rounded-[2.5rem] shadow-xl text-center border">  
                            <i className="fa-solid fa-id-card text-6xl text-blue-600 mb-6"></i>  
                            <h2 className="text-xl font-black mb-6 uppercase">ID सर्च करें</h2>  
                            <input id="sid" type="text" className="w-full bg-slate-50 dark:bg-slate-700 border-2 rounded-2xl py-5 text-center mb-6 text-xl font-bold" placeholder="DPSG-26-XXXX" />  
                            <button onClick={() => window.location.href=`?id=${document.getElementById('sid').value}`} className="w-full bg-blue-600 py-5 rounded-2xl font-black text-white shadow-lg">VIEW DASHBOARD</button>  
                        </div>  
                    ) : (  
                        <div className="space-y-8 animate-in slide-in-from-bottom-4 duration-700">  
                            <div className="text-center">  
                                <h1 className="text-2xl font-black italic uppercase text-blue-900 dark:text-blue-400 leading-none">{t.brand}</h1>  
                                <p className="text-yellow-600 font-bold tracking-widest mt-2 uppercase text-sm">Nimbahera Digital Seva</p>  
                            </div>  

                            <div className="no-print bg-white dark:bg-slate-800 p-6 rounded-3xl shadow-md border dark:border-slate-700">
                                <h3 className="font-black mb-4 text-xs uppercase flex items-center"><i className="fa-solid fa-wallet mr-2 text-blue-500"></i> {t.wallet}</h3>
                                <div className="flex justify-between text-xs font-bold mb-2">
                                    <span>Total: {member[21]}</span><span>Balance: {member[23]}</span>
                                </div>
                                <div className="w-full bg-slate-100 dark:bg-slate-700 rounded-full h-4 overflow-hidden shadow-inner">
                                    <div className="bg-gradient-to-r from-blue-500 to-indigo-600 h-4 rounded-full progress-bar" style={{ width: `${(parseInt(member[22])/parseInt(member[21]))*100}%` }}></div>
                                </div>
                            </div>

                            <div className="no-print grid grid-cols-4 gap-3">
                                {[ {id:'e', n:'ई-मित्र', i:'fa-laptop-file', c:'bg-orange-500'}, {id:'d', n:'डेटा रिकवरी', i:'fa-hard-drive', c:'bg-blue-500'}, {id:'m', n:'मोबाइल अनलॉक', i:'fa-mobile-screen-button', c:'bg-purple-500'}, {id:'g', n:'सरकारी योजना', i:'fa-building-columns', c:'bg-green-500'} ].map(s => (
                                    <div key={s.id} onClick={()=>setShowForm({show:true, srv:s.n})} className="flex flex-col items-center p-3 bg-white dark:bg-slate-800 rounded-2xl border cursor-pointer hover:scale-105 transition-all">
                                        <div className={`w-10 h-10 ${s.c} text-white rounded-full flex items-center justify-center mb-1`}><i className={`fa-solid ${s.i}`}></i></div>
                                        <span className="text-[9px] font-bold uppercase">{s.n}</span>
                                    </div>
                                ))}
                            </div>

                            <div className="no-print bg-white dark:bg-slate-800 p-6 rounded-[2rem] shadow-md border">
                                <p className="text-red-600 font-black text-[11px] mb-4 text-center animate-pulse uppercase">{t.warning}</p>
                                <div className={`p-2 rounded-[2rem] ${prize.isLocked ? 'bg-slate-200' : prize.colorClass}`}>  
                                    {prize.isLocked ? (  
                                        <div className="p-12 text-center text-slate-500 font-bold"> <i className="fa-solid fa-lock text-4xl mb-2"></i> <p>{prize.msg}</p> </div>  
                                    ) : (  
                                        <ScratchCard onComplete={() => confetti({particleCount:150, spread:70})}>  
                                            <div className="p-4 text-center w-full bg-white dark:bg-slate-800 flex flex-col items-center">
                                                <div className="bg-blue-600 text-white px-6 py-1 rounded-full font-black text-sm mb-4 uppercase shadow-lg">{prize.highlight}</div>  
                                                <img src={prize.img} className="w-full max-h-80 object-contain drop-shadow-2xl" alt="Prize" />  
                                                <p className="mt-4 text-[12px] font-bold text-slate-700 dark:text-slate-300 leading-relaxed whitespace-pre-line">{prize.msg}</p>
                                            </div>
                                        </ScratchCard>  
                                    )}  
                                </div>
                            </div>

                            <div className="no-print grid grid-cols-2 gap-4">
                                <a href="https://wa.me/917229874128" className="bg-green-500 text-white p-4 rounded-2xl text-center font-black uppercase text-xs"><i className="fa-brands fa-whatsapp mr-2 text-xl"></i> Help</a>
                                <a href="http://maps.google.com" className="bg-red-500 text-white p-4 rounded-2xl text-center font-black uppercase text-xs"><i className="fa-solid fa-location-dot mr-2 text-xl"></i> Location</a>
                            </div>

                            <div id="receipt" className="receipt-card p-10 text-left dark:bg-white dark:text-slate-900 border-2">  
                                <div className="text-center border-b-2 border-dashed pb-6 mb-6">  
                                    <h3 className="font-black text-2xl text-blue-700 italic">PROFESSIONAL DIGITAL RECEIPT</h3>  
                                    <p className="text-[10px] font-bold text-slate-400 uppercase mt-1">DPSG Nimbahera, Rajasthan</p>  
                                </div>  
                                <div className="grid grid-cols-2 gap-y-6 text-sm">  
                                    <div><p className="text-[10px] text-slate-400 font-black">ID IDENTITY</p><p className="text-xl font-black">{member[1]}</p></div>  
                                    <div className="text-right"><p className="text-[10px] text-slate-400 font-black">CATEGORY</p><p className="font-black text-blue-700 px-3 py-1 border rounded-full inline-block">{member[3]}</p></div>  
                                    <div><p className="text-[10px] text-slate-400 font-black">CUSTOMER</p><p className="font-black uppercase">{member[8]}</p></div>  
                                    <div className="text-right"><p className="text-[10px] text-slate-400 font-black">VILLAGE</p><p className="font-black uppercase">{member[5]}</p></div>  
                                    <div><p className="text-[10px] text-slate-400 font-black">ACTIVATION</p><p className="font-bold">{member[34]}</p></div>  
                                    <div className="text-right"><p className="text-[10px] text-slate-400 font-black">EXPIRY</p><p className="font-bold text-red-600">{member[35]}</p></div>  
                                </div>
                                <div className="grid grid-cols-3 gap-3 my-8">
                                    <div className="bg-blue-600 text-white p-4 rounded-2xl text-center"><p className="text-[8px] font-bold">POINTS</p><p className="text-2xl font-black">{member[21]}</p></div>
                                    <div className="bg-slate-800 text-white p-4 rounded-2xl text-center"><p className="text-[8px] font-bold">USED</p><p className="text-2xl font-black">{member[22]}</p></div>
                                    <div className="bg-green-600 text-white p-4 rounded-2xl text-center"><p className="text-[8px] font-bold">LEFT</p><p className="text-2xl font-black">{member[23]}</p></div>
                                </div>
                                <div className="bg-slate-900 text-white p-6 rounded-2xl text-center mb-6">
                                    <p className="text-[10px] opacity-60 uppercase mb-1">Lucky Draw Date</p>
                                    <p className="text-2xl font-black text-yellow-500 italic uppercase">{member[36]}</p>
                                </div>
                                <button onClick={()=>window.print()} className="no-print w-full bg-blue-600 text-white py-5 rounded-full font-black uppercase shadow-lg">Print Receipt</button>
                            </div>

                            <div className="no-print pb-20 flex flex-col items-center">  
                                {!isAdmin && <button onClick={()=>setShowPin(!showPin)} className="p-6 bg-white dark:bg-slate-800 rounded-full shadow-lg border opacity-20 hover:opacity-100 transition-all"><i className="fa-solid fa-fingerprint text-4xl text-blue-600"></i></button>}  
                                {showPin && !isAdmin && (
                                    <div className="mt-4 bg-white dark:bg-slate-800 p-6 rounded-3xl border w-full animate-in zoom-in">
                                        <input type="password" id="adminPin" className="w-full bg-slate-100 dark:bg-slate-700 rounded-xl py-4 text-center mb-4 font-bold outline-none" placeholder="PIN" />
                                        <button onClick={()=>{document.getElementById('adminPin').value===MASTER_PIN?setIsAdmin(true):alert("Wrong!");}} className="w-full bg-black text-white py-4 rounded-xl font-bold">UNLOCK ADMIN DB</button>
                                    </div>
                                )}
                                {isAdmin && (
                                    <div className="w-full mt-6 bg-white dark:bg-slate-800 border rounded-3xl p-6 text-left shadow-2xl overflow-hidden">
                                        <h3 className="font-black text-xs text-blue-600 mb-4 uppercase">Master DB (0-38)</h3>
                                        <div className="grid gap-3 max-h-80 overflow-y-auto pr-2 custom-scroll">
                                            {member.map((v, i) => ( <div key={i} className="p-3 bg-slate-50 dark:bg-slate-700 rounded-xl border"><p className="text-[8px] text-slate-400 font-black">{headers[i]}</p><p className="font-bold text-sm">{v||"---"}</p></div> ))}
                                        </div>
                                    </div>
                                )}
                            </div>
                        </div>
                    )}
                </div>

                {showForm.show && (
                    <div className="fixed inset-0 bg-black/70 z-50 flex items-center justify-center p-4">
                        <div className="bg-white dark:bg-slate-800 w-full max-w-sm rounded-[2rem] p-8 relative shadow-2xl">
                            <button onClick={()=>setShowForm({show:false, srv:""})} className="absolute top-4 right-4 text-slate-400 hover:text-red-500 text-2xl"><i className="fa-solid fa-circle-xmark"></i></button>
                            <h3 className="text-xl font-black text-center mb-6 uppercase text-blue-600">{showForm.srv} Request</h3>
                            <form action="https://formspree.io/f/xwvndvoe" method="POST" encType="multipart/form-data" className="space-y-4">
                                <input type="hidden" name="Service" value={showForm.srv} /><input type="hidden" name="ID" value={member[1]} />
                                <input type="text" name="Name" placeholder="Full Name" required className="w-full bg-slate-100 dark:bg-slate-700 rounded-xl py-4 px-4 font-bold outline-none" />
                                <input type="tel" name="Mobile" placeholder="Mobile" required className="w-full bg-slate-100 dark:bg-slate-700 rounded-xl py-4 px-4 font-bold outline-none" />
                                <div className="border-2 border-dashed rounded-xl p-4 text-center relative cursor-pointer">
                                    <i className="fa-solid fa-file-arrow-up text-2xl text-slate-400 mb-2"></i><p className="text-[10px] font-bold text-slate-500">Attach Document/Photo</p>
                                    <input type="file" name="file" required className="absolute inset-0 opacity-0 cursor-pointer" />
                                </div>
                                <button type="submit" className="w-full bg-blue-600 text-white py-4 rounded-xl font-black uppercase shadow-lg hover:bg-blue-700 active:scale-95 transition-all">Submit to DPSG</button>
                            </form>
                        </div>
                    </div>
                )}
            </div>  
        );  
    };  
    const root = ReactDOM.createRoot(document.getElementById('root')); root.render(<App />);  
    </script>
</body>  
</html>
