<!DOCTYPE html>  
<html lang="hi">  
<head>  
    <meta charset="UTF-8">  
    <meta name="viewport" content="width=device-width, initial-scale=1.0">  
    <title>DPSG Master Portal - Digital Seva Nimbahera</title>  
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>  
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>  
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>  
    <script src="https://cdn.tailwindcss.com"></script>  
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>  
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>  
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">  
    <script>tailwind.config = { darkMode: 'class' }</script>
    <style> 
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=Play:wght@700&family=Poppins:wght@500;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; transition: background-color 0.3s; margin: 0; background: linear-gradient(135deg, #f0f4f8, #e0e7ff, #f8fafc); }  
        .glass-card { background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(20px); border-radius: 2.5rem; border: 2px solid rgba(255,255,255,0.5); box-shadow: 0 25px 50px -12px rgba(0,0,0,0.15); }  
        .marquee { background: linear-gradient(90deg, #d97706, #fbbf24, #d97706); color: #000; padding: 18px 0; border-bottom: 4px solid #92400e; overflow: hidden; position: relative; }  
        .marquee-content { display: inline-block; padding-left: 100%; animation: marquee 25s linear infinite; white-space: nowrap; font-weight: 900; }  
        @keyframes marquee { 0% { transform: translate(0, 0);} 100% { transform: translate(-100%, 0); } }  
        .card-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(70px, 1fr)); gap: 10px; max-height: 400px; overflow-y: auto; padding: 15px; background: #f8fafc; border-radius: 1.5rem; border: 2px solid #e2e8f0; }
        .grid-item { padding: 15px 5px; text-align: center; border-radius: 12px; font-weight: 900; cursor: pointer; transition: 0.2s; border: 2px solid transparent; font-size: 14px; }
        .grid-item.available.vip { background: #e0e7ff; color: #1e3a8a; border-color: #c7d2fe; }
        .grid-item.available.gold { background: #fef3c7; color: #92400e; border-color: #fde68a; }
        .grid-item.available.silver { background: #f1f5f9; color: #334155; border-color: #e2e8f0; }
        .grid-item.sold { background: #fee2e2; color: #991b1b; cursor: not-allowed; position: relative; opacity: 0.7; }
        .grid-item.sold::after { content: 'SOLD'; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%) rotate(-20deg); font-size: 10px; background: #ef4444; color: white; padding: 1px 4px; border-radius: 4px; }
        .grid-item.selected { border-color: #22c55e; background: #dcfce7 !important; color: #166534 !important; transform: scale(1.1); box-shadow: 0 0 15px rgba(34,197,94,0.4); }
        .scratch-container { position: relative; width: 100%; max-width: 550px; min-height: 400px; margin: 0 auto; }  
        .scratch-canvas { position: absolute; top: 0; left: 0; z-index: 10; border-radius: 2rem; cursor: crosshair; touch-action: none; width: 100%; height: 100%; }  
        .scratch-content { background: #fff; border-radius: 2rem; display: flex; flex-direction: column; align-items: center; justify-content: center; width: 100%; height: 100%; border: 4px solid #1e293b; }  
        .custom-scroll::-webkit-scrollbar { width: 8px; } .custom-scroll::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        @media print { .no-print { display: none !important; } .glass-card { border: none !important; box-shadow: none !important; width: 100% !important; margin: 0 !important; background: white !important;} }
    </style>
</head>  
<body>  
    <div id="root"></div>  
    <script type="text/babel">  
    const { useState, useEffect, useRef, useCallback } = React;

    // --- बैकएंड कॉन्फ़िगरेशन (एक्सेल शीट हेडर्स मैचिंग) ---
    const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyrJDOqyreLQ3ylpumfUgnHe1DFBwoIIjPg-C8kc_2Lm9C43VLeZrN-uoBzATw20Kva/exec";
    const FILE_UPLOAD_URL = "https://script.google.com/macros/s/AKfycbzbGT8QdrTlBlNyN2m502f03N10VdwmBhNUYkDP6nWmqGi99Y5qwFYVfa91zA2UeNQ/exec";
    const REQUEST_SHEET_CSV = "https://docs.google.com/spreadsheets/d/1mMQs6zU_EKRt1o8wEwZQnYrDhCHa-p-WthNdQDb4_Xk/export?format=csv";
    const MAIN_CSV = "https://docs.google.com/spreadsheets/d/1rrU0EHXur_HfPlmYxjm6vIJqeRW2VZAu0qIteItQkLo/export?format=csv";
    const STAFF_CREDENTIALS = { "Parkash": "DPS@Parkash6375#", "Rajkumar": "DPS@Rajkumar6375#", "Jorawar": "DPS@Jorawar6375#" };

    const inamList = [
        { rank: "1", name: "₹5000 Cash", msg: "किस्मत का ताला खुलेगा, जेब में गांधी मुस्कुराएंगे, DPSG के साथ हुकुम, आप मालामाल हो जाएंगे!" },
        { rank: "2", name: "LED TV", msg: "घर बैठे सिनेमा का आनंद, हर तस्वीर में दिखेगा जान, LED टीवी जीतकर, बढ़ाइये अपने घर की शान!" },
        { rank: "3", name: "Kids Bicycle", msg: "नन्हे क़दमों की तेज़ रफ़्तार, बचपन को दें खुशियों का उपहार!" },
        { rank: "4", name: "Ceiling Fan", msg: "चलेगी जब ठंडी हवा, मिट जाएगी हर थकान, पंखा जीतेगा वो, जो है DPSG की जान!" },
        { rank: "5", name: "Bati Oven", msg: "गरमा-गरम बाटी का स्वाद, निम्बाहेड़ा का है ये अनूठा अंदाज़!" },
        { rank: "6", name: "Keypad Mobile Phone", msg: "बातें होंगी अपनों से, दूरियां सारी मिट जाएंगी, हाथ में होगा मोबाइल!" },
        { rank: "7-20", name: "Premium Gifts", msg: "स्टाइल भी होगा और चमक भी, जब जीतेंगे आप ये शाही इनाम!" },
        { rank: "21-51", name: "Surprise Gifts", msg: "कोई खाली हाथ नहीं जाएगा, हर कार्ड में है दम!" }
    ];

    const termsConditions = [
        "01. यह सदस्यता कार्ड व्यक्तिगत है और अहस्तांतरणीय है।",
        "02. सेवाओं का लाभ केवल समाप्ति तिथि तक ही मान्य है।",
        "03. लिया गया पंजीकरण शुल्क वापस नहीं होगा।",
        "04. सर्वर त्रुटि में फिजिकल स्क्रैच कार्ड परिणाम अंतिम होगा।",
        "05. सरकारी टोकन शुल्क ग्राहक द्वारा अलग से देय होगा।",
        "06. यह समाज सेवा हेतु है, कृपया कार्य पूर्ण होने तक धैर्य रखें।",
        "07. मैनेजमेंट के पास नियमों में बदलाव का पूर्ण अधिकार है।"
    ];

    const serviceList = [
        "Airtel Payment Bank (Khaata/KYC)", "PAN Card (New/Correction)", "Birth Certificate", "Caste Certificate", 
        "Bonafide (Mool Niwas)", "Jan Aadhar Correction", "Ration Card Service", "Data Recovery", "Other Work"
    ];
    const App = () => {  
        const [appState, setAppState] = useState("landing");
        const [appView, setAppView] = useState("portal");
        const [cardsData, setCardsData] = useState([]);
        const [selectedCardId, setSelectedCardId] = useState(null);
        const [selectedFilter, setSelectedFilter] = useState("ALL");
        const [member, setMember] = useState(null);
        const [showServiceForm, setShowServiceForm] = useState(false);
        const [formType, setFormType] = useState("");
        const [bookingPaymentMode, setBookingPaymentMode] = useState("Cash");
        const [statusCheckResult, setStatusCheckResult] = useState(null);
        const [staffName, setStaffName] = useState("");
        const [isSubmitting, setIsSubmitting] = useState(false);

        // --- 1. रीयल-टाइम डेटा लोड करना (एक्सेल शीट से) ---
        useEffect(() => {
            const loadMasterData = async () => {
                try {
                    const [res1, res2] = await Promise.all([
                        fetch(MAIN_CSV + "?t=" + Date.now()),
                        fetch(REQUEST_SHEET_CSV + "?t=" + Date.now())
                    ]);
                    const mainRows = Papa.parse(await res1.text()).data;
                    const reqRows = Papa.parse(await res2.text(), {header:true}).data;
                    
                    let parsedCards = [];
                    for(let i=1; i<=1000; i++){
                        let row = mainRows[i] || [];
                        let sNo = String(i).padStart(4, '0');
                        let isSold = !!row[8] || reqRows.some(r => r.Serial_Number === sNo && r.Work_Status === 'SOLD');
                        parsedCards.push({ id: sNo, type: i<=100?'VIP':i<=600?'Gold':'Silver', sold: isSold });
                    }
                    setCardsData(parsedCards);

                    // ऑटो-रसीद खोलना (ID सर्च होने पर)
                    const qId = new URLSearchParams(window.location.search).get('id');
                    if(qId) { 
                        const match = mainRows.find(r => r[1] && r[1].toLowerCase() === qId.toLowerCase()); 
                        if(match) { setMember(match); setAppState("view"); }
                    }
                } catch(e) { console.error("Data Load Error", e); }
            };
            loadMasterData();
        }, []);

        // --- 2. व्हाट्सएप और एक्सेल डेटा सबमिशन (Pukka System) ---
        const handlePortalSubmit = async (e, type) => {
            e.preventDefault();
            setIsSubmitting(true);
            const fd = new FormData(e.target);
            
            // ID जनरेट करना (DPSG-TYPE-SERIAL)
            const generatedID = type === 'booking' ? `DPSG-${selectedCardId.type.toUpperCase()}-${selectedCardId.id}` : fd.get('Membership_ID');
            const serialNo = type === 'booking' ? selectedCardId.id : fd.get('Serial_Number');

            const payload = new URLSearchParams({
                action: 'verifyBooking',
                Serial_Number: serialNo,
                Membership_ID: generatedID,
                Name: fd.get('Name'),
                Mobile: fd.get('Mobile'),
                Aadhar: fd.get('Aadhar'),
                PAN: fd.get('PAN') || 'N/A',
                DOB: fd.get('DOB') || 'N/A',
                Service_Type: fd.get('Service_Type') || 'New Enrollment',
                Customer_Problem: fd.get('Problem') || 'Card Booking Request',
                Payment_Status: fd.get('Payment_Method') || 'Cash',
                status: 'PENDING'
            });

            try {
                // 1. एक्सेल शीट में भेजना
                await fetch(GOOGLE_SCRIPT_URL, { method: "POST", body: payload });
                
                // 2. व्हाट्सएप मैसेज तैयार करना
                let waMsg = `🌟 *DPSG NEW APPLICATION* 🌟\n\n` +
                            `🆔 *ID:* ${generatedID}\n` +
                            `👤 *Name:* ${fd.get('Name')}\n` +
                            `📞 *Mobile:* ${fd.get('Mobile')}\n` +
                            `🆔 *Aadhar:* ${fd.get('Aadhar')}\n` +
                            `💳 *PAN:* ${fd.get('PAN') || 'N/A'}\n` +
                            `🛠️ *Service:* ${fd.get('Service_Type') || 'Card Booking'}\n` +
                            `📅 *Date:* ${new Date().toLocaleDateString()}\n\n` +
                            `✅ *Status:* Request Received. Please wait...`;

                window.open(`https://wa.me/917229874128?text=${encodeURIComponent(waMsg)}`, '_blank');
                alert("बधाई हो हुकुम! डाटा एक्सेल शीट में सुरक्षित कर लिया गया है।");
                window.location.reload();
            } catch(err) {
                alert("सर्वर बिजी है, कृपया व्हाट्सएप पर मैसेज भेजें!");
            }
            setIsSubmitting(false);
        };

        return (
            <div className="min-h-screen">
                <div className="no-print marquee"><div className="marquee-content">DPSG निम्बाहेड़ा में आपका स्वागत है - समस्या आपकी, समाधान हमारा ! 📢 संपर्क: 7229874128 📢 हुकुम जोरवार बना</div></div>
                
                <div className="max-w-4xl mx-auto p-4 sm:p-8">
                    {/* लैंडिंग व्यू */}
                    {appState === "landing" && (
                        <div className="glass-card p-12 text-center mt-10 shadow-2xl animate-in zoom-in">
                            <i className="fa-solid fa-building-shield text-8xl text-blue-600 mb-6 drop-shadow-lg"></i>
                            <h1 className="text-3xl sm:text-4xl font-black text-blue-800 uppercase italic">डिजिटल प्रॉब्लम सॉल्यूशन ग्रुप</h1>
                            <p className="text-amber-500 font-black tracking-widest mt-2 uppercase">नया डिजिटल भारत - निम्बाहेड़ा</p>
                            <div className="grid grid-cols-1 sm:grid-cols-2 gap-6 mt-12">
                                <button onClick={()=>setAppState("booking")} className="bg-gradient-to-r from-blue-600 to-indigo-700 text-white py-8 rounded-3xl font-black text-2xl shadow-xl border-b-8 border-indigo-900"><i className="fa-solid fa-address-card mr-3"></i>नया कार्ड बुक करें</button>
                                <button onClick={()=>setAppState("search")} className="bg-white text-blue-700 py-8 rounded-3xl font-black text-2xl shadow-lg border-2 border-blue-100"><i className="fa-solid fa-magnifying-glass mr-3"></i>स्टेटस / रसीद</button>
                            </div>
                        </div>
                    )}

                    {/* बुकिंग ग्रिड और इनाम */}
                    {appState === "booking" && (
                        <div className="space-y-10 animate-in slide-in-from-right">
                            <button onClick={()=>setAppState("landing")} className="bg-slate-200 px-6 py-2 rounded-full font-black text-slate-700 hover:bg-slate-300 transition-all"><i className="fa-solid fa-arrow-left mr-2"></i>वापस</button>
                            
                            <div className="glass-card p-8">
                                <h3 className="text-center font-black text-blue-800 mb-8 uppercase text-2xl border-b-2 border-dashed pb-4"><i className="fa-solid fa-gift mr-2"></i>51 महा-इनाम शायरी गैलरी</h3>
                                <div className="max-h-60 overflow-y-auto custom-scroll space-y-3">
                                    {inamList.map((n, i) => (
                                        <div key={i} className="bg-slate-50 p-4 rounded-2xl border-2 flex flex-col sm:flex-row justify-between items-start sm:items-center hover:bg-blue-50 transition-all">
                                            <span className="font-black text-blue-700 text-lg uppercase tracking-widest">Rank {n.rank}: {n.name}</span>
                                            <span className="italic text-slate-500 font-bold text-sm sm:text-right">"{n.msg}"</span>
                                        </div>
                                    ))}
                                </div>
                            </div>

                            <div className="glass-card p-10 text-center">
                                <h3 className="text-3xl font-black mb-8 uppercase">अपना लकी नंबर चुनें</h3>
                                <div className="flex justify-center gap-3 mb-8">
                                    {['ALL','VIP','Gold','Silver'].map(f => <button key={f} onClick={()=>setSelectedFilter(f)} className={`px-6 py-2 rounded-full font-black text-xs border-4 transition-all ${selectedFilter===f?'bg-blue-600 text-white border-blue-800 shadow-lg':'bg-white text-slate-500 border-slate-100'}`}>{f}</button>)}
                                </div>
                                <div className="card-grid custom-scroll bg-slate-50/50">
                                    {cardsData.filter(c => selectedFilter==='ALL' || c.type===selectedFilter).map((c, i) => (
                                        <div key={i} onClick={()=> !c.sold && setSelectedCardId(c)} className={`grid-item ${c.sold?'sold':`available ${c.type.toLowerCase()}`} ${selectedCardId?.id === c.id ? 'selected' : ''}`}>{c.id}</div>
                                    ))}
                                </div>
                                {selectedCardId && (
                                    <div className="mt-10 p-6 bg-green-50 rounded-3xl border-4 border-green-500 animate-in zoom-in">
                                        <h4 className="text-2xl font-black text-green-700 mb-4 uppercase">नंबर {selectedCardId.id} उपलब्ध है!</h4>
                                        <button onClick={()=>setAppState("booking_form")} className="w-full bg-green-600 text-white py-6 rounded-2xl font-black text-2xl shadow-xl hover:scale-105 transition-all uppercase tracking-widest">फॉर्म भरें</button>
                                    </div>
                                )}
                            </div>
                        </div>
                    )}

                    {/* बुकिंग फॉर्म (Pukka Sync) */}
                    {appState === "booking_form" && (
                        <div className="glass-card p-10 border-4 border-blue-600 animate-in zoom-in shadow-2xl">
                            <h2 className="text-3xl font-black text-center mb-8 uppercase text-slate-800">Card Enrollment: {selectedCardId.id}</h2>
                            <form onSubmit={(e)=>handlePortalSubmit(e, 'booking')} className="space-y-6 text-left">
                                <input name="Name" placeholder="आपका पूरा नाम *" required className="w-full p-5 border-2 border-slate-300 rounded-2xl font-bold text-xl uppercase shadow-inner outline-none focus:border-blue-600" />
                                <div className="grid grid-cols-1 sm:grid-cols-2 gap-6">
                                    <input name="Mobile" placeholder="मोबाइल नंबर (10 अंक) *" required pattern="[0-9]{10}" className="w-full p-5 border-2 border-slate-300 rounded-2xl font-bold text-xl outline-none focus:border-blue-600" />
                                    <input name="Aadhar" placeholder="आधार नंबर (12 अंक) *" required pattern="[0-9]{12}" className="w-full p-5 border-2 border-slate-300 rounded-2xl font-bold text-xl tracking-widest outline-none focus:border-blue-600" />
                                </div>
                                <div className="bg-red-50 p-6 rounded-3xl border-2 border-red-200">
                                    <p className="font-black text-red-600 mb-4 text-sm uppercase">पेमेंट माध्यम चुनें *</p>
                                    <label className="flex items-center gap-3 font-black text-lg cursor-pointer"><input type="radio" name="Payment_Method" value="Cash" defaultChecked onChange={(e)=>setBookingPaymentMode(e.target.value)} className="w-5 h-5" /> Cash / UPI</label>
                                    <label className="flex items-center gap-3 font-black text-lg mt-4 text-red-700 cursor-pointer"><input type="radio" name="Payment_Method" value="Airtel" onChange={(e)=>setBookingPaymentMode(e.target.value)} className="w-5 h-5" /> Airtel Payment Bank (Offers)</label>
                                </div>
                                {bookingPaymentMode === 'Airtel' && (
                                    <div className="animate-in slide-in-from-top"><label className="text-xs font-black text-red-600 ml-2 uppercase">AIRTEL हेतु PAN अनिवार्य है *</label><input name="PAN" placeholder="ABCDE1234F" required pattern="[A-Z]{5}[0-9]{4}[A-Z]{1}" className="w-full p-5 border-4 border-red-400 rounded-2xl font-black text-2xl uppercase text-center shadow-lg bg-red-50" /></div>
                                )}
                                <button disabled={isSubmitting} className="w-full bg-blue-600 hover:bg-blue-700 text-white py-6 rounded-2xl font-black text-2xl shadow-xl transition-all uppercase tracking-widest">{isSubmitting ? 'भेजा जा रहा है...' : 'OK - सबमिट करें'}</button>
                            </form>
                        </div>
                    )}

                    {/* सर्च व्यू */}
                    {appState === "search" && (
                        <div className="glass-card p-12 text-center animate-in slide-in-from-left shadow-2xl">
                            <button onClick={()=>setAppState("landing")} className="float-left text-slate-400 font-black"><i className="fa-solid fa-arrow-left"></i> वापस</button>
                            <h3 className="text-2xl font-black mb-8 uppercase text-blue-900 tracking-widest underline decoration-dashed"><i className="fa-solid fa-radar mr-2"></i>Live Status Tracking</h3>
                            <div className="flex flex-col sm:flex-row gap-4 mb-10">
                                <input id="liveInput" placeholder="नाम, मोबाइल या ID दर्ज करें" className="flex-1 p-5 border-2 rounded-2xl font-black text-center text-xl shadow-inner outline-none focus:border-blue-600" />
                                <button onClick={async ()=>{
                                    const q = document.getElementById('liveInput').value.toLowerCase().trim();
                                    const res = await fetch(REQUEST_SHEET_CSV + "?t=" + Date.now()); 
                                    const data = Papa.parse(await res.text(), {header:true}).data;
                                    const match = data.find(x => x.Name?.toLowerCase().includes(q) || x.Mobile?.includes(q) || x.Membership_ID?.toLowerCase().includes(q));
                                    setStatusCheckResult(match ? (match.Work_Status==='DONE'?'OK':'PENDING') : 'NOT_FOUND');
                                }} className="bg-blue-600 text-white px-10 py-5 rounded-2xl font-black text-xl shadow-lg hover:scale-105 transition-all">CHECK</button>
                            </div>
                            {statusCheckResult && (
                                <div className={`p-8 rounded-3xl font-black text-2xl border-4 animate-in zoom-in mb-10 ${statusCheckResult==='OK'?'bg-green-100 border-green-500 text-green-700':'bg-yellow-100 border-yellow-500 text-yellow-700'}`}>
                                    {statusCheckResult==='OK' ? 'आपका कार्य पूर्ण हो गया है! ✅' : statusCheckResult==='PENDING' ? 'कार्य प्रक्रिया में है, धैर्य रखें! ⏳' : 'कोई रिकॉर्ड नहीं मिला! ❌'}
                                </div>
                            )}
                            <hr className="my-10" />
                            <h3 className="font-black mb-4 uppercase text-slate-500">ID द्वारा रसीद खोलें</h3>
                            <input id="sidInput" placeholder="ID: DPSG-VIP-0083" className="w-full p-5 border-2 rounded-2xl font-black text-center text-xl mb-6 uppercase shadow-inner outline-none focus:border-black" />
                            <button onClick={()=>window.location.href=`?id=${document.getElementById('sidInput').value}`} className="w-full bg-slate-900 text-white py-6 rounded-2xl font-black text-xl shadow-xl hover:bg-black transition-all">DASHBOARD खोलें</button>
                        </div>
                    )}

                    {/* रसीद और यूजर डैशबोर्ड */}
                    {appState === "view" && member && (
                        <div className="space-y-10 animate-in slide-in-from-bottom">
                            <div className="text-center glass-card p-10 border-b-8 border-b-blue-700 shadow-2xl relative overflow-hidden">
                                <h1 className="text-4xl font-black text-blue-800 uppercase italic">डिजिटल रसीद</h1>
                                <p className="text-amber-500 font-black mt-2 uppercase tracking-widest underline underline-offset-4">DPSG निम्बाहेड़ा</p>
                            </div>

                            <div className="grid grid-cols-4 gap-3 no-print">
                                {['ई-मित्र','डेटा','मोबाइल','सरकारी'].map(s => <button key={s} onClick={()=>{setFormType(s); setShowServiceForm(true);}} className="glass-card py-6 flex flex-col items-center gap-2 hover:border-blue-500 border-2 shadow-sm transition-all"><i className="fa-solid fa-circle-dot text-blue-600 text-2xl animate-pulse"></i><span className="text-[11px] font-black uppercase">{s}</span></button>)}
                            </div>

                            <button onClick={()=>{setFormType('Airtel Payment Bank'); setShowServiceForm(true);}} className="w-full no-print bg-gradient-to-r from-red-600 to-red-700 text-white p-8 rounded-[2.5rem] font-black text-2xl flex justify-between shadow-2xl hover:scale-[1.01] transition-all"><p>AIRTEL PAYMENT BANK (KYC)</p><i className="fa-solid fa-building-columns text-4xl"></i></button>

                            <ScratchCard onComplete={()=>confetti({particleCount:400, spread:100})}>
                                <div className="p-10 text-center">
                                    <p className="text-4xl font-black text-blue-800 uppercase italic">LUCKY DRAW</p>
                                    <p className="text-slate-400 mt-4 font-bold italic text-lg tracking-widest">"परिणाम आधिकारिक घोषणा के बाद यहाँ दिखेगा"</p>
                                </div>
                            </ScratchCard>

                            <div id="receipt" className="glass-card p-10 border-t-[20px] border-t-blue-800 text-left shadow-2xl relative">
                                <h3 className="text-center font-black text-3xl mb-12 text-blue-900 uppercase underline decoration-double">OFFICIAL MEMBERSHIP RECEIPT</h3>
                                <div className="bg-blue-900 text-white p-8 rounded-[2rem] text-center mb-12 shadow-2xl border-4 border-blue-400"><p className="text-sm font-bold opacity-70 mb-2 uppercase tracking-widest">UNIQUE MEMBERSHIP ID</p><p className="text-5xl font-black tracking-[0.2em]">{member[1]}</p></div>
                                <div className="grid grid-cols-1 sm:grid-cols-2 gap-y-10 text-xl font-black uppercase border-b-2 border-dashed pb-10">
                                    <div className="bg-slate-50 p-4 rounded-xl">
                                        <p className="text-slate-400 text-xs mb-1 tracking-widest font-black uppercase">Customer Name</p>
                                        <p className="text-indigo-900 border-l-4 border-indigo-600 pl-3">{member[8]}</p>
                                    </div>
                                    <div className="sm:text-right bg-slate-50 p-4 rounded-xl">
                                        <p className="text-slate-400 text-xs mb-1 tracking-widest font-black uppercase">City/Village</p>
                                        <p className="text-slate-800 border-r-4 border-slate-600 pr-3">{member[5]}</p>
                                    </div>
                                    <div className="bg-green-50 p-4 rounded-xl">
                                        <p className="text-slate-400 text-xs mb-1 font-black uppercase">Account Status</p>
                                        <p className="text-green-600 font-black">ACTIVE ✅</p>
                                    </div>
                                    <div className="sm:text-right bg-red-50 p-4 rounded-xl">
                                        <p className="text-slate-400 text-xs mb-1 font-black uppercase">Validity Upto</p>
                                        <p className="text-red-600 font-black">{member[16] || '31/12/2026'}</p>
                                    </div>
                                </div>

                                <div className="grid grid-cols-3 gap-4 mt-12 text-center">
                                    <div className="bg-blue-100 p-5 rounded-3xl border-2 border-blue-200 shadow-inner"><p className="text-[11px] font-black text-blue-600 mb-1">TOTAL POINTS</p><p className="text-3xl font-black text-blue-900">{member[18] || '0'}</p></div>
                                    <div className="bg-slate-100 p-5 rounded-3xl border-2 border-slate-200 shadow-inner"><p className="text-[11px] font-black text-slate-600 mb-1">USED</p><p className="text-3xl font-black">{(parseInt(member[18])-parseInt(member[21]))||'0'}</p></div>
                                    <div className="bg-green-100 p-5 rounded-3xl border-2 border-green-200 shadow-inner"><p className="text-[11px] font-black text-green-600 mb-1">BALANCE</p><p className="text-3xl font-black text-green-700">{member[21] || '0'}</p></div>
                                </div>

                                <div className="mt-12 p-6 bg-slate-50 rounded-3xl border-2 border-slate-100 italic">
                                    <h4 className="font-black text-slate-800 text-lg mb-4 underline uppercase tracking-widest"><i className="fa-solid fa-scale-balanced mr-2"></i>नियम व शर्तें (Important T&C)</h4>
                                    <div className="space-y-2">
                                        {termsConditions.map((line, i) => <p key={i} className="text-[12px] font-bold text-slate-600 leading-relaxed">{line}</p>)}
                                    </div>
                                </div>

                                <button onClick={()=>window.print()} className="w-full bg-slate-900 text-white py-6 rounded-3xl font-black text-2xl mt-12 shadow-2xl no-print hover:scale-[1.01] transition-all uppercase tracking-widest"><i className="fa-solid fa-print mr-3"></i>प्रिंट रसीद</button>
                            </div>
                        </div>
                    )}
                </div>

                {/* 50+ सर्विस रिक्वेस्ट फॉर्म (Modal) */}
                {showServiceForm && (
                    <div className="fixed inset-0 z-[100] bg-slate-900/95 backdrop-blur-xl p-4 overflow-y-auto animate-in fade-in transition-all">
                        <div className="glass-card p-10 max-w-xl mx-auto my-10 border-4 border-blue-600 animate-in zoom-in shadow-2xl">
                            <button onClick={()=>setShowServiceForm(false)} className="float-right text-red-600 font-black text-5xl hover:scale-110 transition-all">×</button>
                            <h3 className="text-3xl font-black text-center mb-10 uppercase text-blue-800 underline decoration-dashed tracking-widest">{formType} Request</h3>
                            <form onSubmit={(e)=>handlePortalSubmit(e, 'service')} className="space-y-6 text-left">
                                <div className="grid grid-cols-1 sm:grid-cols-2 gap-4 bg-blue-50 p-4 rounded-2xl border-2 border-blue-100 shadow-inner">
                                    <div><label className="text-[10px] font-black text-blue-700 uppercase ml-1">Membership ID *</label><input name="Membership_ID" required className="w-full p-4 border-2 rounded-xl font-black uppercase text-xl shadow-sm" defaultValue={member?.[1]} /></div>
                                    <div><label className="text-[10px] font-black text-blue-700 uppercase ml-1">Serial No *</label><input name="Serial_Number" required className="w-full p-4 border-2 rounded-xl font-black text-xl shadow-sm" placeholder="0083" /></div>
                                </div>
                                <input name="Name" placeholder="ग्राहक का पूरा नाम *" required className="w-full p-5 border-2 border-slate-300 rounded-2xl font-bold uppercase text-xl shadow-inner focus:border-blue-600 outline-none" />
                                <div className="grid grid-cols-1 sm:grid-cols-2 gap-6">
                                    <input name="Mobile" placeholder="मोबाइल नंबर *" required pattern="[0-9]{10}" className="w-full p-5 border-2 border-slate-300 rounded-2xl font-bold text-xl outline-none focus:border-blue-600" />
                                    <input name="Aadhar" placeholder="आधार नंबर *" required pattern="[0-9]{12}" className="w-full p-5 border-2 border-slate-300 rounded-2xl font-bold text-xl outline-none focus:border-blue-600" />
                                </div>
                                <select name="Service_Type" required className="w-full p-5 border-2 border-blue-400 rounded-2xl font-black text-blue-700 bg-blue-50 text-xl shadow-md cursor-pointer">
                                    <option value="">-- सेवा का चयन करें (50+) --</option>
                                    {serviceList.map(s => <option key={s} value={s}>{s}</option>)}
                                </select>
                                {(formType.includes('Airtel') || formType === 'Airtel Bank') && (
                                    <div className="animate-in slide-in-from-top"><label className="text-[10px] font-black text-red-600 ml-2 uppercase">Airtel KYC हेतु PAN अनिवार्य है *</label><input name="PAN" placeholder="ABCDE1234F" required pattern="[A-Z]{5}[0-9]{4}[A-Z]{1}" className="w-full p-5 border-4 border-red-300 rounded-2xl font-black uppercase text-2xl text-center shadow-lg bg-red-50 focus:border-red-600" /></div>
                                )}
                                <textarea name="Problem" placeholder="कार्य या समस्या का पूरा विवरण यहाँ लिखें (कलम 12)..." required rows="4" className="w-full p-5 border-2 border-slate-300 rounded-2xl font-bold text-lg shadow-inner outline-none focus:border-blue-600"></textarea>
                                <button disabled={isSubmitting} className="w-full bg-gradient-to-r from-blue-700 to-indigo-800 text-white py-6 rounded-2xl font-black text-2xl shadow-xl uppercase transition-all tracking-widest hover:scale-[1.01]">{isSubmitting ? 'भेजा जा रहा है...' : 'OK - व्हाट्सएप पर भेजें'}</button>
                            </form>
                        </div>
                    </div>
                )}
            </div>
        );
    };

    // --- फाइनल रेंडरिंग ---
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);  
    </script>
</body>  
</html>
