        @media print { .no-print { display: none !important; } .receipt-card { border: none !important; box-shadow: none !important; width: 100% !important; margin: 0 !important; } }  
        .marquee { white-space: nowrap; overflow: hidden; background: #fbbf24; color: #000; font-weight: 800; padding: 12px 0; font-size: 14px; text-transform: uppercase; border-bottom: 2px solid #000; }  
        .marquee p { display: inline-block; padding-left: 100%; animation: marquee 25s linear infinite; }  
        @keyframes marquee { 0% { transform: translate(0, 0); } 100% { transform: translate(-100%, 0); } }  
        .scratch-container { position: relative; width: 100%; max-width: 550px; margin: 0 auto; min-height: 480px; }  
        .scratch-canvas { position: absolute; top: 0; left: 0; z-index: 30; border-radius: 2rem; cursor: crosshair; touch-action: none; width: 100%; height: 100%; }  
        .scratch-content { background: #fff; border-radius: 2rem; overflow: hidden; display: flex; flex-direction: column; align-items: center; justify-content: center; width: 100%; height: 100%; border: 4px solid #334155; }  
        .winner-glow { border: 8px solid #fbbf24; box-shadow: 0 0 70px rgba(251, 191, 36, 0.9); animation: pulse 2s infinite; }  
        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.03); } }  
        .custom-scroll::-webkit-scrollbar { width: 6px; }  
        .custom-scroll::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }

<body>  
    <div id="root"></div>

    const MASTER_PIN = "Chanchal@6375";  

    const vocab = {  
        hi: {  
            brand: "डिजिटल प्रॉब्लम सॉल्यूशन ग्रुप", service: "डिजिटल सेवा निम्बाहेड़ा", receipt: "प्रोफेशनल डिजिटल रसीद", idLabel: "मेंबरशिप आईडी दर्ज करें",  
            points: "कुल सर्विस पॉइंट्स", used: "उपयोग पॉइंट्स", balance: "शेष पॉइंट्स", active: "सक्रियण तिथि", expiry: "समाप्ति तिथि", left: "शेष दिन", draw: "लकी ड्रा तिथि", fee: "रजिस्ट्रेशन शुल्क",  
            updateMsg: "अपडेट की जा रही है...", termsTitle: "नियम व शर्तें",  
            t1: "01. यह डिजिटल सदस्यता कार्ड व्यक्तिगत है और अहस्तांतरणीय है।", t2: "02. सेवाओं का लाभ केवल कार्ड पर अंकित समाप्ति तिथि तक ही मान्य है।", t3: "03. लिया गया शुल्क पंजीकरण शुल्क है, जो वापस नहीं होगा।", t4: "04. सर्वर त्रुटि में फिजिकल स्क्रैच कार्ड का परिणाम अंतिम होगा।", t5: "05. सर्वर खराबी पर प्रबंधन की जिम्मेदारी नहीं होगी।", t6: "06. सरकारी टोकन शुल्क ग्राहक द्वारा अलग से देय होगा।", t7: "07. फ्री डिलीवरी सीमा के बाद न्यूनतम शुल्क लिया जाएगा।", t8: "08. यह समाज सेवा हेतु है, कृपया कार्य पूर्ण होने तक धैर्य रखें।", t9: "09. कार्य में लगने वाले समय हेतु अभद्र व्यवहार स्वीकार्य नहीं होगा।", t10: "10. मैनेजमेंट के पास नियमों में बदलाव का पूर्ण अधिकार है।",
            walletLabel: "डिजिटल वॉलेट प्रोग्रेस", warning: "⚠️ आधिकारिक घोषणा होने तक कृपया कार्ड को स्क्रैच न करें", pending: "परिणाम जल्द घोषित होगा।"
        }
    };

    const cardSpecs = {  
        VIP: { hi: ["कीमत: ₹500 (6 महीने)", "उपयोग: पूरे परिवार हेतु मान्य", "कोटा: 380 फोटो / 190 प्रिंट", "लैमिनेशन: 2 फ्री", "ई-मित्र: 100% फ्री सेवा", "डिलीवरी: 2 बार फ्री", "इनाम: ₹100 Cash Back + बड़ा धमाका!"] },  
        Gold: { hi: ["कीमत: ₹100 (3 महीने)", "उपयोग: केवल 1 व्यक्ति", "कोटा: 100 फोटो / 52 प्रिंट", "लैमिनेशन: 1 फ्री", "ई-मित्र: 50% छूट", "डिलीवरी: 1 बार फ्री", "इनाम: 100% गारंटीड उपहार!"] },  
        Silver: { hi: ["कीमत: ₹50 (1 महीना)", "उपयोग: केवल 1 व्यक्ति", "कोटा: 40 फोटो / 21 प्रिंट", "ई-मित्र: सीमित सेवा", "डिलीवरी: 1 बार न्यूनतम शुल्क", "इनाम: लकी ड्रा का अवसर!"] }  
    };
    const toDirectLink = (url) => { 
        if (!url) return ""; 
        let id = ""; 
        if (url.includes("/d/")) id = url.split("/d/")[1].split("/")[0]; 
        if (url.includes("id=")) id = url.split("id=")[1].split("&")[0]; 
        return id ? "https://drive.google.com/thumbnail?id=" + id + "&sz=w1000" : url; 
    };  
    
    const mask = (v) => v?.length > 4 ? v.slice(0, 2) + "******" + v.slice(-2) : v;  

    const ScratchCard = ({ onComplete, children }) => {  
        const canvasRef = useRef(null); 
        const [isRevealed, setIsRevealed] = useState(false);  
        
        useEffect(() => {  
            const canvas = canvasRef.current; if(!canvas) return; const ctx = canvas.getContext('2d');  
            canvas.width = canvas.parentElement.offsetWidth; canvas.height = canvas.parentElement.offsetHeight;  
            const grad = ctx.createLinearGradient(0, 0, canvas.width, canvas.height);  
            grad.addColorStop(0, '#D4AF37'); grad.addColorStop(0.5, '#F9F295'); grad.addColorStop(1, '#B8860B');  
            ctx.fillStyle = grad; ctx.fillRect(0, 0, canvas.width, canvas.height);  
            ctx.font = "bold 28px Inter"; ctx.fillStyle = "#4a3b01"; ctx.textAlign = "center";  
            ctx.fillText("SCRATCH FATA-FAT!", canvas.width / 2, canvas.height / 2);  
            
            const scratch = (e) => {  
                if (isRevealed) return; 
                const rect = canvas.getBoundingClientRect();  
                const x = (e.pageX || (e.touches && e.touches[0].pageX)) - rect.left;  
                const y = (e.pageY || (e.touches && e.touches[0].pageY)) - rect.top;  
                ctx.globalCompositeOperation = 'destination-out'; ctx.beginPath(); 
                ctx.arc(x, y, 75, 0, Math.PI * 2); // ⚡ TEZ SCRATCH RADIUS
                ctx.fill();  
                const pixels = ctx.getImageData(0, 0, canvas.width, canvas.height).data;  
                let count = 0; for (let i = 0; i < pixels.length; i += 40) if (pixels[i + 3] === 0) count++;  
                if (count > (pixels.length / 40) * 0.40) { setIsRevealed(true); onComplete(); }  
            };  
            canvas.addEventListener('mousemove', scratch); canvas.addEventListener('touchmove', scratch, {passive: true});  
        }, [isRevealed]);  
        
        return ( <div className="scratch-container"> {!isRevealed && <canvas ref={canvasRef} className="scratch-canvas" />} <div className="scratch-content">{children}</div> </div> );  
    };  

    const App = () => {  
        const [lang, setLang] = useState('hi'); 
        const [theme, setTheme] = useState('light');
        const [status, setStatus] = useState("loading"); 
        const [member, setMember] = useState(null); 
        const [headers, setHeaders] = useState([]); 
        const [isAdmin, setIsAdmin] = useState(false);  
        const [prize, setPrize] = useState({ img: "", msg: "", isLocked: true, type: "normal", highlight: "", colorClass: "" });  
        const [showPin, setShowPin] = useState(false); 
        const [showForm, setShowForm] = useState({ show: false, srv: "" });
        const [isScratched, setIsScratched] = useState(false);

        const t = vocab[lang];

        const mapPrize = useCallback((row, maps) => {  
            const mID = (row[1] || "").toString().toLowerCase().trim();  
            const dDateStr = (row[36] || "").toString().trim(); 
            const lock = (row[37] || "").toString().toUpperCase().trim(); 
            const inamName = (row[4] || "").toString().trim();  
            
            let drawDate = null;
            if (dDateStr) {
                let parts = dDateStr.split(/[-/]/);
                if (parts.length === 3) drawDate = new Date(parts[2], parts[1]-1, parts[0]);
                else drawDate = new Date(dDateStr);
            }
            const today = new Date(); today.setHours(0,0,0,0); if(drawDate) drawDate.setHours(0,0,0,0);

            // ⛔ 1% RULE: Hide data if Inam Status or Date is blank
            if (!lock || !dDateStr || drawDate > today) {
                setPrize({ msg: t.pending, isLocked: true }); return;
            }

            const match = maps.find(m => m.Membership_ID && m.Membership_ID.toLowerCase().trim() === mID);  

            if (lock === "DPSG_WINNER" && match) {
                setPrize({ 
                    img: toDirectLink(match.Image_Link), 
                    highlight: match.Match_Name, 
                    msg: `'मंजिल उन्हीं को मिलती है जिनके सपनों में जान होती है,\nआज आपकी मेहनत और किस्मत दोनों मेहरबान होती है!'\n\nशानदार! आप बने हैं DPSG महा-इनाम के विजेता। आपकी रैंक ${match.Match_Name} है। उज्ज्वल भविष्य के लिए धन्यवाद!`, 
                    isLocked: false, type: "winner", colorClass: "winner-glow bg-yellow-50" 
                });  
            } else if (lock === "DPSG_CASH") {
                setPrize({ 
                    img: "https://drive.google.com/thumbnail?id=1WOrBZpuRF9Q-Pc753LA11XoAaGjCv7zD&sz=w1000", 
                    highlight: inamName || "CASHBACK", 
                    msg: `'इनाम छोटा हो या बड़ा, अपनों का साथ सबसे प्यारा है,\nजीत की ये शुरुआत है, अभी तो सारा आसमान तुम्हारा है!'\n\nभले ही मुख्य सूची में स्थान न मिला, पर आप हमारे खास हैं। DPSG स्पेशल कैशबैक स्वीकार करें। धन्यवाद!`, 
                    isLocked: false, type: "cash", colorClass: "border-4 border-green-500 bg-green-50" 
                });  
            } else if (lock === "DPSG_GIFT") {
                setPrize({ 
                    img: "https://drive.google.com/thumbnail?id=1baCVXWH7XYD5T8QxOfGKnkt9CKDHSx2Z&sz=w1000", 
                    highlight: inamName || "GIFT", 
                    msg: `'खूबसूरत सा ये तोहफा बस एक छोटा सा बहाना है,\nहमे तो आपके साथ मिलकर खुशियों का जशन मनाना है!'\n\nDPSG अपने परिवार को खाली हाथ नहीं भेजता। यह गिफ्ट आपके भरोसे का प्रतीक है। धन्यवाद!`, 
                    isLocked: false, type: "gift", colorClass: "border-4 border-blue-500 bg-blue-50" 
                });  
            } else {
                setPrize({ 
                    img: "https://drive.google.com/thumbnail?id=1j7v5a90h8ABi2r6piQIZR_4Qil4buiqh&sz=w1000", 
                    highlight: "TRY AGAIN", 
                    msg: `'गिरते हैं शहसवार ही मैदान-ए-जंग में,\nवो क्या गिरेंगे जो घुटनों के बल चलते हैं!'\n\nनिराश न हों, अगली बड़ी जीत आपकी ही होगी। हमारे मिशन का हिस्सा बनने के लिए धन्यवाद!`, 
                    isLocked: false, type: "loss", colorClass: "bg-slate-100 border-4" 
                });  
            }
        }, [t.pending]);

        useEffect(() => {  
            fetch(MAIN_CSV + "&t=" + Date.now()).then(r => r.text()).then(txt => {  
                Papa.parse(txt, { complete: (res) => {  
                    const rows = res.data; setHeaders(rows[0] || []);  
                    const qId = new URLSearchParams(window.location.search).get('id');  
                    const match = rows.slice(1).find(r => r[1] && r[1].toLowerCase() === (qId || "").toLowerCase());  
                    if (match) { 
                        setMember(match); 
                        fetch(MAPPING_CSV).then(r => r.text()).then(mTxt => { 
                            Papa.parse(mTxt, { header: true, complete: (mRes) => { 
                                mapPrize(match, mRes.data); setStatus("view"); 
                            }}); 
                        });

                }});  
            });  
        }, [mapPrize]);  

        const clean = (val) => (val && val !== "#REF!" && val !== "") ? val : t.updateMsg;

        if (status === "loading") return <div className="h-screen flex items-center justify-center font-black text-blue-600">DPSG SYSTEM LOADING...</div>;  
        return (  
            <div className={`min-h-screen pb-10 ${theme === 'dark' ? 'bg-slate-900 text-white' : 'bg-slate-50 text-slate-900'}`}>  
                {/* ORIGINAL MARQUEE */}
                <div className="no-print marquee"><p>{member ? (member[38] || "Welcome to Digital Problem Solution Group Nimbahera") : "DPSG Smart Dashboard Loading..."}</p></div>  
                
                <div className="max-w-xl mx-auto p-4 sm:p-8">  
                    {/* THEME & LANG TOGGLE */}
                    <div className="no-print flex justify-between mb-8 items-center">
                        <div className="flex bg-slate-200 dark:bg-slate-700 p-1 rounded-xl">
                            <button onClick={()=>setLang('hi')} className={`px-4 py-1.5 rounded-lg font-bold ${lang==='hi'?'bg-white shadow':''}`}>HI</button>
                            <button onClick={()=>setLang('en')} className={`px-4 py-1.5 rounded-lg font-bold ${lang==='en'?'bg-white shadow':''}`}>EN</button>
                        </div>
                        <button onClick={()=>setTheme(theme==='light'?'dark':'light')} className="p-3 bg-white dark:bg-slate-800 rounded-full shadow-md text-xl">{theme==='light'?'🌙':'☀️'}</button>
                    </div>

                    {status === "search" ? (  
                        <div className="bg-white dark:bg-slate-800 p-12 rounded-[2.5rem] shadow-xl text-center border">  
                            <i className="fa-solid fa-id-card text-6xl text-blue-600 mb-6"></i>  
                            <h2 className="text-xl font-black mb-8 uppercase">मेंबरशिप आईडी सर्च करें</h2>  
                            <input id="sid" type="text" className="w-full bg-slate-50 dark:bg-slate-700 border-2 rounded-2xl py-5 text-center mb-6 text-xl font-bold uppercase" placeholder="DPSG-26-XXXX" />  
                            <button onClick={() => window.location.href=`?id=${document.getElementById('sid').value}`} className="w-full bg-blue-600 py-5 rounded-2xl font-black text-white shadow-lg">DASHBOARD खोलें</button>  
                        </div>  
                    ) : (  
                        <div className="space-y-8 animate-in slide-in-from-bottom-4 duration-700">  
                            {/* BRANDING */}
                            <div className="text-center">  
                                <h1 className="text-3xl font-black italic uppercase text-blue-900 dark:text-blue-400 leading-none">{t.brand}</h1>  
                                <p className="text-yellow-600 font-bold tracking-widest mt-2 uppercase text-sm">Digital Seva Nimbahera</p>  
                            </div>  

                            {/* DIGITAL WALLET */}

                                <h3 className="font-black mb-4 text-xs uppercase flex items-center"><i className="fa-solid fa-wallet mr-2 text-blue-500"></i> {t.walletLabel}</h3>
                                <div className="flex justify-between text-xs font-bold mb-2">

                                </div>

                                    <div key={s.id} onClick={()=>setShowForm({show:true, srv:s.n})} className="flex flex-col items-center p-3 bg-white dark:bg-slate-800 rounded-2xl border cursor-pointer hover:scale-105 transition-all">
                                        <div className={`w-12 h-12 ${s.c} text-white rounded-full flex items-center justify-center mb-1 shadow-md`}><i className={`fa-solid ${s.i}`}></i></div>
                                        <span className="text-[9px] font-bold uppercase text-center">{s.n}</span>

                            </div>

                            {/* NEW SCRATCH CARD SECTION */}

                                <div className={`p-2 rounded-[2.5rem] ${prize.isLocked ? 'bg-slate-100 dark:bg-slate-700' : prize.colorClass}`}>  
                                    {prize.isLocked ? (  
                                        <div className="p-24 text-center text-slate-400 font-bold italic"> <i className="fa-solid fa-lock text-5xl mb-4"></i> <p>{prize.msg}</p> </div>  
                                    ) : (  
                                        <ScratchCard onComplete={() => { setIsScratched(true); confetti({particleCount:250, spread:100, origin:{y:0.6}}); }}>  
                                            <div className="p-8 text-center w-full bg-white dark:bg-slate-800 flex flex-col items-center">
                                                <div className="bg-blue-600 text-white px-10 py-2 rounded-full font-black text-md mb-8 uppercase shadow-xl tracking-widest">{prize.highlight}</div>  
                                                {/* LARGE IMAGE AREA */}
                                                <img src={prize.img} className="w-full max-h-[450px] object-contain drop-shadow-2xl mb-8" alt="Prize" />  
                                                <p className="text-[14px] font-bold text-slate-800 dark:text-slate-200 leading-relaxed whitespace-pre-line px-4">{prize.msg}</p>
                                            </div>
                                        </ScratchCard>  
                                    )}  
                                </div>
                            </div>

                            {/* QUICK HELP BUTTONS */}
                            <div className="no-print grid grid-cols-2 gap-4">
                                <a href="https://wa.me/917229874128" target="_blank" className="bg-green-500 text-white p-5 rounded-2xl text-center font-black uppercase text-xs flex items-center justify-center gap-3 shadow-lg hover:bg-green-600"><i className="fa-brands fa-whatsapp text-3xl"></i> WHATSAPP</a>
                                <a href="http://maps.google.com" target="_blank" className="bg-red-500 text-white p-5 rounded-2xl text-center font-black uppercase text-xs flex items-center justify-center gap-3 shadow-lg hover:bg-red-600"><i className="fa-solid fa-location-dot text-3xl"></i> LOCATION</a>
                            </div>
