<!DOCTYPE html>  
<html lang="hi">  
<head>  
    <meta charset="UTF-8">  
    <meta name="viewport" content="width=device-width, initial-scale=1.0">  
    <title>DPSG Master Portal - Digital Seva Nimbahera</title>  
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>  
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>  
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>  
    <script src="https://cdn.tailwindcss.com"></script>  
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>  
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>  
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">  
    <style>  
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=Mukta:wght@400;700;800&display=swap');  
        body { font-family: 'Mukta', sans-serif; background-color: #0f172a; color: #f8fafc; margin: 0; }  
        .receipt-card { border: 1px solid #e2e8f0; border-radius: 2.5rem; background: white; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5); color: #1e293b; }  
        
        /* Marquee Fix */
        .marquee-container { background: #fbbf24; color: #000; padding: 12px 0; overflow: hidden; position: relative; border-bottom: 2px solid #000; }
        .marquee-p { display: inline-block; white-space: nowrap; font-weight: 900; animation: scroll-left 25s linear infinite; font-size: 15px; }
        @keyframes scroll-left { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }
        
        .scratch-container { position: relative; width: 100%; max-width: 550px; margin: 0 auto; min-height: 480px; }  
        .scratch-canvas { position: absolute; top: 0; left: 0; z-index: 30; border-radius: 2rem; cursor: crosshair; touch-action: none; width: 100%; height: 100%; }  
        .scratch-content { background: #fff; border-radius: 2rem; overflow: hidden; display: flex; flex-direction: column; align-items: center; justify-content: center; width: 100%; height: 100%; border: 4px solid #fbbf24; }  
        
        .winner-msg-box { background: #0f172a; color: #fbbf24; padding: 20px; border-top: 4px solid #fbbf24; width: 100%; text-align: center; }
        .shayari-font { font-style: italic; font-weight: 800; color: #fde68a; font-size: 1.2rem; line-height: 1.6; }
        .notice-portal { background: #1e293b; border-left: 6px solid #fbbf24; padding: 15px; border-radius: 20px; margin-bottom: 20px; border: 1px solid #334155; }
        .lang-btn { background: #2563eb; color: white; padding: 6px 15px; border-radius: 20px; font-weight: 900; font-size: 12px; }
        @media print { .no-print { display: none !important; } }
    </style>
</head>  
<body>  
    <div id="root"></div>  
    <script type="text/babel">  
    const { useState, useEffect, useRef, useCallback } = React;  
    const SHEET_ID = "1rrU0EHXur_HfPlmYxjm6vIJqeRW2VZAu0qIteItQkLo";  
    const MAIN_CSV = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv`;  
    const MAPPING_CSV = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRlm-iMRLk5J-lxybJ7S2sR3ZpcGNG8Z8r3BEku8GzK8opYlsunIcZoe03Jf0Xbhw/pub?gid=1529433935&single=true&output=csv";  
    const MASTER_PIN = "Chanchal@6375";  

    const translations = {
        hi: {
            brand: "डिजिटल प्रॉब्लम सॉल्यूशन ग्रुप", slogan: "समस्या आपकी, समाधान हमारा - उचित मूल्य, बेहतरीन सेवा", 
            receipt: "प्रोफेशनल डिजिटल रसीद", noticeTitle: "📢 आवश्यक सूचना", print: "Print Official Receipt",
            benefitTitle: "सदस्यता कार्ड सुविधायें", warning: "⚠️ आधिकारिक घोषणा होने तक कृपया कार्ड को स्क्रैच न करें", pending: "परिणाम जल्द घोषित होगा।"
        },
        en: {
            brand: "DIGITAL PROBLEM SOLUTION GROUP", slogan: "YOUR PROBLEM, OUR SOLUTION - BEST SERVICE",
            receipt: "PROFESSIONAL DIGITAL RECEIPT", noticeTitle: "📢 IMPORTANT NOTICE", print: "Print Official Receipt",
            benefitTitle: "MEMBERSHIP BENEFITS", warning: "⚠️ DO NOT SCRATCH UNTIL ANNOUNCED", pending: "RESULT COMING SOON..."
        }
    };

    const translateExcel = (text, l) => {
        if (!text || l === 'hi') return text || "---";
        const d = {"6 महीने": "6 Months", "3 महीने": "3 Months", "1 महीना": "1 Month", "वीआईपी": "VIP", "गोल्ड": "Gold", "सिल्वर": "Silver"};
        let res = text;
        Object.keys(d).forEach(k => { res = res.replace(k, d[k]); });
        return res.toUpperCase();
    };

    const cardSpecs = {  
        VIP: { hi: ["₹500 VIP Card (6 महीने)", "उपयोग: पूरे परिवार हेतु मान्य", "कोटा: 380 पॉइंट्स (380 फोटो अथवा 190 प्रिंट)", "लैमिनेशन: 2 फ्री", "ई-मित्र: 100% फ्री सेवा", "डिलीवरी: 2 बार फ्री", "इनाम: ₹100 Cash Back + बड़ा धमाका!"],
               en: ["₹500 VIP Card (6 Months)", "Usage: For whole family", "Quota: 380 Points", "Lamination: 2 Free", "E-Mitra: 100% Free Service", "Delivery: 2 Free", "Prize: ₹100 Cash Back + Bonus!"] },  
        Gold: { hi: ["₹100 Gold Card (3 महीने)", "उपयोग: केवल 1 व्यक्ति", "कोटा: 100 पॉइंट्स (100 फोटो अथवा 50 प्रिंट)", "लैमिनेशन: 1 फ्री", "ई-मित्र: 50% छूट", "डिलीवरी: 1 बार फ्री", "इनाम: 100% गारंटी उपहार!"],
                en: ["₹100 Gold Card (3 Months)", "Usage: 1 Person Only", "Quota: 100 Points", "Lamination: 1 Free", "E-Mitra: 50% Off", "Delivery: 1 Free", "Prize: 100% Guaranteed Gift!"] },  
        Silver: { hi: ["₹50 Silver Card (1 महीना)", "उपयोग: केवल 1 व्यक्ति", "कोटा: 40 पॉइंट्स (40 फोटो अथवा 20 प्रिंट)", "ई-मित्र: सीमित सेवा", "डिलीवरी: 1 बार न्यूनतम शुल्क", "इनाम: लकी ड्रा अवसर!"],
                  en: ["₹50 Silver Card (1 Month)", "Usage: 1 Person Only", "Quota: 40 Points", "E-Mitra: Limited Service", "Delivery: Min Charges", "Prize: Lucky Draw Chance!"] }  
    };

    const App = () => {  
        const [lang, setLang] = useState('hi');
        const [status, setStatus] = useState("loading"); 
        const [member, setMember] = useState(null); 
        const [headers, setHeaders] = useState([]);  
        const [isAdmin, setIsAdmin] = useState(false); 
        const [showPin, setShowPin] = useState(false);  
        const [prize, setPrize] = useState({ img: "", msg: "", isLocked: true, highlight: "" });  

        const t = translations[lang];

        useEffect(() => {  
            fetch(MAIN_CSV + "&t=" + Date.now()).then(r => r.text()).then(txt => {  
                Papa.parse(txt, { complete: (res) => {  
                    const rows = res.data; setHeaders(rows[0] || []);  
                    const qId = new URLSearchParams(window.location.search).get('id');  
                    const match = rows.slice(1).find(r => r[1] && r[1].toLowerCase() === (qId || "").toLowerCase());  
                    if (match) { 
                        setMember(match); 
                        fetch(MAPPING_CSV).then(r => r.text()).then(mTxt => {
                            Papa.parse(mTxt, { header: true, complete: (mRes) => {
                                const lock = (match[37] || "").toUpperCase().trim();
                                if(lock && lock !== "LOCKED") {
                                    const m = mRes.data.find(x => x.Membership_ID?.toLowerCase().trim() === match[1].toLowerCase().trim());
                                    setPrize({
                                        img: m?.Image_Link?.includes("id=") ? "https://drive.google.com/thumbnail?id=" + m.Image_Link.split("id=")[1] + "&sz=w1000" : m?.Image_Link,
                                        highlight: lang === 'hi' ? (m?.Inam_Name || "विजेता") : "WINNER",
                                        msg: lang === 'hi' ? `'मंजिल उन्हीं को मिलती है जिनके सपनों में जान होती है,\nआज आपकी मेहनत और किस्मत दोनों मेहरबान होती है!'\n\nबधाई हो! आप विजेता हैं। रैंक: ${m?.Match_Name}` : `Congratulations! You are a winner. Rank: ${m?.Match_Name}`,
                                        isLocked: false
                                    });
                                } else { setPrize({ msg: lang === 'hi' ? "परिणाम जल्द घोषित होगा" : "Result Soon", isLocked: true }); }
                                setStatus("view");
                            }});
                        });
                    } else setStatus("search");  
                }});  
            });  
        }, [lang]);  

        if (status === "loading") return <div className="h-screen flex items-center justify-center font-black text-blue-400">DPSG LOADING...</div>;  

        return (  
            <div className="min-h-screen pb-10">  
                <div className="no-print marquee-container"><div className="marquee-p">{member ? (member[38] || t.brand) : t.brand} • {t.slogan}</div></div>  
                
                <div className="max-w-xl mx-auto p-4 sm:p-8">  
                    <div className="no-print flex justify-between items-center mb-8">
                        <button onClick={() => setLang(lang === 'hi' ? 'en' : 'hi')} className="lang-btn uppercase">{lang === 'hi' ? 'Switch to English' : 'हिंदी'}</button>
                    </div>

                    {status === "search" ? (  
                        <div className="bg-white p-12 rounded-[2.5rem] shadow-xl text-center border">  
                            <i className="fa-solid fa-id-card text-6xl text-blue-600 mb-6"></i>  
                            <h2 className="text-xl font-black mb-8 uppercase text-slate-900">ID सर्च करें</h2>  
                            <input id="sid" type="text" className="w-full bg-slate-50 border-2 rounded-2xl py-5 text-center mb-6 text-xl font-bold uppercase text-slate-900" placeholder="DPSG-26-XXXX" />  
                            <button onClick={() => window.location.href=`?id=${document.getElementById('sid').value}`} className="w-full bg-blue-600 py-5 rounded-2xl font-black text-white shadow-lg">DASHBOARD</button>  
                        </div>  
                    ) : (  
                        <div className="space-y-6">  
                            <div className="text-center">  
                                <h1 className="text-3xl font-black italic uppercase text-white leading-none">{t.brand}</h1>  
                                <div className="bg-blue-600 inline-block px-4 py-1 rounded-full mt-4 shadow-lg"><p className="text-[10px] font-bold text-white uppercase">{t.slogan}</p></div>
                            </div>  

                            {/* चारों आइकन्स वाला सेक्शन सुरक्षित (0% बदलाव) */}
                            <div className="grid grid-cols-4 gap-2 mb-4 text-center">
                                <div className="bg-white p-3 rounded-2xl shadow-lg"><i className="fa-solid fa-desktop text-orange-500 text-xl"></i><p className="text-[8px] font-bold text-slate-900 mt-1 uppercase">ई-मित्र</p></div>
                                <div className="bg-white p-3 rounded-2xl shadow-lg"><i className="fa-solid fa-database text-blue-500 text-xl"></i><p className="text-[8px] font-bold text-slate-900 mt-1 uppercase">डेटा रिकवरी</p></div>
                                <div className="bg-white p-3 rounded-2xl shadow-lg"><i className="fa-solid fa-mobile-screen text-purple-500 text-xl"></i><p className="text-[8px] font-bold text-slate-900 mt-1 uppercase">मोबाइल अनलॉक</p></div>
                                <div className="bg-white p-3 rounded-2xl shadow-lg"><i className="fa-solid fa-landmark text-green-600 text-xl"></i><p className="text-[8px] font-bold text-slate-900 mt-1 uppercase">सरकारी योजना</p></div>
                            </div>

                            {/* सूचना पोर्टल - Notice Portal */}
                            <div className="notice-portal no-print"><h4 className="text-yellow-500 font-black text-[10px] uppercase mb-1">{t.noticeTitle}</h4><p className="text-white font-bold text-sm italic">{member[38] || "Welcome to DPSG!"}</p></div>

                            <div className="no-print bg-slate-900 p-1 rounded-[2.5rem] shadow-xl border-2 border-slate-800">
                                <p className="text-red-500 font-black text-[10px] my-3 text-center animate-pulse uppercase">{t.warning}</p>
                                <div className="bg-white rounded-[2rem] overflow-hidden">  
                                    {prize.isLocked ? ( <div className="p-24 text-center text-slate-400 font-bold italic"> <i className="fa-solid fa-lock text-5xl mb-4"></i> <p>{prize.pending}</p> </div> ) : (  
                                        <ScratchCard onComplete={() => confetti({particleCount:200, spread:70, origin:{y:0.6}})}>  
                                            <div className="p-0 text-center w-full bg-white flex flex-col items-center">
                                                <div className="bg-blue-600 text-white px-10 py-2 rounded-b-3xl font-black text-xs mb-4 uppercase shadow-xl tracking-widest">{prize.highlight}</div>  
                                                <img src={prize.img} className="w-full max-h-[400px] object-contain px-4" alt="Prize" />  
                                                <div className="winner-msg-box"><p className="shayari-font whitespace-pre-line">{prize.msg.split('\n\n')[0]}</p><p className="bg-yellow-500 text-black px-6 py-1.5 rounded-full font-black text-xs inline-block shadow-lg mt-4 uppercase">{prize.msg.split('\n\n')[1]}</p></div>
                                            </div>
                                        </ScratchCard>  
                                    )}  
                                </div>
                            </div>

                            <div id="receipt" className="receipt-card p-10 text-left">  
                                <div className="text-center border-b-2 border-dashed border-slate-200 pb-8 mb-8"><h3 className="font-black text-2xl text-blue-700 italic uppercase tracking-tight">{t.receipt}</h3><p className="text-[10px] font-black text-slate-400 uppercase tracking-[0.3em] mt-2">DPSG NIMBAHERA</p></div>  
                                <div className="grid grid-cols-2 gap-y-10 border-b border-slate-100 pb-8">  
                                    <div><p className="text-[9px] font-black text-slate-400 uppercase">ID IDENTITY</p><p className="text-xl font-black text-blue-700">{translateExcel(member[1], lang)}</p></div>  
                                    <div className="text-right"><p className="text-[9px] font-black text-slate-400 uppercase">CATEGORY</p><p className="font-black text-blue-700 px-4 py-1 border-2 border-blue-100 rounded-full bg-blue-50 inline-block text-[9px]">{translateExcel(member[3], lang)}</p></div>  
                                    <div><p className="text-[9px] font-black text-slate-400 uppercase">CUSTOMER NAME</p><p className="font-black uppercase text-lg text-slate-800">{translateExcel(member[8], lang)}</p></div>  
                                    <div className="text-right"><p className="text-[9px] font-black text-slate-400 uppercase">VILLAGE</p><p className="font-black uppercase text-lg text-slate-800">{translateExcel(member[5], lang)}</p></div>  
                                    <div><p className="text-[9px] font-black text-slate-400 uppercase">SECURE MOBILE</p><p className="font-bold tracking-widest text-slate-700">******{member[9]?.slice(-4)}</p></div>
                                    <div className="text-right"><p className="text-[9px] font-black text-slate-400 uppercase">EXPIRY DATE</p><p className="font-bold text-red-600">{member[16]}</p></div>  
                                </div>
                                <div className="grid grid-cols-3 gap-4 my-8">
                                    <div className="bg-blue-600 text-white p-5 rounded-3xl text-center shadow-lg"><p className="text-[9px] font-bold opacity-70 uppercase">POINTS</p><p className="text-2xl font-black">{member[18]}</p></div>
                                    <div className="bg-slate-800 text-white p-5 rounded-3xl text-center shadow-lg"><p className="text-[9px] font-bold opacity-70 uppercase">USED</p><p className="text-2xl font-black">{(parseInt(member[18])-parseInt(member[21]))||0}</p></div>
                                    <div className="bg-green-600 text-white p-5 rounded-3xl text-center shadow-lg"><p className="text-[9px] font-bold opacity-70 uppercase">BALANCE</p><p className="text-2xl font-black">{member[21]}</p></div>
                                </div>
                                <div className="bg-blue-50/50 p-8 rounded-[2rem] border border-blue-100 my-8 font-bold italic text-[11px] space-y-3 text-slate-700">
                                    <p className="text-blue-700 font-black uppercase mb-2 flex items-center italic"><i className="fa-solid fa-star-of-life mr-2"></i> {t.benefitTitle}</p>
                                    {(() => { const cat = (member[3] || "").toLowerCase(); let key = (cat.includes("vip") || cat.includes("500")) ? "VIP" : (cat.includes("gold") || cat.includes("100")) ? "Gold" : "Silver"; return cardSpecs[key][lang].map((ben, i) => ( <div key={i} className="flex items-start py-2 border-b border-blue-100/50 last:border-0"><i className="fa-solid fa-circle-check text-green-500 mr-2 mt-1"></i>{ben}</div> )); })()}
                                </div>
                                <div className="bg-slate-900 text-white p-10 rounded-[2.5rem] text-center mb-10 shadow-2xl border-4 border-slate-800"><p className="text-[11px] opacity-50 uppercase mb-1 tracking-widest">LUCKY DRAW DATE</p><p className="text-4xl font-black text-yellow-500 italic uppercase tracking-widest">{member[36]}</p></div>
                                <div className="bg-slate-50 p-10 rounded-[2.5rem] border border-slate-100 mb-10 text-[10px] font-bold italic space-y-4 text-slate-500">
                                    <h4 className="text-[11px] font-black uppercase mb-4 border-b pb-2 flex items-center text-slate-800"><i className="fa-solid fa-scale-balanced mr-3 text-blue-600"></i> {t.tTitle}</h4>
                                    <p>01. यह डिजिटल सदस्यता कार्ड व्यक्तिगत है और अहस्तांतरणीय है।</p><p>02. सेवाओं का लाभ केवल कार्ड पर अंकित समाप्ति तिथि तक ही मान्य है।</p><p>03. लिया गया शुल्क पंजीकरण शुल्क है, जो वापस नहीं होगा।</p><p>04. सर्वर त्रुटि में फिजिकल स्क्रैच कार्ड का परिणाम अंतिम होगा।</p><p>05. सर्वर खराबी पर प्रबंधन की जिम्मेदारी नहीं होगी।</p><p>06. सरकारी टोकन शुल्क ग्राहक द्वारा अलग से देय होगा।</p><p>07. फ्री डिलीवरी सीमा के बाद न्यूनतम शुल्क लिया जाएगा।</p><p>08. यह समाज सेवा हेतु है, कृपया कार्य पूर्ण होने तक धैर्य रखें।</p><p>09. कार्य में लगने वाले समय हेतु अभद्र व्यवहार स्वीकार्य नहीं होगा।</p><p>10. मैनेजमेंट के पास नियमों में बदलाव का पूर्ण अधिकार है।</p>
                                </div>
                                <button onClick={()=>window.print()} className="no-print w-full bg-blue-600 text-white py-6 rounded-full font-black uppercase shadow-xl hover:bg-blue-700 text-lg flex items-center justify-center gap-3"><i className="fa-solid fa-whatsapp text-2xl"></i> {t.print}</button>
                            </div>
                            
                            <div className="no-print flex flex-col items-center pt-10">  
                                <button onClick={()=>setShowPin(!showPin)} className="p-8 bg-white rounded-full shadow-lg border opacity-20 hover:opacity-100 transition-all"><i className="fa-solid fa-fingerprint text-5xl text-blue-600"></i></button>  
                            </div>
                        </div>
                    )}
                </div>
            </div>  
        );  
    };  
    const root = ReactDOM.createRoot(document.getElementById('root')); root.render(<App />);  
    </script>
</body>  
</html>
