<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>DPSG Member</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>

<style>

body{
font-family: Arial;
text-align:center;
background:#0b1020;
color:white;
padding:20px;
}

.box{
background:white;
color:black;
padding:20px;
border-radius:15px;
max-width:400px;
margin:auto;
}

</style>

</head>

<body>

<h2>DPSG Member Verification</h2>

<div id="result">Loading...</div>


<script>

const SHEET_ID="1rrU0EHXur_HfPlmYxjm6vIJqeRW2VZAu0qIteItQkLo";

const CSV=
`https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv`;

const params=new URLSearchParams(window.location.search);

const id=params.get("id");

fetch(CSV)

.then(res=>res.text())

.then(data=>{

Papa.parse(data,{

complete:function(res){

let rows=res.data;

let found=null;


rows.forEach(r=>{

if(r.join("").toLowerCase().includes(id.toLowerCase())){

found=r;

}

});


if(found){

document.getElementById("result").innerHTML=`

<div class="box">

<h3>Member Found</h3>

<p><b>ID:</b> ${id}</p>

<p><b>Name:</b> ${found[8]}</p>

<p><b>Village:</b> ${found[5]}</p>

<p><b>Mobile:</b> ${found[9]}</p>

</div>

`;

}else{

document.getElementById("result").innerHTML="Member Not Found";

}

}

})

});

</script>

</body>

</html>
