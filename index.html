<!DOCTYPE html>  
<html lang="hi">  
<head>  
    <meta charset="UTF-8">  
    <meta name="viewport" content="width=device-width, initial-scale=1.0">  
    <title>DPSG Master Portal - Digital Seva Nimbahera</title>  
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>  
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>  
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>  
    <script src="https://cdn.tailwindcss.com"></script>  
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>  
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>  
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">  
    <style>  
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;700;900&family=Mukta:wght@400;600;800&display=swap');  
        
        body { font-family: 'Poppins', 'Mukta', sans-serif; background: #0f172a; color: #f8fafc; margin: 0; overflow-x: hidden; }  

        /* Fixed Marquee Animation */
        .marquee-container { background: #fbbf24; color: #000; padding: 12px 0; overflow: hidden; position: relative; border-bottom: 3px solid #000; }
        .marquee-text { display: inline-block; white-space: nowrap; font-weight: 900; animation: scroll-left 20s linear infinite; font-size: 15px; }
        @keyframes scroll-left { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }

        /* Stylish Content Cards */
        .receipt-card { background: white; border-radius: 2.5rem; color: #1e293b; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5); }
        .label-style { font-size: 10px; font-weight: 900; color: #64748b; text-transform: uppercase; }
        .value-style { font-size: 1.15rem; font-weight: 800; color: #1e40af; text-transform: uppercase; }

        /* Special Notice Box */
        .notice-box { background: linear-gradient(135deg, #1e293b, #334155); border-left: 6px solid #fbbf24; padding: 15px; border-radius: 15px; margin-bottom: 20px; box-shadow: 0 10px 20px rgba(0,0,0,0.3); }

        /* Premium Winner Glow */
        .winner-card { border: 4px solid #fbbf24; border-radius: 2.5rem; background: #0f172a; overflow: hidden; box-shadow: 0 0 40px rgba(251, 191, 36, 0.4); }
        .winner-msg-box { background: #1e293b; border-top: 4px solid #fbbf24; padding: 20px; text-align: center; }
        .shayari { font-style: italic; font-weight: 700; color: #fde68a; font-size: 1.1rem; }

        .lang-switch { background: #1e40af; color: white; padding: 6px 15px; border-radius: 20px; font-weight: bold; font-size: 12px; transition: 0.3s; }
        .lang-switch:hover { background: #fbbf24; color: black; }
    </style>
</head>  
<body>  
    <div id="root"></div>  
    <script type="text/babel">  
    const { useState, useEffect, useRef, useCallback } = React;
    const SHEET_ID = "1rrU0EHXur_HfPlmYxjm6vIJqeRW2VZAu0qIteItQkLo";  
    const MAIN_CSV = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv`;  
    const MAPPING_CSV = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRlm-iMRLk5J-lxybJ7S2sR3ZpcGNG8Z8r3BEku8GzK8opYlsunIcZoe03Jf0Xbhw/pub?gid=1529433935&single=true&output=csv";  
    const MASTER_PIN = "Chanchal@6375";  

    const translations = {
        hi: {
            brand: "डिजिटल प्रॉब्लम सॉल्यूशन ग्रुप", slogan: "समस्या आपकी, समाधान हमारा - उचित मूल्य, बेहतरीन सेवा",
            receipt: "प्रोफेशनल डिजिटल रसीद", id: "ID पहचान", cat: "श्रेणी", name: "ग्राहक का नाम", vil: "ग्राम/शहर",
            mob: "सुरक्षित मोबाइल", adh: "सुरक्षित आधार", active: "सक्रियण तिथि", exp: "समाप्ति तिथि",
            pts: "POINTS", usd: "USED", bal: "BALANCE", draw: "लकी ड्रा तिथि", noticeHead: "📢 आवश्यक सूचना",
            tTitle: "नियम व शर्तें", print: "प्रिंट रसीद", search: "ID सर्च करें", open: "डैशबोर्ड खोलें"
        },
        en: {
            brand: "DIGITAL PROBLEM SOLUTION GROUP", slogan: "Your Problem, Our Solution - Fair Price, Best Service",
            receipt: "PROFESSIONAL DIGITAL RECEIPT", id: "ID IDENTITY", cat: "CATEGORY", name: "CUSTOMER NAME", vil: "VILLAGE/CITY",
            mob: "SECURE MOBILE", adh: "SECURE AADHAR", active: "ACTIVATION DATE", exp: "EXPIRY DATE",
            pts: "POINTS", usd: "USED", bal: "BALANCE", draw: "LUCKY DRAW DATE", noticeHead: "📢 IMPORTANT NOTICE",
            tTitle: "TERMS & CONDITIONS", print: "PRINT RECEIPT", search: "SEARCH ID", open: "OPEN DASHBOARD"
        }
    };

    const App = () => {  
        const [lang, setLang] = useState('hi');
        const [status, setStatus] = useState("loading"); 
        const [member, setMember] = useState(null); 
        const [prize, setPrize] = useState({ img: "", msg: "", isLocked: true, highlight: "" });  
        const [isAdmin, setIsAdmin] = useState(false);
        const [showPin, setShowPin] = useState(false);

        const t = translations[lang];

        useEffect(() => {
            fetch(MAIN_CSV + "&t=" + Date.now()).then(r => r.text()).then(txt => {
                Papa.parse(txt, { complete: (res) => {
                    const rows = res.data;
                    const qId = new URLSearchParams(window.location.search).get('id');
                    const match = rows.slice(1).find(r => r[1] && r[1].toLowerCase() === (qId || "").toLowerCase());
                    if (match) {
                        setMember(match);
                        fetch(MAPPING_CSV).then(r => r.text()).then(mTxt => {
                            Papa.parse(mTxt, { header: true, complete: (mRes) => {
                                const lock = (match[37] || "").toUpperCase().trim();
                                if(lock && lock !== "LOCKED") {
                                    const m = mRes.data.find(x => x.Membership_ID?.toLowerCase().trim() === match[1].toLowerCase().trim());
                                    setPrize({
                                        img: m?.Image_Link?.includes("id=") ? "https://drive.google.com/thumbnail?id=" + m.Image_Link.split("id=")[1] + "&sz=w1000" : m?.Image_Link,
                                        highlight: lang === 'hi' ? "विजेता" : "WINNER",
                                        msg: lang === 'hi' ? `'मंजिल उन्हीं को मिलती है जिनके सपनों में जान होती है,\nआज आपकी मेहनत और किस्मत दोनों मेहरबान होती है!'\n\nबधाई हो! आप विजेता हैं। रैंक: ${m?.Match_Name}` : `Congratulations! You are a winner. Rank: ${m?.Match_Name}`,
                                        isLocked: false
                                    });
                                } else { setPrize({ msg: lang === 'hi' ? "परिणाम जल्द घोषित होगा" : "Result Soon", isLocked: true }); }
                                setStatus("view");
                            }});
                        });
                    } else setStatus("search");
                }});
            });
        }, [lang]);

        if (status === "loading") return <div className="h-screen flex items-center justify-center text-blue-400 font-bold">DPSG LOADING...</div>;

        return (
            <div className="min-h-screen pb-10">
                <div className="marquee-container no-print">
                    <div className="marquee-text">{member ? member[38] : t.slogan} • {t.brand}</div>
                </div>

                <div className="max-w-xl mx-auto p-4 sm:p-6">
                    <div className="flex justify-end mb-6">
                        <button onClick={() => setLang(lang === 'hi' ? 'en' : 'hi')} className="lang-switch uppercase">
                            {lang === 'hi' ? 'Switch to English' : 'हिंदी में बदलें'}
                        </button>
                    </div>

                    {status === "search" ? (
                        <div className="bg-slate-800 p-10 rounded-[2.5rem] text-center border border-slate-700 shadow-2xl">
                            <h2 className="text-xl font-bold mb-6 text-blue-400 uppercase">{t.search}</h2>
                            <input id="sid" type="text" className="w-full bg-slate-900 border-2 border-slate-700 rounded-2xl py-4 text-center mb-6 font-bold text-white uppercase" placeholder="DPSG-26-XXXX" />
                            <button onClick={() => window.location.href=`?id=${document.getElementById('sid').value}`} className="w-full bg-blue-600 py-4 rounded-2xl font-black text-white">{t.open}</button>
                        </div>
                    ) : (
                        <div className="space-y-6">
                            <div className="text-center">
                                <h1 className="text-3xl font-black italic text-white">{t.brand}</h1>
                                <p className="text-yellow-500 font-bold text-[11px] mt-2 uppercase tracking-widest">{t.slogan}</p>
                            </div>

                            {/* NOTICE BOX */}
                            <div className="notice-box no-print">
                                <h4 className="text-yellow-500 font-black text-xs uppercase mb-2"><i className="fa-solid fa-bullhorn mr-2"></i>{t.noticeHead}</h4>
                                <p className="text-sm font-bold text-slate-200">{member[38] || "कोई नई सूचना नहीं है।"}</p>
                            </div>

                            {/* REWARD SECTION */}
                            <div className="winner-card no-print">
                                {prize.isLocked ? (
                                    <div className="py-20 text-center text-slate-500 italic font-bold">
                                        <i className="fa-solid fa-lock text-4xl mb-3"></i><p>{prize.msg}</p>
                                    </div>
                                ) : (
                                    <div className="bg-white text-slate-900 p-0 overflow-hidden">
                                        <div className="bg-blue-600 text-white text-center font-black py-2 text-sm uppercase">{prize.highlight}</div>
                                        <img src={prize.img} className="w-full max-h-[300px] object-contain my-4 px-4" />
                                        <div className="winner-msg-box">
                                            <p className="shayari whitespace-pre-line">{prize.msg}</p>
                                        </div>
                                    </div>
                                )}
                            </div>

                            {/* RECEIPT SECTION - 0% DATA CHANGE */}
                            <div id="receipt" className="receipt-card p-10">
                                <div className="text-center border-b-2 border-dashed border-slate-200 pb-6 mb-6">
                                    <h3 className="font-black text-2xl text-blue-700 italic uppercase">{t.receipt}</h3>
                                    <p className="text-[9px] font-black text-slate-400 tracking-[0.3em] mt-1">DPSG NIMBAHERA</p>
                                </div>

                                <div className="grid grid-cols-2 gap-y-8 border-b pb-6">
                                    <div><p className="label-style">{t.id}</p><p className="value-style">{member[1]}</p></div>
                                    <div className="text-right"><p className="label-style">{t.cat}</p><p className="font-bold text-blue-700 bg-blue-50 px-3 py-1 rounded-full text-xs inline-block">{member[3]}</p></div>
                                    <div><p className="label-style">{t.name}</p><p className="font-black text-slate-800 uppercase">{member[8]}</p></div>
                                    <div className="text-right"><p className="label-style">{t.vil}</p><p className="font-black text-slate-800 uppercase">{member[5]}</p></div>
                                    <div><p className="label-style">{t.mob}</p><p className="font-bold text-slate-600">******{member[9]?.slice(-4)}</p></div>
                                    <div className="text-right"><p className="label-style">{t.exp}</p><p className="font-bold text-red-600">{member[16]}</p></div>
                                </div>

                                <div className="grid grid-cols-3 gap-3 my-8">
                                    <div className="bg-blue-600 text-white p-4 rounded-2xl text-center"><p className="text-[8px] font-bold uppercase">{t.pts}</p><p className="text-xl font-black">{member[18]}</p></div>
                                    <div className="bg-slate-800 text-white p-4 rounded-2xl text-center"><p className="text-[8px] font-bold uppercase">{t.usd}</p><p className="text-xl font-black">{(parseInt(member[18])-parseInt(member[21]))||0}</p></div>
                                    <div className="bg-green-600 text-white p-4 rounded-2xl text-center"><p className="text-[8px] font-bold uppercase">{t.bal}</p><p className="text-xl font-black">{member[21]}</p></div>
                                </div>

                                <div className="bg-slate-900 text-white p-8 rounded-3xl text-center mb-6 shadow-xl">
                                    <p className="text-[10px] opacity-60 uppercase mb-1">{t.draw}</p>
                                    <p className="text-3xl font-black text-yellow-500 italic uppercase">{member[36]}</p>
                                </div>

                                <div className="bg-slate-50 p-6 rounded-2xl text-[9px] font-bold text-slate-500 space-y-2">
                                    <h4 className="text-slate-800 font-black uppercase mb-2 border-b pb-1">{t.tTitle}</h4>
                                    <p>01. यह डिजिटल सदस्यता कार्ड व्यक्तिगत है।</p>
                                    <p>02. सेवाएँ समाप्ति तिथि तक ही मान्य हैं।</p>
                                    <p>03. मैनेजमेंट के पास नियमों में बदलाव का पूर्ण अधिकार है।</p>
                                </div>
                                <button onClick={()=>window.print()} className="no-print w-full bg-blue-600 text-white py-4 rounded-full font-black mt-6 shadow-lg uppercase">{t.print}</button>
                            </div>
                            
                            {/* ADMIN AREA */}
                            <div className="no-print flex flex-col items-center opacity-30 hover:opacity-100">
                                <button onClick={()=>setShowPin(!showPin)}><i className="fa-solid fa-fingerprint text-4xl text-blue-400"></i></button>
                            </div>
                        </div>
                    )}
                </div>
            </div>
        );
    };
    const root = ReactDOM.createRoot(document.getElementById('root')); root.render(<App />);
    </script>
</body>  
</html>
