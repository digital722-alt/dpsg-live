    <style>

        .receipt-card { border: 1px solid #e2e8f0; border-radius: 2.5rem; background: white; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.1); }  
        @media print { .no-print { display: none !important; } .receipt-card { border: none !important; box-shadow: none !important; width: 100% !important; margin: 0 !important; } }  
        .marquee { white-space: nowrap; overflow: hidden; background: #fbbf24; color: #000; font-weight: 800; padding: 12px 0; font-size: 14px; text-transform: uppercase; border-bottom: 2px solid #000; }  
        .marquee p { display: inline-block; padding-left: 100%; animation: marquee 25s linear infinite; }

        .scratch-container { position: relative; width: 100%; max-width: 550px; margin: 0 auto; min-height: 480px; }  
        .scratch-canvas { position: absolute; top: 0; left: 0; z-index: 30; border-radius: 2rem; cursor: crosshair; touch-action: none; width: 100%; height: 100%; }  
        .scratch-content { background: #fff; border-radius: 2rem; overflow: hidden; display: flex; flex-direction: column; align-items: center; justify-content: center; width: 100%; height: 100%; border: 4px solid #334155; }  
        .winner-glow { border: 8px solid #fbbf24; box-shadow: 0 0 70px rgba(251, 191, 36, 0.9); animation: pulse 2s infinite; }  
        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.03); } }

</head>  
<body>  
    <div id="root"></div>  
    <script type="text/babel">  
    const { useState, useEffect, useRef, useCallback } = React;  
    const SHEET_ID = "1rrU0EHXur_HfPlmYxjm6vIJqeRW2VZAu0qIteItQkLo";  
    const MAIN_CSV = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv`;  
    const MAPPING_CSV = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRlm-iMRLk5J-lxybJ7S2sR3ZpcGNG8Z8r3BEku8GzK8opYlsunIcZoe03Jf0Xbhw/pub?gid=1529433935&single=true&output=csv";  
    const MASTER_PIN = "Chanchal@6375";  

    const vocab = {  
        hi: {  
            brand: "डिजिटल प्रॉब्लम सॉल्यूशन ग्रुप", service: "डिजिटल सेवा निम्बाहेड़ा", receipt: "प्रोफेशनल डिजिटल रसीद", idLabel: "मेंबरशिप आईडी दर्ज करें",  
            points: "कुल सर्विस पॉइंट्स", used: "उपयोग पॉइंट्स", balance: "शेष पॉइंट्स", active: "सक्रियण तिथि", expiry: "समाप्ति तिथि", draw: "लकी ड्रा तिथि",  
            tTitle: "नियम व शर्तें", t1: "01. यह डिजिटल सदस्यता कार्ड व्यक्तिगत है और अहस्तांतरणीय है।", t2: "02. सेवाओं का लाभ केवल कार्ड पर अंकित समाप्ति तिथि तक ही मान्य है।", t3: "03. लिया गया शुल्क पंजीकरण शुल्क है, जो वापस नहीं होगा।", t4: "04. सर्वर त्रुटि में फिजिकल स्क्रैच कार्ड का परिणाम अंतिम होगा।", t5: "05. सर्वर खराबी पर प्रबंधन की जिम्मेदारी नहीं होगी।", t6: "06. सरकारी टोकन शुल्क ग्राहक द्वारा अलग से देय होगा।", t7: "07. फ्री डिलीवरी सीमा के बाद न्यूनतम शुल्क लिया जाएगा।", t8: "08. यह समाज सेवा हेतु है, कृपया कार्य पूर्ण होने तक धैर्य रखें।", t9: "09. कार्य में लगने वाले समय हेतु अभद्र व्यवहार स्वीकार्य नहीं होगा।", t10: "10. मैनेजमेंट के पास नियमों में बदलाव का पूर्ण अधिकार है।",
            warning: "⚠️ आधिकारिक घोषणा होने तक कृपया कार्ड को स्क्रैच न करें", pending: "परिणाम जल्द घोषित होगा।"
        }
    };

    const cardSpecs = {  
        VIP: { hi: ["₹500 VIP Card (6 महीने)", "उपयोग: पूरे परिवार के लिए मान्य", "कोटा: 150 प्रिंट + 80 फोटो (या 380 फोटो / 190 प्रिंट)", "लैमिनेशन: 2 फ्री", "ई-मित्र: 100% फ्री सेवा (केवल टोकन चार्ज देय)", "डिलीवरी: 2 बार फ्री (न्यूनतम रेट)", "इनाम: 100 Cash Back + बड़ा धमाका!", "संपर्क: 7229874128"] },  
        Gold: { hi: ["₹100 Gold Card (3 महीने)", "उपयोग: केवल 1 व्यक्ति हेतु", "कोटा: 40 प्रिंट + 24 फोटो (या 100 फोटो / 52 प्रिंट)", "लैमिनेशन: 1 फ्री", "ई-मित्र: 50% छूट (केवल टोकन चार्ज देय)", "डिलीवरी: 1 बार (न्यूनतम रेट पर)", "इनाम: 100% गारंटीड उपहार!", "संपर्क: 7229874128"] },  
        Silver: { hi: ["₹50 Silver Card (1 महीना)", "उपयोग: केवल 1 व्यक्ति हेतु", "कोटा: 15 प्रिंट + 12 फोटो (या 40 फोटो / 21 प्रिंट)", "ई-मित्र: सीमित सेवा (केवल टोकन चार्ज देय)", "डिलीवरी: 1 बार (न्यूनतम रेट पर)", "इनाम: लकी ड्रा का शानदार अवसर!", "संपर्क: 7229874128"] }  
    };

    const toDirectLink = (url) => { if (!url) return ""; let id = ""; if (url.includes("/d/")) id = url.split("/d/")[1].split("/")[0]; if (url.includes("id=")) id = url.split("id=")[1].split("&")[0]; return id ? "https://drive.google.com/thumbnail?id=" + id + "&sz=w1000" : url; };  
    const mask = (v) => v?.length > 4 ? v.slice(0, 2) + "******" + v.slice(-2) : v;  

    const ScratchCard = ({ onComplete, children }) => {  
        const canvasRef = useRef(null); const [isRevealed, setIsRevealed] = useState(false);  
        useEffect(() => {  
            const canvas = canvasRef.current; if(!canvas) return; const ctx = canvas.getContext('2d');  
            canvas.width = canvas.parentElement.offsetWidth; canvas.height = canvas.parentElement.offsetHeight;  
            const grad = ctx.createLinearGradient(0, 0, canvas.width, canvas.height);  
            grad.addColorStop(0, '#D4AF37'); grad.addColorStop(0.5, '#F9F295'); grad.addColorStop(1, '#B8860B');  
            ctx.fillStyle = grad; ctx.fillRect(0, 0, canvas.width, canvas.height);  
            ctx.font = "bold 28px Inter"; ctx.fillStyle = "#4a3b01"; ctx.textAlign = "center";  
            ctx.fillText("SCRATCH FATA-FAT!", canvas.width / 2, canvas.height / 2);  
            const scratch = (e) => {  
                if (isRevealed) return; const rect = canvas.getBoundingClientRect();  
                const x = (e.pageX || (e.touches && e.touches[0].pageX)) - rect.left;  
                const y = (e.pageY || (e.touches && e.touches[0].pageY)) - rect.top;  
                ctx.globalCompositeOperation = 'destination-out'; ctx.beginPath(); 
                ctx.arc(x, y, 80, 0, Math.PI * 2); ctx.fill();  
                const pixels = ctx.getImageData(0, 0, canvas.width, canvas.height).data;  
                let count = 0; for (let i = 0; i < pixels.length; i += 40) if (pixels[i + 3] === 0) count++;  
                if (count > (pixels.length / 40) * 0.40) { setIsRevealed(true); onComplete(); }  
            };  
            canvas.addEventListener('mousemove', scratch); canvas.addEventListener('touchmove', scratch, {passive: true});  
        }, [isRevealed]);  
        return ( <div className="scratch-container"> {!isRevealed && <canvas ref={canvasRef} className="scratch-canvas" />} <div className="scratch-content">{children}</div> </div> );  
    };  

    const App = () => {  
        const [theme, setTheme] = useState('light'); const [status, setStatus] = useState("loading"); 
        const [member, setMember] = useState(null); const [headers, setHeaders] = useState([]);  
        const [isAdmin, setIsAdmin] = useState(false); const [showPin, setShowPin] = useState(false);  
        const [prize, setPrize] = useState({ img: "", msg: "", isLocked: true, highlight: "", colorClass: "" });  
        
        // फॉर्म के लिए नए स्टेट्स
        const [showForm, setShowForm] = useState(false);
        const [formType, setFormType] = useState("");

        const t = vocab.hi;

        const openForm = (type) => {
            setFormType(type);
            setShowForm(true);
        };

        const mapPrize = useCallback((row, maps) => {  
            const mID = (row[1] || "").toString().toLowerCase().trim();  
            const dDateStr = (row[36] || "").toString().trim(); 
            const lock = (row[37] || "").toString().toUpperCase().trim(); 
            
            let drawDate = null;
            if (dDateStr) {
                let parts = dDateStr.split(/[-/]/);
                if (parts.length === 3) drawDate = new Date(parts[2], parts[1]-1, parts[0]);
                else drawDate = new Date(dDateStr);
            }
            const today = new Date(); today.setHours(0,0,0,0); if(drawDate) drawDate.setHours(0,0,0,0);

            if (!lock || !dDateStr || drawDate > today) {
                setPrize({ msg: t.pending, isLocked: true }); return;
            }

            const match = maps.find(m => m.Membership_ID && m.Membership_ID.toLowerCase().trim() === mID);  

            if (lock === "DPSG_WINNER" && match) {
                setPrize({ img: toDirectLink(match.Image_Link), highlight: match.Inam_Name || "DPSG WINNER", msg: `"मंजिल उन्हीं को मिलती है जिनके सपनों में जान होती है, आज आपकी मेहनत और किस्मत दोनों मेहरबान होती है!"\n\nहार्दिक बधाई! आप डिजिटल प्रॉब्लम सॉल्यूशन ग्रुप (DPSG) के गौरवशाली विजेता बने हैं और आपने ${match.Match_Name} प्राप्त की है। यह इनाम संस्था की ओर से आपके विश्वास का सम्मान है। हमें गर्व है कि आप हमारे डिजिटल परिवार का हिस्सा हैं। उज्जवल भविष्य की कामनाओं के साथ, धन्यवाद!`, isLocked: false, colorClass: "winner-glow bg-yellow-50" });  
            } else if (lock === "DPSG_CASH") {
                setPrize({ img: "https://drive.google.com/thumbnail?id=1WOrBZpuRF9Q-Pc753LA11XoAaGjCv7zD&sz=w1000", highlight: "₹100 Cash Back", msg: `"इनाम छोटा हो या बड़ा, अपनों का साथ सबसे प्यारा है, जीत की ये शुरुआत है, अभी तो सारा आसमान तुम्हारा है!"\n\nमुस्कुराइए! DPSG संस्था की ओर से आपको यह विशेष कैशबैक भेंट किया जा रहा है। यह आपके और हमारे अटूट रिश्ते की एक छोटी सी पहचान है। भविष्य में भी हम आपकी समस्याओं के बेहतरीन समाधान के लिए तत्पर रहेंगे। हमारे साथ जुड़ने के लिए हृदय से धन्यवाद!`, isLocked: false, colorClass: "border-4 border-green-500 bg-green-50" });  
            } else if (lock === "DPSG_GIFT") {
                setPrize({ img: "https://drive.google.com/thumbnail?id=1baCVXWH7XYD5T8QxOfGKnkt9CKDHSx2Z&sz=w1000", highlight: "5 rs Pen", msg: `"खूबसूरत सा ये तोहफा बस एक छोटा सा बहाना है, हमे तो आपके साथ मिलकर खुशियों का जशन मनाना है!"\n\nबधाई हो! DPSG परिवार की ओर से यह उपहार आपके डिजिटल सफर को और भी खास बनाने के लिए है। आपकी संतुष्टि ही हमारी असली सफलता है। हम आपके सुखद भविष्य की कामना करते हैं। हमारे साथ बने रहने के लिए बहुत-बहुत धन्यवाद!`, isLocked: false, colorClass: "border-4 border-blue-500 bg-blue-50" });  
            } else {
                setPrize({ img: "https://drive.google.com/thumbnail?id=1j7v5a90h8ABi2r6piQIZR_4Qil4buiqh&sz=w1000", highlight: "Better Luck Next Time", msg: `"गिरते हैं शहसवार ही मैदान-ए-जंग में, वो क्या गिरेंगे जो घुटनों के बल चलते हैं!"\n\nनिराश न हों, यह केवल एक शुरुआत है। DPSG संस्था आपके निरंतर सहयोग की सराहना करती है। अगली बार आपकी किस्मत ज़रूर चमकेगी। हमारे साथ बने रहने और हम पर भरोसा जताने के लिए आपका धन्यवाद!`, isLocked: false, colorClass: "bg-slate-100 border-4" });  
            }
        }, [t.pending]);

        useEffect(() => {  
            fetch(MAIN_CSV + "&t=" + Date.now()).then(r => r.text()).then(txt => {  
                Papa.parse(txt, { complete: (res) => {  
                    const rows = res.data; setHeaders(rows[0] || []);  
                    const qId = new URLSearchParams(window.location.search).get('id');  
                    const match = rows.slice(1).find(r => r[1] && r[1].toLowerCase() === (qId || "").toLowerCase());  
                    if (match) { setMember(match); fetch(MAPPING_CSV).then(r => r.text()).then(mTxt => { Papa.parse(mTxt, { header: true, complete: (mRes) => { mapPrize(match, mRes.data); setStatus("view"); } }); }); }  
                    else setStatus("search");  
                }});  
            });  
        }, [mapPrize]);  

        const clean = (val) => (val && val !== "#REF!" && val !== "") ? val : "---";

        if (status === "loading") return <div className="h-screen flex items-center justify-center font-black text-blue-600">DPSG LOADING...</div>;  

        return (  
            <div className={`min-h-screen pb-10 ${theme === 'dark' ? 'bg-slate-900 text-white' : 'bg-slate-50 text-slate-900'}`}>  
                <div className="no-print marquee"><p>{member ? (member[38] || "Welcome to Digital Problem Solution Group Nimbahera") : "DPSG Dashboard Loading..."}</p></div>  
                <div className="max-w-xl mx-auto p-4 sm:p-8">  
                    <div className="no-print flex justify-end mb-8"><button onClick={()=>setTheme(theme==='light'?'dark':'light')} className="p-3 bg-white dark:bg-slate-800 rounded-full shadow-md text-xl">{theme==='light'?'🌙':'☀️'}</button></div>
                    {status === "search" ? (  
                        <div className="bg-white dark:bg-slate-800 p-12 rounded-[2.5rem] shadow-xl text-center border">  
                            <i className="fa-solid fa-id-card text-6xl text-blue-600 mb-6"></i>  
                            <h2 className="text-xl font-black mb-8 uppercase">ID सर्च करें</h2>  
                            <input id="sid" type="text" className="w-full bg-slate-50 dark:bg-slate-700 border-2 rounded-2xl py-5 text-center mb-6 text-xl font-bold uppercase" placeholder="DPSG-26-XXXX" />  
                            <button onClick={() => window.location.href=`?id=${document.getElementById('sid').value}`} className="w-full bg-blue-600 py-5 rounded-2xl font-black text-white shadow-lg">DASHBOARD खोलें</button>  
                        </div>  
                    ) : (  
                        <div className="space-y-8 animate-in slide-in-from-bottom-4 duration-700">  
                            <div className="text-center">  
                                <h1 className="text-3xl font-black italic uppercase text-blue-900 dark:text-blue-400 leading-none">{t.brand}</h1>  
                                <p className="text-yellow-600 font-bold tracking-widest mt-2 uppercase text-sm">Digital Seva Nimbahera</p>  
                                <p className="text-blue-700 dark:text-blue-400 font-black mt-3 italic text-sm">समस्या आपकी, समाधान हमारा - उचित मूल्य, बेहतरीन सेवा !</p>
                            </div>  
                            
                            {/* 4 New Icons Section */}
                            <div className="no-print grid grid-cols-4 gap-2 sm:gap-4 my-6">
                                <button onClick={() => openForm('ई-मित्र')} className="flex flex-col items-center justify-center bg-white dark:bg-slate-800 p-3 rounded-2xl shadow-md border hover:border-orange-500 transition-all">

                                    <span className="text-[10px] sm:text-xs font-bold text-slate-700 dark:text-slate-300">ई-मित्र</span>
                                </button>
                                <button onClick={() => openForm('डेटा रिकवरी')} className="flex flex-col items-center justify-center bg-white dark:bg-slate-800 p-3 rounded-2xl shadow-md border hover:border-blue-500 transition-all">
                                    <div className="w-12 h-12 bg-blue-100 text-blue-600 rounded-full flex items-center justify-center text-xl mb-2"><i className="fa-solid fa-hard-drive"></i></div>
                                    <span className="text-[10px] sm:text-xs font-bold text-slate-700 dark:text-slate-300">डेटा रिकवरी</span>
                                </button>
                                <button onClick={() => openForm('मोबाइल सर्विसेज')} className="flex flex-col items-center justify-center bg-white dark:bg-slate-800 p-3 rounded-2xl shadow-md border hover:border-purple-500 transition-all">
                                    <div className="w-12 h-12 bg-purple-100 text-purple-600 rounded-full flex items-center justify-center text-xl mb-2"><i className="fa-solid fa-mobile-screen-button"></i></div>
                                    <span className="text-[10px] sm:text-xs font-bold text-slate-700 dark:text-slate-300">मोबाइल सर्विसेज</span>
                                </button>
                                <button onClick={() => openForm('सरकारी योजना')} className="flex flex-col items-center justify-center bg-white dark:bg-slate-800 p-3 rounded-2xl shadow-md border hover:border-green-500 transition-all">
                                    <div className="w-12 h-12 bg-green-100 text-green-600 rounded-full flex items-center justify-center text-xl mb-2"><i className="fa-solid fa-building-columns"></i></div>
                                    <span className="text-[10px] sm:text-xs font-bold text-slate-700 dark:text-slate-300">सरकारी योजना</span>
                                </button>
                            </div>

                            <div className="no-print bg-white dark:bg-slate-800 p-8 rounded-[3rem] shadow-xl border">
                                <p className="text-red-600 font-black text-[12px] mb-4 text-center animate-pulse uppercase">{t.warning}</p>
                                <div className={`p-2 rounded-[2.5rem] ${prize.isLocked ? 'bg-slate-100 dark:bg-slate-700' : prize.colorClass}`}>  
                                    {prize.isLocked ? ( <div className="p-24 text-center text-slate-400 font-bold italic"> <i className="fa-solid fa-lock text-5xl mb-4"></i> <p>{prize.msg}</p> </div> ) : (  
                                        <ScratchCard onComplete={() => confetti({particleCount:200, spread:70, origin:{y:0.6}})}>  
                                            <div className="p-8 text-center w-full bg-white dark:bg-slate-800 flex flex-col items-center">
                                                <div className="bg-blue-600 text-white px-10 py-2 rounded-full font-black text-md mb-8 uppercase shadow-xl tracking-widest">{prize.highlight}</div>  
                                                <img src={prize.img} className="w-full max-h-[480px] object-contain mb-8" alt="Prize" />  
                                                <p className="text-[14px] font-bold leading-relaxed whitespace-pre-line px-4">{prize.msg}</p>
                                            </div>
                                        </ScratchCard>  
                                    )}  
                                </div>
                            </div>

                            {/* WhatsApp & Location Buttons Section */}
                            <div className="no-print grid grid-cols-2 gap-4 my-2">
                                <button onClick={() => openForm('WhatsApp (HELP)')} className="bg-green-500 hover:bg-green-600 text-white font-black py-4 rounded-2xl shadow-md flex items-center justify-center text-sm transition-all">
                                    <i className="fa-brands fa-whatsapp text-2xl mr-2"></i> HELP
                                </button>
                                <button onClick={() => openForm('LOCATION')} className="bg-red-500 hover:bg-red-600 text-white font-black py-4 rounded-2xl shadow-md flex items-center justify-center text-sm transition-all">
                                    <i className="fa-solid fa-location-dot text-2xl mr-2"></i> LOCATION
                                </button>
                            </div>

                            <div id="receipt" className="receipt-card p-12 text-left dark:bg-white dark:text-slate-900 border-2 border-slate-100 mt-6">  
                                <div className="text-center border-b-2 border-dashed pb-8 mb-8"><h3 className="font-black text-2xl text-blue-700 italic uppercase tracking-tight">{t.receipt}</h3><p className="text-[10px] font-black text-slate-400 uppercase tracking-[0.3em] mt-2">DPSG NIMBAHERA</p></div>  
                                <div className="grid grid-cols-2 gap-y-12 text-sm border-b pb-10">  
                                    <div><p className="text-[10px] text-slate-400 font-black uppercase">ID IDENTITY</p><p className="text-2xl font-black">{clean(member[1])}</p></div>  
                                    <div className="text-right"><p className="text-[10px] text-slate-400 font-black uppercase">Category</p><p className="font-black text-blue-700 px-5 py-1.5 border-2 border-blue-100 rounded-full bg-blue-50 inline-block">{clean(member[3])}</p></div>  
                                    <div><p className="text-[10px] text-slate-400 font-black uppercase">Customer Name</p><p className="font-black uppercase text-lg">{clean(member[8])}</p></div>  
                                    <div className="text-right"><p className="text-[10px] text-slate-400 font-black uppercase">Village</p><p className="font-black uppercase text-lg">{clean(member[5])}</p></div>  
                                    <div><p className="text-[10px] text-slate-400 font-black uppercase">Secure Mobile</p><p className="font-bold tracking-widest">{mask(member[9])}</p></div>
                                    <div className="text-right"><p className="text-[10px] text-slate-400 font-black uppercase">Secure Aadhar</p><p className="font-bold tracking-widest">{mask(member[11])}</p></div>
                                    <div><p className="text-[10px] text-slate-400 font-black uppercase">{t.active}</p><p className="font-bold">{clean(member[15])}</p></div>  
                                    <div className="text-right"><p className="text-[10px] text-slate-400 font-black uppercase">{t.expiry}</p><p className="font-bold text-red-600">{clean(member[16])}</p></div>  
                                </div>
                                <div className="grid grid-cols-3 gap-5 my-10">
                                    <div className="bg-blue-600 text-white p-6 rounded-3xl text-center shadow-lg"><p className="text-[9px] font-bold opacity-70 uppercase">Points</p><p className="text-3xl font-black">{clean(member[18])}</p></div>
                                    <div className="bg-slate-800 text-white p-6 rounded-3xl text-center shadow-lg"><p className="text-[9px] font-bold opacity-70 uppercase">Used</p><p className="text-3xl font-black">{(parseInt(member[18])-parseInt(member[21]))||0}</p></div>
                                    <div className="bg-green-600 text-white p-6 rounded-3xl text-center shadow-lg"><p className="text-[9px] font-bold opacity-70 uppercase">Balance</p><p className="text-3xl font-black">{clean(member[21])}</p></div>
                                </div>
                                <div className="bg-blue-50/50 p-8 rounded-[2rem] border border-blue-100 my-8 font-bold italic text-[11px] space-y-3">
                                    <p className="text-blue-700 font-black uppercase mb-4 flex items-center italic"><i className="fa-solid fa-crown mr-3"></i> सदस्यता कार्ड सुविधायें</p>
                                    {(() => { const cat = (member[3] || "").toLowerCase(); let key = (cat.includes("vip") || cat.includes("500")) ? "VIP" : (cat.includes("gold") || cat.includes("100")) ? "Gold" : "Silver"; return cardSpecs[key].hi.map((ben, i) => ( <div key={i} className="flex items-start py-2 border-b border-blue-100/50 last:border-0"><i className="fa-solid fa-circle-check text-green-500 mr-3 mt-1"></i>{ben}</div> )); })()}
                                </div>
                                <div className="bg-slate-900 text-white p-10 rounded-[2.5rem] text-center mb-10 shadow-2xl border-4 border-slate-800"><p className="text-[11px] opacity-50 uppercase mb-2 tracking-widest">{t.draw}</p><p className="text-4xl font-black text-yellow-500 italic uppercase tracking-widest">{clean(member[36])}</p></div>
                                <div className="bg-slate-50 p-10 rounded-[2.5rem] border border-slate-100 mb-10 text-[10px] font-bold italic space-y-4 text-slate-500">
                                    <h4 className="text-[11px] font-black uppercase mb-4 border-b pb-2 flex items-center text-slate-800"><i className="fa-solid fa-scale-balanced mr-3 text-blue-600"></i> {t.tTitle}</h4>
                                    <p>{t.t1}</p><p>{t.t2}</p><p>{t.t3}</p><p>{t.t4}</p><p>{t.t5}</p><p>{t.t6}</p><p>{t.t7}</p><p>{t.t8}</p><p>{t.t9}</p><p>{t.t10}</p>
                                </div>
                                <button onClick={()=>window.print()} className="no-print w-full bg-blue-600 text-white py-6 rounded-full font-black uppercase shadow-xl hover:bg-blue-700 active:scale-95 text-lg">Print Official Receipt</button>
                            </div>
                            <div className="no-print pt-10 pb-20 flex flex-col items-center">  
                                {!isAdmin && <button onClick={()=>setShowPin(!showPin)} className="p-8 bg-white dark:bg-slate-800 rounded-full shadow-lg border opacity-20 hover:opacity-100 transition-all"><i className="fa-solid fa-fingerprint text-5xl text-blue-600"></i></button>}  
                                {showPin && !isAdmin && ( <div className="mt-4 bg-white dark:bg-slate-800 p-8 rounded-[2rem] border w-full animate-in zoom-in shadow-2xl"><input type="password" id="adminPin" className="w-full bg-slate-100 dark:bg-slate-700 rounded-2xl py-5 text-center mb-4 font-bold outline-none text-2xl" placeholder="ENTER MASTER PIN" /><button onClick={()=>{document.getElementById('adminPin').value===MASTER_PIN?setIsAdmin(true):alert("Wrong Pin!");}} className="w-full bg-black text-white py-5 rounded-2xl font-black uppercase">Unlock Database</button></div> )}
                                {isAdmin && ( <div className="w-full mt-6 bg-white dark:bg-slate-800 border rounded-[2rem] p-10 text-left shadow-2xl overflow-hidden border-t-8 border-t-blue-600"><div className="flex justify-between items-center mb-8 border-b pb-4"><h3 className="font-black text-sm text-blue-600 uppercase tracking-widest">Master Database Panel</h3><button onClick={()=>setIsAdmin(false)} className="text-red-500 font-bold text-[11px] uppercase border px-4 py-1 rounded-full">Logout Admin</button></div><div className="grid gap-4 max-h-[500px] overflow-y-auto pr-2 custom-scroll">{member.map((v, i) => ( <div key={i} className="p-5 bg-slate-50 dark:bg-slate-700 rounded-2xl border border-slate-200"><p className="text-[9px] text-slate-400 font-black uppercase mb-1">{headers[i] || `Index ${i}`}</p><p className="font-bold text-md text-slate-800 dark:text-slate-100">{v||"---"}</p></div> ))}</div></div> )}
                            </div>
                        </div>
                    )}

                    {/* Formspree Popup Modal */}
                    {showForm && (
                        <div className="fixed inset-0 z-50 flex items-center justify-center bg-black/70 p-4">
                            <div className="bg-white dark:bg-slate-800 p-8 rounded-[2rem] w-full max-w-md relative shadow-2xl animate-in zoom-in duration-300 border-4 border-blue-100 dark:border-slate-700">
                                <button onClick={() => setShowForm(false)} className="absolute top-4 right-4 w-10 h-10 bg-red-100 text-red-600 hover:bg-red-200 rounded-full font-black text-lg flex items-center justify-center transition-all"><i className="fa-solid fa-xmark"></i></button>
                                <h3 className="text-2xl font-black text-blue-600 mb-6 uppercase text-center border-b-2 border-dashed pb-4">{formType}</h3>
                                <form action="https://formspree.io/f/xwvndvoe" method="POST" encType="multipart/form-data" className="space-y-5 text-left">
                                    <input type="hidden" name="Service_Requested" value={formType} />
                                    <div>
                                        <label className="block text-[13px] font-black uppercase text-slate-700 dark:text-slate-300 mb-2 tracking-wider">मोबाइल नंबर <span className="text-red-500">*</span></label>
                                        <input type="tel" name="Mobile" required className="w-full border-2 border-slate-200 dark:border-slate-600 bg-slate-50 dark:bg-slate-700 p-4 rounded-2xl outline-none focus:border-blue-500 font-bold text-lg transition-all" placeholder="अपना नंबर दर्ज करें" />
                                    </div>
                                    <div>
                                        <label className="block text-[13px] font-black uppercase text-slate-700 dark:text-slate-300 mb-2 tracking-wider">समस्या / कार्य का विवरण <span className="text-red-500">*</span></label>
                                        <textarea name="Problem" required rows="3" className="w-full border-2 border-slate-200 dark:border-slate-600 bg-slate-50 dark:bg-slate-700 p-4 rounded-2xl outline-none focus:border-blue-500 font-bold text-md transition-all resize-none" placeholder="अपनी समस्या या जो काम करवाना है, वह लिखें..."></textarea>
                                    </div>
                                    <div>
                                        <label className="block text-[13px] font-black uppercase text-slate-700 dark:text-slate-300 mb-2 tracking-wider">फोटो/वीडियो अपलोड करें</label>
                                        <input type="file" name="Files" multiple accept="image/*,video/*" className="w-full text-sm text-slate-500 file:mr-4 file:py-3 file:px-6 file:rounded-full file:border-0 file:text-sm file:font-black file:uppercase file:bg-blue-100 file:text-blue-700 hover:file:bg-blue-200 transition-all cursor-pointer bg-slate-50 dark:bg-slate-700 p-2 rounded-2xl border-2 border-slate-200 dark:border-slate-600" />
                                    </div>
                                    <button type="submit" className="w-full bg-blue-600 hover:bg-blue-700 text-white font-black py-5 rounded-2xl shadow-xl mt-4 text-lg uppercase tracking-widest transition-all">रिक्वेस्ट भेजें</button>
                                </form>
                            </div>
                        </div>
                    )}
                </div>
            </div>  
        );  
    };  
    const root = ReactDOM.createRoot(document.getElementById('root')); root.render(<App />);  
    </script>
</body>  
</html>
