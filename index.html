<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>DPSG Member Lookup</title>
  <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
</head>

<body style="font-family: Arial; text-align:center; padding:20px;">

<h2>DPSG Member Details</h2>

<div id="result">Loading...</div>

<script>
const CSV_URL =
"https://docs.google.com/spreadsheets/d/e/2PACX-1vTQkqhLTtRAhSxsmb2eLeSfRNhZjue28NGF9tHMSgqQ_1jWJWqVQ2-amEbAune6y1dwgRFxcpjIIgaH/pub?gid=1255606959&single=true&output=csv";

function getIdFromURL() {
  const params = new URLSearchParams(window.location.search);
  return params.get("id");
}

function showData(member) {
  document.getElementById("result").innerHTML = `
    <h3>${member[8]}</h3>
    <p><b>ID:</b> ${member[1]}</p>
    <p><b>Village:</b> ${member[10]}</p>
    <p><b>Points:</b> ${member[21]}</p>
  `;
}

function showError(msg) {
  document.getElementById("result").innerHTML = msg;
}

const memberId = getIdFromURL();

if (!memberId) {
  showError("ID दर्ज करें");
} else {
  Papa.parse(CSV_URL, {
    download: true,
    complete: function(results) {
      const rows = results.data;

      const member = rows.find(r => r[1] === memberId);

      if (member) {
        showData(member);
      } else {
        showError("Member नहीं मिला");
      }
    }
  });
}
</script>

</body>
</html>
