<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DPSG Digital Seva - Official Master Portal</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; margin: 0; overflow-x: hidden; transition: all 0.3s ease; }
        
        /* Dark Mode Colors */
        .dark-theme { background-color: #0f172a; color: #f8fafc; }
        .dark-theme .receipt-card, .dark-theme .bg-white { background-color: #1e293b !important; color: #f8fafc; border-color: #334155; }
        .dark-theme .text-slate-800, .dark-theme .text-slate-900 { color: #f1f5f9 !important; }
        .dark-theme .bg-slate-50, .dark-theme .bg-slate-100 { background-color: #0f172a !important; border-color: #334155 !important; }
        
        /* Light Mode Colors (Original) */
        .light-theme { background-color: #f8fafc; color: #1e293b; }
        .light-theme .receipt-card { border: 1px solid #e2e8f0; background: white; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.1); }
        
        .receipt-card { border-radius: 2rem; }
        @media print { .no-print { display: none !important; } body { background: white !important; } .receipt-card { border: none !important; box-shadow: none !important; margin: 0 !important; width: 100% !important; } }
        
        /* SCROLLING NOTICE */
        .marquee { white-space: nowrap; overflow: hidden; position: relative; background: #fbbf24; color: #000; font-weight: 800; padding: 10px 0; font-size: 14px; text-transform: uppercase; border-bottom: 2px solid #000; }
        .marquee p { display: inline-block; padding-left: 100%; animation: marquee 25s linear infinite; }
        @keyframes marquee { 0% { transform: translate(0, 0); } 100% { transform: translate(-100%, 0); } }

        /* SCRATCH CARD SYSTEM */
        .scratch-container { position: relative; width: 100%; max-width: 450px; margin: 0 auto; min-height: 350px; }
        .scratch-canvas { position: absolute; top: 0; left: 0; z-index: 30; border-radius: 1.5rem; cursor: crosshair; touch-action: none; width: 100%; height: 100%; }
        .scratch-content { background: #000; border-radius: 1.5rem; overflow: hidden; display: flex; flex-direction: column; align-items: center; justify-content: center; width: 100%; height: 100%; border: 4px solid #334155; }
        .winner-glow { border: 5px solid #fbbf24; box-shadow: 0 0 50px rgba(251, 191, 36, 0.5); animation: pulse 2s infinite; }
        @keyframes pulse { 0% { box-shadow: 0 0 20px rgba(251, 191, 36, 0.4); } 50% { box-shadow: 0 0 60px rgba(251, 191, 36, 0.7); } 100% { box-shadow: 0 0 20px rgba(251, 191, 36, 0.4); } }
        .custom-scroll::-webkit-scrollbar { width: 6px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        
        /* Hide Scrollbar for Banners */
        .hide-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
    const { useState, useEffect, useRef, useCallback } = React;

    const SHEET_ID = "1rrU0EHXur_HfPlmYxjm6vIJqeRW2VZAu0qIteItQkLo";
    const MAIN_CSV = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv`;
    const MAPPING_CSV = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRlm-iMRLk5J-lxybJ7S2sR3ZpcGNG8Z8r3BEku8GzK8opYlsunIcZoe03Jf0Xbhw/pub?gid=1529433935&single=true&output=csv";
    const MASTER_PIN = "Chanchal@6375";

    const vocab = {
        hi: { brand: "डिजिटल प्रॉब्लम सॉल्यूशन ग्रुप", service: "डिजिटल सेवा निम्बाहेड़ा", slogan: "समस्या आपकी, समाधान हमारा !" },
        en: { brand: "Digital Problem Solution Group", service: "Digital Seva Nimbahera", slogan: "Your Problem, Our Solution!" }
    };

    const toDirectLink = (url) => { if (!url) return ""; let id = ""; if (url.includes("/d/")) id = url.split("/d/")[1].split("/")[0]; if (url.includes("id=")) id = url.split("id=")[1].split("&")[0]; return id ? "https://drive.google.com/thumbnail?id=" + id + "&sz=w1000" : url; };
    const mask = (v) => v?.length > 4 ? v.slice(0, 2) + "******" + v.slice(-2) : v;

    const ScratchCard = ({ onComplete, children }) => {
        const canvasRef = useRef(null);
        const [isRevealed, setIsRevealed] = useState(false);
        useEffect(() => {
            const canvas = canvasRef.current; if(!canvas) return; const ctx = canvas.getContext('2d');
            canvas.width = canvas.parentElement.offsetWidth; canvas.height = canvas.parentElement.offsetHeight;
            const grad = ctx.createLinearGradient(0, 0, canvas.width, canvas.height);
            grad.addColorStop(0, '#D4AF37'); grad.addColorStop(0.5, '#F9F295'); grad.addColorStop(1, '#B8860B');
            ctx.fillStyle = grad; ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.font = "bold 22px Inter"; ctx.fillStyle = "#4a3b01"; ctx.textAlign = "center";
            ctx.fillText("SCRATCH HERE", canvas.width / 2, canvas.height / 2);
            const scratch = (e) => {
                if (isRevealed) return; const rect = canvas.getBoundingClientRect();
                const x = (e.pageX || (e.touches && e.touches[0].pageX)) - rect.left;
                const y = (e.pageY || (e.touches && e.touches[0].pageY)) - rect.top;
                ctx.globalCompositeOperation = 'destination-out'; ctx.beginPath(); ctx.arc(x, y, 40, 0, Math.PI * 2); ctx.fill();
                const pixels = ctx.getImageData(0, 0, canvas.width, canvas.height).data;
                let count = 0; for (let i = 0; i < pixels.length; i += 40) if (pixels[i + 3] === 0) count++;
                if (count > (pixels.length / 40) * 0.5) { setIsRevealed(true); onComplete(); }
            };
            canvas.addEventListener('mousemove', scratch); canvas.addEventListener('touchmove', scratch);
        }, [isRevealed]);
        return ( <div className="scratch-container"> {!isRevealed && <canvas ref={canvasRef} className="scratch-canvas" />} <div className="scratch-content">{children}</div> </div> );
    };

    const App = () => {
        const [lang, setLang] = useState('hi'); 
        const [theme, setTheme] = useState('light-theme'); // Dark/Light Mode
        const [status, setStatus] = useState("loading");
        const [member, setMember] = useState(null); 
        const [headers, setHeaders] = useState([]);
        const [globalNotice, setGlobalNotice] = useState("Welcome to Digital Problem Solution Group Nimbahera");
        const [showForm, setShowForm] = useState(null); // Service Form State
        const [prize, setPrize] = useState({ img: "", msg: "", isLocked: true, type: "normal", highlight: "" });
        const [isAdmin, setIsAdmin] = useState(false);
        const [showPin, setShowPin] = useState(false);
        const [searchId, setSearchId] = useState("");

        const t = vocab[lang];

        const mapPrize = useCallback((row, maps) => {
            const mID = (row[1] || "").toString().toLowerCase().trim();
            const dDate = (row[36] || "").toString().trim();
            const lock = (row[37] || "").toString().toUpperCase().trim();
            const inamName = (row[4] || "").toString().trim();
            const today = new Date(); const draw = dDate ? new Date(dDate) : null;
            const keys = ["DPSG_WINNER", "DPSG_CASH", "DPSG_GIFT", "DPSG_NEXT"];

            if (!dDate || draw > today || !keys.includes(lock)) {
                setPrize({ msg: "परिणाम की घोषणा जल्द की जाएगी, इंतज़ार करें।", isLocked: true }); return;
            }
            const match = maps.find(m => m.Membership_ID.toLowerCase() === mID);
            if (lock === "DPSG_WINNER" && match) setPrize({ img: toDirectLink(match.Image_Link), highlight: inamName, msg: `🎉 Congratulations!`, isLocked: false, type: "winner" });
            else if (lock === "DPSG_CASH") setPrize({ img: "https://drive.google.com/thumbnail?id=1WOrBZpuRF9Q-Pc753LA11XoAaGjCv7zD&sz=w1000", highlight: inamName, msg: "🥳 Cashback!", isLocked: false, type: "cash" });
            else if (lock === "DPSG_GIFT") setPrize({ img: "https://drive.google.com/thumbnail?id=1baCVXWH7XYD5T8QxOfGKnkt9CKDHSx2Z&sz=w1000", highlight: inamName, msg: "🎁 Gift!", isLocked: false, type: "gift" });
            else setPrize({ img: "https://drive.google.com/thumbnail?id=1j7v5a90h8ABi2r6piQIZR_4Qil4buiqh&sz=w1000", highlight: inamName || "Better Luck", msg: "✨ Try Again!", isLocked: false, type: "loss" });
        }, []);

        useEffect(() => {
            fetch(MAIN_CSV + "&t=" + Date.now()).then(r => r.text()).then(txt => {
                Papa.parse(txt, { complete: (res) => {
                    const rows = res.data; setHeaders(rows[0] || []);
                    if(rows[1] && rows[1][38]) setGlobalNotice(rows[1][38]);
                    const qId = new URLSearchParams(window.location.search).get('id');
                    if (qId) { 
                        const match = rows.slice(1).find(r => r[1] && r[1].toLowerCase() === qId.toLowerCase());
                        if (match) { 
                            setMember(match); 
                            fetch(MAPPING_CSV).then(r => r.text()).then(mTxt => { 
                                Papa.parse(mTxt, { header: true, complete: (mRes) => { mapPrize(match, mRes.data); setStatus("view"); } }); 
                            }); 
                        } else { alert("ID Not Found"); setStatus("home"); }
                    } else { setStatus("home"); }
                }});
            });
        }, [mapPrize]);

        const clean = (val) => (val && val !== "#REF!" && val !== "") ? val : "Updating...";
        const toggleTheme = () => setTheme(theme === 'light-theme' ? 'dark-theme' : 'light-theme');

        if (status === "loading") return <div className="h-screen flex items-center justify-center font-black text-blue-600 text-2xl">DPSG SYSTEM LOADING...</div>;

        return (
            <div className={`min-h-screen pb-20 ${theme}`}>
                <div className="no-print marquee"><p>{globalNotice}</p></div>
                
                <div className="max-w-xl mx-auto p-4 sm:p-8">
                    
                    {/* Header: Language & Dark Mode */}
                    <div className="no-print flex justify-between items-center mb-8 border-b pb-4 border-slate-200">
                        <div className="flex bg-slate-200 p-1 rounded-xl">
                            <button onClick={() => setLang('hi')} className={`px-5 py-2 rounded-lg font-bold ${lang === 'hi' ? 'bg-white shadow text-black' : 'text-slate-500'}`}>हिन्दी</button>
                            <button onClick={() => setLang('en')} className={`px-5 py-2 rounded-lg font-bold ${lang === 'en' ? 'bg-white shadow text-black' : 'text-slate-500'}`}>English</button>
                        </div>
                        <div className="flex gap-4">
                            <button onClick={toggleTheme} className="text-slate-400 hover:text-blue-600 transition-colors bg-white p-2 rounded-full shadow"><i className={`fa-solid ${theme === 'light-theme' ? 'fa-moon' : 'fa-sun text-yellow-500'} text-xl`}></i></button>
                            <button onClick={() => window.location.href="?"} className="text-slate-400 hover:text-blue-600 transition-colors bg-white p-2 rounded-full shadow"><i className="fa-solid fa-house-chimney text-xl"></i></button>
                        </div>
                    </div>

                    <div className="text-center mb-8">
                        <h1 className="text-2xl font-black italic uppercase text-blue-600 leading-none">{t.brand}</h1>
                        <p className="text-yellow-600 font-black tracking-widest mt-2 uppercase text-sm">{t.service}</p>
                    </div>

                    {status === "home" && (
                        <div className="animate-in fade-in duration-500">
                            
                            {/* Slide Banners (30 Days Guarantee) */}
                            <div className="flex overflow-x-auto gap-4 snap-x snap-mandatory hide-scrollbar mb-8">
                                <div className="snap-center shrink-0 w-[90%] bg-gradient-to-r from-purple-700 to-indigo-600 text-white p-5 rounded-3xl shadow-lg">
                                    <h3 className="font-black text-lg"><i className="fa-solid fa-crown text-yellow-300 mr-2"></i> VIP (100) & Gold (400)</h3>
                                    <p className="text-sm mt-2 font-bold opacity-90"><i className="fa-solid fa-clock-rotate-left"></i> 30 दिन का लक्ष्य | 30 दिन में 100% रिफंड गारंटी!</p>
                                </div>
                            </div>

                            {/* Service Grid (Clear e-Mitra Logos) */}
                            <h3 className="font-black text-slate-700 mb-4 px-2 uppercase tracking-wider text-center border-b pb-2"><i className="fa-solid fa-desktop text-blue-600 mr-2"></i> हमारी प्रमुख सेवाएं</h3>
                            <div className="grid grid-cols-2 gap-4 mb-8">
                                <div onClick={() => setShowForm('ई-मित्र व बैंकिंग')} className="bg-white p-5 rounded-2xl shadow-md border-2 border-slate-100 text-center cursor-pointer hover:border-blue-400 transition-all">
                                    <i className="fa-solid fa-building-columns text-blue-600 text-4xl mb-3"></i>
                                    <p className="font-black text-sm uppercase">ई-मित्र सेवाएं</p>
                                    <p className="text-[10px] text-slate-500 mt-1">पैन कार्ड, आधार, जन-आधार</p>
                                </div>
                                <div onClick={() => setShowForm('डेटा रिकवरी')} className="bg-white p-5 rounded-2xl shadow-md border-2 border-slate-100 text-center cursor-pointer hover:border-purple-400 transition-all">
                                    <i className="fa-solid fa-database text-purple-600 text-4xl mb-3"></i>
                                    <p className="font-black text-sm uppercase">डेटा रिकवरी</p>
                                    <p className="text-[10px] text-slate-500 mt-1">डिलीट फोटो व डेटा वापसी</p>
                                </div>
                                <div onClick={() => setShowForm('मोबाइल अनलॉकिंग')} className="bg-white p-5 rounded-2xl shadow-md border-2 border-slate-100 text-center cursor-pointer hover:border-green-400 transition-all">
                                    <i className="fa-solid fa-mobile-screen-button text-green-600 text-4xl mb-3"></i>
                                    <p className="font-black text-sm uppercase">मोबाइल अनलॉक</p>
                                    <p className="text-[10px] text-slate-500 mt-1">पासवर्ड व पैटर्न लॉक</p>
                                </div>
                                <div onClick={() => setShowForm('सरकारी योजनाएं')} className="bg-white p-5 rounded-2xl shadow-md border-2 border-slate-100 text-center cursor-pointer hover:border-orange-400 transition-all">
                                    <i className="fa-solid fa-file-signature text-orange-600 text-4xl mb-3"></i>
                                    <p className="font-black text-sm uppercase">सरकारी योजनाएं</p>
                                    <p className="text-[10px] text-slate-500 mt-1">स्कॉलरशिप व बीमा फॉर्म</p>
                                </div>
                            </div>

                            {/* ID Search Box */}
                            <div className="bg-white p-8 rounded-[2rem] shadow-xl border border-slate-100 text-center">
                                <i className="fa-solid fa-id-badge text-5xl text-blue-600 mb-4"></i>
                                <h3 className="font-black text-slate-800 mb-4 text-lg">मेंबरशिप आईडी खोजें</h3>
                                <input value={searchId} onChange={(e)=>setSearchId(e.target.value)} type="text" className="w-full bg-slate-50 border-2 border-slate-200 rounded-xl py-4 px-4 text-center mb-4 font-bold focus:border-blue-500 outline-none uppercase text-black" placeholder="DPSG-26-XXXX" />
                                <button onClick={()=>searchId && (window.location.href=`?id=${searchId}`)} className="w-full bg-blue-600 py-4 rounded-xl font-black text-white shadow-lg hover:bg-blue-700">सर्च करें</button>
                            </div>

                            {/* Help Desk (WhatsApp & Maps) */}
                            <div className="mt-8 grid grid-cols-2 gap-4">
                                <a href="https://wa.me/917229874128?text=नमस्ते%20DPSG,%20मुझे%20मदद%20चाहिए" target="_blank" className="bg-green-100 text-green-700 border border-green-300 rounded-xl p-4 text-center font-bold text-sm shadow">
                                    <i className="fa-brands fa-whatsapp text-2xl mb-1 block"></i> व्हाट्सएप सहायता
                                </a>
                                <a href="https://maps.google.com/?q=Nimbahera" target="_blank" className="bg-blue-100 text-blue-700 border border-blue-300 rounded-xl p-4 text-center font-bold text-sm shadow">
                                    <i className="fa-solid fa-location-dot text-2xl mb-1 block"></i> ऑफिस लोकेशन
                                </a>
                            </div>
                        </div>
                    )}

                    {status === "view" && (
                        <div className="space-y-8 animate-in slide-in-from-bottom-4 duration-700">
                            
                            {/* Scratch Card with Red Warning */}
                            <div className={`p-2 rounded-[2rem] ${prize.type === 'winner' ? 'winner-glow bg-yellow-400' : 'bg-slate-200'}`}>
                                <p className="text-red-600 bg-red-50 text-[11px] font-black uppercase text-center py-2 rounded-t-[1.5rem] border-b border-red-200"><i className="fa-solid fa-triangle-exclamation"></i> आधिकारिक घोषणा होने तक कृपया कार्ड को स्क्रैच न करें</p>
                                
                                {prize.isLocked ? (
                                    <div className="bg-white p-12 rounded-b-[1.8rem] text-center italic">
                                        <i className="fa-solid fa-lock text-4xl text-slate-300 mb-4"></i>
                                        <p className="text-slate-500 font-bold">{prize.msg}</p>
                                    </div>
                                ) : (
                                    <ScratchCard onComplete={() => { setIsScratched(true); confetti(); }}>
                                        <div className="bg-white px-8 py-2 rounded-full font-black text-blue-600 mb-4 shadow-md">{clean(prize.highlight)}</div>
                                        <img src={prize.img} className="max-h-80 w-auto object-contain" alt="Prize" />
                                    </ScratchCard>
                                )}
                            </div>

                            <div id="receipt" className="receipt-card p-6 sm:p-10 text-left">
                                <div className="text-center border-b-2 border-dashed border-slate-200 pb-6 mb-6">
                                    <h3 className="font-black text-xl text-blue-700 italic uppercase">Digital Receipt</h3>
                                    <p className="text-2xl font-black text-slate-900 mt-2">{clean(member[1])}</p>
                                    <p className="text-sm font-black text-blue-700 bg-blue-50 inline-block px-4 py-1 rounded-full mt-2">{clean(member[3])}</p>
                                </div>
                                
                                <div className="space-y-6">
                                    {/* Digital Wallet / Progress Meter */}
                                    <div className="bg-slate-50 p-6 rounded-3xl border border-slate-200">
                                        <h4 className="font-black text-slate-700 mb-4 text-center uppercase text-xs"><i className="fa-solid fa-wallet text-blue-600 mr-2"></i> सर्विस पॉइंट्स वॉलेट</h4>
                                        <div className="flex justify-between text-xs font-bold mb-1">
                                            <span className="text-slate-500">उपयोग: {clean(member[22])}</span>
                                            <span className="text-blue-600">कुल: {clean(member[21])}</span>
                                        </div>
                                        <div className="w-full bg-slate-200 rounded-full h-3 mb-4">
                                            <div className="bg-blue-600 h-3 rounded-full" style={{width: `${Math.min(100, (Number(member[22]) / Number(member[21])) * 100 || 0)}%`}}></div>
                                        </div>
                                        <div className="text-center">
                                            <span className="bg-green-100 text-green-700 px-4 py-2 rounded-xl font-black text-sm border border-green-200"><i className="fa-solid fa-circle-check mr-1"></i> शेष पॉइंट्स: {clean(member[23])}</span>
                                        </div>
                                    </div>

                                    <div className="grid grid-cols-2 gap-x-6 gap-y-6 py-4">
                                        <div><p className="text-[10px] text-slate-400 font-black uppercase mb-1">Name</p><p className="text-sm font-black uppercase">{clean(member[8])}</p></div>
                                        <div className="text-right"><p className="text-[10px] text-slate-400 font-black uppercase mb-1">Village</p><p className="text-sm font-black uppercase">{clean(member[5])}</p></div>
                                        <div><p className="text-[10px] text-slate-400 font-black uppercase mb-1">Mobile</p><p className="font-bold tracking-widest">{mask(member[9])}</p></div>
                                        <div className="text-right"><p className="text-[10px] text-slate-400 font-black uppercase mb-1">Aadhar</p><p className="font-bold tracking-widest">{mask(member[11])}</p></div>
                                    </div>

                                    <button onClick={()=>window.print()} className="no-print w-full bg-blue-600 text-white py-4 rounded-xl text-sm font-black uppercase shadow-lg hover:bg-blue-700"><i className="fa-solid fa-print mr-2"></i> रसीद प्रिंट करें</button>
                                </div>
                            </div>

                            {/* MASTER ADMIN - FINGERPRINT ICON */}  
                            <div className="no-print pt-6 pb-10 flex flex-col items-center">
                                {!isAdmin && (
                                    <button onClick={() => setShowPin(!showPin)} className="opacity-40 hover:opacity-100 transition-all p-5 bg-white rounded-full shadow-lg border">
                                        <i className="fa-solid fa-fingerprint text-4xl text-blue-600"></i>
                                    </button>
                                )}
                                {showPin && !isAdmin && (
                                    <div className="mt-6 bg-white p-8 rounded-3xl border shadow-2xl w-full text-black">
                                        <input type="password" id="adminPin" className="w-full bg-slate-50 border-2 rounded-xl px-6 py-4 text-xl font-bold text-center mb-4 outline-none focus:border-blue-500" placeholder="ENTER PIN" />
                                        <button onClick={() => {document.getElementById('adminPin').value === MASTER_PIN ? setIsAdmin(true) : alert("WRONG PIN!");}} className="w-full bg-slate-900 py-4 rounded-xl font-black text-white hover:bg-black">UNLOCK DATA</button>
                                    </div>
                                )}
                                {isAdmin && (
                                    <div className="w-full mt-6 bg-white border rounded-3xl p-6 shadow-2xl">
                                        <div className="flex justify-between items-center mb-4 border-b pb-2">
                                            <h3 className="font-black text-blue-600 text-sm">MASTER DASHBOARD</h3>
                                            <button onClick={()=>setIsAdmin(false)} className="bg-red-100 text-red-600 px-3 py-1 rounded font-black text-xs">LOGOUT</button>
                                        </div>
                                        <div className="grid grid-cols-1 gap-2 max-h-96 overflow-y-auto pr-2 custom-scroll text-black">
                                            {member.map((val, i) => (
                                                <div key={i} className="p-3 bg-slate-50 rounded-lg border border-slate-200">
                                                    <p className="text-[10px] text-blue-600 font-black mb-1">{headers[i] || `Col ${i}`}</p>
                                                    <p className="font-bold text-sm">{val || "---"}</p>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                )}
                            </div>
                        </div>
                    )}
                </div>

                {/* Formspree Upload Form (Pop-up) */}
                {showForm && (
                    <div className="fixed inset-0 bg-black/70 z-50 flex items-center justify-center p-4">
                        <div className="bg-white p-6 rounded-3xl w-full max-w-md relative animate-in zoom-in text-black">
                            <button onClick={()=>setShowForm(null)} className="absolute top-4 right-5 text-2xl text-slate-400 hover:text-red-500"><i className="fa-solid fa-circle-xmark"></i></button>
                            <h2 className="font-black text-xl mb-6 text-blue-700 border-b pb-3"><i className="fa-solid fa-file-arrow-up mr-2"></i> {showForm} <br/><span className="text-xs text-slate-500 uppercase tracking-widest">डॉक्यूमेंट अपलोड फॉर्म</span></h2>
                            
                            <form action="https://formspree.io/f/xwvndvoe" method="POST" encType="multipart/form-data">
                                <input type="hidden" name="Service_Type" value={showForm} />
                                <input type="text" name="Name" placeholder="आपका पूरा नाम" required className="w-full bg-slate-50 border-2 border-slate-200 p-4 rounded-xl mb-4 font-bold outline-none focus:border-blue-500" />
                                <input type="tel" name="Phone" placeholder="मोबाइल नंबर (WhatsApp)" required className="w-full bg-slate-50 border-2 border-slate-200 p-4 rounded-xl mb-4 font-bold outline-none focus:border-blue-500" />
                                <label className="block text-xs font-black text-slate-600 mb-2 uppercase tracking-widest"><i className="fa-solid fa-camera mr-1"></i> फोटो / आधार चुनें:</label>
                                <input type="file" name="Document" className="w-full border-2 border-dashed border-blue-300 p-4 rounded-xl mb-6 bg-blue-50 cursor-pointer text-sm font-bold text-blue-700" />
                                <button type="submit" className="w-full bg-blue-600 text-white font-black py-4 rounded-xl shadow-lg hover:bg-blue-700">SUBMIT (जमा करें)</button>
                                <p className="text-[11px] text-center text-slate-500 font-bold mt-4"><i className="fa-solid fa-shield-halved text-green-500 mr-1"></i> आपका डेटा सुरक्षित रूप से DPSG को भेजा जाएगा।</p>
                            </form>
                        </div>
                    </div>
                )}
            </div>
        );
    };
    const root = ReactDOM.createRoot(document.getElementById('root')); root.render(<App />);
    </script>
</body>
</html>
