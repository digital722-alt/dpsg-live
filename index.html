<!DOCTYPE html>  
<html lang="hi">  
<head>  
    <meta charset="UTF-8">  
    <meta name="viewport" content="width=device-width, initial-scale=1.0">  
    <title>DPSG Master Portal - Digital Seva Nimbahera</title>  
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>  
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>  
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>  
    <script src="https://cdn.tailwindcss.com"></script>  
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>  
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>  
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">  
    <script>tailwind.config = { darkMode: 'class' }</script>
    <style>  
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');  
        body { font-family: 'Plus Jakarta Sans', sans-serif; transition: background-color 0.3s; margin: 0; }  
        .receipt-card { border: 1px solid #e2e8f0; border-radius: 2.5rem; background: white; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.1); position: relative; overflow: hidden; }  
        /* Colorbar Design */
        .colorbar { height: 8px; background: linear-gradient(90deg, #1e40af, #fbbf24, #10b981, #ef4444); width: 100%; position: absolute; top: 0; left: 0; }
        @media print { .no-print { display: none !important; } .receipt-card { border: none !important; box-shadow: none !important; width: 100% !important; margin: 0 !important; } }  
        .marquee { white-space: nowrap; overflow: hidden; background: #fbbf24; color: #000; font-weight: 800; padding: 10px 0; font-size: 13px; text-transform: uppercase; border-bottom: 2px solid #000; }  
        .marquee p { display: inline-block; padding-left: 100%; animation: marquee 25s linear infinite; }  
        @keyframes marquee { 0% { transform: translate(0, 0); } 100% { transform: translate(-100%, 0); } }  
        .scratch-container { position: relative; width: 100%; max-width: 550px; margin: 0 auto; min-height: 480px; }  
        .scratch-canvas { position: absolute; top: 0; left: 0; z-index: 30; border-radius: 2rem; cursor: crosshair; touch-action: none; width: 100%; height: 100%; }  
        .scratch-content { background: #fff; border-radius: 2rem; overflow: hidden; display: flex; flex-direction: column; align-items: center; justify-content: center; width: 100%; height: 100%; border: 4px solid #334155; }  
        .winner-glow { border: 8px solid #fbbf24; box-shadow: 0 0 70px rgba(251, 191, 36, 0.9); animation: pulse 2s infinite; }  
        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.03); } }  
        .stylish-gradient-text { background: linear-gradient(to right, #1e40af, #6366f1); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-weight: 900; }
    </style>
</head>  
<body>  
    <div id="root"></div>  
    <script type="text/babel">  
    const { useState, useEffect, useRef, useCallback } = React;  
    const SHEET_ID = "1rrU0EHXur_HfPlmYxjm6vIJqeRW2VZAu0qIteItQkLo";  
    const MAIN_CSV = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv`;  
    const MAPPING_CSV = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRlm-iMRLk5J-lxybJ7S2sR3ZpcGNG8Z8r3BEku8GzK8opYlsunIcZoe03Jf0Xbhw/pub?gid=1529433935&single=true&output=csv";  
    const MASTER_PIN = "Chanchal@6375";  

    const vocab = {  
        hi: {  
            brand: "डिजिटल प्रॉब्लम सॉल्यूशन ग्रुप", service: "डिजिटल सेवा निम्बाहेड़ा", receipt: "प्रोफेशनल डिजिटल रसीद", idLabel: "मेंबरशिप आईडी दर्ज करें",  
            points: "सर्विस पॉइंट्स", used: "उपयोग", balance: "शेष", active: "सक्रियण तिथि", expiry: "समाप्ति तिथि", draw: "लकी ड्रा तिथि",  
            tTitle: "नियम व शर्तें", t1: "01. यह डिजिटल सदस्यता कार्ड व्यक्तिगत है।", t2: "02. सेवाओं का लाभ केवल समाप्ति तिथि तक मान्य है।", 
            warning: "⚠️ आधिकारिक घोषणा तक कार्ड को स्क्रैच न करें", pending: "परिणाम जल्द घोषित होगा।", printBtn: "रसीद प्रिंट करें", 
            idHeading: "ID सर्च करें", unlock: "डेटाबेस अनलॉक करें", category: "श्रेणी", name: "ग्राहक का नाम", village: "गाँव", mobile: "मोबाइल", aadhar: "आधार", features: "सदस्यता कार्ड सुविधायें"
        },
        en: {  
            brand: "Digital Problem Solution Group", service: "Digital Seva Nimbahera", receipt: "Professional Digital Receipt", idLabel: "Enter Membership ID",  
            points: "Service Points", used: "Used", balance: "Balance", active: "Activation Date", expiry: "Expiry Date", draw: "Lucky Draw Date",  
            tTitle: "Terms & Conditions", t1: "01. This digital membership card is personal.", t2: "02. Services are valid until the expiry date.", 
            warning: "⚠️ Do not scratch the card until official announcement", pending: "Result will be announced soon.", printBtn: "Print Receipt",
            idHeading: "Search ID", unlock: "Unlock Database", category: "Category", name: "Customer Name", village: "Village", mobile: "Mobile", aadhar: "Aadhar", features: "Membership Benefits"
        }
    };

    const cardSpecs = {  
        VIP: { 
            hi: ["₹500 VIP Card (6 महीने)", "उपयोग: पूरे परिवार हेतु मान्य", "कोटा: 380 पॉइंट्स", "ई-मित्र: 100% फ्री सेवा"],
            en: ["₹500 VIP Card (6 Months)", "Usage: Valid for family", "Quota: 380 Points", "E-Mitra: 100% Free Service"]
        },  
        Gold: { 
            hi: ["₹100 Gold Card (3 महीने)", "कोटा: 100 पॉइंट्स", "ई-मित्र: 50% छूट"],
            en: ["₹100 Gold Card (3 Months)", "Quota: 100 Points", "E-Mitra: 50% Off"]
        },  
        Silver: { 
            hi: ["₹50 Silver Card (1 महीना)", "कोटा: 40 पॉइंट्स", "ई-मित्र: सीमित सेवा"],
            en: ["₹50 Silver Card (1 Month)", "Quota: 40 Points", "E-Mitra: Limited Service"]
        }  
    };

    const toDirectLink = (url) => { if (!url) return ""; let id = ""; if (url.includes("/d/")) id = url.split("/d/")[1].split("/")[0]; if (url.includes("id=")) id = url.split("id=")[1].split("&")[0]; return id ? "https://drive.google.com/thumbnail?id=" + id + "&sz=w1000" : url; };  
    const mask = (v) => v?.length > 4 ? v.slice(0, 2) + "******" + v.slice(-2) : v;  

    const ScratchCard = ({ onComplete, children }) => {  
        const canvasRef = useRef(null); const [isRevealed, setIsRevealed] = useState(false);  
        useEffect(() => {  
            const canvas = canvasRef.current; if(!canvas) return; const ctx = canvas.getContext('2d');  
            canvas.width = canvas.parentElement.offsetWidth; canvas.height = canvas.parentElement.offsetHeight;  
            const grad = ctx.createLinearGradient(0, 0, canvas.width, canvas.height);  
            grad.addColorStop(0, '#D4AF37'); grad.addColorStop(0.5, '#F9F295'); grad.addColorStop(1, '#B8860B');  
            ctx.fillStyle = grad; ctx.fillRect(0, 0, canvas.width, canvas.height);  
            ctx.font = "bold 28px Inter"; ctx.fillStyle = "#4a3b01"; ctx.textAlign = "center";  
            ctx.fillText("SCRATCH HERE", canvas.width / 2, canvas.height / 2);  
            const scratch = (e) => {  
                if (isRevealed) return; const rect = canvas.getBoundingClientRect();  
                const x = (e.pageX || (e.touches && e.touches[0].pageX)) - rect.left;  
                const y = (e.pageY || (e.touches && e.touches[0].pageY)) - rect.top;  
                ctx.globalCompositeOperation = 'destination-out'; ctx.beginPath(); 
                ctx.arc(x, y, 80, 0, Math.PI * 2); ctx.fill();  
                const pixels = ctx.getImageData(0, 0, canvas.width, canvas.height).data;  
                let count = 0; for (let i = 0; i < pixels.length; i += 40) if (pixels[i + 3] === 0) count++;  
                if (count > (pixels.length / 40) * 0.40) { setIsRevealed(true); onComplete(); }  
            };  
            canvas.addEventListener('mousemove', scratch); canvas.addEventListener('touchmove', scratch, {passive: true});  
        }, [isRevealed]);  
        return ( <div className="scratch-container"> {!isRevealed && <canvas ref={canvasRef} className="scratch-canvas" />} <div className="scratch-content">{children}</div> </div> );  
    };  

    const App = () => {  
        const [theme, setTheme] = useState('light'); 
        const [lang, setLang] = useState('hi');
        const [status, setStatus] = useState("loading"); 
        const [member, setMember] = useState(null); const [headers, setHeaders] = useState([]);  
        const [isAdmin, setIsAdmin] = useState(false); const [showPin, setShowPin] = useState(false);  
        const [prize, setPrize] = useState({ img: "", msg: "", isLocked: true, highlight: "", colorClass: "" });  

        const t = vocab[lang];

        const mapPrize = useCallback((row, maps) => {  
            const mID = (row[1] || "").toString().toLowerCase().trim();  
            const dDateStr = (row[36] || "").toString().trim(); 
            const lock = (row[37] || "").toString().toUpperCase().trim(); 
            
            let drawDate = null;
            if (dDateStr) {
                let parts = dDateStr.split(/[-/]/);
                if (parts.length === 3) drawDate = new Date(parts[2], parts[1]-1, parts[0]);
                else drawDate = new Date(dDateStr);
            }
            const today = new Date(); today.setHours(0,0,0,0); if(drawDate) drawDate.setHours(0,0,0,0);

            if (!lock || !dDateStr || drawDate > today) {
                setPrize({ msg: t.pending, isLocked: true }); return;
            }

            const match = maps.find(m => m.Membership_ID && m.Membership_ID.toLowerCase().trim() === mID);  

            if (lock === "DPSG_WINNER" && match) {
                setPrize({ img: toDirectLink(match.Image_Link), highlight: match.Inam_Name || "DPSG WINNER", msg: lang === 'hi' ? "बधाई हो! आप विजेता हैं।" : "Congrats! You are a winner.", isLocked: false, colorClass: "winner-glow bg-yellow-50" });  
            } else if (lock === "DPSG_CASH") {
                setPrize({ img: "https://drive.google.com/thumbnail?id=1WOrBZpuRF9Q-Pc753LA11XoAaGjCv7zD&sz=w1000", highlight: "₹100 Cash Back", msg: lang === 'hi' ? "कैशबैक स्वीकार करें।" : "Accept your cashback.", isLocked: false, colorClass: "border-4 border-green-500 bg-green-50" });  
            } else {
                setPrize({ img: "https://drive.google.com/thumbnail?id=1j7v5a90h8ABi2r6piQIZR_4Qil4buiqh&sz=w1000", highlight: "Better Luck Next Time", msg: lang === 'hi' ? "निराश न हों, अगली बार किस्मत ज़रूर चमकेगी।" : "Don't be disappointed, better luck next time.", isLocked: false, colorClass: "bg-slate-100 border-4" });  
            }
        }, [t.pending, lang]);

        useEffect(() => {  
            fetch(MAIN_CSV + "&t=" + Date.now()).then(r => r.text()).then(txt => {  
                Papa.parse(txt, { complete: (res) => {  
                    const rows = res.data; setHeaders(rows[0] || []);  
                    const qId = new URLSearchParams(window.location.search).get('id');  
                    const match = rows.slice(1).find(r => r[1] && r[1].toLowerCase() === (qId || "").toLowerCase());  
                    if (match) { setMember(match); fetch(MAPPING_CSV).then(r => r.text()).then(mTxt => { Papa.parse(mTxt, { header: true, complete: (mRes) => { mapPrize(match, mRes.data); setStatus("view"); } }); }); }  
                    else setStatus("search");  
                }});  
            });  
        }, [mapPrize]);  

        const clean = (val) => (val && val !== "#REF!" && val !== "") ? val : "---";

        if (status === "loading") return <div className="h-screen flex flex-col items-center justify-center font-black text-blue-600 animate-pulse text-2xl">DPSG LOADING...</div>;  

        return (  
            <div className={`min-h-screen pb-10 ${theme === 'dark' ? 'bg-slate-900 text-white' : 'bg-slate-50 text-slate-900'}`}>  
                <div className="no-print marquee"><p>{member ? (member[38] || "Welcome to Digital Problem Solution Group Nimbahera") : "DPSG Dashboard Loading..."}</p></div>  
                
                <div className="max-w-2xl mx-auto p-4 sm:p-8">  
                    <div className="no-print flex justify-between items-center mb-8">
                        <button onClick={()=>setLang(lang==='hi'?'en':'hi')} className="px-6 py-2 bg-blue-600 text-white rounded-full font-extrabold shadow-lg hover:scale-105 transition-all">
                            {lang === 'hi' ? 'Switch to English' : 'हिन्दी में देखें'}
                        </button>
                        <button onClick={()=>setTheme(theme==='light'?'dark':'light')} className="p-3 bg-white dark:bg-slate-800 rounded-full shadow-md text-xl">{theme==='light'?'🌙':'☀️'}</button>
                    </div>

                    {status === "search" ? (  
                        <div className="bg-white dark:bg-slate-800 p-12 rounded-[2.5rem] shadow-2xl text-center border-t-8 border-blue-600">  
                            <i className="fa-solid fa-id-card text-6xl stylish-gradient-text mb-6"></i>  
                            <h2 className="text-2xl font-black mb-8 uppercase tracking-tight">{t.idHeading}</h2>  
                            <input id="sid" type="text" className="w-full bg-slate-50 dark:bg-slate-700 border-2 rounded-2xl py-5 text-center mb-6 text-xl font-bold uppercase focus:ring-4 ring-blue-100 transition-all outline-none" placeholder="DPSG-26-XXXX" />  
                            <button onClick={() => window.location.href=`?id=${document.getElementById('sid').value}`} className="w-full bg-blue-600 py-5 rounded-2xl font-black text-white shadow-xl hover:bg-blue-700 transition-all">DASHBOARD</button>  
                        </div>  
                    ) : (  
                        <div className="space-y-8">  
                            <div className="text-center">  
                                <h1 className="text-4xl stylish-gradient-text italic uppercase leading-none">{t.brand}</h1>  
                                <p className="text-yellow-600 font-extrabold tracking-[0.2em] mt-2 uppercase text-xs">{t.service}</p>  
                            </div>  

                            <div className="no-print bg-white dark:bg-slate-800 p-6 rounded-[3rem] shadow-xl border relative overflow-hidden">
                                <div className="colorbar"></div>
                                <p className="text-red-600 font-black text-[12px] my-4 text-center animate-pulse uppercase">{t.warning}</p>
                                <div className={`p-2 rounded-[2.5rem] ${prize.isLocked ? 'bg-slate-100 dark:bg-slate-700' : prize.colorClass}`}>  
                                    {prize.isLocked ? ( <div className="p-24 text-center text-slate-400 font-bold italic"> <i className="fa-solid fa-lock text-5xl mb-4"></i> <p>{prize.msg}</p> </div> ) : (  
                                        <ScratchCard onComplete={() => confetti({particleCount:200, spread:70, origin:{y:0.6}})}>  
                                            <div className="p-8 text-center w-full bg-white dark:bg-slate-800 flex flex-col items-center">
                                                <div className="bg-blue-600 text-white px-10 py-2 rounded-full font-black text-md mb-8 uppercase shadow-xl tracking-widest">{prize.highlight}</div>  
                                                <img src={prize.img} className="w-full max-h-[480px] object-contain mb-8" alt="Prize" />  
                                                <p className="text-[14px] font-bold leading-relaxed whitespace-pre-line px-4">{prize.msg}</p>
                                            </div>
                                        </ScratchCard>  
                                    )}  
                                </div>
                            </div>

                            <div id="receipt" className="receipt-card p-12 text-left dark:bg-white dark:text-slate-900">  
                                <div className="colorbar"></div>
                                <div className="text-center border-b-2 border-dashed pb-8 mb-8 mt-4">
                                    <h3 className="font-black text-3xl stylish-gradient-text italic uppercase">{t.receipt}</h3>
                                </div>  
                                <div className="grid grid-cols-2 gap-y-10 text-sm border-b pb-10">  
                                    <div><p className="text-[10px] text-slate-400 font-black uppercase">IDENTITY ID</p><p className="text-2xl font-black text-blue-900">{clean(member[1])}</p></div>  
                                    <div className="text-right"><p className="text-[10px] text-slate-400 font-black uppercase">{t.category}</p><p className="font-black text-blue-700 px-5 py-1.5 border-2 border-blue-100 rounded-full bg-blue-50 inline-block">{clean(member[3])}</p></div>  
                                    <div><p className="text-[10px] text-slate-400 font-black uppercase">{t.name}</p><p className="font-black uppercase text-lg">{clean(member[8])}</p></div>  
                                    <div className="text-right"><p className="text-[10px] text-slate-400 font-black uppercase">{t.village}</p><p className="font-black uppercase text-lg">{clean(member[5])}</p></div>  
                                    <div><p className="text-[10px] text-slate-400 font-black uppercase">{t.mobile}</p><p className="font-bold tracking-widest">{mask(member[9])}</p></div>
                                    <div className="text-right"><p className="text-[10px] text-slate-400 font-black uppercase">{t.aadhar}</p><p className="font-bold tracking-widest">{mask(member[11])}</p></div>
                                    <div><p className="text-[10px] text-slate-400 font-black uppercase">{t.active}</p><p className="font-bold">{clean(member[15])}</p></div>  
                                    <div className="text-right"><p className="text-[10px] text-slate-400 font-black uppercase">{t.expiry}</p><p className="font-bold text-red-600">{clean(member[16])}</p></div>  
                                </div>
                                <div className="grid grid-cols-3 gap-5 my-10">
                                    <div className="bg-blue-600 text-white p-6 rounded-3xl text-center shadow-lg"><p className="text-[9px] font-bold opacity-70 uppercase">{t.points}</p><p className="text-3xl font-black">{clean(member[18])}</p></div>
                                    <div className="bg-slate-800 text-white p-6 rounded-3xl text-center shadow-lg"><p className="text-[9px] font-bold opacity-70 uppercase">{t.used}</p><p className="text-3xl font-black">{(parseInt(member[18])-parseInt(member[21]))||0}</p></div>
                                    <div className="bg-green-600 text-white p-6 rounded-3xl text-center shadow-lg"><p className="text-[9px] font-bold opacity-70 uppercase">{t.balance}</p><p className="text-3xl font-black">{clean(member[21])}</p></div>
                                </div>
                                <div className="bg-blue-50/50 p-8 rounded-[2rem] border border-blue-100 my-8 font-bold text-[11px] space-y-3">
                                    <p className="text-blue-700 font-black uppercase mb-4 flex items-center italic"><i className="fa-solid fa-crown mr-3"></i> {t.features}</p>
                                    {(() => { const cat = (member[3] || "").toLowerCase(); let key = (cat.includes("vip") || cat.includes("500")) ? "VIP" : (cat.includes("gold") || cat.includes("100")) ? "Gold" : "Silver"; return cardSpecs[key][lang].map((ben, i) => ( <div key={i} className="flex items-start py-2 border-b border-blue-100/50 last:border-0"><i className="fa-solid fa-circle-check text-green-500 mr-3 mt-1"></i>{ben}</div> )); })()}
                                </div>
                                <div className="bg-slate-900 text-white p-10 rounded-[2.5rem] text-center mb-10 shadow-2xl border-4 border-slate-800"><p className="text-[11px] opacity-50 uppercase mb-2 tracking-widest">{t.draw}</p><p className="text-4xl font-black text-yellow-500 italic uppercase tracking-widest">{clean(member[36])}</p></div>
                                <div className="bg-slate-50 p-10 rounded-[2.5rem] border border-slate-100 mb-10 text-[10px] font-bold space-y-4 text-slate-500">
                                    <h4 className="text-[11px] font-black uppercase mb-4 border-b pb-2 flex items-center text-slate-800"><i className="fa-solid fa-scale-balanced mr-3 text-blue-600"></i> {t.tTitle}</h4>
                                    <p>{t.t1}</p><p>{t.t2}</p>
                                </div>
                                <button onClick={()=>window.print()} className="no-print w-full bg-blue-600 text-white py-6 rounded-full font-black uppercase shadow-xl hover:bg-blue-700 transition-all text-lg">{t.printBtn}</button>
                            </div>
                            
                            {/* Admin Panel Footer */}
                            <div className="no-print pt-10 pb-20 flex flex-col items-center">  
                                {!isAdmin && <button onClick={()=>setShowPin(!showPin)} className="p-8 bg-white dark:bg-slate-800 rounded-full shadow-lg border opacity-20 hover:opacity-100 transition-all"><i className="fa-solid fa-fingerprint text-5xl text-blue-600"></i></button>}  
                                {showPin && !isAdmin && ( <div className="mt-4 bg-white dark:bg-slate-800 p-8 rounded-[2rem] border w-full animate-in zoom-in shadow-2xl"><input type="password" id="adminPin" className="w-full bg-slate-100 dark:bg-slate-700 rounded-2xl py-5 text-center mb-4 font-bold outline-none text-2xl" placeholder="PIN" /><button onClick={()=>{document.getElementById('adminPin').value===MASTER_PIN?setIsAdmin(true):alert("Wrong Pin!");}} className="w-full bg-black text-white py-5 rounded-2xl font-black uppercase">{t.unlock}</button></div> )}
                                {isAdmin && ( <div className="w-full mt-6 bg-white dark:bg-slate-800 border rounded-[2rem] p-10 text-left shadow-2xl overflow-hidden border-t-8 border-t-blue-600"><div className="flex justify-between items-center mb-8 border-b pb-4"><h3 className="font-black text-sm text-blue-600 uppercase tracking-widest">Master Database Panel</h3><button onClick={()=>setIsAdmin(false)} className="text-red-500 font-bold text-[11px] uppercase border px-4 py-1 rounded-full">Logout</button></div><div className="grid gap-4 max-h-[500px] overflow-y-auto pr-2 custom-scroll">{member.map((v, i) => ( <div key={i} className="p-5 bg-slate-50 dark:bg-slate-700 rounded-2xl border border-slate-200"><p className="text-[9px] text-slate-400 font-black uppercase mb-1">{headers[i] || `Index ${i}`}</p><p className="font-bold text-md text-slate-800 dark:text-slate-100">{v||"---"}</p></div> ))}</div></div> )}
                            </div>
                        </div>
                    )}
                </div>
            </div>  
        );  
    };  
    const root = ReactDOM.createRoot(document.getElementById('root')); root.render(<App />);  
    </script>
</body>  
</html>
